name: Build PG Extensions

# Builds the embedded-Postgres extension/FDW bundle (file_fdw, postgres_fdw, sqlite_fdw, mysql_fdw,
# pg_duckdb+iceberg) per platform, smoke-tests each in the same job, and attaches per-platform tarballs
# + a checksummed manifest to the Release. scripts/ci/build_pg_extensions.sh is the source of truth.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # upload release assets

concurrency:
  group: build-pg-ext-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- Unix (macOS + Linux): the proven bash/PGXS + vcpkg path -------------------------------------
  unix:
    name: pg-ext ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    # Matrix tracks the platforms pgserver actually ships an embedded-PG wheel for:
    #   macosx arm64 + x86_64, manylinux_2_17_x86_64, win_amd64.  NO Linux arm64 wheel exists, so
    #   Linux arm64 is intentionally absent (there is no embedded PG to load into there yet).
    # NOTE (glibc floor): pgserver's Linux wheel is manylinux_2_17 (glibc 2.17). For maximum
    #   compatibility the Linux .so should be built in a manylinux_2_17/2014 container; ubuntu-22.04
    #   (glibc 2.35) is a simpler start that only loads on 2.35+ hosts — tighten before GA.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,     os: darwin, arch: arm64 }
          # darwin-x64 (Intel mac) dropped: unsupported target; the macos-13 hosted runner is being
          # retired by GitHub and queues indefinitely. Apple Silicon (darwin-arm64) is the Mac target.
          - { runner: ubuntu-22.04, os: linux,  arch: x64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (macOS)
        if: matrix.os == 'darwin'
        run: brew install cmake ninja mariadb-connector-c

      - name: Install build deps (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git curl bison flex patchelf \
            libssl-dev liblz4-dev libzstd-dev libsqlite3-dev libmariadb-dev pkg-config

      - name: Setup Python 3.12 (pgserver smoke test)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bootstrap vcpkg (unshallow — pinned baselines) + cache
        uses: actions/cache@v4
        with:
          path: ~/vcpkg
          key: vcpkg-${{ matrix.os }}-${{ matrix.arch }}-v1
      - name: Ensure vcpkg
        run: |
          if [ ! -x "$HOME/vcpkg/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          fi

      - name: Cache PG source build + FDW clones
        uses: actions/cache@v4
        with:
          path: ~/.cache/provisa-fdw
          key: pgext-${{ matrix.os }}-${{ matrix.arch }}-pg16.2-pgduckdb-v1.0.0

      - name: Build the PG extension bundle
        env:
          PG_VERSION: '16.2'
          PG_DUCKDB_TAG: 'v1.0.0'
          VCPKG_TARGET_TRIPLET: ${{ matrix.arch == 'arm64' && (matrix.os == 'darwin' && 'arm64-osx' || 'arm64-linux') || (matrix.os == 'darwin' && 'x64-osx' || 'x64-linux') }}
        run: bash scripts/ci/build_pg_extensions.sh

      - name: Smoke-test (pgserver load + CREATE EXTENSION)
        run: |
          pip install pgserver asyncpg
          python scripts/ci/smoke_pg_extensions.py "dist/pg-ext/${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisa-pg-ext-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            dist/provisa-pg-ext-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            dist/provisa-pg-ext-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/ensure-release

      # gh release upload only ADDS assets — never flips draft/prerelease.
      - name: Attach to draft release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            "dist/provisa-pg-ext-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" \
            "dist/provisa-pg-ext-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256" \
            --clobber

  # ---- Windows: VIABLE (pgserver ships win_amd64), but a DIFFERENT toolchain — MSVC + .dll, no
  # PGXS/make. Core contrib + pg_duckdb build with MSVC + vcpkg (x64-windows triplet); sqlite_fdw/
  # mysql_fdw have no first-class MSVC build (would need bespoke .vcxproj or a MinGW build). This is a
  # native path in scripts/ci/build_pg_extensions.ps1 + smoke_pg_extensions.py (already OS-agnostic).
  # Kept green-optional until that PowerShell build exists.
  windows:
    name: pg-ext windows-x64 (experimental)
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native Windows PostgreSQL 16 (source of the built-in FDW DLLs)
        run: choco install postgresql16 --params "/Password:Passw0rd1" -y --no-progress
      - name: pip install pgserver
        run: python -m pip install pgserver
      - name: Probe — (Q1) does embedded pgserver boot? (Q2) acquire+load built-in FDW DLLs
        env:
          PGDATA_DIR: 'C:/pgd'
          PG16_HOME: 'C:/Program Files/PostgreSQL/16'
        run: python scripts/ci/win_pgserver_probe.py

  # Collect every platform's built bundles into ONE universal py3-none-any wheel (provisa-pg-ext) and
  # publish it to PyPI so `provisa[embedded]` gets the FDW binaries through PyPI/Artifactory — never
  # github.com/releases. The runtime (provisa.pg_extensions.catalog) stages the running platform's
  # blobs out of this wheel via provisa_pg_ext.ext_root(). Mirrors build-duckdb-extensions.yml.
  wheel:
    name: Build + publish provisa-pg-ext wheel
    needs: unix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: provisa-pg-ext-*
          path: pg-ext-artifacts
          merge-multiple: true

      - name: Extract tarballs -> raw <os>-<arch> trees
        run: |
          set -euo pipefail
          mkdir -p pg-ext-extracted
          for tb in pg-ext-artifacts/*.tar.gz; do
            # The tarball name (provisa-pg-ext-<os>-<arch>.tar.gz) carries the platform; its contents
            # (manifest.json + lib/) are NOT platform-prefixed, so extract each into its own dir.
            base="$(basename "$tb" .tar.gz)"; plat="${base#provisa-pg-ext-}"
            mkdir -p "pg-ext-extracted/$plat"
            tar -xzf "$tb" -C "pg-ext-extracted/$plat"
          done
          find pg-ext-extracted -name manifest.json | sort

      - name: Collect blobs into the package
        run: python packaging/pg-ext/collect.py pg-ext-extracted

      - name: Build the universal wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --sdist --outdir dist-pg-ext packaging/pg-ext

      - name: Publish provisa-pg-ext to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-pg-ext/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Ensure release exists
        if: startsWith(github.ref, 'refs/tags/')
        uses: ./.github/actions/ensure-release

      # gh release upload only ADDS assets — never flips draft/prerelease.
      - name: Attach wheel to draft release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" dist-pg-ext/* --clobber

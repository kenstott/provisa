name: Deploy Site

# Builds the MkDocs docs into site/docs and deploys the provisa.dev Cloudflare
# Pages project (marketing landing + /docs). exclude_docs in mkdocs.yml keeps
# internal-only pages (requirements traceability, GTM/competitor, private
# multi-tenant/SaaS) out of the published site.
on:
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - mkdocs.yml
      - scripts/gen_docs_index.py
      - site/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build docs into site/docs
        run: |
          pip install mkdocs-material pymdown-extensions
          python scripts/gen_docs_index.py
          mkdocs build --strict -d site/docs

      - name: Deploy to Cloudflare Pages
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler pages deploy --branch=main --commit-dirty=true

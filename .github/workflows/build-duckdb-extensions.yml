name: Build DuckDB Extensions

# Family A: mirror the DuckDB-proper extensions the standalone DuckDB engine needs (derived from the
# connector defs) for the pinned DuckDB version, per platform, and prove each LOADs. No compilation —
# these are official core + community builds, pinned + collected into a self-hostable repo layout for
# offline installs. Contrast build-pg-extensions.yml (Family B: native PG .so/.dylib we compile).
#
# Broader matrix than Family B: DuckDB ships arm64-Linux + Windows wheels, so the standalone engine
# (and thus its extensions) reach platforms the embedded-PG engine cannot.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-duckdb-ext-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mirror:
    name: duckdb-ext ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,        label: osx-arm64 }
          # osx-x64 (Intel mac) dropped: unsupported target; the macos-13 hosted runner is being
          # retired by GitHub and queues indefinitely. Apple Silicon (osx-arm64) is the Mac target.
          - { runner: ubuntu-22.04,    label: linux-x64 }
          - { runner: ubuntu-22.04-arm, label: linux-arm64 }
          - { runner: windows-latest,  label: windows-x64 }
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync (pins DuckDB + provisa; the mirror derives the list from the connector defs)
        run: uv sync --frozen --extra dev

      - name: Mirror + prove-load DuckDB extensions
        run: uv run python scripts/ci/mirror_duckdb_extensions.py dist/duckdb-ext/${{ matrix.label }}

      - name: Package
        shell: bash
        run: |
          cd dist/duckdb-ext
          tar -czf "../provisa-duckdb-ext-${{ matrix.label }}.tar.gz" "${{ matrix.label }}"
          cd ..
          ( command -v sha256sum >/dev/null && sha256sum "provisa-duckdb-ext-${{ matrix.label }}.tar.gz" \
            || shasum -a256 "provisa-duckdb-ext-${{ matrix.label }}.tar.gz" ) \
            > "provisa-duckdb-ext-${{ matrix.label }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisa-duckdb-ext-${{ matrix.label }}
          path: |
            dist/provisa-duckdb-ext-${{ matrix.label }}.tar.gz
            dist/provisa-duckdb-ext-${{ matrix.label }}.tar.gz.sha256

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/provisa-duckdb-ext-${{ matrix.label }}.tar.gz
            dist/provisa-duckdb-ext-${{ matrix.label }}.tar.gz.sha256

  # Collect every platform's mirrored blobs into ONE universal py3-none-any wheel (provisa-duckdb-ext)
  # and publish it to PyPI so `provisa[embedded]` gets the extensions through PyPI/Artifactory — never
  # extensions.duckdb.org. The runtime (provisa.federation.duckdb_extensions.stage_bundled_extensions)
  # copies the running platform's blobs out of this wheel on first run.
  wheel:
    name: Build + publish provisa-duckdb-ext wheel
    needs: mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform mirror artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: provisa-duckdb-ext-*
          path: mirror-artifacts
          merge-multiple: true

      - name: Extract tarballs -> raw <version>/<platform> trees
        run: |
          set -euo pipefail
          mkdir -p mirror-extracted
          find mirror-artifacts -name '*.tar.gz' -exec tar -xzf {} -C mirror-extracted \;
          find mirror-extracted -name '*.duckdb_extension' | sed 's|/[^/]*$||' | sort -u

      - name: Collect blobs into the package
        run: python packaging/duckdb-ext/collect.py mirror-extracted

      - name: Build the universal wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --sdist --outdir dist-ext packaging/duckdb-ext

      - name: Publish provisa-duckdb-ext to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-ext/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Attach wheel to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-ext/*

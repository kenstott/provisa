name: Release Exports

# On every release tag: generate and attach feature_matrix.csv,
# traceability_matrix.csv, and roadmap.md to the GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload release assets

jobs:
  exports:
    name: Generate and attach release exports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install deps
        run: uv sync --frozen --extra dev

      - name: Validate requirements.yaml
        run: uv run python scripts/validate_requirements.py

      - name: Generate feature matrix (buyers)
        run: uv run python scripts/gen_feature_matrix.py

      - name: Generate traceability matrix (auditors)
        run: uv run python scripts/gen_traceability_matrix.py

      - name: Generate roadmap
        run: uv run python scripts/gen_roadmap.py

      - name: Ensure release exists
        uses: ./.github/actions/ensure-release

      # gh release upload only ADDS assets — it never flips draft/prerelease, so
      # these secondary exports can never publish the draft ahead of the installer
      # builds (softprops would default draft:false and publish it).
      - name: Attach export assets to draft release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" \
            docs/exports/feature_matrix.csv \
            docs/exports/traceability_matrix.csv \
            docs/exports/roadmap.md \
            --clobber

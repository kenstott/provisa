name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
      linux_name: ${{ steps.meta.outputs.linux_name }}
      windows_name: ${{ steps.meta.outputs.windows_name }}
      jdbc_name: ${{ steps.meta.outputs.jdbc_name }}
      py_version: ${{ steps.meta.outputs.py_version }}
    steps:
      - name: Resolve channel and versions from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -alpha(\.|$) ]]; then
            CHANNEL=alpha
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -beta(\.|$) ]]; then
            CHANNEL=beta
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -rc(\.|$) ]]; then
            CHANNEL=rc
            IS_PRERELEASE=true
          else
            CHANNEL=stable
            IS_PRERELEASE=false
          fi
          # PEP 440 version: v0.1.0-alpha.1 → 0.1.0a1
          PY_VERSION=$(echo "$TAG" | sed 's/^v//' \
            | sed 's/-alpha\.\([0-9]*\)/a\1/' \
            | sed 's/-beta\.\([0-9]*\)/b\1/' \
            | sed 's/-rc\.\([0-9]*\)/rc\1/')
          echo "is_prerelease=$IS_PRERELEASE"                        >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"                                    >> "$GITHUB_OUTPUT"
          echo "dmg_name=Provisa-${TAG}-macOS.dmg"                  >> "$GITHUB_OUTPUT"
          echo "linux_name=Provisa-${TAG}-linux-x86_64.AppImage"    >> "$GITHUB_OUTPUT"
          echo "windows_name=Provisa-${TAG}-windows-x64.exe"        >> "$GITHUB_OUTPUT"
          echo "jdbc_name=provisa-jdbc-${TAG}.jar"                   >> "$GITHUB_OUTPUT"
          echo "py_version=$PY_VERSION"                              >> "$GITHUB_OUTPUT"

  build-vm-image:
    name: Build Provisa runtime VM (OVA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-utils e2fsprogs dosfstools parted util-linux

      - name: Download alpine-make-vm-image
        run: |
          curl -fsSL https://raw.githubusercontent.com/alpinelinux/alpine-make-vm-image/v0.13.4/alpine-make-vm-image \
            -o alpine-make-vm-image
          chmod +x alpine-make-vm-image

      - name: Build Alpine VM with dockerd
        run: |
          chmod +x packaging/windows/vm/configure-dockerd.sh
          sudo ./alpine-make-vm-image \
            --image-format qcow2 \
            --image-size 10G \
            --packages "docker docker-compose-plugin openrc" \
            --script-chroot \
            provisa-runtime.qcow2 \
            -- packaging/windows/vm/configure-dockerd.sh

      - name: Convert QCOW2 to VMDK (streamOptimized)
        run: |
          qemu-img convert -f qcow2 -O vmdk \
            -o subformat=streamOptimized \
            provisa-runtime.qcow2 provisa-runtime.vmdk
          VMDK_BYTES=$(stat -c %s provisa-runtime.vmdk)
          echo "VMDK_BYTES=${VMDK_BYTES}" >> "$GITHUB_ENV"

      - name: Create OVF descriptor
        run: |
          cat > provisa-runtime.ovf << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Envelope xmlns="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:ovf="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:rasd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_ResourceAllocationSettingData"
                    xmlns:vssd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_VirtualSystemSettingData"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <References>
              <File ovf:href="provisa-runtime.vmdk" ovf:id="file1" ovf:size="${VMDK_BYTES}"/>
            </References>
            <DiskSection>
              <Info>List of the virtual disks</Info>
              <Disk ovf:capacity="10737418240" ovf:diskId="disk1" ovf:fileRef="file1"
                    ovf:format="http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized"/>
            </DiskSection>
            <NetworkSection>
              <Info>Logical networks</Info>
              <Network ovf:name="NAT"><Description>NAT</Description></Network>
            </NetworkSection>
            <VirtualSystem ovf:id="Provisa">
              <Info>Provisa container runtime</Info>
              <Name>Provisa</Name>
              <OperatingSystemSection ovf:id="36">
                <Info>Alpine Linux x86_64</Info>
              </OperatingSystemSection>
              <VirtualHardwareSection>
                <Info>Virtual hardware</Info>
                <System>
                  <vssd:ElementName>Virtual Hardware Family</vssd:ElementName>
                  <vssd:InstanceID>0</vssd:InstanceID>
                  <vssd:VirtualSystemType>virtualbox-2.2</vssd:VirtualSystemType>
                </System>
                <Item>
                  <rasd:Caption>2 virtual CPUs</rasd:Caption>
                  <rasd:InstanceID>1</rasd:InstanceID>
                  <rasd:ResourceType>3</rasd:ResourceType>
                  <rasd:VirtualQuantity>2</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:AllocationUnits>MegaBytes</rasd:AllocationUnits>
                  <rasd:Caption>2048 MB RAM</rasd:Caption>
                  <rasd:InstanceID>2</rasd:InstanceID>
                  <rasd:ResourceType>4</rasd:ResourceType>
                  <rasd:VirtualQuantity>2048</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:Caption>SATA Controller</rasd:Caption>
                  <rasd:InstanceID>3</rasd:InstanceID>
                  <rasd:ResourceSubType>AHCI</rasd:ResourceSubType>
                  <rasd:ResourceType>20</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:Caption>disk0</rasd:Caption>
                  <rasd:HostResource>ovf:/disk/disk1</rasd:HostResource>
                  <rasd:InstanceID>4</rasd:InstanceID>
                  <rasd:Parent>3</rasd:Parent>
                  <rasd:ResourceType>17</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:Caption>NAT network adapter</rasd:Caption>
                  <rasd:Connection>NAT</rasd:Connection>
                  <rasd:InstanceID>5</rasd:InstanceID>
                  <rasd:ResourceSubType>E1000</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                </Item>
              </VirtualHardwareSection>
            </VirtualSystem>
          </Envelope>
          EOF

      - name: Package OVA
        run: |
          tar -cf provisa-runtime.ova provisa-runtime.ovf provisa-runtime.vmdk

      - name: Upload OVA artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisa-runtime-ova
          path: provisa-runtime.ova
          retention-days: 1
          compression-level: 0

  pull-images:
    name: Pull and save Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull service images and build zaychik
        run: |
          mkdir -p images
          for img in \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "minio/minio:latest" \
            "redis:7-alpine" \
            "trinodb/trino:480"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull "$img"
            docker save "$img" -o "images/${tag}.tar"
          done
          docker build -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local -o images/zaychik-local.tar

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images/
          retention-days: 1
          compression-level: 0

  build-python-client:
    name: Build and test Python client
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          pip install -e "provisa-client/[dev]" -q
          python -m pytest provisa-client/tests/ -x -q

      - name: Stamp version and build dist
        run: |
          sed -i 's/^version = .*/version = "${{ needs.metadata.outputs.py_version }}"/' \
            provisa-client/pyproject.toml
          pip install build -q
          python -m build provisa-client/ --outdir provisa-client/dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: python-client-dist
          path: provisa-client/dist/
          retention-days: 1

  build-jdbc:
    name: Build JDBC driver
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Build shaded JAR
        run: mvn -f jdbc-driver/pom.xml -B package -DskipTests

      - name: Rename JAR with version + channel
        run: |
          mv jdbc-driver/target/provisa-jdbc-*.jar \
             "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"

      - name: Upload JDBC JAR
        uses: actions/upload-artifact@v4
        with:
          name: jdbc-jar
          path: "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"
          retention-days: 1

  publish-pypi:
    name: Publish Python client to PyPI
    runs-on: ubuntu-latest
    needs: build-python-client
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  build-dmg:
    name: Build airgapped macOS DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: packaging/macos/images/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12

      - name: Build DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh

      - name: Rename DMG with version + channel
        run: |
          mv packaging/macos/dist/Provisa.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"
          retention-days: 1

  build-linux:
    name: Build airgapped Linux AppImage (${{ needs.metadata.outputs.channel }})
    runs-on: ubuntu-latest
    needs: [metadata, pull-images]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: packaging/linux/images/

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh

      - name: Rename AppImage
        run: |
          mv packaging/linux/dist/Provisa.AppImage \
             "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"
          retention-days: 1

  build-windows:
    name: Build airgapped Windows installer (${{ needs.metadata.outputs.channel }})
    runs-on: windows-latest
    needs: [metadata, pull-images, build-vm-image]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: packaging/windows/images/

      - name: Download Provisa runtime OVA
        uses: actions/download-artifact@v4
        with:
          name: provisa-runtime-ova
          path: packaging/windows/

      - name: Download VirtualBox installer
        shell: pwsh
        run: |
          $VBoxVersion = '7.1.6'
          $VBoxUrl = "https://download.virtualbox.org/virtualbox/${VBoxVersion}/VirtualBox-${VBoxVersion}-167084-Win.exe"
          New-Item -ItemType Directory -Path packaging/windows/redist -Force | Out-Null
          Write-Host "Downloading VirtualBox ${VBoxVersion}..."
          Invoke-WebRequest -Uri $VBoxUrl -OutFile packaging/windows/redist/VirtualBox-setup.exe -UseBasicParsing
          Write-Host "VirtualBox installer downloaded."

      - name: Install NSIS
        run: |
          choco install nsis --no-progress -y
          echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}
          WINDOWS_CERT_TIMESTAMP_URL: ${{ secrets.WINDOWS_CERT_TIMESTAMP_URL }}
        run: packaging/windows/build-installer.ps1

      - name: Rename installer
        shell: pwsh
        run: |
          Move-Item packaging/windows/dist/Provisa-Setup.exe `
            "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [metadata, build-dmg, build-linux, build-windows, build-jdbc, build-python-client, build-vm-image]
    permissions:
      contents: write
    steps:
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: release-assets/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-dist
          path: release-assets/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: release-assets/

      - name: Download JDBC JAR
        uses: actions/download-artifact@v4
        with:
          name: jdbc-jar
          path: release-assets/

      - name: Download Python client wheel
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: release-assets/

      - name: Delete existing release if present
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ needs.metadata.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            release-assets/${{ needs.metadata.outputs.dmg_name }}
            release-assets/${{ needs.metadata.outputs.linux_name }}
            release-assets/${{ needs.metadata.outputs.windows_name }}
            release-assets/${{ needs.metadata.outputs.jdbc_name }}
            release-assets/*.whl
          body: |
            ## Channel: `${{ needs.metadata.outputs.channel }}`

            | Asset | Platform / Use |
            |-------|----------------|
            | `${{ needs.metadata.outputs.dmg_name }}` | macOS (Apple Silicon + Intel, airgapped) |
            | `${{ needs.metadata.outputs.linux_name }}` | Linux x86_64 (airgapped AppImage) |
            | `${{ needs.metadata.outputs.windows_name }}` | Windows x64 (airgapped installer) |
            | `${{ needs.metadata.outputs.jdbc_name }}` | JDBC driver — Tableau, PowerBI, DBeaver |
            | `provisa_client-${{ needs.metadata.outputs.py_version }}-py3-none-any.whl` | Python client |

            ### macOS Install
            1. Download the DMG and drag **Provisa.app** to `/Applications`
            2. Double-click — first-launch setup runs once (~2 min, no internet required)
            3. `provisa start && provisa open`

            ### Linux Install
            ```bash
            chmod +x ${{ needs.metadata.outputs.linux_name }}
            ./${{ needs.metadata.outputs.linux_name }}   # one-time setup, no internet required
            provisa start && provisa open
            ```

            ### Windows Install
            1. Run `${{ needs.metadata.outputs.windows_name }}` — no admin rights required
            2. Open **Provisa First Launch** from the Start Menu — one-time setup (~5 min, no internet required)
            3. Open a new terminal:
            ```
            provisa start
            ```

            ### Python client
            ```bash
            pip install provisa-client==${{ needs.metadata.outputs.py_version }}
            ```

            ### JDBC
            Add `${{ needs.metadata.outputs.jdbc_name }}` to your BI tool's driver path.
            Connection URL: `jdbc:provisa://localhost:8001`

            See [deployment docs](https://github.com/${{ github.repository }}/blob/main/docs/deployment.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

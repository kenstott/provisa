name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build-dmg:
    name: Build airgapped macOS DMG
    runs-on: macos-14

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker (colima)
        run: |
          brew install colima docker docker-compose
          colima start --cpu 4 --memory 8

      - name: Build DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh

      - name: Upload DMG as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/macos/dist/Provisa.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Provisa Packages

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
      dmg_obs_name: ${{ steps.meta.outputs.dmg_obs_name }}
      dmg_demo_name: ${{ steps.meta.outputs.dmg_demo_name }}
      dmg_runtime_name: ${{ steps.meta.outputs.dmg_runtime_name }}
      linux_name: ${{ steps.meta.outputs.linux_name }}
      windows_name: ${{ steps.meta.outputs.windows_name }}
      windows_container_name: ${{ steps.meta.outputs.windows_container_name }}
      jdbc_name: ${{ steps.meta.outputs.jdbc_name }}
      py_version: ${{ steps.meta.outputs.py_version }}
      obs_images_name: ${{ steps.meta.outputs.obs_images_name }}
      demo_images_name: ${{ steps.meta.outputs.demo_images_name }}
      core_images_name: ${{ steps.meta.outputs.core_images_name }}
      core_images_amd64_name: ${{ steps.meta.outputs.core_images_amd64_name }}
      plugins_name: ${{ steps.meta.outputs.plugins_name }}
    steps:
      - name: Resolve channel and versions from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -alpha(\.|$) ]]; then
            CHANNEL=alpha
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -beta(\.|$) ]]; then
            CHANNEL=beta
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -rc(\.|$) ]]; then
            CHANNEL=rc
            IS_PRERELEASE=true
          else
            CHANNEL=stable
            IS_PRERELEASE=false
          fi
          # PEP 440 version: v0.1.0-alpha.1 → 0.1.0a1
          PY_VERSION=$(echo "$TAG" | sed 's/^v//' \
            | sed 's/-alpha\.\([0-9]*\)/a\1/' \
            | sed 's/-beta\.\([0-9]*\)/b\1/' \
            | sed 's/-rc\.\([0-9]*\)/rc\1/')
          echo "is_prerelease=$IS_PRERELEASE"                              >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"                                          >> "$GITHUB_OUTPUT"
          echo "dmg_name=Provisa-${TAG}-macOS.dmg"                        >> "$GITHUB_OUTPUT"
          echo "dmg_obs_name=Provisa-Obs-${TAG}-macOS.dmg"                >> "$GITHUB_OUTPUT"
          echo "dmg_demo_name=Provisa-Demo-${TAG}-macOS.dmg"              >> "$GITHUB_OUTPUT"
          echo "dmg_runtime_name=Provisa-Runtime-${TAG}-macOS.dmg"        >> "$GITHUB_OUTPUT"
          echo "linux_name=Provisa-${TAG}-linux-x86_64.AppImage"          >> "$GITHUB_OUTPUT"
          echo "windows_name=Provisa-${TAG}-windows-x64.exe"              >> "$GITHUB_OUTPUT"
          echo "windows_container_name=Provisa-Container-${TAG}-windows-x64.exe" >> "$GITHUB_OUTPUT"
          echo "jdbc_name=provisa-jdbc-${TAG}.jar"                         >> "$GITHUB_OUTPUT"
          echo "py_version=$PY_VERSION"                                    >> "$GITHUB_OUTPUT"
          echo "obs_images_name=provisa-obs-images-${TAG}.tar.gz"         >> "$GITHUB_OUTPUT"
          echo "demo_images_name=provisa-demo-images-${TAG}.tar.gz"       >> "$GITHUB_OUTPUT"
          echo "core_images_name=provisa-core-images-${TAG}.tar.gz"            >> "$GITHUB_OUTPUT"
          echo "core_images_amd64_name=provisa-core-images-amd64-${TAG}.zip" >> "$GITHUB_OUTPUT"
          echo "plugins_name=provisa-trino-plugins-${TAG}.tar.gz"            >> "$GITHUB_OUTPUT"

  # ── Calcite plugin download ──────────────────────────────────────────────────

  download-plugins:
    name: Download Calcite Trino plugins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugins from kenstott/calcite release
        run: |
          CALCITE_RELEASE="https://github.com/kenstott/calcite/releases/download/engine-v0.32.0"
          PLUGINS_DIR="trino/plugins"
          for plugin in trino-sharepoint trino-splunk trino-file; do
            curl -fsSL "$CALCITE_RELEASE/$plugin-plugin.zip" -o "$PLUGINS_DIR/$plugin-plugin.zip"
            unzip -q -o "$PLUGINS_DIR/$plugin-plugin.zip" -d "$PLUGINS_DIR"
            rm -f "$PLUGINS_DIR/$plugin-plugin.zip"
          done

      - name: Upload plugin directories
        uses: actions/upload-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/
          retention-days: 1
          compression-level: 0

  package-plugins:
    name: Package Trino plugins tarball for release
    runs-on: ubuntu-latest
    needs: [metadata, download-plugins]
    steps:
      - name: Download plugin directories
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino-plugins/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.plugins_name }}" -C trino-plugins/ .

      - name: Upload plugins tarball
        uses: actions/upload-artifact@v4
        with:
          name: plugins-tarball
          path: "${{ needs.metadata.outputs.plugins_name }}"
          retention-days: 1
          compression-level: 0

  # ── Image pull jobs (one per layer) ─────────────────────────────────────────

  pull-images-core:
    name: Pull core Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull core images and build zaychik
        run: |
          mkdir -p images
          for img in \
            "python:3.12-slim" \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "redis:7-alpine" \
            "busybox:latest" \
            "trinodb/trino:481"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/arm64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done
          docker build --platform linux/arm64 -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local | gzip -9 > images/zaychik-local.tar.gz

      - name: Build provisa wheels for linux/arm64
        run: |
          mkdir -p provisa-wheels
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src:ro" \
            -v "$PWD/provisa-wheels:/wheels" \
            python:3.12-slim \
            bash -c "cp -r /src /tmp/build && cd /tmp/build && pip wheel --no-cache-dir --wheel-dir /wheels ."

      - name: Upload core image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-core
          path: images/
          retention-days: 1
          compression-level: 0

      - name: Upload provisa wheels
        uses: actions/upload-artifact@v4
        with:
          name: provisa-wheels
          path: provisa-wheels/
          retention-days: 1
          compression-level: 0

  pull-images-core-amd64:
    name: Pull core Docker images (amd64) for OVA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull core images (amd64), build zaychik and provisa
        run: |
          mkdir -p images
          for img in \
            "python:3.12-slim" \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "redis:7-alpine" \
            "busybox:latest" \
            "trinodb/trino:481"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/amd64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done
          docker build --platform linux/amd64 -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local | gzip -9 > images/zaychik-local.tar.gz
          docker build --platform linux/amd64 -t provisa/provisa:local .
          docker save provisa/provisa:local | gzip -9 > images/provisa-local.tar.gz

      - name: Upload amd64 core image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-core-amd64
          path: images/
          retention-days: 1
          compression-level: 0

  pull-images-obs:
    name: Pull obs Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull obs images
        run: |
          mkdir -p images
          for img in \
            "minio/minio:latest" \
            "ghcr.io/smithclay/otlp2parquet:latest" \
            "otel/opentelemetry-collector-contrib:0.99.0" \
            "prom/prometheus:v2.51.2" \
            "grafana/tempo:2.4.1" \
            "grafana/grafana:10.4.2"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/arm64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done

      - name: Upload obs image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-obs
          path: images/
          retention-days: 1
          compression-level: 0

  pull-images-demo:
    name: Pull demo Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build demo images (all Python — no Java petstore)
        run: |
          mkdir -p images
          docker build --platform linux/arm64 -t provisa/petstore-demo:local ./demo/petstore_server
          docker save provisa/petstore-demo:local | gzip -9 > images/petstore-demo-local.tar.gz
          docker build --platform linux/arm64 -t provisa/graphql-demo:local ./demo/graphql_server
          docker save provisa/graphql-demo:local | gzip -9 > images/graphql-demo-local.tar.gz

      - name: Upload demo image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-demo
          path: images/
          retention-days: 1
          compression-level: 0

  # ── Python client + JDBC (unchanged) ────────────────────────────────────────

  build-python-client:
    name: Build and test Python client
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          pip install -e "provisa-client/[dev]" -q
          python -m pytest provisa-client/tests/ -x -q

      - name: Stamp version and build dist
        run: |
          sed -i 's/^version = .*/version = "${{ needs.metadata.outputs.py_version }}"/' \
            provisa-client/pyproject.toml
          pip install build -q
          python -m build provisa-client/ --outdir provisa-client/dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: python-client-dist
          path: provisa-client/dist/
          retention-days: 1

  build-provisa-wheel:
    name: Build provisa server wheel (embedded tier)
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20 (vite build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: provisa-ui/package-lock.json

      # build-wheel.sh runs `npm run build`, whose prebuild hook renders the offline
      # MkDocs site into provisa/_ui; without mkdocs on PATH it fails with ENOENT.
      - name: Install docs-site build deps (mkdocs)
        run: pip install mkdocs-material pymdown-extensions

      - name: Stamp version and build wheel (bundles UI + config + buenavista)
        run: |
          sed -i 's/^version = .*/version = "${{ needs.metadata.outputs.py_version }}"/' pyproject.toml
          pip install build -q
          scripts/build-wheel.sh --sdist --wheel

      - name: Verify the wheel is self-contained
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          wheel = glob.glob("dist/provisa-*.whl")[0]
          names = zipfile.ZipFile(wheel).namelist()
          missing = [n for n in ("provisa/cli.py", "buenavista/core.py") if n not in names]
          missing += [p for p in ("provisa/_ui/", "provisa/_config/") if not any(n.startswith(p) for n in names)]
          leaked = [n for n in names if "node_modules" in n or n.startswith("provisa_client/")]
          if missing or leaked:
              print("missing:", missing, "\nleaked:", leaked[:5]); sys.exit(1)
          print(f"OK: {wheel} self-contained ({len(names)} members)")
          PY

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: provisa-wheel-dist
          path: dist/
          retention-days: 1

  publish-provisa-pypi:
    name: Publish provisa server to PyPI
    runs-on: ubuntu-latest
    needs: build-provisa-wheel
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: provisa-wheel-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  build-jdbc:
    name: Build JDBC driver
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build shaded JAR
        run: mvn -f jdbc-driver/pom.xml -B package -DskipTests

      - name: Rename JAR with version + channel
        run: |
          mv jdbc-driver/target/provisa-jdbc-*.jar \
             "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"

      - name: Upload JDBC JAR
        uses: actions/upload-artifact@v4
        with:
          name: jdbc-jar
          path: "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"
          retention-days: 1

  publish-pypi:
    name: Publish Python client to PyPI
    runs-on: ubuntu-latest
    needs: build-python-client
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── macOS build jobs ─────────────────────────────────────────────────────────

  build-macos-core:
    name: Build macOS Core DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-core, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: packaging/macos/images/

      - name: Download provisa wheels
        uses: actions/download-artifact@v4
        with:
          name: provisa-wheels
          path: packaging/macos/tmp-provisa-wheels/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12
          security find-identity -v -p codesigning build.keychain

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: provisa-ui/package-lock.json

      - name: Build DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh

      - name: Rename DMGs with version + channel
        run: |
          mv packaging/macos/dist/Provisa.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"
          mv packaging/macos/dist/Provisa-Runtime.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_runtime_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-core-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"
          retention-days: 1

      - name: Upload runtime DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-runtime-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_runtime_name }}"
          retention-days: 1

  build-macos-obs:
    name: Build macOS Obs DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-obs, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download obs image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-obs
          path: packaging/macos/obs-images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12

      - name: Build Obs DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg-obs.sh
          packaging/macos/build-dmg-obs.sh

      - name: Rename DMG
        run: |
          mv packaging/macos/dist/Provisa-Obs.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_obs_name }}"

      - name: Upload Obs DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-obs-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_obs_name }}"
          retention-days: 1

  build-macos-demo:
    name: Build macOS Demo DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-demo, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download demo image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-demo
          path: packaging/macos/demo-images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12

      - name: Build Demo DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg-demo.sh
          packaging/macos/build-dmg-demo.sh

      - name: Rename DMG
        run: |
          mv packaging/macos/dist/Provisa-Demo.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_demo_name }}"

      - name: Upload Demo DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-demo-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_demo_name }}"
          retention-days: 1

  # ── Linux build job ──────────────────────────────────────────────────────────

  build-linux:
    name: Build Linux AppImage (core, ${{ needs.metadata.outputs.channel }})
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-core, pull-images-obs, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: packaging/linux/images/

      # Obs images are NOT bundled in the AppImage (2GB asset limit); they ship as the
      # provisa-obs-images-<version>.tar.gz add-on.

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh

      - name: Rename AppImage
        run: |
          mv packaging/linux/dist/Provisa.AppImage \
             "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"
          retention-days: 1

  # ── Windows build jobs ───────────────────────────────────────────────────────

  build-ui-dist:
    name: Build provisa-ui dist (Linux, for Windows native tier)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python (offline docs site)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs (offline docs site)
        run: pip install mkdocs-material pymdown-extensions

      - name: Build provisa-ui
        run: |
          cd provisa-ui
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisa-ui-dist
          path: provisa-ui/dist/
          retention-days: 1

  build-windows-core:
    name: Build Windows Core installer (${{ needs.metadata.outputs.channel }})
    runs-on: windows-latest
    needs: [metadata, build-ui-dist]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prebuilt provisa-ui dist
        uses: actions/download-artifact@v4
        with:
          name: provisa-ui-dist
          path: provisa-ui/dist/

      - name: Build installer (native tier, Inno Setup)
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}
          WINDOWS_CERT_TIMESTAMP_URL: ${{ secrets.WINDOWS_CERT_TIMESTAMP_URL }}
        run: packaging/windows/build-sfx.ps1

      - name: Rename installer
        shell: pwsh
        run: |
          Move-Item packaging/windows/dist/Provisa-Setup.exe `
            "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-core-dist
          path: "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"
          retention-days: 1

  build-windows-container:
    name: Build Windows Container-tier installer (${{ needs.metadata.outputs.channel }})
    runs-on: windows-latest
    needs: [metadata]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container-tier installer (WSL2, Inno Setup)
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}
          WINDOWS_CERT_TIMESTAMP_URL: ${{ secrets.WINDOWS_CERT_TIMESTAMP_URL }}
        run: packaging/windows/build-container.ps1

      - name: Rename installer
        shell: pwsh
        run: |
          Move-Item packaging/windows/dist/Provisa-Container-Setup.exe `
            "packaging/windows/dist/${{ needs.metadata.outputs.windows_container_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-container-dist
          path: "packaging/windows/dist/${{ needs.metadata.outputs.windows_container_name }}"
          retention-days: 1

  # ── Package extension image tarballs (Option A) ─────────────────────────────

  package-obs-images:
    name: Package obs image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-obs]
    steps:
      - name: Download obs image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-obs
          path: obs-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.obs_images_name }}" -C obs-images/ .

      - name: Upload obs images tarball
        uses: actions/upload-artifact@v4
        with:
          name: obs-images-tarball
          path: "${{ needs.metadata.outputs.obs_images_name }}"
          retention-days: 1
          compression-level: 0

  package-demo-images:
    name: Package demo image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-demo]
    steps:
      - name: Download demo image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-demo
          path: demo-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.demo_images_name }}" -C demo-images/ .

      - name: Upload demo images tarball
        uses: actions/upload-artifact@v4
        with:
          name: demo-images-tarball
          path: "${{ needs.metadata.outputs.demo_images_name }}"
          retention-days: 1
          compression-level: 0

  package-core-images:
    name: Package core image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-core]
    steps:
      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: core-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.core_images_name }}" -C core-images/ .

      - name: Upload core images tarball
        uses: actions/upload-artifact@v4
        with:
          name: core-images-tarball
          path: "${{ needs.metadata.outputs.core_images_name }}"
          retention-days: 1
          compression-level: 0

  package-core-images-amd64:
    name: Package amd64 core image tarballs for Windows release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-core-amd64]
    steps:
      - name: Download amd64 core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core-amd64
          path: core-images-amd64/

      - name: Package as zip (tarballs already compressed — store only)
        run: |
          cd core-images-amd64
          zip -0 "../${{ needs.metadata.outputs.core_images_amd64_name }}" *.tar.gz

      - name: Upload amd64 core images zip
        uses: actions/upload-artifact@v4
        with:
          name: core-images-amd64-tarball
          path: "${{ needs.metadata.outputs.core_images_amd64_name }}"
          retention-days: 1
          compression-level: 0

  # ── Release ──────────────────────────────────────────────────────────────────

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-macos-core
      - build-macos-obs
      - build-macos-demo
      - build-linux
      - build-windows-core
      - build-windows-container
      - build-jdbc
      - build-python-client
      - package-obs-images
      - package-demo-images
      - package-core-images
      - package-core-images-amd64
      - package-plugins
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-dist"
          path: release-assets/
          merge-multiple: true

      - name: Download JDBC JAR
        uses: actions/download-artifact@v4
        with:
          name: jdbc-jar
          path: release-assets/

      - name: Download Python client wheel
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: release-assets/

      - name: Download obs images tarball
        uses: actions/download-artifact@v4
        with:
          name: obs-images-tarball
          path: release-assets/

      - name: Download demo images tarball
        uses: actions/download-artifact@v4
        with:
          name: demo-images-tarball
          path: release-assets/

      - name: Download core images tarball
        uses: actions/download-artifact@v4
        with:
          name: core-images-tarball
          path: release-assets/

      - name: Download amd64 core images zip
        uses: actions/download-artifact@v4
        with:
          name: core-images-amd64-tarball
          path: release-assets/

      - name: Download Trino plugins tarball
        uses: actions/download-artifact@v4
        with:
          name: plugins-tarball
          path: release-assets/

      - name: Delete existing release if present
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ needs.metadata.outputs.is_prerelease != 'false' }}
          make_latest: "false"
          generate_release_notes: true
          files: |
            release-assets/${{ needs.metadata.outputs.dmg_name }}
            release-assets/${{ needs.metadata.outputs.dmg_runtime_name }}
            release-assets/${{ needs.metadata.outputs.dmg_obs_name }}
            release-assets/${{ needs.metadata.outputs.dmg_demo_name }}
            release-assets/${{ needs.metadata.outputs.linux_name }}
            release-assets/${{ needs.metadata.outputs.windows_name }}
            release-assets/${{ needs.metadata.outputs.windows_container_name }}
            release-assets/${{ needs.metadata.outputs.jdbc_name }}
            release-assets/${{ needs.metadata.outputs.obs_images_name }}
            release-assets/${{ needs.metadata.outputs.demo_images_name }}
            release-assets/${{ needs.metadata.outputs.core_images_name }}
            release-assets/${{ needs.metadata.outputs.core_images_amd64_name }}
            release-assets/${{ needs.metadata.outputs.plugins_name }}
            release-assets/*.whl
          body: |
            ## Channel: `${{ needs.metadata.outputs.channel }}`

            | Asset | Platform / Use |
            |-------|----------------|
            | `${{ needs.metadata.outputs.dmg_name }}` | macOS Core (Apple Silicon, airgapped) |
            | `${{ needs.metadata.outputs.dmg_runtime_name }}` | macOS native Python runtime (mount alongside Core) |
            | `${{ needs.metadata.outputs.dmg_obs_name }}` | macOS Observability extension |
            | `${{ needs.metadata.outputs.dmg_demo_name }}` | macOS Demo extension (requires Obs) |
            | `${{ needs.metadata.outputs.linux_name }}` | Linux x86_64 (core, airgapped AppImage; obs ships separately) |
            | `${{ needs.metadata.outputs.windows_name }}` | Windows x64 native installer (embedded Python, no Docker) |
            | `${{ needs.metadata.outputs.windows_container_name }}` | Windows x64 container-tier upgrade (WSL2 + Trino); fetches images on demand |
            | `${{ needs.metadata.outputs.core_images_amd64_name }}` | Core Services image tarballs — the container tier downloads this, or drop it beside the installer for airgap |
            | `${{ needs.metadata.outputs.jdbc_name }}` | JDBC driver — Tableau, PowerBI, DBeaver |
            | `provisa_client-${{ needs.metadata.outputs.py_version }}-py3-none-any.whl` | Python client |
            | `${{ needs.metadata.outputs.core_images_name }}` | Core Services (airgapped install) |
            | `${{ needs.metadata.outputs.obs_images_name }}` | Observability Stack (optional) |
            | `${{ needs.metadata.outputs.demo_images_name }}` | Demo Data Pack (optional) |
            | `${{ needs.metadata.outputs.plugins_name }}` | Coordination Engine connectors (SharePoint, Splunk, File) |

            ### macOS Install
            1. Download `${{ needs.metadata.outputs.dmg_name }}` **and** `${{ needs.metadata.outputs.dmg_runtime_name }}` (keep both in the same folder, e.g. ~/Downloads)
            2. Open the Core DMG, drag **Provisa.app** to `/Applications`. Double-click the Runtime DMG once to mount it (first-launch also auto-mounts it if found).
            3. Double-click **Provisa.app** — first-launch setup runs once (~2 min, no internet required)
            4. `provisa start && provisa open`
            5. **Optional**: Open `${{ needs.metadata.outputs.dmg_obs_name }}` and run `install-obs.sh` to add Observability Stack
            6. **Optional**: Open `${{ needs.metadata.outputs.dmg_demo_name }}` and run `install-demo.sh` to add Demo Data Pack (requires Observability Stack)

            ### Linux Install
            ```bash
            chmod +x ${{ needs.metadata.outputs.linux_name }}
            ./${{ needs.metadata.outputs.linux_name }}   # one-time setup (core; obs available as add-on)
            provisa start && provisa open
            ```

            ### Windows Install
            Run `${{ needs.metadata.outputs.windows_name }}` — the native tier (embedded Python) runs immediately, no Docker or VM.
            1. Run `${{ needs.metadata.outputs.windows_name }}`
            2. Launch **Provisa** from the Start Menu — first-launch stages the bundled runtime and starts the app
            3. `provisa start`

            **Optional container tier** (adds Trino + full compute via WSL2, no VirtualBox): download and run
            `${{ needs.metadata.outputs.windows_container_name }}`. It provisions a WSL2 distro with
            containerd, loads the bundled core images, and starts the compose stack. Reversible — switch
            back to the native tier at any time.

            ### Python client
            ```bash
            pip install provisa-client==${{ needs.metadata.outputs.py_version }}
            ```

            ### JDBC
            Add `${{ needs.metadata.outputs.jdbc_name }}` to your BI tool's driver path.
            Connection URL: `jdbc:provisa://localhost:8001`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

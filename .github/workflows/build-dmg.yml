name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
    steps:
      - name: Resolve channel from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -alpha(\.|$) ]]; then
            CHANNEL=alpha
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -beta(\.|$) ]]; then
            CHANNEL=beta
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -rc(\.|$) ]]; then
            CHANNEL=rc
            IS_PRERELEASE=true
          else
            CHANNEL=stable
            IS_PRERELEASE=false
          fi
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"             >> "$GITHUB_OUTPUT"
          echo "dmg_name=Provisa-${TAG}-macOS.dmg" >> "$GITHUB_OUTPUT"

  pull-images:
    name: Pull and save Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull service images and build zaychik
        run: |
          mkdir -p images
          for img in \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "minio/minio:latest" \
            "redis:7-alpine" \
            "trinodb/trino:480"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull "$img"
            docker save "$img" -o "images/${tag}.tar"
          done
          docker build -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local -o images/zaychik-local.tar

      - name: Upload image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images/
          retention-days: 1
          compression-level: 0

  build-dmg:
    name: Build airgapped macOS DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: packaging/macos/images/

      - name: Build DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh

      - name: Rename DMG with version + channel
        run: |
          mv packaging/macos/dist/Provisa.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ needs.metadata.outputs.is_prerelease }}
          generate_release_notes: true
          files: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"
          body: |
            ## Channel: `${{ needs.metadata.outputs.channel }}`

            | Asset | Platform |
            |-------|----------|
            | `${{ needs.metadata.outputs.dmg_name }}` | macOS (Apple Silicon + Intel, airgapped) |

            ### Install
            1. Download the DMG and drag **Provisa.app** to `/Applications`
            2. Double-click to run first-launch setup (~2 min)
            3. `provisa start && provisa open`

            See [deployment docs](https://github.com/${{ github.repository }}/blob/main/docs/deployment.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

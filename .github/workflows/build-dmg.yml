name: Build Provisa Packages

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      channel: ${{ steps.meta.outputs.channel }}
      dmg_name: ${{ steps.meta.outputs.dmg_name }}
      dmg_obs_name: ${{ steps.meta.outputs.dmg_obs_name }}
      dmg_demo_name: ${{ steps.meta.outputs.dmg_demo_name }}
      linux_name: ${{ steps.meta.outputs.linux_name }}
      windows_name: ${{ steps.meta.outputs.windows_name }}
      ova_name: ${{ steps.meta.outputs.ova_name }}
      jdbc_name: ${{ steps.meta.outputs.jdbc_name }}
      py_version: ${{ steps.meta.outputs.py_version }}
      obs_images_name: ${{ steps.meta.outputs.obs_images_name }}
      demo_images_name: ${{ steps.meta.outputs.demo_images_name }}
      core_images_name: ${{ steps.meta.outputs.core_images_name }}
      plugins_name: ${{ steps.meta.outputs.plugins_name }}
    steps:
      - name: Resolve channel and versions from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ -alpha(\.|$) ]]; then
            CHANNEL=alpha
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -beta(\.|$) ]]; then
            CHANNEL=beta
            IS_PRERELEASE=true
          elif [[ "$TAG" =~ -rc(\.|$) ]]; then
            CHANNEL=rc
            IS_PRERELEASE=true
          else
            CHANNEL=stable
            IS_PRERELEASE=false
          fi
          # PEP 440 version: v0.1.0-alpha.1 → 0.1.0a1
          PY_VERSION=$(echo "$TAG" | sed 's/^v//' \
            | sed 's/-alpha\.\([0-9]*\)/a\1/' \
            | sed 's/-beta\.\([0-9]*\)/b\1/' \
            | sed 's/-rc\.\([0-9]*\)/rc\1/')
          echo "is_prerelease=$IS_PRERELEASE"                              >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"                                          >> "$GITHUB_OUTPUT"
          echo "dmg_name=Provisa-${TAG}-macOS.dmg"                        >> "$GITHUB_OUTPUT"
          echo "dmg_obs_name=Provisa-Obs-${TAG}-macOS.dmg"                >> "$GITHUB_OUTPUT"
          echo "dmg_demo_name=Provisa-Demo-${TAG}-macOS.dmg"              >> "$GITHUB_OUTPUT"
          echo "linux_name=Provisa-${TAG}-linux-x86_64.AppImage"          >> "$GITHUB_OUTPUT"
          echo "windows_name=Provisa-${TAG}-windows-x64.exe"              >> "$GITHUB_OUTPUT"
          echo "ova_name=Provisa-${TAG}-runtime.ova"                       >> "$GITHUB_OUTPUT"
          echo "jdbc_name=provisa-jdbc-${TAG}.jar"                         >> "$GITHUB_OUTPUT"
          echo "py_version=$PY_VERSION"                                    >> "$GITHUB_OUTPUT"
          echo "obs_images_name=provisa-obs-images-${TAG}.tar.gz"         >> "$GITHUB_OUTPUT"
          echo "demo_images_name=provisa-demo-images-${TAG}.tar.gz"       >> "$GITHUB_OUTPUT"
          echo "core_images_name=provisa-core-images-${TAG}.tar.gz"       >> "$GITHUB_OUTPUT"
          echo "plugins_name=provisa-trino-plugins-${TAG}.tar.gz"         >> "$GITHUB_OUTPUT"

  build-vm-image:
    name: Build Provisa runtime VM (OVA)
    runs-on: ubuntu-latest
    needs: [pull-images-core-amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download amd64 core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core-amd64
          path: core-images-amd64/

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y qemu-utils qemu-system-x86 e2fsprogs dosfstools parted util-linux
          sudo chmod 666 /dev/kvm

      - name: Generate SSH key for VM pre-bake access
        run: ssh-keygen -t ed25519 -f /tmp/vm_key -N ""

      - name: Download alpine-make-vm-image
        run: |
          curl -fsSL https://raw.githubusercontent.com/alpinelinux/alpine-make-vm-image/v0.13.4/alpine-make-vm-image \
            -o alpine-make-vm-image
          chmod +x alpine-make-vm-image

      - name: Build Alpine VM with dockerd + sshd
        run: |
          chmod +x packaging/windows/vm/configure-dockerd.sh
          sudo ./alpine-make-vm-image \
            --image-format qcow2 \
            --image-size 20G \
            --packages "docker docker-compose openrc openssh" \
            --script-chroot \
            provisa-runtime.qcow2 \
            -- packaging/windows/vm/configure-dockerd.sh

      - name: Inject images and provisa source into VM filesystem
        run: |
          sudo modprobe nbd max_part=8
          sudo qemu-nbd --connect=/dev/nbd0 provisa-runtime.qcow2
          sleep 2
          sudo partprobe /dev/nbd0
          sleep 1
          ROOT_PART=$(sudo lsblk -ln -o NAME,FSTYPE /dev/nbd0 | awk '$2=="ext4"{print "/dev/"$1}' | head -1)
          sudo mkdir -p /mnt/vm
          sudo mount "$ROOT_PART" /mnt/vm

          sudo mkdir -p /mnt/vm/opt/provisa-images
          sudo cp core-images-amd64/*.tar.gz /mnt/vm/opt/provisa-images/

          sudo mkdir -p /mnt/vm/opt/provisa-source
          sudo cp Dockerfile main.py pyproject.toml /mnt/vm/opt/provisa-source/
          sudo cp -r provisa /mnt/vm/opt/provisa-source/
          sudo cp -r vendor /mnt/vm/opt/provisa-source/
          sudo mkdir -p /mnt/vm/opt/provisa-source/static

          sudo cp /tmp/vm_key.pub /mnt/vm/root/.ssh/authorized_keys
          sudo chmod 600 /mnt/vm/root/.ssh/authorized_keys

          sudo umount /mnt/vm
          sudo qemu-nbd --disconnect /dev/nbd0

      - name: Boot VM and pre-bake images
        run: |
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m 4096 -smp 2 \
            -drive file=provisa-runtime.qcow2,format=qcow2 \
            -netdev user,id=net0,hostfwd=tcp::2375-:2375,hostfwd=tcp::2222-:22 \
            -device e1000,netdev=net0 \
            -display none \
            -serial file:/tmp/vm-serial.log \
            -daemonize \
            -pidfile /tmp/qemu.pid

          echo "Waiting for sshd..."
          for i in $(seq 1 90); do
            ssh -p 2222 -i /tmp/vm_key \
              -o StrictHostKeyChecking=no -o ConnectTimeout=3 -o BatchMode=yes \
              root@localhost true 2>/dev/null && break
            sleep 5
          done

          echo "Waiting for Docker..."
          for i in $(seq 1 30); do
            ssh -p 2222 -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
              root@localhost 'docker info >/dev/null 2>&1' 2>/dev/null && break
            sleep 5
          done

          echo "Loading container images..."
          ssh -p 2222 -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            root@localhost 'for f in /opt/provisa-images/*.tar.gz; do echo "Loading $f"; docker load -i "$f"; done'

          echo "Building provisa/provisa:local..."
          ssh -p 2222 -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            root@localhost 'docker build -t provisa/provisa:local /opt/provisa-source'

          echo "Cleaning up and zeroing free space..."
          ssh -p 2222 -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            root@localhost 'docker system prune -f; rm -rf /opt/provisa-images /opt/provisa-source /root/.ssh; dd if=/dev/zero of=/zeros bs=1M 2>/dev/null; rm -f /zeros; sync'

          echo "Shutting down VM..."
          ssh -p 2222 -i /tmp/vm_key -o StrictHostKeyChecking=no -o BatchMode=yes \
            root@localhost 'poweroff' || true

          QPID=$(cat /tmp/qemu.pid 2>/dev/null || true)
          if [ -n "$QPID" ]; then
            echo "Waiting for QEMU PID $QPID to exit..."
            timeout 120 bash -c "while [ -d /proc/$QPID ]; do sleep 2; done" || \
              sudo kill "$QPID" 2>/dev/null || true
            sleep 2
          fi

          echo "--- VM serial log ---"
          cat /tmp/vm-serial.log || true

      - name: Convert QCOW2 to VMDK (streamOptimized)
        run: |
          sudo qemu-img convert -f qcow2 -O vmdk \
            -o subformat=streamOptimized \
            provisa-runtime.qcow2 provisa-runtime.vmdk
          VMDK_BYTES=$(stat -c %s provisa-runtime.vmdk)
          echo "VMDK_BYTES=${VMDK_BYTES}" >> "$GITHUB_ENV"

      - name: Create OVF descriptor
        run: |
          cat > provisa-runtime.ovf << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Envelope xmlns="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:ovf="http://schemas.dmtf.org/ovf/envelope/1"
                    xmlns:rasd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_ResourceAllocationSettingData"
                    xmlns:vssd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_VirtualSystemSettingData"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <References>
              <File ovf:href="provisa-runtime.vmdk" ovf:id="file1" ovf:size="${VMDK_BYTES}"/>
            </References>
            <DiskSection>
              <Info>List of the virtual disks</Info>
              <Disk ovf:capacity="21474836480" ovf:diskId="disk1" ovf:fileRef="file1"
                    ovf:format="http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized"/>
            </DiskSection>
            <NetworkSection>
              <Info>Logical networks</Info>
              <Network ovf:name="NAT"><Description>NAT</Description></Network>
            </NetworkSection>
            <VirtualSystem ovf:id="Provisa">
              <Info>Provisa container runtime</Info>
              <Name>Provisa</Name>
              <OperatingSystemSection ovf:id="36">
                <Info>Alpine Linux x86_64</Info>
              </OperatingSystemSection>
              <VirtualHardwareSection>
                <Info>Virtual hardware</Info>
                <System>
                  <vssd:ElementName>Virtual Hardware Family</vssd:ElementName>
                  <vssd:InstanceID>0</vssd:InstanceID>
                  <vssd:VirtualSystemType>virtualbox-2.2</vssd:VirtualSystemType>
                </System>
                <Item>
                  <rasd:Caption>2 virtual CPUs</rasd:Caption>
                  <rasd:InstanceID>1</rasd:InstanceID>
                  <rasd:ResourceType>3</rasd:ResourceType>
                  <rasd:VirtualQuantity>2</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:AllocationUnits>MegaBytes</rasd:AllocationUnits>
                  <rasd:Caption>2048 MB RAM</rasd:Caption>
                  <rasd:InstanceID>2</rasd:InstanceID>
                  <rasd:ResourceType>4</rasd:ResourceType>
                  <rasd:VirtualQuantity>2048</rasd:VirtualQuantity>
                </Item>
                <Item>
                  <rasd:Caption>SATA Controller</rasd:Caption>
                  <rasd:InstanceID>3</rasd:InstanceID>
                  <rasd:ResourceSubType>AHCI</rasd:ResourceSubType>
                  <rasd:ResourceType>20</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:Caption>disk0</rasd:Caption>
                  <rasd:HostResource>ovf:/disk/disk1</rasd:HostResource>
                  <rasd:InstanceID>4</rasd:InstanceID>
                  <rasd:Parent>3</rasd:Parent>
                  <rasd:ResourceType>17</rasd:ResourceType>
                </Item>
                <Item>
                  <rasd:Caption>NAT network adapter</rasd:Caption>
                  <rasd:Connection>NAT</rasd:Connection>
                  <rasd:InstanceID>5</rasd:InstanceID>
                  <rasd:ResourceSubType>E1000</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                </Item>
              </VirtualHardwareSection>
            </VirtualSystem>
          </Envelope>
          EOF

      - name: Package OVA
        run: |
          tar -cf provisa-runtime.ova provisa-runtime.ovf provisa-runtime.vmdk

      - name: Upload OVA artifact
        uses: actions/upload-artifact@v4
        with:
          name: provisa-runtime-ova
          path: provisa-runtime.ova
          retention-days: 1
          compression-level: 0

  rename-ova:
    name: Rename OVA with version
    runs-on: ubuntu-latest
    needs: [metadata, build-vm-image]
    steps:
      - name: Download OVA artifact
        uses: actions/download-artifact@v4
        with:
          name: provisa-runtime-ova
          path: ova-dist/

      - name: Rename OVA
        run: |
          mv ova-dist/provisa-runtime.ova \
             "ova-dist/${{ needs.metadata.outputs.ova_name }}"

      - name: Upload versioned OVA
        uses: actions/upload-artifact@v4
        with:
          name: ova-dist
          path: "ova-dist/${{ needs.metadata.outputs.ova_name }}"
          retention-days: 1
          compression-level: 0

  # ── Calcite plugin download ──────────────────────────────────────────────────

  download-plugins:
    name: Download Calcite Trino plugins
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download plugins from kenstott/calcite release
        run: |
          CALCITE_RELEASE="https://github.com/kenstott/calcite/releases/download/engine-v0.25.0"
          PLUGINS_DIR="trino/plugins"
          for plugin in trino-sharepoint trino-splunk trino-file; do
            curl -fsSL "$CALCITE_RELEASE/$plugin-plugin.zip" -o "$PLUGINS_DIR/$plugin-plugin.zip"
            unzip -q -o "$PLUGINS_DIR/$plugin-plugin.zip" -d "$PLUGINS_DIR"
            rm -f "$PLUGINS_DIR/$plugin-plugin.zip"
          done

      - name: Upload plugin directories
        uses: actions/upload-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/
          retention-days: 1
          compression-level: 0

  package-plugins:
    name: Package Trino plugins tarball for release
    runs-on: ubuntu-latest
    needs: [metadata, download-plugins]
    steps:
      - name: Download plugin directories
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino-plugins/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.plugins_name }}" -C trino-plugins/ .

      - name: Upload plugins tarball
        uses: actions/upload-artifact@v4
        with:
          name: plugins-tarball
          path: "${{ needs.metadata.outputs.plugins_name }}"
          retention-days: 1
          compression-level: 0

  # ── Image pull jobs (one per layer) ─────────────────────────────────────────

  pull-images-core:
    name: Pull core Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull core images and build zaychik
        run: |
          mkdir -p images
          for img in \
            "python:3.12-slim" \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "redis:7-alpine" \
            "trinodb/trino:481"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/arm64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done
          docker build --platform linux/arm64 -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local | gzip -9 > images/zaychik-local.tar.gz

      - name: Build provisa wheels for linux/arm64
        run: |
          mkdir -p provisa-wheels
          docker run --rm --platform linux/arm64 \
            -v "$PWD:/src:ro" \
            -v "$PWD/provisa-wheels:/wheels" \
            python:3.12-slim \
            bash -c "cp -r /src /tmp/build && cd /tmp/build && pip wheel --no-cache-dir --wheel-dir /wheels ."

      - name: Upload core image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-core
          path: images/
          retention-days: 1
          compression-level: 0

      - name: Upload provisa wheels
        uses: actions/upload-artifact@v4
        with:
          name: provisa-wheels
          path: provisa-wheels/
          retention-days: 1
          compression-level: 0

  pull-images-core-amd64:
    name: Pull core Docker images (amd64) for OVA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull core images (amd64) and build zaychik
        run: |
          mkdir -p images
          for img in \
            "python:3.12-slim" \
            "postgres:16" \
            "edoburu/pgbouncer:latest" \
            "redis:7-alpine" \
            "trinodb/trino:481"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/amd64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done
          docker build --platform linux/amd64 -t provisa/zaychik:local ./zaychik
          docker save provisa/zaychik:local | gzip -9 > images/zaychik-local.tar.gz

      - name: Upload amd64 core image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-core-amd64
          path: images/
          retention-days: 1
          compression-level: 0

  pull-images-obs:
    name: Pull obs Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull obs images
        run: |
          mkdir -p images
          for img in \
            "minio/minio:latest" \
            "ghcr.io/smithclay/otlp2parquet:latest" \
            "otel/opentelemetry-collector-contrib:0.99.0" \
            "prom/prometheus:v2.51.2" \
            "grafana/tempo:2.4.1" \
            "grafana/grafana:10.4.2"; do
            tag="${img##*/}"
            tag="${tag//:/-}"
            tag="${tag//\//-}"
            docker pull --platform linux/arm64 "$img"
            docker save "$img" | gzip -9 > "images/${tag}.tar.gz"
          done

      - name: Upload obs image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-obs
          path: images/
          retention-days: 1
          compression-level: 0

  pull-images-demo:
    name: Pull demo Docker images (arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Pull + build demo images
        run: |
          mkdir -p images
          docker pull --platform linux/amd64 "swaggerapi/petstore3:unstable"
          docker save "swaggerapi/petstore3:unstable" | gzip -9 > images/petstore3-unstable.tar.gz
          docker build --platform linux/arm64 -t provisa/graphql-demo:local ./demo/graphql_server
          docker save provisa/graphql-demo:local | gzip -9 > images/graphql-demo-local.tar.gz

      - name: Upload demo image tarballs
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-demo
          path: images/
          retention-days: 1
          compression-level: 0

  # ── Python client + JDBC (unchanged) ────────────────────────────────────────

  build-python-client:
    name: Build and test Python client
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and test
        run: |
          pip install -e "provisa-client/[dev]" -q
          python -m pytest provisa-client/tests/ -x -q

      - name: Stamp version and build dist
        run: |
          sed -i 's/^version = .*/version = "${{ needs.metadata.outputs.py_version }}"/' \
            provisa-client/pyproject.toml
          pip install build -q
          python -m build provisa-client/ --outdir provisa-client/dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: python-client-dist
          path: provisa-client/dist/
          retention-days: 1

  build-jdbc:
    name: Build JDBC driver
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build shaded JAR
        run: mvn -f jdbc-driver/pom.xml -B package -DskipTests

      - name: Rename JAR with version + channel
        run: |
          mv jdbc-driver/target/provisa-jdbc-*.jar \
             "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"

      - name: Upload JDBC JAR
        uses: actions/upload-artifact@v4
        with:
          name: jdbc-jar
          path: "jdbc-driver/target/${{ needs.metadata.outputs.jdbc_name }}"
          retention-days: 1

  publish-pypi:
    name: Publish Python client to PyPI
    runs-on: ubuntu-latest
    needs: build-python-client
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  # ── macOS build jobs ─────────────────────────────────────────────────────────

  build-macos-core:
    name: Build macOS Core DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-core, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: packaging/macos/images/

      - name: Download provisa wheels
        uses: actions/download-artifact@v4
        with:
          name: provisa-wheels
          path: packaging/macos/tmp-provisa-wheels/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12
          security find-identity -v -p codesigning build.keychain

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: provisa-ui/package-lock.json

      - name: Build DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg.sh
          packaging/macos/build-dmg.sh

      - name: Rename DMG with version + channel
        run: |
          mv packaging/macos/dist/Provisa.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-core-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_name }}"
          retention-days: 1

  build-macos-obs:
    name: Build macOS Obs DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-obs, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download obs image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-obs
          path: packaging/macos/obs-images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12

      - name: Build Obs DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg-obs.sh
          packaging/macos/build-dmg-obs.sh

      - name: Rename DMG
        run: |
          mv packaging/macos/dist/Provisa-Obs.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_obs_name }}"

      - name: Upload Obs DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-obs-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_obs_name }}"
          retention-days: 1

  build-macos-demo:
    name: Build macOS Demo DMG (${{ needs.metadata.outputs.channel }})
    runs-on: macos-14
    needs: [metadata, pull-images-demo, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download demo image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-demo
          path: packaging/macos/demo-images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Import Apple signing certificate
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12

      - name: Build Demo DMG
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          chmod +x packaging/macos/build-dmg-demo.sh
          packaging/macos/build-dmg-demo.sh

      - name: Rename DMG
        run: |
          mv packaging/macos/dist/Provisa-Demo.dmg \
             "packaging/macos/dist/${{ needs.metadata.outputs.dmg_demo_name }}"

      - name: Upload Demo DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-demo-dist
          path: "packaging/macos/dist/${{ needs.metadata.outputs.dmg_demo_name }}"
          retention-days: 1

  # ── Linux build job ──────────────────────────────────────────────────────────

  build-linux:
    name: Build Linux AppImage (core + obs, ${{ needs.metadata.outputs.channel }})
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-core, pull-images-obs, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: packaging/linux/images/

      - name: Download obs image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-obs
          path: packaging/linux/images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Build AppImage
        run: |
          chmod +x packaging/linux/build-appimage.sh
          packaging/linux/build-appimage.sh

      - name: Rename AppImage
        run: |
          mv packaging/linux/dist/Provisa.AppImage \
             "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: "packaging/linux/dist/${{ needs.metadata.outputs.linux_name }}"
          retention-days: 1

  # ── Windows build jobs ───────────────────────────────────────────────────────

  build-windows-core:
    name: Build Windows Core installer (${{ needs.metadata.outputs.channel }})
    runs-on: windows-latest
    needs: [metadata, pull-images-core, build-vm-image, download-plugins]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: packaging/windows/images/

      - name: Download Calcite plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: trino/plugins/

      - name: Download Provisa runtime OVA
        uses: actions/download-artifact@v4
        with:
          name: provisa-runtime-ova
          path: packaging/windows/

      - name: Download VirtualBox installer
        shell: pwsh
        run: |
          $VBoxVersion = '7.1.6'
          $VBoxUrl = "https://download.virtualbox.org/virtualbox/${VBoxVersion}/VirtualBox-${VBoxVersion}-167084-Win.exe"
          New-Item -ItemType Directory -Path packaging/windows/redist -Force | Out-Null
          Write-Host "Downloading VirtualBox ${VBoxVersion}..."
          Invoke-WebRequest -Uri $VBoxUrl -OutFile packaging/windows/redist/VirtualBox-setup.exe -UseBasicParsing
          Write-Host "VirtualBox installer downloaded."

      - name: Build installer (7-Zip SFX)
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PFX_PASSWORD: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}
          WINDOWS_CERT_TIMESTAMP_URL: ${{ secrets.WINDOWS_CERT_TIMESTAMP_URL }}
        run: packaging/windows/build-sfx.ps1

      - name: Rename installer
        shell: pwsh
        run: |
          Move-Item packaging/windows/dist/Provisa-Setup.exe `
            "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-core-dist
          path: "packaging/windows/dist/${{ needs.metadata.outputs.windows_name }}"
          retention-days: 1

  # ── Package extension image tarballs (Option A) ─────────────────────────────

  package-obs-images:
    name: Package obs image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-obs]
    steps:
      - name: Download obs image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-obs
          path: obs-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.obs_images_name }}" -C obs-images/ .

      - name: Upload obs images tarball
        uses: actions/upload-artifact@v4
        with:
          name: obs-images-tarball
          path: "${{ needs.metadata.outputs.obs_images_name }}"
          retention-days: 1
          compression-level: 0

  package-demo-images:
    name: Package demo image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-demo]
    steps:
      - name: Download demo image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-demo
          path: demo-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.demo_images_name }}" -C demo-images/ .

      - name: Upload demo images tarball
        uses: actions/upload-artifact@v4
        with:
          name: demo-images-tarball
          path: "${{ needs.metadata.outputs.demo_images_name }}"
          retention-days: 1
          compression-level: 0

  package-core-images:
    name: Package core image tarballs for release
    runs-on: ubuntu-latest
    needs: [metadata, pull-images-core]
    steps:
      - name: Download core image tarballs
        uses: actions/download-artifact@v4
        with:
          name: docker-images-core
          path: core-images/

      - name: Package as single tarball
        run: |
          tar -czf "${{ needs.metadata.outputs.core_images_name }}" -C core-images/ .

      - name: Upload core images tarball
        uses: actions/upload-artifact@v4
        with:
          name: core-images-tarball
          path: "${{ needs.metadata.outputs.core_images_name }}"
          retention-days: 1
          compression-level: 0

  # ── Release ──────────────────────────────────────────────────────────────────

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-macos-core
      - build-macos-obs
      - build-macos-demo
      - build-linux
      - build-windows-core
      - build-jdbc
      - build-python-client
      - rename-ova
      - package-obs-images
      - package-demo-images
      - package-core-images
      - package-plugins
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-dist"
          path: release-assets/
          merge-multiple: true

      - name: Download JDBC JAR
        uses: actions/download-artifact@v4
        with:
          name: jdbc-jar
          path: release-assets/

      - name: Download Python client wheel
        uses: actions/download-artifact@v4
        with:
          name: python-client-dist
          path: release-assets/

      - name: Download obs images tarball
        uses: actions/download-artifact@v4
        with:
          name: obs-images-tarball
          path: release-assets/

      - name: Download demo images tarball
        uses: actions/download-artifact@v4
        with:
          name: demo-images-tarball
          path: release-assets/

      - name: Download core images tarball
        uses: actions/download-artifact@v4
        with:
          name: core-images-tarball
          path: release-assets/

      - name: Download Trino plugins tarball
        uses: actions/download-artifact@v4
        with:
          name: plugins-tarball
          path: release-assets/

      - name: Delete existing release if present
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ needs.metadata.outputs.is_prerelease != 'false' }}
          make_latest: "false"
          generate_release_notes: true
          files: |
            release-assets/${{ needs.metadata.outputs.dmg_name }}
            release-assets/${{ needs.metadata.outputs.dmg_obs_name }}
            release-assets/${{ needs.metadata.outputs.dmg_demo_name }}
            release-assets/${{ needs.metadata.outputs.linux_name }}
            release-assets/${{ needs.metadata.outputs.windows_name }}
            release-assets/${{ needs.metadata.outputs.ova_name }}
            release-assets/${{ needs.metadata.outputs.jdbc_name }}
            release-assets/${{ needs.metadata.outputs.obs_images_name }}
            release-assets/${{ needs.metadata.outputs.demo_images_name }}
            release-assets/${{ needs.metadata.outputs.core_images_name }}
            release-assets/${{ needs.metadata.outputs.plugins_name }}
            release-assets/*.whl
          body: |
            ## Channel: `${{ needs.metadata.outputs.channel }}`

            | Asset | Platform / Use |
            |-------|----------------|
            | `${{ needs.metadata.outputs.dmg_name }}` | macOS Core (Apple Silicon, airgapped) |
            | `${{ needs.metadata.outputs.dmg_obs_name }}` | macOS Observability extension |
            | `${{ needs.metadata.outputs.dmg_demo_name }}` | macOS Demo extension (requires Obs) |
            | `${{ needs.metadata.outputs.linux_name }}` | Linux x86_64 (core + obs, airgapped AppImage) |
            | `${{ needs.metadata.outputs.windows_name }}` | Windows x64 Core installer |
            | `${{ needs.metadata.outputs.ova_name }}` | Alpine Linux OVA (VirtualBox runtime) |
            | `${{ needs.metadata.outputs.jdbc_name }}` | JDBC driver — Tableau, PowerBI, DBeaver |
            | `provisa_client-${{ needs.metadata.outputs.py_version }}-py3-none-any.whl` | Python client |
            | `${{ needs.metadata.outputs.core_images_name }}` | Core Docker images (airgapped install) |
            | `${{ needs.metadata.outputs.obs_images_name }}` | Observability Docker images (optional) |
            | `${{ needs.metadata.outputs.demo_images_name }}` | Demo Docker images (optional) |
            | `${{ needs.metadata.outputs.plugins_name }}` | Trino connector plugins (SharePoint, Splunk, File) |

            ### macOS Install
            1. Download `${{ needs.metadata.outputs.dmg_name }}` — drag **Provisa.app** to `/Applications`
            2. Double-click — first-launch setup runs once (~2 min, no internet required)
            3. `provisa start && provisa open`
            4. **Optional**: Open `${{ needs.metadata.outputs.dmg_obs_name }}` and run `install-obs.sh` to add observability
            5. **Optional**: Open `${{ needs.metadata.outputs.dmg_demo_name }}` and run `install-demo.sh` to add demo data (requires obs)

            ### Linux Install
            ```bash
            chmod +x ${{ needs.metadata.outputs.linux_name }}
            ./${{ needs.metadata.outputs.linux_name }}   # one-time setup, includes observability
            provisa start && provisa open
            ```

            ### Windows Install
            **Online**: Run `${{ needs.metadata.outputs.windows_name }}` → Start Menu → **Provisa First Launch** (downloads images automatically)
            **Airgapped**: Download installer + `${{ needs.metadata.outputs.core_images_name }}` + any extension tarballs to same folder, then run installer
            1. Run `${{ needs.metadata.outputs.windows_name }}`
            2. Open **Provisa First Launch** from the Start Menu
            3. `provisa start`
            4. **Optional**: check Observability / Demo in setup GUI (or place tarballs in same folder for airgap)

            ### Python client
            ```bash
            pip install provisa-client==${{ needs.metadata.outputs.py_version }}
            ```

            ### JDBC
            Add `${{ needs.metadata.outputs.jdbc_name }}` to your BI tool's driver path.
            Connection URL: `jdbc:provisa://localhost:8001`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

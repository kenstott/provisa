name: Ensure release exists
description: >-
  Idempotently create the GitHub release for the pushed tag so the several
  tag-triggered workflows (and their parallel matrix jobs) never race on
  creation. After this runs, every softprops/action-gh-release step only ever
  performs an idempotent update, never a create POST that can return
  "already_exists".
runs:
  using: composite
  steps:
    - name: Ensure release exists
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAG: ${{ github.ref_name }}
      run: |
        set -euo pipefail
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Release $TAG already exists."
          exit 0
        fi
        case "$TAG" in
          *-alpha*|*-beta*|*-rc*) pre=--prerelease ;;
          *) pre= ;;
        esac
        # Concurrent creators: exactly one POST wins; the losers get 422
        # "already_exists". That is tolerated ONLY when the release genuinely
        # exists afterward (the `gh release view` below). Any other failure —
        # bad token, network, invalid tag — leaves no release and fails loudly.
        gh release create "$TAG" --title "$TAG" --generate-notes --latest=false $pre \
          || gh release view "$TAG" >/dev/null 2>&1

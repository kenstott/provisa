# Test-only services (kafka, schema-registry, mongodb, elasticsearch, neo4j,
# fuseki) layered onto docker-compose.core.yml INSIDE one isolated compose project
# (see tests/conftest.py::_DockerServiceManager). They share that project's own
# default network, so Trino/debezium reach kafka (kafka:29092) and the others by
# service name — no external dev network. Host ports are ephemeral (${*_PORT},
# allocated per run) and there are no fixed container_names, so the isolated stack
# never collides with the local dev stack or a parallel run.
#
# Usage (core + test in the SAME project):
#   docker compose -p provisa-itest -f docker-compose.core.yml -f docker-compose.test.yml up -d --wait
services:
  kafka:
    hostname: kafka
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.6.0
    # HOST listener published on the same ephemeral port both sides so the advertised
    # address handed back to host clients (localhost:${KAFKA_HOST_PORT}) is reachable.
    ports:
      - "${KAFKA_HOST_PORT:-9092}:${KAFKA_HOST_PORT:-9092}"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,HOST://localhost:${KAFKA_HOST_PORT:-9092}"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:${KAFKA_HOST_PORT:-9092}"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 3W4Vn7JTS4yUfx7dcvUlPg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_test_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:${KAFKA_HOST_PORT:-9092} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 42
      start_period: 120s

  schema-registry:
    hostname: schema-registry
    restart: unless-stopped
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  mariadb:
    restart: unless-stopped
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: provisa
      MARIADB_DATABASE: provisa
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  tidb:
    restart: unless-stopped
    image: pingcap/tidb:latest
    ports:
      - "${TIDB_PORT:-4000}:4000"
    volumes:
      - tidb_test_data:/tmp/tidb
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/4000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  cockroachdb:
    restart: unless-stopped
    image: cockroachdb/cockroach:v24.1.0
    command: start-single-node --insecure
    ports:
      - "${COCKROACHDB_PORT:-26257}:26257"
    volumes:
      - cockroach_test_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  yugabytedb:
    restart: unless-stopped
    image: yugabytedb/yugabyte:latest
    command: ["bin/yugabyted", "start", "--background=false"]
    ports:
      - "${YUGABYTEDB_PORT:-5433}:5433"
    volumes:
      - yugabyte_test_data:/home/yugabyte/var
    healthcheck:
      test: ["CMD-SHELL", "bin/yugabyted status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 120s

  sqlserver:
    restart: unless-stopped
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Provisa_2026!"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - mssql_test_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"Provisa_2026!\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  oracle:
    restart: unless-stopped
    image: gvenzl/oracle-free:slim
    environment:
      ORACLE_PASSWORD: provisa
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracle_test_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  # Connector source (federation-engine → Trino cassandra catalog, not a direct driver).
  # Trino reaches it in-network at cassandra:9042; ${CASSANDRA_PORT} is host-published only
  # for seeding via `docker exec ... cqlsh`. Slow to boot (JVM + gossip), hence start_period.
  cassandra:
    restart: unless-stopped
    image: cassandra:5
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: provisa-itest
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_test_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  # Reached via the DuckDB firebird COMMUNITY EXTENSION (REQ-899), not a Trino connector and not a
  # direct driver — DuckDBFirebirdConnector ATTACHes it in place from an in-process DuckDB connection.
  # ${FIREBIRD_PORT} is host-published for both the in-process DuckDB ATTACH and seeding via
  # `docker exec ... isql`; there is no Trino catalog involved for this source type.
  firebird:
    restart: unless-stopped
    image: jacobalberty/firebird:v4
    ports:
      - "${FIREBIRD_PORT:-3050}:3050"
    environment:
      FIREBIRD_DATABASE: test.fdb
      FIREBIRD_USER: provisa
      FIREBIRD_PASSWORD: provisa
      ISC_PASSWORD: masterkey
    volumes:
      - firebird_test_data:/firebird/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /firebird/data/test.fdb || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Connector source (Trino exasol catalog). Image is linux/amd64 only — unbootable under arm64
  # emulation, so the test is arch-gated (skipif) and this service is dropped from provisioning on
  # non-amd64 hosts (conftest). Trino reaches it in-network at exasol:8563.
  exasol:
    restart: unless-stopped
    image: exasol/docker-db:latest
    privileged: true
    shm_size: 2g
    ports:
      - "${EXASOL_PORT:-8563}:8563"
    volumes:
      - exasol_test_data:/exa
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8563' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  singlestore:
    restart: unless-stopped
    image: ghcr.io/singlestore-labs/singlestoredb-dev:latest
    environment:
      SINGLESTORE_LICENSE: "${SINGLESTORE_LICENSE:-}"
      ROOT_PASSWORD: provisa
    ports:
      - "${SINGLESTORE_PORT:-3306}:3306"
    volumes:
      - singlestore_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -pprovisa || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Connector source (federation-engine → Trino splunk catalog, not a direct driver — see
  # TrinoSplunkConnector in provisa/federation/trino_connectors.py). Trino reaches it in-network at
  # splunk:8089 over the Splunk management/REST port (the trino-splunk plugin wraps Calcite's Splunk
  # JDBC driver, itself REST-based — no separate "query port"). ${SPLUNK_MGMT_PORT} is host-published
  # so the TEST PROCESS can seed an index/data-model via the same management REST API from outside the
  # container; ${SPLUNK_HEC_PORT} is host-published only for seeding events via HTTP Event Collector.
  # Neither host-published port is used by Trino. Newer Splunk images require BOTH the general terms
  # AND license acceptance env vars or the container refuses to start. Slow to boot (full Splunk
  # instance init), hence the long start_period — the image ships its own readiness script.
  splunk:
    restart: unless-stopped
    image: splunk/splunk:latest
    ports:
      - "${SPLUNK_MGMT_PORT:-8089}:8089"
      - "${SPLUNK_HEC_PORT:-8088}:8088"
    environment:
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: Provisa_2026!
    volumes:
      - splunk_test_data:/opt/splunk/var
    healthcheck:
      test: ["CMD", "/sbin/checkstate.sh"]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 180s

  # Reached via the DuckDB `airport` COMMUNITY EXTENSION (REQ-899/1097), not a Trino connector and
  # not a direct driver — DuckDBAirportConnector ATTACHes it in place from an in-process DuckDB
  # connection (same shape as firebird above). airport speaks a bespoke Arrow Flight application
  # protocol (custom DoAction/catalog RPCs) distinct from Flight SQL — zaychik (Flight SQL) cannot
  # serve it, hence this tiny purpose-built server (tests/fixtures/airport_shim, ~30 lines of Go
  # via github.com/hugr-lab/airport-go) exposing a static catalog: schema "test", table "widgets".
  # Plaintext gRPC, no TLS, no auth. ${AIRPORT_PORT} is host-published because the in-process
  # DuckDB connection (running in the pytest process on the HOST, not in this compose network)
  # attaches directly at grpc://localhost:${AIRPORT_PORT} — there is no Trino catalog involved.
  airport-shim:
    restart: unless-stopped
    build: ./tests/fixtures/airport_shim
    image: airport-shim:latest
    ports:
      - "${AIRPORT_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "50051"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Connector source (federation-engine → Trino pinot catalog, not a direct driver) — REQ-1097.
  # QuickStart -type batch brings up zookeeper+controller+broker+server in ONE container with sample
  # tables (airlineStats, baseballStats, …). Trino reaches the controller in-network at pinot:9000;
  # ${PINOT_CONTROLLER_PORT}/${PINOT_BROKER_PORT} are host-published only for the seeding/wait probe.
  pinot:
    restart: unless-stopped
    image: apachepinot/pinot:1.2.0
    command: ["QuickStart", "-type", "batch"]
    ports:
      - "${PINOT_CONTROLLER_PORT:-9000}:9000"
      - "${PINOT_BROKER_PORT:-8099}:8099"
    environment:
      JAVA_OPTS: "-Xms256M -Xmx1G"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 120s

  # Druid as a connector-source (federation-engine -> Trino druid catalog, not a direct driver).
  # Trino reaches the BROKER in-network at druid:8082 over Avatica; the source's jdbc_url() emits
  # jdbc:avatica:remote:url=http://druid:8082/druid/v2/sql/avatica/ (see provisa/core/models.py).
  # The official apache/druid image has NO perl, so bin/supervise (the single-container quickstart)
  # cannot run — Druid must be split into its normal processes (each via /druid.sh <service>) with an
  # external ZooKeeper and a Postgres metadata store, exactly the upstream multi-container layout.
  # amd64-only image -> runs under emulation on arm64 (like exasol), hence the generous start_period.
  # ${DRUID_BROKER_PORT}/${DRUID_COORD_PORT} are host-published ONLY so the test process can poll the
  # broker and submit ingestion tasks to the overlord (coordinator asOverlord); Trino never uses them.
  druid-zookeeper:
    restart: unless-stopped
    image: zookeeper:3.8
    environment:
      ZOO_MY_ID: "1"
      ZOO_4LW_COMMANDS_WHITELIST: ruok
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  druid-metadata:
    restart: unless-stopped
    image: postgres:16
    environment:
      POSTGRES_USER: druid
      POSTGRES_PASSWORD: diurd
      POSTGRES_DB: druid
    volumes:
      - druid_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid -d druid"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  druid-coordinator:
    restart: unless-stopped
    image: &druid_image apache/druid:30.0.0
    platform: linux/amd64
    command: ["coordinator"]
    depends_on:
      druid-zookeeper: {condition: service_healthy}
      druid-metadata: {condition: service_healthy}
    ports:
      - "${DRUID_COORD_PORT:-8081}:8081"
    environment: &druid_env
      ZOOKEEPER: druid-zookeeper
      DRUID_XMS: 256m
      DRUID_XMX: 512m
      DRUID_MAXDIRECTMEMORYSIZE: 512m
      druid_metadata_storage_type: postgresql
      druid_metadata_storage_connector_connectURI: jdbc:postgresql://druid-metadata:5432/druid
      druid_metadata_storage_connector_user: druid
      druid_metadata_storage_connector_password: diurd
      druid_extensions_loadList: '["postgresql-metadata-storage", "druid-multi-stage-query"]'
      druid_storage_type: local
      druid_storage_storageDirectory: /opt/shared/segments
      druid_indexer_logs_type: file
      druid_indexer_logs_directory: /opt/shared/indexing-logs
      druid_processing_numThreads: "1"
      druid_processing_numMergeBuffers: "2"
      druid_processing_buffer_sizeBytes: "50000000"
      druid_server_maxSize: "100000000"
      druid_emitter: noop
      druid_indexer_runner_javaOptsArray: '["-server","-Xms256m","-Xmx256m","-XX:MaxDirectMemorySize=256m","-Duser.timezone=UTC","-Dfile.encoding=UTF-8"]'
      druid_coordinator_asOverlord_enabled: "true"
      druid_coordinator_asOverlord_overlordService: druid/overlord
    volumes:
      - druid_shared:/opt/shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 180s

  druid-historical:
    restart: unless-stopped
    image: *druid_image
    platform: linux/amd64
    command: ["historical"]
    depends_on:
      druid-coordinator: {condition: service_healthy}
    environment: *druid_env
    volumes:
      - druid_shared:/opt/shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8083/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 180s

  druid-middlemanager:
    restart: unless-stopped
    image: *druid_image
    platform: linux/amd64
    command: ["middleManager"]
    depends_on:
      druid-coordinator: {condition: service_healthy}
    environment: *druid_env
    volumes:
      - druid_shared:/opt/shared
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8091/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 180s

  # The BROKER is the query entry point Trino's druid connector attaches to (druid:8082 Avatica).
  # Named "druid" so the Source.host handed to create_catalog resolves it on the isolated network.
  druid:
    restart: unless-stopped
    image: *druid_image
    platform: linux/amd64
    command: ["broker"]
    depends_on:
      druid-coordinator: {condition: service_healthy}
    ports:
      - "${DRUID_BROKER_PORT:-8082}:8082"
    environment: *druid_env
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8082/status/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 180s

  mongodb:
    restart: unless-stopped
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  elasticsearch:
    restart: unless-stopped
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_test_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  neo4j:
    restart: unless-stopped
    image: neo4j:5.19
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  fuseki:
    restart: unless-stopped
    image: atomgraph/fuseki:latest
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    command: ["--mem", "/provisa"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null 'http://localhost:3030/provisa/query?query=ASK%7B%7D' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  # Debezium Connect (REQ-824 CDC). Lives here now (was in dev.yml) so it shares the
  # isolated project's network with kafka + postgres and reaches them by service name.
  debezium-connect:
    restart: unless-stopped
    image: quay.io/debezium/connect:2.7
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Prometheus for the prometheus-connector integration test (requires_prometheus).
  # Internal-only: Trino's connector reaches it at prometheus:9090 on the project
  # network. Reuses the dev scrape config — its trino:8080 target resolves inside
  # this project, so the `up` metric populates and the test can query it.
  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.51.2
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Hive (local warehouse) as a connector-source: Trino reaches the Thrift metastore at
  # hive-metastore:9083 and reads table data from a warehouse volume SHARED with Trino at the same
  # path (/opt/hive/data/warehouse) via Trino's Hadoop-native filesystem (fs.hadoop.enabled). The
  # metastore records file:/ locations; both containers run uid 1000 so the shared volume is writable
  # by each. Seeding is done THROUGH Trino (CREATE TABLE / INSERT) — no beeline needed. The Derby
  # metastore DB is embedded (DB_DRIVER=derby); schema is auto-initialized by the image entrypoint.
  hive-metastore:
    restart: unless-stopped
    image: &hive_image apache/hive:4.0.0
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/9083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 90s

  # Hive on S3 (MinIO) as a connector-source: the same Thrift metastore, but the warehouse lives on
  # s3a://provisa-hive-s3. The metastore is given the bundled hadoop-aws + aws-sdk jars
  # (HIVE_AUX_JARS_PATH) and the S3A settings (db/hive-s3-conf/hive-site.xml) so it can create the
  # database dir on MinIO; Trino reads the data via its NATIVE S3 filesystem. Reuses the core MinIO
  # service (reached at minio:9000 on the project network).
  hive-s3-metastore:
    restart: unless-stopped
    image: *hive_image
    depends_on:
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      HIVE_AUX_JARS_PATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
    volumes:
      - ./db/hive-s3-conf:/hive-custom-conf:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/9083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 90s

volumes:
  hive_warehouse:
  kafka_test_data:
  mariadb_test_data:
  tidb_test_data:
  cockroach_test_data:
  yugabyte_test_data:
  mssql_test_data:
  oracle_test_data:
  singlestore_test_data:
  cassandra_test_data:
  firebird_test_data:
  exasol_test_data:
  splunk_test_data:
  druid_metadata_data:
  druid_shared:

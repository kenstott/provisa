# Test-only services (kafka, schema-registry, mongodb, elasticsearch, neo4j,
# fuseki) layered onto docker-compose.core.yml INSIDE one isolated compose project
# (see tests/conftest.py::_DockerServiceManager). They share that project's own
# default network, so Trino/debezium reach kafka (kafka:29092) and the others by
# service name — no external dev network. Host ports are ephemeral (${*_PORT},
# allocated per run) and there are no fixed container_names, so the isolated stack
# never collides with the local dev stack or a parallel run.
#
# Usage (core + test in the SAME project):
#   docker compose -p provisa-itest -f docker-compose.core.yml -f docker-compose.test.yml up -d --wait
services:
  kafka:
    hostname: kafka
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.6.0
    # HOST listener published on the same ephemeral port both sides so the advertised
    # address handed back to host clients (localhost:${KAFKA_HOST_PORT}) is reachable.
    ports:
      - "${KAFKA_HOST_PORT:-9092}:${KAFKA_HOST_PORT:-9092}"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,HOST://localhost:${KAFKA_HOST_PORT:-9092}"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:${KAFKA_HOST_PORT:-9092}"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 3W4Vn7JTS4yUfx7dcvUlPg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_test_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:${KAFKA_HOST_PORT:-9092} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 42
      start_period: 120s

  schema-registry:
    hostname: schema-registry
    restart: unless-stopped
    image: confluentinc/cp-schema-registry:7.6.0
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  mariadb:
    restart: unless-stopped
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: provisa
      MARIADB_DATABASE: provisa
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  tidb:
    restart: unless-stopped
    image: pingcap/tidb:latest
    ports:
      - "${TIDB_PORT:-4000}:4000"
    volumes:
      - tidb_test_data:/tmp/tidb
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/4000' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  cockroachdb:
    restart: unless-stopped
    image: cockroachdb/cockroach:v24.1.0
    command: start-single-node --insecure
    ports:
      - "${COCKROACHDB_PORT:-26257}:26257"
    volumes:
      - cockroach_test_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  yugabytedb:
    restart: unless-stopped
    image: yugabytedb/yugabyte:latest
    command: ["bin/yugabyted", "start", "--background=false"]
    ports:
      - "${YUGABYTEDB_PORT:-5433}:5433"
    volumes:
      - yugabyte_test_data:/home/yugabyte/var
    healthcheck:
      test: ["CMD-SHELL", "bin/yugabyted status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 120s

  sqlserver:
    restart: unless-stopped
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Provisa_2026!"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - mssql_test_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"Provisa_2026!\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  oracle:
    restart: unless-stopped
    image: gvenzl/oracle-free:slim
    environment:
      ORACLE_PASSWORD: provisa
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    volumes:
      - oracle_test_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  # Connector source (federation-engine → Trino cassandra catalog, not a direct driver).
  # Trino reaches it in-network at cassandra:9042; ${CASSANDRA_PORT} is host-published only
  # for seeding via `docker exec ... cqlsh`. Slow to boot (JVM + gossip), hence start_period.
  cassandra:
    restart: unless-stopped
    image: cassandra:5
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: provisa-itest
      CASSANDRA_DC: datacenter1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_test_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  # Reached via the DuckDB firebird COMMUNITY EXTENSION (REQ-899), not a Trino connector and not a
  # direct driver — DuckDBFirebirdConnector ATTACHes it in place from an in-process DuckDB connection.
  # ${FIREBIRD_PORT} is host-published for both the in-process DuckDB ATTACH and seeding via
  # `docker exec ... isql`; there is no Trino catalog involved for this source type.
  firebird:
    restart: unless-stopped
    image: jacobalberty/firebird:v4
    ports:
      - "${FIREBIRD_PORT:-3050}:3050"
    environment:
      FIREBIRD_DATABASE: test.fdb
      FIREBIRD_USER: provisa
      FIREBIRD_PASSWORD: provisa
      ISC_PASSWORD: masterkey
    volumes:
      - firebird_test_data:/firebird/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /firebird/data/test.fdb || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  singlestore:
    restart: unless-stopped
    image: ghcr.io/singlestore-labs/singlestoredb-dev:latest
    environment:
      SINGLESTORE_LICENSE: "${SINGLESTORE_LICENSE:-}"
      ROOT_PASSWORD: provisa
    ports:
      - "${SINGLESTORE_PORT:-3306}:3306"
    volumes:
      - singlestore_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -pprovisa || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  mongodb:
    restart: unless-stopped
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  elasticsearch:
    restart: unless-stopped
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_test_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  neo4j:
    restart: unless-stopped
    image: neo4j:5.19
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_test_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  fuseki:
    restart: unless-stopped
    image: atomgraph/fuseki:latest
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    command: ["--mem", "/provisa"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null 'http://localhost:3030/provisa/query?query=ASK%7B%7D' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  # Debezium Connect (REQ-824 CDC). Lives here now (was in dev.yml) so it shares the
  # isolated project's network with kafka + postgres and reaches them by service name.
  debezium-connect:
    restart: unless-stopped
    image: quay.io/debezium/connect:2.7
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Prometheus for the prometheus-connector integration test (requires_prometheus).
  # Internal-only: Trino's connector reaches it at prometheus:9090 on the project
  # network. Reuses the dev scrape config — its trino:8080 target resolves inside
  # this project, so the `up` metric populates and the test can query it.
  prometheus:
    restart: unless-stopped
    image: prom/prometheus:v2.51.2
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  kafka_test_data:
  mariadb_test_data:
  tidb_test_data:
  cockroach_test_data:
  yugabyte_test_data:
  mssql_test_data:
  oracle_test_data:
  singlestore_test_data:
  cassandra_test_data:
  firebird_test_data:
  mongo_test_data:
  es_test_data:
  neo4j_test_data:

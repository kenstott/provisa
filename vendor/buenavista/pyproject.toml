[project]
name = "buenavista"
version = "0.5.0.post1"
description = "Provisa fork of buenavista — adds binary codecs for DECIMAL, JSON, and array types"
requires-python = ">=3.12"
dependencies = [
    "python-dateutil",
    "sqlglot",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["buenavista*"]

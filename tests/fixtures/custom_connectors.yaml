# REQ-1177 conformance descriptors — three real, non-OOTB extensions, one per mechanism.
# Selected via PROVISA_CUSTOM_CONNECTORS in the connector tests.
connectors:
  - engine: postgres          # PG SQL/MED → mongo_fdw
    source_type: mongodb
    kind: pg_fdw
    extension: mongo_fdw
    mechanism: attach_r
    server_options: {address: "{host}", port: "{port}"}
    user_mapping: {username: "{username}", password: "{password}"}
    supports_import: false
    table_options: {database: "{database}", collection: "{table_name}"}
  - engine: duckdb            # DuckDB ATTACH → ducklake
    source_type: ducklake
    kind: duckdb_attach
    extension: ducklake
    install_from_community: false
    probe_symbol: ducklake_snapshots
    mechanism: attach_rw
    attach_template: "ATTACH 'ducklake:{path}' AS \"{alias}\" (DATA_PATH '{data_path}')"
    remote_schema: main
  - engine: duckdb            # DuckDB SCAN → excel/read_xlsx
    source_type: xlsx
    kind: duckdb_scan
    extension: excel
    install_from_community: false
    probe_symbol: read_xlsx
    scan_template: "read_xlsx('{path}')"

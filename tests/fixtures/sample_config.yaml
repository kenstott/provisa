sources:
  - id: sales-pg
    type: postgresql
    host: localhost
    # Direct-driver path reaches the isolated stack's postgres on its ephemeral
    # published port (parse_config_dict resolves ${env:...} for int fields too);
    # Trino federates via its own static catalog (postgres:5432 internal).
    port: ${env:PG_PORT:-5432}
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD}

domains:
  - id: sales-analytics
    description: Sales operational and analytical data
  - id: product-catalog
    description: Product catalog data

naming:
  domain_prefix: true
  rules:
    - pattern: "^prod_pg_"
      replace: ""

tables:
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: orders
    governance: pre-approved
    columns:
      - name: id
        data_type: integer
        visible_to: [admin, analyst]
      - name: customer_id
        visible_to: [admin, analyst]
      - name: amount
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
      - name: status
        visible_to: [admin, analyst]
      - name: created_at
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: customers
    governance: pre-approved
    columns:
      - name: id
        data_type: integer
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: email
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: product-catalog
    schema: public
    table: products
    governance: registry-required
    columns:
      - name: id
        data_type: integer
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: price
        visible_to: [admin]
      - name: category
        visible_to: [admin, analyst]

relationships:
  - id: orders-to-customers
    source_table_id: orders
    target_table_id: customers
    source_column: customer_id
    target_column: id
    cardinality: many-to-one

roles:
  - id: admin
    capabilities:
      - source_registration
      - table_registration
      - create_relationship
      - access_config
      - query_development
      - approve_view
      - admin
    domain_access: ["*"]
  - id: analyst
    capabilities:
      - query_development
      - ad_hoc_query
    domain_access:
      - sales-analytics

kafka_sources:
  # The kafka source query (REQ-147) runs through Trino, which is a container on
  # the compose network — it reaches the broker at the internal listener
  # kafka:29092, not the host's localhost:9092. Host-side producers (tests) write
  # to the same broker via the HOST listener (localhost:9092).
  - id: kafka-support
    bootstrap_servers: kafka:29092
    topics:
      - id: tickets
        topic: support.tickets
        domain_id: sales-analytics
        description: "Inbound support tickets"
        default_window: 1h
        columns:
          - name: ticket_id
          - name: subject
          - name: status

rls_rules:
  - table_id: orders
    role_id: analyst
    filter: "region = current_setting('provisa.user_region')"

functions:
  # REQ-1159: python-impl command that ENRICHES orders inline (composed-command E2E). In-process,
  # so no external service; narrow input contract {id, region}, derived-only output.
  - name: enrich_orders
    description: Enrich orders inline — deterministic score + region label (REQ-1159)
    domain_id: sales-analytics
    kind: query
    impl_kind: python
    source_id: ""
    function_name: enrich_orders
    returns: ""
    binding:
      callable: demo.py_functions:enrich_orders
    arguments:
      - name: input
        type: String
        arg_kind: result_set
        columns:
          - {name: id, type: integer}
          - {name: region, type: text}
    visible_to: [admin]
    output_columns:
      - {name: id, type: integer}
      - {name: score, type: double}
      - {name: region_label, type: text}
    return_schema:
      type: array
      items:
        type: object
        properties:
          id: {type: integer}
          score: {type: number}
          region_label: {type: string}

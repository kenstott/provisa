- id: REQ-881
  status: complete
  since: "2026-07"
  group: "4. Source Connectors"
  category: Materialization Store
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Probe-based freshness gate on the MV REFRESH path, opt-in per MV — the refresh-time
    application of REQ-855's centralized freshness gate to the materialized-view role.
    MOTIVATION: relationship-based (join-pattern) MVs are expensive to rebuild — a full Trino
    CTAS / DELETE+INSERT of the join every cycle. Today the background refresh loop gates purely
    on TTL (MVRegistry.get_due_for_refresh compares now - last_refresh_at >= refresh_interval),
    so a due MV pays the full rebuild every interval EVEN WHEN NO SOURCE CHANGED. FIX: add a
    per-MV freshness_mode (ttl [default, current behavior] | probe | ttl_probe). For probe /
    ttl_probe, before the expensive materialization the refresh computes an opaque per-MV change
    token from the REQ-862 per-source input signals (Iceberg snapshot id / RDB watermark MAX,
    already gathered by provisa/mv/input_signals.py::gather_input_signals) and compares it by
    equality to the token stored at last refresh: unchanged → skip the rebuild, reset the TTL,
    keep the materialized rows and FRESH status (zero lag at probe cost); changed → rebuild and
    store the new token. ttl_probe probes only after the TTL floor elapses (caps probe
    frequency); probe re-checks every loop ignoring TTL. SAFETY: a token is usable only when
    EVERY source produces one (len(signals) == len(source_tables)); if any source is
    token-less the entry degrades to TTL and rebuilds normally — never skip on partial signal
    (REQ-855 None-degrades-to-TTL, REQ-847 capability-signal-not-silent-fallback). Opt-in is
    per MV so cheap MVs keep plain TTL and only expensive relationship MVs pay the probe.
    Mutual exclusivity with delta (REQ-874) and the shared coordination catalog (REQ-879) follow
    REQ-855: the same materialized_input_version stamp is the probe token and the dedup key.
  use_case: >-
    Lets a steward gate an expensive relationship-based MV so its costly join is rebuilt only
    when a source actually changed, trading a cheap per-source probe (snapshot id / watermark)
    for skipping a full re-materialization every interval — zero-lag freshness where rebuild
    cost is high, plain TTL where it is not.
  code:
    - provisa/mv/models.py
    - provisa/mv/registry.py
    - provisa/mv/refresh.py
    - provisa/mv/input_signals.py
  tests:
    - tests/unit/test_mv_probe_freshness.py
  scenario: |
    Given a relationship MV with freshness_mode="probe" over an Iceberg-backed source and a
    last_input_token equal to the source's current snapshot id
    When the refresh loop processes it
    Then the refresh computes the source token, finds it unchanged, and skips the rebuild
    (no DELETE/CREATE) — resetting the TTL and keeping the materialized rows FRESH
    And when the source snapshot id later differs, the same MV rebuilds and stores the new token
    And an MV where any source yields no token degrades to plain TTL (never skips on partial signal)
  notes: >-
    DONE (2026-07): MVDefinition gains freshness_mode (ttl | probe | ttl_probe) + last_input_token;
    MVRegistry.get_due_for_refresh returns probe-mode MVs every loop (ttl_probe keeps the TTL floor);
    refresh_mv gathers the REQ-862 per-source signals first and, for probe/ttl_probe, builds an
    input_token (usable only when EVERY source produced a signal, else degrade to TTL) and skips the
    expensive rebuild + size-count probe via MVRegistry.mark_unchanged when it equals last_input_token,
    storing the fresh token after a real rebuild. Single-instance token store today; fleet-wide
    persistence of the token is REQ-879's shared refresh-coordination catalog (by design — the same
    stamp is the dedup key there).
  related_reqs:
    - REQ-855
    - REQ-862
    - REQ-874
    - REQ-879
    - REQ-847
- id: REQ-882
  status: complete
  since: "2026-07"
  group: "4. Source Connectors"
  category: Materialization Store
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Wire the aggregate MV rewrite path into the live query execution path.
    Populate AggregateMVCatalog from MVRegistry on startup, invoke aggregate rewrite
    in the endpoint query path, and enforce filter subset-safety before rewriting.
    DONE (2026-07): (1) POPULATE — MVRegistry.register/unregister now sync the process
    aggregate-MV catalog (provisa/mv/aggregate_catalog.get_aggregate_catalog()), so every MV
    registered at startup is visible to rewriting; register() is a no-op for non-aggregate MVs.
    (2) INVOKE — the endpoint query path calls rewrite_if_aggregate_match after the join-MV
    rewriter (provisa/mv/rewriter.py); only when the join rewrite did not already fire. It extracts
    a single-table aggregate query via sqlglot (base table, columns inside aggregate functions,
    top-level AND filter fragments; queries with a JOIN, multiple tables, or no aggregate are left
    alone) and, on a covering MV, rewrites FROM to the MV target and sets sources to the MV catalog.
    (3) SUBSET-SAFETY — find_aggregate_mv now enforces it (the prior code skipped the check its
    docstring promised): a new MVDefinition.filters records the predicates the aggregate MV was
    pre-computed with, and an MV is usable only when set(mv.filters) is a SUBSET of the query's
    filters (an unfiltered MV is always safe); the query's remaining filters (query − MV) are
    re-applied on the MV at rewrite so no rows the query wants are silently dropped.
  use_case: >-
    Enables query acceleration via pre-computed aggregates stored in materialized views,
    allowing queries requesting SUM/AVG/etc over MV-backed tables to read pre-aggregated
    results instead of materializing raw rows and computing aggregates at query time.
  code:
    - provisa/mv/aggregate_catalog.py
    - provisa/mv/registry.py
    - provisa/mv/rewriter.py
    - provisa/mv/models.py
    - provisa/api/data/endpoint.py
  tests:

    Given a JDBC or psycopg2 client using $1, $2 positional parameters
    When the query executes
    Then parameters are substituted as SQL literals before reaching the upstream engine

- id: REQ-582
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    pgwire DDL dispatches to one of two paths based on `ddl_catalog`. Trino path (non-registered
    catalog such as `iceberg`, `hive`, `otel`, `results`): supports only `CREATE TABLE` and
    `CREATE VIEW`; ALTER, DROP, and CREATE INDEX are rejected. Direct path (registered source ID):
    supports full DDL including CREATE, ALTER, DROP, indexes, and sequences.
  use_case: >-
    Two DDL paths let stewards write tables to Iceberg for lake storage or directly to registered
    RDBMS sources for full DDL control.
  code:
    - provisa/pgwire/ddl_handler.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a DDL statement submitted over pgwire
    When ddl_catalog is a Trino catalog only CREATE TABLE and CREATE VIEW are allowed; when it is a
      registered source ID full DDL is supported
    Then the statement is dispatched to the correct path

- id: REQ-583
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    After DDL execution on either the Trino or direct path, the new table is registered into the
    role's compilation context so it is immediately queryable without a server restart.
  use_case: >-
    Immediate post-DDL registration lets analytic workflows create tables and query them in the same
    session.
  code:
    - provisa/pgwire/ddl_handler.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a DDL statement that creates a table
    When execution completes
    Then the table is registered into the role's compilation context and immediately queryable

- id: REQ-584
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    DDL write target is resolved from the domain's `ddl_catalog` and `ddl_schema` config fields. If
    `ddl_catalog` is unset, the system defaults to the Iceberg catalog. If `ddl_schema` is unset,
    it defaults to the domain ID. The domain is resolved through the role's `domain_access` list.
  use_case: >-
    Domain-driven DDL target resolution ensures DDL writes land in the correct catalog and schema
    without per-query configuration.
  code:
    - provisa/pgwire/ddl_handler.py

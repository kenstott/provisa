- id: REQ-529
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: MUST
  type: behavioral
  description: >-
    pgwire authentication uses PG auth type 3 (cleartext password) for both trust and simple modes.
    Trust mode: username becomes role_id, password ignored. Simple mode: password verified via bcrypt
    through SimpleAuthProvider. Any `provider` value other than `none` or `simple` returns a FATAL
    login error.
  use_case: >-
    Restricting pgwire auth to trust or simple providers prevents misconfiguration with OIDC or
    Firebase providers that require HTTP redirect flows incompatible with the wire protocol.
  code:
    - provisa/pgwire/server.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a pgwire connection with a provider other than none or simple
    When authentication is attempted
    Then a FATAL login error is returned

- id: REQ-530
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    pgwire TLS is enabled by setting `PROVISA_PGWIRE_CERT` and `PROVISA_PGWIRE_KEY` to PEM
    certificate and key paths. When both are set the server wraps connections in TLS. When absent the
    server replies `N` to SSL negotiation requests.
  use_case: >-
    Optional TLS for pgwire allows encrypted connections in production without requiring TLS in local
    development.

- id: REQ-596
  status: complete
  group: "1. Access Governance & Security"
  category: Audit Logging
  priority: MUST
  type: behavioral
  description: >-
    Every query is recorded in `query_audit_log` with tenant_id, user_id, role_id, SHA-256 query
    hash, table_ids, source, status_code, duration_ms, and logged_at. The table is append-only:
    PostgreSQL rules block DELETE and UPDATE at the database level. Query text is never stored
    verbatim — only its SHA-256 hash. Two indexes support tenant-scoped and per-user time-range
    queries.
  use_case: >-
    Append-only audit log with hash-only query storage satisfies data minimization requirements
    while providing immutable evidence of query activity for compliance and investigation.
  code:
    - provisa/audit/query_log.py
  tests:
    - tests/unit/test_audit_requirements.py
    - tests/integration/test_audit_auth_integration.py
  since: "2026-01"
  scenario: |
    Given any query executed against the system
    When the query completes
    Then it is recorded in query_audit_log with required fields and only the SHA-256 hash of the query text

- id: REQ-603
  status: complete
  group: "1. Access Governance & Security"
  category: Query Governance
  priority: MUST
  type: behavioral
  description: >-
    V002 relationship governance: every JOIN ON condition in SQL and Cypher queries must match an
    approved, registered relationship (source_col = target_col). SQL and Cypher queries that
    traverse a join not backed by a registered relationship are rejected at compile time. GraphQL
    queries that traverse relationships defined in the SDL are always pre-approved and exempt from
    the V002 check.
  use_case: >-
    V002 enforces approved navigation paths so joins between sensitive tables require explicit
    steward registration and approval, providing an audit surface for cross-table data access.
  code:
    - provisa/compiler/sql_validator.py
  tests:
    - tests/unit/test_stage2.py
  since: "2026-01"
  scenario: |
    Given a SQL or Cypher query with a JOIN ON condition
    When the compiler validates the query
    Then it is rejected at compile time if the join is not backed by a registered relationship

- id: REQ-613
  status: complete
  group: "1. Access Governance & Security"
  category: Query Governance
  priority: MUST
  type: behavioral
  description: >-
    Every query that touches a domain asset is logged in an append-only audit log
    (query_audit_log). The log captures: user_id, role_id, query_hash, table_ids, source,
    status_code, duration_ms, and logged_at. The log is protected by PostgreSQL rules that prevent
    DELETE and UPDATE operations (SOC2 append-only requirement). Indexed by (tenant_id, logged_at)
    and (user_id, logged_at) for efficient compliance reporting.
  use_case: >-
    Append-only query audit log provides SOC2-compliant evidence of who queried what data and when.
  code:
    - provisa/audit/query_log.py
    - provisa/audit/compliance_reporter.py
  tests:
    - tests/unit/test_audit_requirements.py
  since: "2026-01"
  scenario: |
    Given any query touching a domain asset
    When the query is executed
    Then it is logged in the append-only query_audit_log with all required fields

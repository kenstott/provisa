- id: REQ-576
  status: complete
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Query Frontend (Phase AU)
  priority: SHOULD
  type: behavioral
  description: >-
    When shortestPath endpoints have different node types and no self-referential relationship
    exists in the schema, the translator emits a flat JOIN chain (structurally shortest schema path)
    rather than a recursive CTE with ORDER BY hops. Hops are not tracked in this code path, so the
    result is the structurally shortest schema path, not the data-shortest path across multiple rows.
  use_case: >-
    Flat JOIN for heterogeneous shortestPath avoids unnecessary recursive CTE overhead when the
    schema topology determines the path uniquely.
  code:
    - provisa/cypher/path_translator.py
  tests:

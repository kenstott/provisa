- id: REQ-889
  status: proposed
  target: "2026-Q4"
  group: "8. Deployment & Infrastructure"
  category: Deployment Tier Architecture
  priority: MUST
  type: constraint
  description: >-
    The metadata/config/roles store MUST be the embedded single source of truth in every
    deployment tier. The embedded tier (SQLite or DuckDB) is the metadata home; container
    tier adds Trino + observability strictly as COMPUTE, never as metadata home. Tier
    changes MUST be additive and reversible: Trino can be toggled on/off without migrating
    the catalog.
  use_case: >-
    Tier changes must be reversible without catalog migrations. If Postgres becomes the
    metadata home in a container tier, it reintroduces a container dependency and creates
    a migration problem on every tier toggle, breaking the design invariant that compute
    is pluggable while metadata stays embedded.
  notes: >-
    Scope clarification (what is and is not a metadata-home blocker): Provisa governance roles
    (analyst/admin, RLS, masking, capabilities) already live entirely in metadata tables + the
    governance layer and never touch a database role system — no gap. The PG `CREATE ROLE
    role_<org_id>` (db.py:82) is per-org PHYSICAL schema isolation invoked only by provision_org()
    from the multi-tenant SaaS admin endpoint (POST /admin/orgs), not at base startup; it is
    compute/deployment-tier hardening and is now a NO-OP on every non-PostgreSQL control-plane
    backend (create_org_role/provision_org/deprovision_org gate on dialect=="postgresql"), so it is
    structurally unreachable on an embedded home. PG LISTEN/NOTIFY (database.py:454) is a DATASOURCE
    feature (subscriptions/CDC/triggers on a PG source, via pg_provider) correctly gated on source
    type — NOT a metadata-home dependency. The genuine remaining metadata-home item is the
    control-plane bootstrap DDL (schema.sql is PG-only), which already has a portable path
    (_init_schema_portable via the schema_org SQLAlchemy metadata) for embedded backends.
  code:
    - provisa/core/db.py
    - provisa/core/database.py
  related_reqs:
    - REQ-825
    - REQ-840
    - REQ-888
- id: REQ-890
  status: proposed
  target: "2026-Q4"
  group: "4. Source Connectors"
  category: Federation Engine Abstraction
  priority: SHOULD
  type: behavioral
  description: >-
    Pgwire auth must be a pluggable provider interface selected at launch (trust | local | oidc),
    superseding today's fixed MD5/cleartext wiring while keeping trust/cleartext as the baseline.
    (a) A local-accounts provider stores SCRAM-SHA-256 verifiers at rest (RFC 5802 — random salt,
    iterations, StoredKey/ServerKey; no cleartext stored or required on the wire, secure without TLS)
    with a CLI to add/remove/list users, and offers SCRAM-SHA-256 as a wire auth mechanism.
    (b) An external-token provider accepts an OIDC ID token (JWT) presented as the password and
    verifies it against the issuer's JWKS (signature, exp, aud, iss); issuer-generic
    (Firebase/Auth0/Google/Entra) via configured issuer URL + audience.
  use_case: >-
    Pgwire connections to Provisa today use MD5 or cleartext auth, neither of which meet enterprise
    security standards. SCRAM-SHA-256 (salted, iterated, server-side verification) secures local
    accounts without requiring TLS. OIDC integration allows enterprises to reuse their identity
    provider, eliminating separate credential management for database access.
  code:
    - provisa/pgwire/server.py
  related_reqs:
    - REQ-883
    - REQ-527
- id: REQ-891
  status: proposed
  target: "2026-Q4"
  group: "4. Source Connectors"
  category: Federation Engine Abstraction
  priority: SHOULD
  type: behavioral
  description: >-
    Pgwire per-role authorization maps an authenticated account to Calcite/source schema+table
    visibility, enforced in BOTH discovery and execution by construction: the catalog intercept
    (provisa/pgwire/catalog.py) filters pg_catalog/information_schema discovery to the role's
    allowed objects, and query execution rejects access to objects outside the role's grant.
    Complements existing RLS/masking (which govern rows/columns) with object-level visibility

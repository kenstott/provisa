    Then the output is a DELETE FROM SQL statement with the WHERE clause from the MATCH pattern

- id: REQ-668
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: SHOULD
  type: behavioral
  description: >-
    `MATCH (n:Label) WHERE ... SET n.prop = val` is translated to `UPDATE catalog.schema.table SET

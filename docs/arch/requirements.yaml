- id: REQ-309
  status: complete
  group: "4. Source Connectors"
  category: "GraphQL Remote Schema Connector (REQ-307–313)"
  priority: SHOULD
  type: behavioral
  description: >-
    At query execution time, Provisa translates the incoming GraphQL request into a remote GraphQL
    query and forwards it to the remote endpoint. The response rows are materialized as Parquet in a
    Trino Iceberg table on S3 (`results.api_cache`, `s3a://provisa-results/api_cache/`). Repeated
    calls within TTL are served from the Iceberg table via Trino — zero remote hops. The cache table
    is automatically dropped after TTL expires.
  use_case: >-
    S3/Iceberg materialization of remote schema results eliminates repeated network hops and enables
    federated SQL (WHERE/ORDER BY/LIMIT) over cached data.
  code:
    - provisa/graphql_remote/
    - provisa/api_source/trino_cache.py
  tests:
    - tests/unit/test_graphql_remote_introspect.py
    - tests/unit/test_graphql_remote_mapper.py

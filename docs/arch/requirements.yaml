  tests:
    - provisa-client/tests/test_client.py
    - tests/unit/test_client_access.py
  since: "2026-01"
  scenario: |
    Given a ProvisaClient instantiated with a token parameter
    When a request is made
    Then Authorization: Bearer <token> is sent on every request

- id: REQ-607
  status: complete
  group: "8. Client Access & Protocols"
  category: "SQL & Multi-Protocol Client Access"
  priority: SHOULD
  type: behavioral
  description: >-
    ProvisaClient error contract: `query()` raises `httpx.HTTPStatusError` on HTTP-level errors
    (4xx/5xx). `query_df()` raises `RuntimeError` when the GraphQL response body contains an
    `errors` field, regardless of HTTP status.

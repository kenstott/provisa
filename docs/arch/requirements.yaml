- id: REQ-869
  status: complete
  since: "2026-07"
  group: "2. Authentication & Identity"
  category: Authorization
  priority: MUST
  type: constraint
  description: >-
    Mutations are classified as WRITES by contract (not caller declaration) via
    protocol-specific classifiers. Per-adapter read/write classifiers: GraphQL uses
    operation type (type Mutation), OpenAPI uses HTTP method (POST/PUT/PATCH/DELETE = write;
    GET = read) plus x-provisa-kind override, gRPC uses MethodOptions.idempotency_level
    (NO_SIDE_EFFECTS = read; IDEMPOTENCY_UNKNOWN and IDEMPOTENT = write; AIP naming and
    server-streaming are non-normative heuristics only), Hasura uses exposed_as/action_type.
    Universal default: unknown/unclassifiable → treat as write (default-deny). Any read
    statement (SELECT) referencing a kind=mutation UDF is promoted to write and subject
    to both WRITE capability + writable_by check. Execute-time enforcement in
    _execute_action_field validates role_id ∈ mutation.writable_by.
  use_case: >-
    Prevents callers from invoking mutations by disguising them as SELECT statements.
    Protocol-agnostic classification with per-adapter signals ensures mutations cannot
    bypass write-level authorization regardless of source.
  code:
  - provisa/security/mutation_authz.py
  - provisa/api/data/endpoint.py
  tests:
  - tests/unit/test_mutation_authz.py
  related_reqs:

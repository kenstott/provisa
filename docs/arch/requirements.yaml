  use_case: >-
    Meet legacy enterprise estates (Oracle/SQL Server shops with large proc inventories) at
    their current state, ensuring nothing in the estate is invisible to the catalog. Mirrors
    the OpenAPI discovery pattern (REQ-316/317): introspection + auto-registration avoiding
    hand-registration. Value scales with proc inventory; low build cost because it reuses
    existing introspection and OpenAPI-style registration.
  code:

- id: REQ-423
  status: complete
  group: "4. Source Connectors"
  category: Vector Search
  priority: SHOULD
  type: behavioral
  description: >-
    A `cosine_similarity(column, query_vector)` UDF must be available in Provisa SQL. It translates
    to the native vector operator for sources with native capability (pgvector `<=>`, Snowflake
    `VECTOR_COSINE_SIMILARITY()`, etc.) and to the pgvector fallback cache for sources without.
  use_case: >-
    Unified UDF hides native vs. fallback complexity from analysts.

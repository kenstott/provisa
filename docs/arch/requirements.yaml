- id: REQ-323
  status: complete
  group: "4. Source Connectors"
  category: "gRPC Remote Schema Connector (REQ-322–329)"
  priority: SHOULD
  type: behavioral
  description: >-
    Query vs mutation classification defaults to a name-prefix rule: methods whose names start with
    `Get`, `List`, `Find`, `Fetch`, `Search`, or `Stream` are classified as queries (virtual tables);
    all others are classified as mutations (tracked functions). Per-method override precedence is
    retained in the admin UI. Structural heuristic (server-streaming / repeated-message) is kept as
    fallback for non-prefixed methods.
  use_case: >-
    Default name-prefix classification removes manual tagging while preserving per-method overrides
    and structural fallback.
  code:

    `WITH` (pipeline) → CTE or subquery. Node label `:Label` and relationship type `:TYPE` are
    resolved via the steward-declared label mapping (REQ-351) to physical table and join references.
  use_case: >-
    Cypher clause mapping enables graph queries to execute as governed SQL via Trino.

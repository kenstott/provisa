- id: REQ-597
  status: complete
  group: "4. Source Connectors"
  category: "GraphQL Remote Schema Connector (REQ-307–313)"
  priority: SHOULD
  type: behavioral
  description: >-
    GraphQL remote source registration accepts a `field_overrides` map
    (`{fieldName: "query" | "mutation"}`) that is applied after introspection and takes priority over
    structural classification. Only query-type fields can be reclassified as mutations via overrides;
    mutation-type fields have no override path in GraphQL.
  use_case: >-
    field_overrides lets stewards correct mis-classified remote fields (e.g. a mutation named like a
    query) at registration time without modifying the upstream schema.
  code:
    - provisa/graphql_remote/mapper.py
  tests:
    - tests/unit/test_graphql_remote_mapper.py
    - tests/unit/test_misc_requirements.py
    - tests/unit/test_graphql_remote_overrides_requirements.py
  since: "2026-01"
  scenario: |
    Given a GQL remote source with a query-type field that behaves as a mutation
    When field_overrides maps that field to "mutation"
    Then the field is registered as a tracked function and the override takes priority over structural classification

- id: REQ-598
  status: complete
  group: "4. Source Connectors"
  category: "GraphQL Remote Schema Connector (REQ-307–313)"
  priority: SHOULD
  type: behavioral
  description: >-
    Remote schema source registrations (GraphQL, gRPC, OpenAPI) accept a `relationships` list that
    stores FK/PK join paths as manually declared relationships (no `remote_managed` flag).
    Relationships auto-detected during introspection are stored with `remote_managed: True`. On
    schema refresh, auto-detected (`remote_managed: True`) relationships are re-run and may change;
    manually declared relationships (no flag) are preserved unchanged.
  use_case: >-
    Distinguishing manual from auto-detected relationships ensures steward-declared join paths survive
    schema refreshes without being overwritten by introspection results.
  code:
    - provisa/graphql_remote/mapper.py
    - provisa/api/admin/graphql_remote_router.py
    - provisa/api/admin/grpc_remote_router.py
    - provisa/api/admin/openapi_router.py
  tests:
    - tests/unit/test_graphql_remote_mapper.py
  since: "2026-01"
  scenario: |
    Given a remote schema source with both manually declared and auto-detected relationships
    When a schema refresh is triggered
    Then auto-detected relationships are re-run and may change; manually declared relationships are preserved unchanged

- id: REQ-599
  status: complete
  group: "4. Source Connectors"
  category: "GraphQL Remote Schema Connector (REQ-307–313)"
  priority: SHOULD
  type: behavioral
  description: >-
    For all remote schema source types (GraphQL, gRPC, OpenAPI), required input parameters that are
    not already response fields are registered as `_nf_`-prefixed native filter columns. The
    `native_filter_type` is `query_param` for GQL and OpenAPI query parameters, `path_param` for
    OpenAPI path parameters, and `grpc_input` for gRPC. When a parameter name matches a response
    field name, parameter metadata is merged into the existing column rather than creating a
    duplicate.
  use_case: >-
    Native filter columns let consumers filter remote-source queries using standard `where` arguments
    that are passed through to the upstream API rather than applied as post-fetch SQL predicates.
  code:
    - provisa/graphql_remote/mapper.py
    - provisa/api/admin/grpc_remote_router.py
    - provisa/openapi/register.py
    - provisa/api/app.py
  tests:
    - tests/unit/test_graphql_remote_mapper.py
    - tests/integration/test_openapi_source.py
    - tests/integration/test_grpc_execution.py
  since: "2026-01"
  scenario: |
    Given a remote schema source with required input parameters not in the response fields
    When the source is registered
    Then those parameters become _nf_-prefixed native filter columns with the appropriate native_filter_type

- id: REQ-600
  status: complete
  group: "4. Source Connectors"
  category: "GraphQL Remote Schema Connector (REQ-307–313)"
  priority: MUST
  type: constraint
  description: >-
    Remote schema sources enforce depth limits on nested object expansion:
    `graphql_remote.max_object_depth` (default: 5) caps GQL OBJECT nesting;
    `graphql_remote.max_list_depth` (default: 2) caps LIST-typed nested OBJECT inclusion;
    `graphql_remote.max_list_items` (default: 100) injects `first: N` to cap array size. For gRPC
    and OpenAPI, nested message/object sub-field resolution is one level deep only. Fields beyond
    these limits are excluded from the fetch.
  use_case: >-
    Depth limits prevent unbounded data expansion and runaway remote API calls when remote schemas
    contain deeply recursive or list-heavy structures.
  code:
    - provisa/graphql_remote/mapper.py
    - provisa/grpc_remote/mapper.py
    - provisa/openapi/register.py
  tests:
    - tests/unit/test_graphql_remote_mapper.py
    - tests/unit/test_grpc_remote_loader.py
    - tests/unit/test_openapi_loader.py
  since: "2026-01"
  scenario: |
    Given a remote GraphQL schema with deeply nested OBJECT fields beyond max_object_depth
    When the schema is introspected
    Then fields beyond the depth limit are excluded from the fetch and array sizes are capped at max_list_items

- id: REQ-601
  status: complete
  group: "4. Source Connectors"
  category: OpenAPI Auto-Registration Connector
  priority: SHOULD
  type: behavioral
  description: >-
    OpenAPI virtual table names are derived from the operation's `operationId`. If no `operationId`
    is defined, Provisa slugifies `{method}_{path}`. An alias is derived by stripping the leading
    verb segment and singularizing the noun (e.g. `findPetsByStatus` → `pet_by_status`). The alias
    is used as the consumer-facing name in GraphQL and other query interfaces.
  use_case: >-
    operationId-based naming and verb-stripped aliases give OpenAPI tables predictable,
    consumer-friendly names without manual configuration.
  code:
    - provisa/openapi/register.py
  tests:
    - tests/unit/test_openapi_loader.py
  since: "2026-01"
  scenario: |
    Given an OpenAPI spec with operationId "findPetsByStatus"
    When the spec is registered
    Then the virtual table alias is "pet_by_status" used as the consumer-facing GraphQL name


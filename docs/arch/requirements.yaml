- id: REQ-685
  status: complete
  since: "2026-07"
  group: 15. Proposed Features
  category: Encryption
  priority: SHOULD
  type: structural
  description: Envelope encryption for all encrypted payloads. A unique Data Encryption Key (DEK) is generated
    per payload, used to encrypt data locally with AES-256-GCM in streaming chunks. The DEK is then encrypted
    by the org master key via KMS. Storage format is encrypted_DEK | IV | ciphertext. DEKs are cached
    in-process with a short TTL to minimize KMS round-trips. Chunk size is configurable (default 64KB)
    to bound memory usage on large payloads.
  use_case: Prevents large payload memory issues and excessive KMS costs. One KMS call per payload, not
    per row. Streaming chunks mean memory overhead is constant regardless of payload size.
  code:
  - provisa/encryption/envelope.py
  tests:
  - tests/unit/test_encryption.py
  integration_test: not_required
  integration_test_reason: Envelope encryption algorithm and chunk handling are pure logic; mock KMS provides
    full fidelity.
  stakeholders:
  - compliance
  - ops
  competitive_position:
    status: ahead

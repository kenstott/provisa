- id: REQ-655
  status: complete
  group: 5. Query Languages, Compilation & Operations
  category: Compiler & Schema
  priority: SHOULD
  type: behavioral
  description: '`{table}_group_by` supports two additional filter clauses beyond the base `where`: (1)
    `aggregates(where: {TypeName}BoolExp)` — a `where` arg on the `aggregates` field of `{TypeName}GroupByRow`
    that applies conditional aggregation within each group (SQL `FILTER (WHERE ...)`); (2) `having: {TypeName}HavingExp`
    arg on the root field that filters groups post-aggregation (SQL `HAVING`). `{TypeName}HavingExp` is
    a new input type with the same numeric/comparable fields as `{TypeName}AggregateFields` but with comparison
    operators. Three filters compose orthogonally: `_group_by(where:)` → SQL WHERE, `aggregates(where:)`
    → SQL FILTER, `having:` → SQL HAVING.'

- id: REQ-218
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: "Hasura v2 Parity: Medium-Complexity Features"
  priority: SHOULD
  type: behavioral
  description: >-
    Cursor-based pagination -- `first`, `after`, `last`, `before` args on root query fields.

    exercised identically whether or not a provider is configured. Both proven end-to-end against the
    live Postgres store (ciphertext at rest, decrypted round-trip through the repo, wrong master key
    rejected). COMPLETE — these are the only sensitive DB-resident columns: the sources and
    kafka_sources tables persist no credentials at all (the schema stores host/username/auth_type only;
    passwords/keys are never written, resolved at runtime via the secrets provider), and there is no

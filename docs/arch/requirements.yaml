    assignment expressions must be valid SQL expressions. Multiple SET clauses compose as
    comma-separated column updates.
  use_case: >-
    Property-to-column mapping with multi-assignment composition lets graph clients issue idiomatic
    UPDATE patterns.
  code:
    - provisa/cypher/translator.py

    - provisa/core/
    - provisa/discovery/
  tests:
    - tests/unit/test_discovery_requirements.py
  since: "2026-01"
  scenario: |
    Given a newly registered source
    When a steward navigates the discovery workflow
    Then each of the five governance tiers is presented in sequence as prerequisites are met

- id: REQ-612
  status: complete

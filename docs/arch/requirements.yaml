    APQ wire protocol support lets Apollo clients reduce bandwidth by sending only a hash after the
    first request.
  code:
    - provisa/apq/
  tests:
    - tests/unit/test_apq.py
    - tests/integration/test_apq_integration.py
  since: "2026-01"
  scenario: |
    Given an Apollo client sending only a hash
    When the server has the query cached it executes immediately; when not it returns
      PersistedQueryNotFound
    Then the client resends with full text, server stores and executes without modification


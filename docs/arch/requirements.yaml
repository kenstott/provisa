- id: REQ-825
  status: in-progress
  since: "2026-07"
  group: 6. Execution, Routing, Caching & Performance
  category: Execution & Routing
  priority: SHOULD
  type: structural
  target: 2026-Q4
  description: 'The Provisa FederationEngine is a pluggable, abstract execution substrate behind a single
    contract. It is one of four primitives composed as a data-flow pipeline: DATASOURCES → FEDERATION
    ENGINE → SEMANTIC LAYER → EXECUTION PIPELINE. DATASOURCES are external systems with a capability profile.
    The FEDERATION ENGINE (this requirement) federates those datasources into one raw unified queryable
    surface; the method per source is the federation strategy (REQ-826). The SEMANTIC LAYER is the governed
    virtual model projected over that surface — registered tables/columns, relationships, domains, RLS,
    masking — engine-independent; it is where governance is DEFINED and the thing queries target. The
    EXECUTION PIPELINE turns a governed query into results as a sequence of total IR→IR passes (nanopass
    discipline), bookended by transport: (1) TRANSPORT ingress — receive the query over the client protocol
    (pgwire, Bolt, Arrow Flight, GraphQL, SQL); (2) TRANSPILE TO IR — frontend parse of the source language
    into a dialect-neutral logical IR (plural frontends converge here); (3) TRANSPILE TO GOVERNED IR —
    apply the semantic layer: inject RLS predicates, masking expressions, and relationship joins (engine-independent;
    the IP pass); (4) PLAN — the one IMPURE stage: not a pure transpile but a planner that (a) chooses
    the ROUTE (direct native-driver execution for a single reachable source vs handing the query to the
    federation engine), (b) resolves RESIDENCY PREREQUISITES — for each source whose federation strategy
    is MATERIALIZED and stale, emit a side-effecting prep step that loads/refreshes it into the DB cache
    before execute (REQ-826), and (c) CODEGENs the engine-dialect SQL via SQLGlot for the chosen route.
    The output is not a string but an ordered plan: a prep phase (0..n cache materializations, may be
    empty) feeding a single terminal step (DIRECT driver or federation-engine execute); this is where
    today''s router (DIRECT/TRINO/API) and the cache tiers (hot/warm/MV) converge. (5) EXECUTE — the federation
    engine runs the terminal step and does its own opaque physical planning (NOT Provisa''s plan); (6)
    TRANSPORT egress — stream results back over the same client protocol. Stages 1–3 are pure and engine-independent;
    stage 4 reads mutable freshness state and emits effects, and stages 4–5 vary per engine — so governance-parity
    conformance (REQ-827) must PIN residency (pre-warm the prep phase) and then test only the codegen
    + execute. No governance or compilation logic is duplicated per engine — governance is defined in
    the semantic layer and ENFORCED at stage 3; the engine only executes.

    There is no "federation vs warehouse" dichotomy: EVERY engine federates; only the METHOD of federation
    changes with capability (see REQ-826). An engine advertises a capability profile with two axes: (a)
    REACH — for each datasource, which federation strategies it can support; and (b) SCALE — single-node/memory-bound
    vs distributed. The profile RANKS transports per source (native > ADBC > ODBC), not a has_connectors
    boolean.

    Concrete engines: DuckDB is a full federation engine whose reach nearly matches Trino''s — native
    ATTACH for postgres/mysql/sqlite; ODBC (community nanodbc odbc_attach, or the DuckDB-team odbc/odbc_scanner
    functions) for any ODBC source; ADBC (community adbc_scanner, Arrow-native, preferred over ODBC);
    NoSQL via community extensions (mongo ATTACH TYPE MONGO, cassandra scan/query/ATTACH, elasticsearch_query);
    and zero-copy file scans. Its ONLY differentiator vs Trino is SCALE (single-node, memory-bound, no
    distributed shuffle), making it ideal on a developer desktop with no Trino dependency. Trino has broad
    reach and distributed scale. Snowflake/Databricks/Dremio are reused as engines to leverage a customer''s
    existing infrastructure. A pure RDBMS (e.g. SQL Server) has near-zero reach and federates only by
    the materialized strategy. The engine is selected at deployment via top-level config (engine: duckdb
    | trino | snowflake | databricks | dremio | ...), not per-source. All query dispatch that today reads
    the hardcoded Trino singleton (provisa/api/app.py, provisa/api/data/endpoint.py, provisa/executor/trino.py)
    must route through the FederationEngine contract. The IR->physical mapping is intentionally thin —
    the divergence is confined to dialect transpilation and the per-source federation strategy (REQ-826).
    DONE (2026-07): the PLAN stage OUTPUT is modelled — provisa/federation/plan.py::build_execution_plan
    composes the pure part of stage 4 into an ordered Plan: a prep phase (0..n PrepStep residency
    loads/refreshes, one per source whose federate() strategy is MATERIALIZED and stale) feeding a single
    terminal Route (DIRECT for a single VIRTUAL source, ENGINE otherwise). This is the four-primitive
    flow''s planner surface built on the connector/federate contract (REQ-840/826). REMAINING (kept
    in-progress): the other pipeline stages as engine-agnostic passes (transport ingress/egress, transpile
    to IR, transpile to governed IR, codegen, execute) and routing the hardcoded-Trino dispatch through the
    FederationEngine contract.'
  use_case: 'Decouples Provisa''s governed semantic layer from any single execution vendor. The same semantic
    layer, execution pipeline, governance, IR, and multi-protocol query surface run on an embedded desktop
    engine (DuckDB, no Trino), the Trino federation engine, or a customer''s existing warehouse (Snowflake/Databricks/Dremio)
    — making the engine a swappable deployment choice and concentrating Provisa''s IP in the semantic
    layer, pipeline, governance, and federation-strategy logic rather than the engine. Intended model:
    develop on DuckDB (laptop, zero infra, full governance and full source reach), then scale out to Trino/Snowflake/Databricks
    in production, unchanged.'
  code:
  - provisa/federation/plan.py
  - provisa/api/app.py
  - provisa/api/data/endpoint.py
  - provisa/executor/trino.py
  - provisa/transpiler/router.py
  - provisa/core/config_loader.py
  tests:
  - tests/unit/test_federation_plan.py
  related_reqs:
  - REQ-826
  - REQ-830
- id: REQ-826
  status: in-progress
  since: "2026-07"
  group: 6. Execution, Routing, Caching & Performance
  category: Caching
  priority: SHOULD
  type: behavioral
  target: 2026-Q4
  description: 'Federation strategy and freshness management — the datasources → federation engine arrow
    of REQ-825. The binding between a datasource table and the engine is a FEDERATION STRATEGY: the method
    by which that source joins the engine''s unified surface. federate(datasource, table) resolves each
    table to one of three strategies and returns which was chosen, because freshness differs per strategy:
    (1) VIRTUAL — the engine reaches the source live (a connector, or DuckDB ATTACH to postgres/mysql/sqlite,
    or a Trino connector); no copy, always fresh, cache_ttl irrelevant. (2) SCAN — the source is a file/object
    the engine reads in place, exposed as a CREATE VIEW with no data moved; freshness follows the underlying
    file, cache_ttl irrelevant. For DuckDB this spans read_parquet/read_csv/read_json, httpfs over S3/HTTP/GCS/Azure,
    Iceberg/Delta via extension, ATTACH of external DuckDB/SQLite, and other scanner extensions; the engine
    declares what it can scan. (3) MATERIALIZED — no virtual or scan representation (live APIs, NoSQL,
    or an RDBMS deliberately cached for latency); data is INSERTed/COPYed in. MATERIALIZED is the ONLY
    strategy where cache_ttl means a reload interval and the load-scheduling/invalidation logic runs;
    VIRTUAL and SCAN are effectively free.

    The federation strategy is STATEFUL — it owns residency, reload state, and freshness; the execution
    pipeline (transpile → transport) is stateless per query and must not carry this state. The chosen
    strategy depends on BOTH datasource capability and engine capability, so the same source may federate
    by different strategies on different engines. This unifies today''s three separate mechanisms — OpenAPI
    PG response cache (provisa/openapi/pg_cache.py), NoSQL mapping catalogs, and warm-tables/MV materialization
    — into one federate() operation. NoSQL scanners (mongo, cassandra, elasticsearch) infer schema on
    read; because governance in the semantic layer binds to columns, federate() MUST pin the schema on
    the CREATE VIEW from the semantic layer''s mapping (REQ-251), never trust re-inference. The router
    must not attempt a live/VIRTUAL route when federate() reports only a MATERIALIZED strategy for that
    source; it uses the strategy federate() returns. Only the TENANT MATERIALIZATION STORE (durable — API/GraphQL/gRPC
    results, warm tables, MVs; REQ-830) is a true MATERIALIZED strategy: the data becomes a real relation
    the engine reads, so it PARTICIPATES in federation (joinable/scannable like any source). The TENANT
    HOT CACHE is NOT a federation strategy and is orthogonal to virtual|scan|materialized — it is a codegen-time
    VALUES-CTE injection inlined into the SQL at the PLAN stage, never an engine relation and never federated;
    tier exclusivity (REQ-241) chooses hot over materialization store.
    DONE (2026-07): federate(source, engine) is implemented (provisa/federation/strategy.py), resolving
    each source to VIRTUAL | SCAN | MATERIALIZED and returning which was chosen. The choice depends on
    BOTH source capability and engine capability: an ATTACH connector on a live DB → VIRTUAL, an ATTACH
    connector on a file/object type (csv/parquet/iceberg/...) → SCAN, a LAND connector (warehouse-native)
    → MATERIALIZED, and an API/NoSQL source with no connector → MATERIALIZED (loaded into the store). The
    same source therefore federates differently per engine (csv SCANs on DuckDB but is UnreachableSource
    on a Trino build without a csv connector). prefer_materialized forces MATERIALIZED for a live source
    deliberately cached for latency. requires_residency(strategy) is the REQ-825 stage-4b signal (only
    MATERIALIZED needs a prep step). REMAINING (kept in-progress): the STATEFUL side — wiring residency /
    reload-scheduling / invalidation and unifying the three existing mechanisms (openapi pg_cache, NoSQL
    mapping catalogs, warm-tables/MV) behind this one federate() operation, and having the router consume
    the returned strategy — lands with the materialization store (REQ-844-848/830) and the PLAN stage.'
  use_case: Concentrates the real complexity of federation — strategy selection, residency, reload scheduling,
    and invalidation — in one stateful federate() operation, so any datasource (RDBMS, files, NoSQL, APIs)
    joins the engine's surface by the best available strategy with predictable freshness, independent
    of which engine is deployed.
  code:
  - provisa/federation/strategy.py
  - provisa/federation/engine.py
  - provisa/executor/trino.py
  - provisa/transpiler/router.py
  - provisa/openapi/pg_cache.py
  - provisa/mv/registry.py
  - provisa/cache/warm_tables.py
  - provisa/cache/hot_tables.py
  - provisa/core/config_loader.py
  tests:
  - tests/unit/test_federation_strategy.py
  scenario: 'Given an engine that can only materialize an OpenAPI datasource

    When a query references that source

    Then federate() returns the MATERIALIZED strategy, loads/refreshes the data, and the query reads it
    in place

    And the router does not attempt a live/VIRTUAL route


    Given a MATERIALIZED strategy with cache_ttl=300

    When the table has not been reloaded within 300 seconds

    Then federate() reloads it before the query executes (cache_ttl means reload interval)


    Given an engine that can ATTACH an RDBMS datasource live

    When a query references that source

    Then federate() returns the VIRTUAL strategy and the query reads it live with no copy


    Given a NoSQL datasource federated by SCAN or MATERIALIZED

    When the view is created

    Then the schema is pinned from the semantic layer mapping, not inferred

    '
  related_reqs:
  - REQ-825
  - REQ-827
  - REQ-830
- id: REQ-827
  status: in-progress
  since: "2026-07"
  group: 6. Execution, Routing, Caching & Performance
  category: Execution & Routing
  priority: MUST
  type: constraint
  target: 2026-Q4
  description: 'Governance-parity conformance across federation engines. Any engine admitted to the FederationEngine
    contract (REQ-825) MUST produce byte-identical governed results — RLS filtering, column masking, relationship-join
    enforcement, and row/aggregate output — as the reference engine for the same query and same identity.
    Because governance is defined in the semantic layer and enforced when the query compiles to IR, only
    the transpile → transport stages differ per engine; SQLGlot transpiles syntax, but semantic edges
    still differ per engine (NULL ordering, type coercion, decimal/numeric precision, regex and collation
    semantics, timezone and timestamp handling, string comparison case sensitivity), and these must not
    change which rows are visible, which cells are masked, or which joins are enforced. An engine is certified
    only by passing a shared governance-parity conformance suite run against a fixed golden dataset and
    identity matrix; results are diffed against the reference engine and any divergence fails certification.
    This is a hard gate: an uncertified engine MUST NOT be selectable in production config (REQ-825).
    The suite is authoritative for DuckDB, Trino, Snowflake, Databricks, Dremio, and any future engine.
    DONE (2026-07): the comparator + certification GATE are implemented — provisa/federation/conformance.py::
    compare_governed_results diffs a candidate engine''s governed rows against the reference as an
    order-INDEPENDENT multiset (NULL ordering is an allowed semantic edge) but visibility/masking-EXACT: a
    row visible in exactly one side (an RLS leak or over-filter) or a differently-masked cell is a
    Divergence, and any divergence fails certification. ConformanceRegistry tracks certified engines (the
    reference is always certified) and require_certified raises UncertifiedEngineError — the hard gate that
    an uncertified engine must not be selectable. REMAINING (kept in-progress): the conformance SUITE
    itself — the fixed golden dataset + identity matrix and the runner that executes each governed query on
    every candidate engine and feeds the diff — which needs the live multi-engine execution paths.'
  code:
  - provisa/federation/conformance.py
  - provisa/security/
  - provisa/compiler/
  - provisa/executor/trino.py
  - provisa/transpiler/router.py
  tests:
  - tests/unit/test_conformance.py
  - tests/integration/test_governance_integration.py
  scenario: 'Given a fixed golden dataset and an identity with role "analyst" subject to RLS and column
    masking

    When the same governed query is executed on the reference engine and on a candidate engine (DuckDB,
    Snowflake, Databricks, Dremio, or Trino)

    Then the returned rows, masked cells, and enforced relationship joins are byte-identical between engines


    Given a candidate engine whose semantic differences (NULL ordering, type coercion, collation) change
    which rows are visible or which cells are masked

    When the governance-parity conformance suite is run

    Then the engine fails certification and MUST NOT be selectable in production config

    '
  related_reqs:
  - REQ-825
  - REQ-826
- id: REQ-828
  status: proposed
  group: 11. Platform, Infrastructure & Delivery
  category: Deployment & Infrastructure
  priority: SHOULD
  type: structural
  target: 2026-Q4
  description: 'Pluggable admin/metadata store, decoupled from Postgres, selected via a SQLAlchemy-compliant
    URI. The control-plane store (sources, domains, registered tables, columns, naming rules, governance
    config) plus the OpenAPI/GraphQL cache substrate must run on an embedded engine (DuckDB or SQLite)
    with zero external infra on a developer desktop, and on Postgres in production — same schema, same
    behavior. This is required for the desktop deployment model in REQ-825 (PG today requires Docker,
    which breaks the zero-infra laptop story). Three couplings must be removed: (1) DRIVER — repositories
    take asyncpg.Connection directly (provisa/core/repositories/source.py) and the pool factory is asyncpg-only
    (provisa/core/db.py); these move behind a store abstraction driven by a SQLAlchemy URI. (2) DIALECT
    — schema.sql uses Postgres-specific DDL (SERIAL, JSONB); metadata DDL must be dialect-neutral. (3)
    META-GOVERNANCE RLS — the hard gate: _init_meta_rls (provisa/api/app.py, REQ-041/REQ-402) enforces
    control-plane governance via Postgres row-level security, which DuckDB/SQLite lack. Meta-RLS enforcement
    MUST move from the database into the app layer so control-plane governance is store-independent (the
    same parity principle as REQ-827, applied to the admin DB). Until meta-RLS is app-enforced, embedded
    stores cannot be certified for production. On desktop the OpenAPI/GraphQL cache lands in the embedded
    store rather than a Docker Postgres; where Postgres exists (prod) the existing pg_cache path is unchanged
    and DuckDB may ATTACH it (REQ-826). This store is the TENANT CONTROL PLANE REGISTRY (REQ-830) — per-tenant,
    distinct from the PLATFORM CONTROL PLANE REGISTRY (tenant directory, federation-engine registry, platform
    governance). The meta-RLS move generalizes to a single app-layer tenant-isolation boundary enforced
    across all tenant-scoped stateful components, since swappable media (Redis, DuckDB, S3) have no native
    RLS.'
  use_case: Makes the full Provisa deployment — control plane and cache, not just the query engine — infra-free
    on a developer laptop, completing the develop-on-DuckDB / scale-out-in-prod model in REQ-825 without
    requiring Docker or an external Postgres.
  code:
  - provisa/core/db.py
  - provisa/core/repositories/source.py
  - provisa/core/schema.sql
  - provisa/api/app.py
  - provisa/openapi/pg_cache.py
  related_reqs:
  - REQ-825
  - REQ-826
  - REQ-827
  - REQ-830
- id: REQ-829
  status: complete
  since: "2026-07"
  group: 11. Platform, Infrastructure & Delivery
  category: Deployment & Infrastructure
  priority: SHOULD
  type: structural
  description: 'Pluggable Redis medium with a lightweight, code-identical embedded realization for desktop.
    Sibling to REQ-828: where REQ-828 makes the SQL-store medium of the TENANT CONTROL PLANE REGISTRY
    pluggable (Postgres -> DuckDB/SQLite), this makes the Redis medium pluggable (Redis -> embedded fakeredis),
    so both halves of the REQ-830 desktop collapse (stateful components 1-4 into one process, zero infra)
    are covered. Redis is REQ-830''s named production medium for the TENANT HOT CACHE (component #4, hot
    tables REQ-230, provisa/cache/hot_tables.py) and additionally backs the fast result/APQ caches (provisa/cache/store.py,
    provisa/apq/cache.py) and the Redis-runtime governance state that is orthogonal to the five data-flow
    components — the sliding-window rate limiter and concurrency gauge (provisa/api/rate_limit.py) and
    the table-based cache-invalidation index (provisa/cache/store.py). When no REDIS_URL is configured,
    every one of these MUST transparently use an embedded fakeredis (FakeAsyncRedis) client that is API-identical
    to redis.asyncio.Redis. All four current connection factories (rate_limit.py:120, cache/store.py:138,
    apq/cache.py:97, cache/hot_tables.py:174) route through a single make_redis(url, decode_responses)
    factory that returns redis.asyncio.from_url when a URL is set and FakeAsyncRedis otherwise, sharing
    one process-wide fakeredis.FakeServer so the four clients (which differ in decode_responses) see the
    same in-memory store. Zero changes to existing call sites. TENANT ISOLATION for the Redis medium is
    enforced in the app layer via key namespacing (existing tenant_id key prefixes: provisa:cache:<tenant_id>:...,
    provisa:apq:<tenant_id>:...), NOT any store-native RLS — the same app-layer isolation boundary REQ-828/REQ-830
    mandate for all swappable media (Redis, DuckDB, S3); the single shared FakeServer is acceptable because
    desktop is single-tenant. The stub is not a KVS: it MUST support the full command surface actually
    invoked — get/set/delete, expire/TTL, sorted sets (zadd/zcard/zremrangebyscore/zrange for the sliding-window
    rate limiter), sets (sadd/smembers/scan_iter for the invalidation index), incr/decr (concurrency gauge),
    and pipelines. An aiocache/cashews-style KVS abstraction is explicitly rejected because it cannot
    express the sorted-set and set operations without rewriting rate limiting and invalidation, and the
    pure get/set caches it could serve already degrade to no-ops without Redis, so it buys almost nothing.
    Rationale — desktop already runs without Redis today, but silently: build_rate_limiter(None) returns
    NoopRateLimiter (rate_limit.py:118) and NoopCacheStore no-ops invalidate_by_table/invalidate_by_pattern
    (store.py:93-96), so rate limiting and cache invalidation are simply disabled and those code paths
    are never exercised on the laptop. Yet both surfaces are live in production: rate limiting runs on
    every HTTP request (rate_limit_middleware.py:28) plus Arrow Flight, subscriptions, and NL endpoints
    (flight/server.py:248, data/subscribe.py:404, nl_router.py:58), and table invalidation fires after
    every write (cypher_router.py:560, data/endpoint.py:3307, admin/schema.py:2458). The purpose is therefore
    NOT to add missing Redis features but to make desktop exercise the SAME hot-cache, result-cache, and
    rate-limit code paths as production instead of silently falling back to no-ops — so that behavior
    is testable on a laptop with zero infra. Production with a real REDIS_URL is unchanged; in production
    the same medium scales out to Redis (REQ-830). Completes the infra-free desktop model (REQ-825/828/830)
    by removing Redis as the last mandatory Docker dependency alongside the SQL store.'
  use_case: Lets a developer run the full Provisa backend on a laptop with no Redis server and no Docker,
    collapsing the Redis medium of the TENANT HOT CACHE and Redis-runtime state into an embedded fakeredis
    while exercising the identical hot-cache, result-cache, APQ, rate-limit, and invalidation code paths
    that production runs against a real Redis — rather than the current silent no-op fallback — so behavior
    is the same, and testable, in both environments, with tenant isolation enforced in the app layer.
  code:
  - provisa/core/redis_factory.py
  - provisa/api/rate_limit.py
  - provisa/cache/store.py
  - provisa/apq/cache.py
  - provisa/cache/hot_tables.py
  tests:
  - tests/unit/test_redis_factory.py
  related_reqs:
  - REQ-825
  - REQ-826
  - REQ-828
  - REQ-830
  - REQ-831
- id: REQ-830
  status: proposed
  group: 11. Platform, Infrastructure & Delivery
  category: Deployment & Infrastructure
  priority: SHOULD
  type: structural
  target: 2026-Q4
  description: 'Stateful-component topology. The four data-flow primitives (datasources -> federation
    engine -> semantic layer -> execution pipeline; REQ-825) describe a STATELESS per-query flow. Orthogonal
    to them, a deployment holds FIVE PLUGGABLE STATEFUL COMPONENTS, each independently swappable and —
    except the platform registry — TENANT-ISOLATED: (1) PLATFORM CONTROL PLANE REGISTRY — platform-scoped,
    shared: tenant directory, federation-engine registry, platform-level governance (REQ-041/REQ-402),
    and per-tenant routing (which registry/caches/engine each tenant uses). (2) TENANT CONTROL PLANE REGISTRY
    — per-tenant: persists that tenant''s datasource definitions and semantic layer (registered tables/columns,
    relationships, domains, RLS, masking, naming); the store REQ-828 makes pluggable. (3) TENANT MATERIALIZATION STORE
    — per-tenant durable store realizing the MATERIALIZED federation strategy (REQ-826): API/GraphQL/gRPC
    result caches, warm tables, MVs; disk/object-backed. It is a real relation the federation engine reads,
    so materialized/MV data PARTICIPATES in federation (joinable/scannable like any source). (4) TENANT
    HOT CACHE — per-tenant fast tier realizing hot tables (REQ-230): small, low-latency, ephemeral. STRICTLY
    a CTE-injection mechanism — its data is inlined as a VALUES CTE into the generated SQL at codegen
    and NEVER becomes an engine relation, so it does NOT participate in federation (cannot be joined or
    scanned by the engine as a table) and is orthogonal to the virtual|scan|materialized strategies. Tier
    exclusivity (REQ-241) chooses it over the materialization store. (5) FEDERATION ENGINE — the execution substrate
    (REQ-825); tenant-dedicated or shared. Each is independently pluggable: on a developer desktop components
    1-4 collapse into one embedded engine (DuckDB/SQLite) and #5 is DuckDB (zero infra); in production
    they scale out independently (platform registry in Postgres, tenant registries sharded, materialization store in
    Iceberg/S3, hot cache in Redis, engine in Trino/Snowflake). Tenant isolation for components 2-5 MUST
    be enforced in the app layer (REQ-828), not delegated to any single store''s native RLS, so isolation
    holds across every medium.'
  use_case: Names the stateful components multi-tenancy must isolate and deployment must place, separating
    them from the stateless execution pipeline, and makes each independently pluggable so the same platform
    collapses to zero-infra on a laptop and scales each tier independently in production with tenant isolation
    enforced uniformly in the app layer.
  code:
  - provisa/api/app.py
  - provisa/core/db.py
  - provisa/core/repositories/source.py
  - provisa/openapi/pg_cache.py
  - provisa/cache/hot_tables.py
  - provisa/cache/warm_tables.py
  - provisa/mv/registry.py
  related_reqs:
  - REQ-825
  - REQ-826
  - REQ-828
  - REQ-829
  - REQ-831

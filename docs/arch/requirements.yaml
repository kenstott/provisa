- id: REQ-298
  status: complete
  group: "4. Source Connectors"
  category: "Query-API Sources (Neo4j & SPARQL)"
  priority: SHOULD
  type: behavioral
  description: >-
    API source caller extended to support HTTP POST with a request body. Required for Neo4j (POST to
    `/db/{database}/query/v2` with `Content-Type: application/json` body `{"statement": "<cypher>"}`)

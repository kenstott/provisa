- id: REQ-001
  status: complete
  group: "1. Access Governance & Security"
  category: Query Governance
  priority: MUST
  type: behavioral
  since: "2026-03"
  description: >
    Any authenticated identity can query using any supported language
    (GraphQL, SQL, pgwire, Arrow Flight). Data returned is governed solely
    by table/column visibility, RLS, and masking — there is no capability
    gate on querying itself.
  use_case: >
    Removing the query-execution capability gate means governance is expressed
    entirely through data-layer controls (visibility, RLS, masking), not
    through access lists.
  code:
    - provisa/security/
    - provisa/compiler/
  tests:
    - tests/unit/test_governance.py
    - tests/integration/test_governance_integration.py
  scenario: |
    Given an authenticated identity with role "analyst"
    When a GraphQL query is submitted against a registered table
    Then data is returned filtered by RLS and masking rules only
    And no capability gate rejects the query

  since: "2026-01"
  scenario: |
    Given a hot table with a configured refresh_interval
    When the TTL expires or a mutation occurs on the source table
    Then the cache is invalidated and asynchronously reloaded, falling back to live query if stale

- id: REQ-232
  status: complete
  group: "6. Execution, Routing, Caching & Performance"
  category: Hot Tables (Redis-Cached Lookups)
  priority: SHOULD
  type: behavioral
  description: >-
    Hot table JOIN optimization -- when a query joins a hot table (e.g., `orders JOIN countries ON
    country_code`), the compiler injects the hot table data as constants into the SQL via a
    `VALUES`-based CTE. The DB engine sees literal rows, not a table reference. This eliminates the
    second table scan and works across sources (constants travel with the query to
    Trino/Snowflake/ClickHouse). SQLGlot transpiles the VALUES clause per dialect.
  use_case: >-
    Hot table JOIN optimisation eliminates a second table scan by injecting lookup data as SQL
    constants.
  code:
    - provisa/cache/
  tests:
    - tests/unit/test_hot_tables.py
    - tests/integration/test_hot_tables_real.py
  since: "2026-01"
  scenario: |
    Given a query that JOINs a hot table
    When the compiler processes the query
    Then the hot table data is injected as a VALUES-based CTE and the DB engine sees no table
    reference

- id: REQ-233
  status: complete
  group: "6. Execution, Routing, Caching & Performance"
  category: Hot Tables (Redis-Cached Lookups)
  priority: MUST
  type: constraint
  description: >-
    Hot caching is bounded by both `max_rows` (own config default, falls back to `auto_threshold`)
    and `max_bytes` (default 10MB, measured after JSON serialization) — a wide table within
    `max_rows` but over the byte ceiling is not cached.

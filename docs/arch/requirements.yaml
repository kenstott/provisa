- id: REQ-621
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: MUST
  type: behavioral
  description: >-
    Both Hasura v2 and DDN converters emit placeholder connection credentials in the output config
    (host: localhost, password: ${env:DB_PASSWORD}). Operators must update connection details
    before starting Provisa.
  use_case: >-
    Placeholder credentials ensure the generated config is syntactically valid while signaling that
    real credentials must be supplied before production use.
  code:
    - provisa/hasura_v2/mapper.py
    - provisa/ddn/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
    - tests/unit/test_ddn.py
  since: "2026-01"
  scenario: |
    Given a completed Hasura v2 or DDN conversion
    When the output config is inspected
    Then placeholder credentials (host: localhost, password: ${env:DB_PASSWORD}) are present and Provisa refuses to start without real values

- id: REQ-623
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    v2 converter maps Hasura source `kind` to Provisa `SourceType`: `pg`/`postgres` ->
    `postgresql`, `mssql` -> `sqlserver`, `bigquery` -> `bigquery`, `citus` -> `postgresql`,
    `mysql` -> `mysql`. Connection URL (`database_url`) is parsed into host/port/database/username/
    password components. Pool settings (`pool_settings.min_connections`,
    `pool_settings.max_connections`) are preserved as `pool_min`/`pool_max`.
  use_case: >-
    Hasura v2 parity — source kind and connection URL normalization ensures source configs carry
    over without manual rewriting.
  code:
    - provisa/hasura_v2/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
  since: "2026-01"
  scenario: |
    Given a Hasura v2 source config with kind, database_url, and pool_settings
    When the v2 converter runs
    Then SourceType is mapped correctly and connection URL is parsed into components with pool settings preserved

- id: REQ-624
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    v2 converter upgrades a role to `write` capability when that role has any `delete_permissions`
    entry on any table. No per-table delete mapping is produced — the capability upgrade is the
    only artefact.
  use_case: >-
    Hasura v2 parity — delete permission grants are reflected as write capability in Provisa role
    definitions.
  code:
    - provisa/hasura_v2/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
  since: "2026-01"
  scenario: |
    Given a Hasura v2 role with delete_permissions on any table
    When the v2 converter runs
    Then the role is upgraded to write capability with no per-table delete mapping produced

- id: REQ-625
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    When a Hasura v2 source `database_url` is an environment variable reference
    (`{"from_env": "VAR"}`) or cannot be parsed, the converter substitutes placeholder values:
    `host: localhost`, `port: 5432`, `database: default`, `username: postgres`,
    `password: ${env:DB_PASSWORD}`. Operators must fix these via `--source-overrides` before the
    config is used.
  use_case: >-
    Explicit placeholder values on parse failure make unparseable connection URLs visible rather
    than producing silent misconfiguration.
  code:
    - provisa/hasura_v2/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
  since: "2026-01"
  scenario: |
    Given a Hasura v2 source with database_url as an env var reference or unparseable URL
    When the v2 converter runs
    Then placeholder connection values are substituted and operators are directed to use --source-overrides

- id: REQ-626
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    Roles are collected exclusively from permission entries (select, insert, update, delete
    permissions on tables, action permissions, and inherited role definitions). A Hasura role that
    exists without any permission entry on any table or action does not appear in the converter
    output.
  use_case: >-
    Permission-driven role collection ensures only roles that carry actual access rules are emitted,
    keeping the output minimal.
  code:
    - provisa/hasura_v2/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
  since: "2026-01"
  scenario: |
    Given a Hasura project with roles that have no permission entries on any table or action
    When the v2 converter runs
    Then those roles are excluded from the output config

- id: REQ-627
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    v2 converter derives the Provisa table `alias` from `custom_root_fields.select` (first
    priority), then `custom_root_fields.select_by_pk` (second priority), then `custom_name`
    (third priority). All other custom root fields (`select_aggregate`, `insert`, `update`,
    `delete`) are not mapped to any Provisa equivalent.
  use_case: >-
    Hasura v2 parity — table alias is derived from the select root field, the most common
    customization point, without requiring operators to manually specify aliases.
  code:
    - provisa/hasura_v2/mapper.py
  tests:
    - tests/unit/test_hasura_v2.py
  since: "2026-01"
  scenario: |
    Given a Hasura v2 table with custom_root_fields or custom_name defined
    When the v2 converter runs
    Then the Provisa table alias is derived with select > select_by_pk > custom_name priority order

- id: REQ-628
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: behavioral
  description: >-
    When converting DDN HML, if a Model references an ObjectType name that is not found in any

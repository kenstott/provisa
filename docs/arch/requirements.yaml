- id: REQ-672
  status: proposed
  group: 15. Proposed Features
  category: Graph Model
  priority: SHOULD
  type: structural
  description: 'M:N relationship support via explicit join tables: a RelationshipMapping may declare a
    join_table (schema + table name, source FK column, target FK column) to represent a many-to-many association.
    The join table''s extra columns are projected as relationship properties into the Cypher rel JSON
    object. Two Cypher relationship type names (one per direction) and two GraphQL field names (one per
    side) are declared from the same join table definition. Relationship properties are accessible as
    r.prop in Cypher queries via JSON_EXTRACT_SCALAR on the rel object''s properties bag. Users who prefer
    simplicity may instead expose the join table as a node label with its own identity.'
  use_case: Many-to-many relationships with attributes on the association (e.g. WORKS_AT with start_date
    and salary) cannot be modeled today without exposing the join table as a node. A native M:N join table
    mapping lets the graph model reflect the true cardinality without forcing an artificial entity.
  tests:
  - tests/unit/test_cypher_graph_fns.py
  - tests/unit/test_cypher_label_map.py
  - tests/unit/test_mn_relationship_requirements.py
  target: 2026-Q3
  integration_test: required
  integration_test_reason: 'M:N relationship correctness requires end-to-end verification: Cypher compilation,
    GraphQL schema generation, and data flow from source through join table to result.'
  e2e: true
  e2e_reason: M:N relationship correctness must be verified end-to-end through Cypher queries over a live
    graph stack, as unit tests cannot confirm correct JOIN generation and result projection across the
    pgwire or REST transport.
  stakeholders:
  - app-developer
  - data-engineer
  competitive_position:
    status: parity
    rationale: M:N relationship support via explicit join tables is available in Hasura (array relationships
      with join tables) and standard in Dremio and Denodo.

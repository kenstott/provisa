- id: REQ-595
  status: complete
  group: "6. Execution, Routing, Caching & Performance"
  category: Caching
  priority: MUST
  type: constraint
  description: >-
    In multi-tenant mode, RedisCacheStore prefixes every cache key with the tenant_id
    (`provisa:cache:<tenant_id>:<sha256_key>`). Table invalidation keys follow
    `provisa:table:<tenant_id>:<table_id>`. The APQ cache uses
    `provisa:apq:<tenant_id>:<sha256_hex>`. Default APQ TTL is 86400 seconds, configurable via
    `PROVISA_APQ_TTL`. One tenant's cache flush never touches another tenant's cached results.
  use_case: >-
    Tenant-prefixed cache keys guarantee that cache invalidation, eviction, and key collisions cannot
    cross tenant boundaries on shared Redis infrastructure.
  code:
    - provisa/cache/store.py
    - provisa/apq/cache.py
  tests:
    - tests/unit/test_cache_requirements.py
    - tests/integration/test_execution_routing.py
  since: "2026-01"

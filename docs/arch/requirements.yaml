  group: 6. Execution, Routing, Caching & Performance
  category: Warm Tables (Replica Profile — Low-Latency Placement)
  priority: SHOULD
  type: behavioral
  description: Warm tables -- frequently queried RDBMS tables materialized into a low-latency, engine-reachable
    location. In materialization_store terms (REQ-844) this is the `warm` profile of the REPLICA role — an
    engine-relative low-latency PLACEMENT of a reachable source (distinct from `reactive`, which lands an
    unreachable source). The mechanism below is the current Trino realization of that placement rather than
    its definition — it materializes into the Iceberg results catalog so Trino's built-in file system cache
    (`fs.cache.enabled=true`) caches the Parquet files on local SSD; other engines realize the low-latency
    tier differently. Provides ~10-50ms reads vs 100ms+ network round-trip to remote source. Same TTL/refresh
    pattern as MVs.

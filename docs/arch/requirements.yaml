  scenario: 'Given a role without the ddl capability submitting COPY or DDL over pgwire

    When the statement is received

    Then PG error code 42501 is returned

    '
  integration_test: required
  integration_test_reason: DDL/COPY capability-gating requires real role permission check before handler
    dispatch.
  stakeholders:

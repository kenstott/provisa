- id: REQ-595
  status: complete
  group: 6. Execution, Routing, Caching & Performance
  category: Caching
  priority: MUST
  type: constraint
  description: In multi-tenant mode, RedisCacheStore prefixes every cache key with the tenant_id (`provisa:cache:<tenant_id>:<sha256_key>`).
    Table invalidation keys follow `provisa:table:<tenant_id>:<table_id>`. The APQ cache uses `provisa:apq:<tenant_id>:<sha256_hex>`.
    Default APQ TTL is 86400 seconds, configurable via `PROVISA_APQ_TTL`. One tenant's cache flush never
    touches another tenant's cached results. check_cache and store_result in cache/middleware.py pass
    tenant_id (org_id) through to RedisCacheStore.get/set, so prefix isolation is active for query result
    caching.
  use_case: Tenant-prefixed cache keys guarantee that cache invalidation, eviction, and key collisions
    cannot cross tenant boundaries on shared Redis infrastructure.
  code:
  - provisa/cache/store.py
  - provisa/cache/middleware.py
  - provisa/apq/cache.py
  tests:
  - tests/e2e/test_caching.py
  - tests/integration/test_cache_store.py
  - tests/integration/test_execution_routing.py
  - tests/unit/test_cache_requirements.py
  - tests/unit/test_cache_store.py
  - tests/unit/test_config_validation_edge_cases.py
  - tests/unit/test_mv_tenant_isolation.py
  since: 2026-01
  integration_test: required
  integration_test_reason: Tenant-prefixed cache key isolation and multi-tenant cache boundaries require
    real Redis storage and full query execution path.
  competitive_position:
    status: ahead
    rationale: Tenant-prefixed cache key isolation (tenant_id in every cache key and invalidation key)
      with APQ cache partitioning is not offered by Trino, Dremio, or open-source Hasura in their multi-tenant
      caching; this is a gap in the current implementation (middleware omits tenant_id) but the design
      is a differentiator once closed.
  stakeholders:
  - ops
  - compliance

- id: REQ-874
  status: in-progress
  since: "2026-07"
  group: "4. Source Connectors"
  category: Materialization Store
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Delta fetch for materialization_store REPLICA incremental refresh: an INCREMENTAL RELOAD
    strategy for datasets whose federation strategy is MATERIALIZED (REQ-826) — data is
    landed/cached, so full re-pull is the cost delta avoids. Remote schemas (graphql_remote/
    openapi/grpc) are the PRIMARY DRIVER but not the sole case; also RDB cached-for-latency,
    NoSQL, live APIs landed via MATERIALIZED. VIRTUAL and SCAN strategies EXCLUDED (always-fresh /
    read-in-place; nothing to delta-refresh per REQ-826). KEY SIMPLIFICATION: PROBE == DELTA for
    monotonic entries. For a monotonic-cursor entry the DELTA QUERY IS THE FRESHNESS EVALUATION.
    Run the delta query: non-empty result ⇒ changed ⇒ apply the rows; empty ⇒ fresh ⇒ no-op. No
    separate watermark/probe query. No scalar_path. DEFINITION: ONE authored query (delta_query) —
    authored, source-native, fully-formed filter with two PLACEHOLDERS that Provisa substitutes:
    (a) watermark placeholder ($wm bind variable) bound to the stored CURSOR VALUE, (b) fields
    placeholder ({{fields}}) injected from the table's registered selection set. Provisa
    substitutes only; never parses the filter. CURSOR FIELD IMPLICIT: the cursor field is the
    field $wm filters on (single query, single field); after applying delta rows, the stored
    cursor advances to max(cursor-field) over returned rows (delta_query ordered by cursor field).
    Same-field alignment therefore trivially guaranteed; no separate field declaration required.
    Cursor and monotonicity are the registrant's responsibility; Provisa does no dedup or
    boundary-inclusivity logic. SOURCE-TYPE-SPECIFIC AUTHORING AND EXECUTION: delta_query is
    AUTHORED IN THE SOURCE'S NATIVE QUERY LANGUAGE, syntax and filter/cursor binding PER-SOURCE-TYPE:
    GraphQL `where: {field: {_gt: $wm}}` + `{{fields}}`; OpenAPI query-param `?updated_since=$wm` +
    selection headers; gRPC request-message filter + `$wm` + selection; SQL `WHERE field > $wm` +
    projection. Only $wm/{{fields}} placeholder substitution and cursor-advance logic are uniform
    across types. DELTA EXECUTION ROUTES THROUGH THE ADAPTER'S NATIVE CALLER, NOT THE FEDERATION
    ENGINE: GraphQL delta POSTs the native query to the source (predicate pushed down AT source) and
    lands rows into materialization_store; does NOT execute as Trino `WHERE field > x` scan over the
    federated relation. Native-pushdown path is the efficiency win and reason delta exists rather than
    relying on Trino watermark_column poll (which re-scans with no pushdown). Per source type: (1)
    delta template = native query syntax + filter/cursor binding (author-supplied, source-specific);
    (2) delta execution = routes through source type's existing native caller (GraphQL/HTTP/gRPC/SQL),
    bypassing federation engine. Pattern mirrors per-adapter mutation classification/suggestion
    (REQ-869/871): uniform contract with per-source-type native implementation. APPLY: upsert returned rows on the replica's ALREADY-REGISTERED PRIMARY KEY
    (entity identity from table registration) to replace prior row state; degrades to plain insert
    for append-only/immutable sources. REPLICA-ONLY: VIEW/mv role is delta-ineligible—REQ-844
    Iceberg overwrite-snapshot semantics (one clean snapshot per refresh) for time-travel/provenance/
    bitemporal (REQ-372/862) would be violated by upsert. Mutable relational substrate only.
    RELATIONSHIP TO FRESHNESS: Freshness (REQ-855/856) is pure stale/fresh DECISION with no
    refresh semantics (REQ-856). Delta is REFRESH ACTION under REQ-826's MATERIALIZED reload —
    incremental sibling of full re-pull. But for monotonic entries delta query serves as freshness
    evaluation, so REQ-855's opaque probe is NOT also run: PROBE (opaque token) and DELTA (monotonic
    cursor) are MUTUALLY EXCLUSIVE PER ENTRY, selected by token type. Opaque-token entries ⇒
    REQ-855 probe + full re-pull, no delta. Monotonic entries ⇒ delta-as-probe, no separate probe.
    Validation gates: (a) delta_query contains both $wm and {{fields}} placeholders; (b) parses;
    (c) $wm bind-var type is orderable/monotonic-compatible; (d) injected selection valid against
    row type.
    DONE (2026-07): the UNIFORM part is implemented — provisa/federation/delta.py: delta_applies gates
    delta to MATERIALIZED (VIRTUAL/SCAN excluded); render_delta_fields substitutes {{fields}} textually
    (Provisa never parses the source-native filter) leaving $wm for native binding; has_wm_placeholder is
    the $wm validation gate; delta_is_fresh is PROBE==DELTA (empty result ⇒ fresh/no-op, non-empty ⇒
    changed/apply); advance_cursor advances the stored cursor to max(cursor-field) over the returned rows
    (empty keeps it). REMAINING (kept in-progress): the per-source-type delta authoring + native execution
    (GraphQL/HTTP/gRPC/SQL callers, predicate pushed down at source), keyed-upsert apply on the replica,
    and the delta/opaque-probe mutual-exclusivity wiring with REQ-855.
  use_case: >-
    For REPLICAS (any MATERIALIZED-strategy dataset whose federation strategy lands data), full
    re-pull on every refresh is expensive and unnecessary. Delta fetch via monotonic watermark
    keeps replicas fresh with zero lag (REQ-855 probe) without repeated full upstream fetches.
    Primary use: remote-schema sources (graphql_remote/openapi/gRPC) avoid full-relation re-fetch
    and re-materialize. Also benefits RDB sources presently using watermark_column only for
    subscriptions (REQ-260) — they gain incremental replica refresh: keyed upsert instead of full
    re-pull, no full-CTAS + mutation-triggered staleness cycle. Strategy-agnostic scope avoids
    VIRTUAL (live) and SCAN (in-place read) per REQ-826. Replicas in mutable stores absorb deltas;
    views cannot.
  code:

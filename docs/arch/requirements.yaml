- id: REQ-885
  status: proposed
  group: "5. Query Languages, Compilation & Operations"
  category: Extensible Functions
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Generalize tracked functions (REQ-205–208: source-resident stored procedures exposed as GraphQL
    mutations) to support multiple implementation kinds: source procedure (existing), script (local
    subprocess), http, grpc, and optionally python (in-process). Implementation kind becomes a
    selectable dimension at registration; addressing (catalog name) is decoupled from binding
    (transport+location, swappable). Provisa-hosted functions take relation arguments (kinds:
    table_ref=lazy, result_set=eager materialized Arrow, column_value=scalar row-wise) and return
    Arrow buffers materialized as relations, governed at the read-time boundary. Identity model
    (DEFINER/admin vs INVOKER/user) selected by materialize flag: true ⇒ admin/output-governed;
    false ⇒ user/input-governed. Composition via view_sql + materialize; no new MV subsystem—reuse
    MV refresh (REQ-879), CTAS sink, governance, lineage primitives.
  use_case: >-
    Enables diverse computation platforms (hosted scripts, external services, Python libraries) to
    act as governed data transformations, returning relations (not just scalar functions). Maintains
    config-as-truthful-model property with URI addressing and spec-driven discovery (OpenAPI/proto/
    script-manifest). Preserves existing source-procedure tracked-function contract while extending
    to Provisa-hosted and external implementations.
  code:
    - provisa/compiler/
    - provisa/executor/
    - provisa/core/models.py
  scenario: |
    Given a user registers a function with implementation kind=http and argument kinds=[table_ref, column_value]
    and a view references it as SELECT * FROM myfn(tbl, param) WITH (materialize=true)
    When Provisa materializes the view (e.g. via CTAS or scheduled MV refresh)
    Then the function invokes the http endpoint as admin (definer), passing table metadata/hint
    and row-wise scalar, receives Arrow buffer, materializes as a relation, and applies row-level
    access governance on output before serving to end users
  open_decisions:
    - Eager vs streamed as default carrier for result_set arguments
    - Reentrancy/cycle guard when a function queries its own dependents (engine cannot see dependency graph statically)
    - Exact credential-minting mechanism for invoker-identity functions (scoped, single-use, short-TTL pgwire session tokens)
  security_constraints: >-
    Registration requires admin privilege for system-processed (materialize=true) functions; users may
    register only invoker-context (materialize=false) functions bounded by their own rights. Hosted
    functions receive minted, scoped, single-use, short-TTL credentials (no ambient passwords in env/
    config). Egress deny-by-default with allow-list (Provisa pgwire + declared http/grpc endpoints).
    Process isolation + resource limits close DoS. Row-wise calls to external services are refused/
    hard-warned; set-wise/batched required for expensive or external work. Honest staging: ship-now
    requires trusted-author-only trust model (same as stored procedures/dbt); opening to less-trusted
    authors requires confinement (egress control + process isolation).
  performance_constraint: >-
    Row-wise (column_value kind) permitted only for cheap pure local scalars; expensive or external
    work must be set-wise and batched (function receives relation, makes batched outbound calls).
    Row-wise kills pushdown (opaque projection) and prevents engine optimization. Detection via
    ops-domain audit (REQ-884) duration_ms; prevention via refusal for external row-wise and
    cardinality warning for row-wise applied past N estimated rows.
  observability: >-
    Engine-emitted I/O-boundary trace (REQ-886) is the non-bypassable floor; function-emitted OTel
    tracing via W3C traceparent propagation is encouraged ceiling. Correlation ID stamped into minted
    pgwire session joins invocation to governed reads for precise lineage.
  ui: >-
    No new top-level nav category or actionType noun. Generalized existing Commands "function" type
    with implementation/body selector (source procedure | script | http | grpc). Referenced from
    Views/Materialized Views as definition source.
  related_reqs:
    - REQ-205
    - REQ-206
    - REQ-207
    - REQ-208
    - REQ-879
    - REQ-884
    - REQ-886
- id: REQ-886
  status: proposed
  group: "3. Governance & Observability"
  category: Observability
  priority: MUST
  type: behavioral
  target: "2026-Q4"
  description: >-
    Engine-emitted I/O tracing for UDF/transformer invocations must be mandatory and
    non-bypassable, recording UDF name, transport type (script/http/grpc/sql/python),
    identity context (admin/definer vs user/invoker), declared input refs, output
    cardinality/size, duration_ms, and status. A trace/correlation ID must be stamped
    into the UDF's minted pgwire session so audit rows join to the invocation trace
    for precise lineage reconstruction. UDF-emitted tracing (via W3C traceparent context
    propagation) is encouraged but optional, allowing UDF interiors and egress calls to
    nest under the engine-side invocation span.
  use_case: >-
    Establishes a non-bypassable observability floor (relied on for governance and audit)
    while encouraging voluntary UDF-emitted interior/egress tracing as the ceiling for
    debugging and performance analysis. Enables precise lineage reconstruction by
    correlating UDF invocation traces with pgwire data-access audit rows.
  code:
    - provisa/otel_compat.py
  scenario: |
    Given a user invokes a UDF (transformer or custom function) via pgwire or SQL
    When the UDF executes and accesses tables via pgwire data derefs
    Then the engine records an invocation trace with UDF name, transport, identity, input
    refs, output size, duration, and status, stamping a trace ID into the UDF session so
    that pgwire audit rows for the UDF's data access join to the invocation trace via
    correlation ID, reconstructing the full data lineage precisely
    And if the UDF implements W3C traceparent propagation, its interior spans nest under
    the invocation span automatically via OTEL context
  related_reqs:
    - REQ-884
    - REQ-885
- id: REQ-887
  status: proposed
  group: "4. Source Connectors"
  category: RDBMS Stored Procedure Auto-Discovery
  priority: SHOULD
  type: behavioral
  target: "2026-Q3"
  description: >-
    Extend database source introspection to auto-discover stored procedures and routines
    (via information_schema.routines, pg_proc, or vendor equivalents) and auto-register them,
    rather than requiring hand-registration. Classify discovered procedures as read-returning
    (registered as parameterized relations; proc arguments become query arguments) or
    side-effecting (registered as mutations/tracked functions). Discovered proc results flow

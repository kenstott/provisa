    source registration time; unknown names are rejected. Extensible for future query-API envelope
    formats without changes to the core flattener.
  use_case: >-
    Named response normalizers (neo4j_tabular, sparql_bindings) cleanly unwrap API envelopes before
    flattening.
  code:
    - provisa/neo4j/
    - provisa/sparql/
    - provisa/api_source/
  tests:
    - tests/unit/test_neo4j_normalizers.py
    - tests/integration/test_neo4j_exec.py
    - tests/unit/test_misc_requirements.py
    - tests/unit/test_api_normalizer_requirements.py
  since: "2026-01"


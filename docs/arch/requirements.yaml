  scenario: |
    Given an aggregate MV over "orders" pre-computing SUM(amount), registered with no filters,
    and the aggregate catalog populated from the MV registry
    When a query "SELECT SUM(amount) FROM orders WHERE region = 'us'" reaches the endpoint and the
    join-MV rewriter did not fire
    Then the query is rewritten to read the MV target table with region = 'us' re-applied, and its
    sources become the MV catalog
    And an MV pre-computed WITH status = 'active' is NOT used for a query that lacks that filter
    (subset-safety), so no rows are silently dropped
  related_reqs:
    - REQ-198
    - REQ-199
    - REQ-849
- id: REQ-883
  status: complete
  since: "2026-07"
  group: "4. Source Connectors"
  category: Federation Engine Abstraction
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Provisa's pgwire server must satisfy the capability set that DuckDB's `postgres`
    extension exercises when attaching Provisa via `ATTACH ... AS x (TYPE postgres)`,
    enabling DuckDB federation engines and external DuckDB clients to mount a governed
    Provisa instance with RLS/masking intact. Concrete capabilities enumerated: (1)
    libpq connection + auth handshake; (2) catalog introspection queries for schemas/tables/
    columns/types/PKs over pg_namespace, pg_class, pg_attribute, pg_type, pg_index,
    pg_constraint with correct atttypmod and pg_type OIDs; (3) bulk read via `COPY (SELECT
    ...) TO STDOUT (FORMAT binary)` with real PostgreSQL binary COPY wire encoding per column
    type; (4) transaction-control statements (`BEGIN`/`COMMIT`/`ROLLBACK`, incl. `SET TRANSACTION
    READ ONLY` / `REPEATABLE READ`) accepted as no-ops — NO real snapshot isolation is provided or
    needed; (5) single-stream scan ONLY. Snapshot export, server-side cursors, and ctid-range
    parallelism are explicit NON-GOALS, validated empirically against DuckDB in the sibling
    pgwire-calcite project (PGW-004 / PGW-023): DuckDB's ctid parallelism splits a table by physical
    page range, but Provisa exposes no physical row address, so honoring a ctid range would force a
    `ROW_NUMBER() OVER (ORDER BY ...)` partition that scans+sorts the whole table per stream — strictly
    worse than one stream. The server reports relpages/reltuples ~ 0 in pg_class so DuckDB never elects
    parallelism and reads a single correct binary-COPY stream. Server version >= 14 (DuckDB's gate) is
    already met (server_version '14.0.provisa').
    DONE (2026-07) capability (3) — BINARY COPY output: COPY ... TO STDOUT (FORMAT binary) now emits a
    real PostgreSQL binary COPY stream (provisa/pgwire/copy_handler.py): the 11-byte PGCOPY signature +
    flags + header-extension, per-row int16 field count with length-prefixed per-field bodies (int32 -1
    for NULL), and the int16 -1 trailer. Per-column encoding is selected from the column's advertised
    type (Arrow schema on the Trino Flight bulk path; DuckDB type strings via QueryResult.column_types
    on the direct path) — bool/int2/int4/int8/float4/float8/bytea encode to their PG binary
    representations, everything else to UTF-8 text matching the text OID — and the CopyOutResponse
    overall-format flag is set to 1 (binary). Capabilities (1) libpq handshake and (2) catalog
    introspection are served by the existing pgwire server + catalog; (4) transaction-control
    statements are accepted as no-ops by the txn-tag path. DONE (2026-07) the COPY parser now accepts
    DuckDB's actual `(FORMAT "binary")` syntax — optional WITH and a quoted format word — which the
    older regex rejected (all three COPY regexes in provisa/pgwire/copy_handler.py); and a live
    end-to-end DuckDB 1.5.3 `ATTACH ... TYPE postgres` test drives all five capabilities against a
    running server (tests/integration/test_duckdb_attach_pgwire.py): ATTACH + catalog discovery,
    binary-COPY row/type/NULL round-trip, transaction no-ops via postgres_execute, and relpages=0
    single-stream. Capability (5) is confirmed a non-goal, not remaining work. COMPLETE.
  use_case: >-
    Lets DuckDB (as the REQ-825 federation engine or any external DuckDB/BI client) mount
    a governed Provisa instance via `ATTACH ... TYPE postgres` and query it with RLS/masking
    intact, completing the develop-on-DuckDB story where DuckDB reaches Provisa itself the same
    way it reaches any Postgres.
  code:
    - provisa/pgwire/server.py
    - provisa/pgwire/copy_handler.py
    - provisa/pgwire/catalog.py
    - provisa/pgwire/_pipeline.py
  tests:

- id: REQ-600
  status: complete
  group: 4. Source Connectors
  category: GraphQL Remote Schema Connector (REQ-307–313)
  priority: MUST
  type: constraint
  description: 'Remote schema sources enforce depth limits on nested object expansion: `graphql_remote.max_object_depth`
    (default: 5) caps GQL OBJECT nesting; `graphql_remote.max_list_depth` (default: 2) caps LIST-typed
    nested OBJECT inclusion; `graphql_remote.max_list_items` (default: 100) injects `first: N` to cap
    array size. For gRPC and OpenAPI, nested message/object sub-field resolution is one level deep only.
    Fields beyond these limits are excluded from the fetch.'
  use_case: Depth limits prevent unbounded data expansion and runaway remote API calls when remote schemas
    contain deeply recursive or list-heavy structures.
  code:
  - provisa/graphql_remote/mapper.py
  - provisa/grpc_remote/mapper.py

  tests:
    - provisa-client/tests/test_client.py
    - tests/unit/test_client_access.py
  since: "2026-01"
  scenario: |
    Given a ProvisaClient caller
    When query() receives a 4xx/5xx response it raises httpx.HTTPStatusError; when query_df()
      receives a GraphQL errors field it raises RuntimeError
    Then callers can handle transport and schema errors separately

- id: REQ-608
  status: complete
  group: "8. Client Access & Protocols"
  category: "SQL & Multi-Protocol Client Access"
  priority: SHOULD
  type: structural
  description: >-

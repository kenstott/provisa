- id: REQ-581
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    Parameterized queries using `$1`, `$2`, ... positional parameters are supported in both
    simple-query and extended-query (Bind/Execute) protocol modes. Parameters are substituted as SQL
    literals before execution — the upstream engine never sees a prepared statement.

  scenario: |
    Given PROVISA_PGWIRE_CERT and PROVISA_PGWIRE_KEY are set
    When a client connects
    Then the connection is wrapped in TLS; when absent the server replies N to SSL negotiation

- id: REQ-532
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    Queries against `information_schema` and `pg_catalog` are intercepted and answered from an
    in-memory DuckDB database built per request from the role's compilation context — no Trino
    round-trip occurs. Intercepted tables include `pg_namespace`, `pg_class`, `pg_attribute`,
    `pg_type`, `pg_constraint`, `pg_roles`, `pg_settings`, `pg_stat_activity`, `schemata`, `tables`,
    `columns`, `views`, `table_constraints`, `key_column_usage`, `referential_constraints`, and
    others. Stubs return zero rows.
  use_case: >-
    Local catalog intercept allows BI tools (DBeaver, Tableau, JDBC schema browsers) to populate
    their schema tree from `pg_catalog` without generating Trino queries.
  code:
    - provisa/pgwire/catalog.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a BI tool querying information_schema or pg_catalog via pgwire
    When the query is intercepted
    Then it is answered from an in-memory DuckDB built from the role's compilation context

- id: REQ-538
  status: complete

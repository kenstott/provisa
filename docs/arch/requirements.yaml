    Parameterized query support enables standard JDBC/psycopg2 prepared statement patterns. Literal
    substitution avoids prepared-statement protocol complexity with Trino.
  code:
    - provisa/pgwire/server.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"

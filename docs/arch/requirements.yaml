- id: REQ-591
  status: complete
  group: "1. Access Governance & Security"
  category: Security
  priority: MUST
  type: constraint
  description: >-
    SET LOCAL scopes app.tenant_id to the current database transaction. When the transaction
    commits or rolls back, the variable resets, preventing tenant context leakage across
    transactions.
  use_case: >-
    Transaction-scoped tenant context prevents cross-tenant data leakage if middleware is bypassed
    or connection is reused across requests.
  code:
    - provisa/core/db.py
  tests:
    - tests/unit/test_core_registration.py
  since: "2026-01"
  scenario: |
    Given a database transaction with SET LOCAL app.tenant_id applied
    When the transaction commits or rolls back
    Then the tenant_id variable resets preventing context leakage to subsequent transactions


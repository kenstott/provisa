    - provisa/pgwire/function_catalog.py
    - provisa/pgwire/function_call.py
    - provisa/pgwire/_pipeline.py
    - provisa/api/data/action_exec.py
    - provisa/api/rest/registered_call.py
    - provisa/api/rest/cypher_router.py
  tests:
    - tests/unit/pgwire/test_function_projection.py
    - tests/unit/pgwire/test_function_call.py
    - tests/unit/test_tracked_function_invocation.py
  target: "2026-Q4"
  scenario: |
    Given a tracked_function "createOrder(customer_id integer, total number)" returning a table

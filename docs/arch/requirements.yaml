  tests:
    - tests/unit/test_neo4j_normalizers.py
    - tests/integration/test_neo4j_exec.py
  since: "2026-01"
  scenario: |
    Given a Neo4j source registered with endpoint URL and auth
    When a steward defines a table using a Cypher SELECT query
    Then the HTTP API v2 response is unwrapped by neo4j_tabular and returned as flat rows

- id: REQ-296
  status: complete
  group: "4. Source Connectors"
  category: "Query-API Sources (Neo4j & SPARQL)"
  priority: SHOULD
  type: behavioral
  description: >-
    Neo4j table registration includes a query preview step. On submission, Provisa executes the
    steward's Cypher query against the live endpoint with an implicit `LIMIT 5` appended and displays
    the resulting rows. If the response contains node or edge objects rather than flat scalar values,
    registration is blocked with an error directing the steward to rewrite the query using explicit
    scalar projections (`RETURN n.name AS name, n.age AS age` rather than `RETURN n`). Steward owns
    the response shape via query authoring; Provisa does not auto-flatten graph objects.
  use_case: >-
    Query preview at Neo4j table registration catches non-scalar projections early before they cause
    runtime errors.
  code:
    - provisa/neo4j/
    - provisa/sparql/
    - provisa/api_source/
  tests:
    - tests/unit/test_neo4j_normalizers.py
    - tests/integration/test_neo4j_exec.py
  since: "2026-01"
  scenario: |
    Given a steward submitting a Cypher query for Neo4j table registration
    When the query returns node or edge objects instead of flat scalar projections
    Then registration is blocked with an error directing the steward to use explicit scalar RETURN aliases


  tests:
    - provisa-client/tests/test_adbc.py
    - tests/unit/test_client_access.py
  since: "2026-01"

- id: REQ-614
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire
  priority: MUST
  type: constraint
  description: >-
    The pgwire listener accepts only SQL statements. GraphQL and Cypher query strings are not parsed
    or executed over the pgwire protocol.

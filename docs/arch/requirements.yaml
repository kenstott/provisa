- id: REQ-366
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Registration & Governance
  priority: MUST
  type: behavioral
  description: >-
    Views require an approval workflow, OR the originator must already hold the rights to the
    underlying tables and to any joins used within the view. Any join within a view likewise
    requires approval or originator rights. Convenience views (adding no new semantics) are
    discouraged — instead grant the relationship rights and query in any form. Creating a view
    implies new semantics: derived/calculated values, or the view name itself as a new business
    concept. Approval gates therefore apply to both views (for the semantics they introduce,
    consistent with REQ-134) and relationships (for navigational intent).
  use_case: >-
    View approval (or originator-rights) plus join approval ensures new semantics and cross-domain
    imports are governed; convenience views are discouraged in favor of relationship rights.
  code:
    - provisa/core/
  tests:
    - tests/integration/test_schema_gen.py
    - tests/unit/test_core_registration.py
  since: "2026-01"
  scenario: |
    Given a user attempting to create a view over tables they do not own
    When they submit the view creation
    Then an approval workflow is triggered unless the originator already holds rights to all
    underlying tables and joins

- id: REQ-367
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Domain Model
  priority: MUST
  type: structural
  description: >-
    There is only one view type — always intradomain (the output belongs to a domain). Two valid
    reasons to create a view: (1) the source is cross-domain (importing external data into the
    domain as a named business concept), (2) the source is local (deriving new or calculated data
    from existing domain assets). Two hard constraints follow: cross-domain data may only enter a
    domain via a view, and new or derived data may only exist as a view. No other reason to create
    a view is valid; there is no separate cross-domain view type — just views, always intradomain,
    used for exactly these two purposes.
  use_case: >-
    Unified view model with two hard constraints ensures cross-domain imports are read-only adapters
    while computed data is always created within a single domain.
  code:
    - provisa/compiler/sql_gen.py
    - provisa/mv/
  tests:
    - tests/unit/test_domain_views.py
  since: "2026-01"
  scenario: |
    Given a request to create a view in a domain
    When the view source is cross-domain or derives new data locally
    Then the view is valid; any other motivation is rejected as it violates the two-purpose rule


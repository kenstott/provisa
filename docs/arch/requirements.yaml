- id: REQ-432
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Registration & Governance
  priority: MUST
  type: constraint
  description: >-
    A registered table must be unique by (domain_id, table_name) — stronger guarantee than the DB
    constraint UNIQUE(source_id, schema_name, table_name). Table registration (admin
    registerTable/updateTable mutations) rejects any collision of domain+table against a different
    physical table. Startup/schema-rebuild validates the entire registry and fails if any duplicate
    exists.
  use_case: >-
    Domain+table uniqueness prevents ambiguous table references across all query layers (GraphQL,
    Cypher, view SQL).
  code:
    - provisa/core/
  tests:
    - tests/unit/test_core_registration.py
  since: "2026-01"
  scenario: |
    Given an attempt to register a table under a (domain_id, table_name) pair already in use
    When the registerTable mutation is submitted
    Then the registration is rejected with a uniqueness collision error

- id: REQ-433
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Registration & Governance
  priority: MUST
  type: behavioral
  description: >-
    A datasource may be associated with multiple domains. Any domain owner may register any
    unclaimed table from that source. Once a table is claimed by one domain, no other domain may
    register it — first-come ownership model. Unique constraint enforced on (source_id,
    normalized_table_name). The UI greys out claimed tables regardless of which domain claimed
    them.
  use_case: >-
    Multi-domain with first-claim ownership prevents the same physical table from being registered
    multiple times while allowing flexible domain-to-source associations.
  code:
    - provisa/core/
    - provisa-ui/src/pages/TablesPage
  tests:
    - tests/unit/test_dataset_uniqueness.py
  since: "2026-01"
  scenario: |
    Given a datasource shared across multiple domains
    When a domain owner claims a table
    Then no other domain may claim that same physical table; the UI greys it out for all other
    domains

- id: REQ-434
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Registration & Governance
  priority: SHOULD
  type: behavioral
  description: >-
    Creation-request mechanism: any governed create operation (view, relationship, etc.) attempted
    by a user lacking the authority to perform it produces a persisted request rather than an
    error. The request enters a queue (REQ-063) visible to every user holding the rights to execute
    that create. An authorized user may execute or reject the request; rejection carries a
    specific, actionable reason. No create is performed until an authorized user executes the
    request.
  use_case: >-
    Creation-request queue lets users without create authority propose views/relationships for an
    authorized holder to execute.
  code:
    - provisa/core/
    - provisa-ui/src/
  tests:
    - tests/unit/test_core_registration.py
  since: "2026-01"
  scenario: |
    Given a user without create authority attempting to create a view or relationship
    When they submit the creation
    Then a persisted request is created in the queue rather than an error; an authorized user may
    execute or reject it


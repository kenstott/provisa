  related_reqs:
  - REQ-842
  - REQ-135
- id: REQ-844
  status: in-progress
  since: "2026-07"
  group: 4. Source Connectors
  category: Materialization Store
  priority: SHOULD
  type: structural
  target: "2026-Q3"
  description: >-
    materialization_store — materialized (landed physically by ANY write means:
    engine-native CTAS/load, SQLAlchemy upsert, or app-side land; REQ-848) into a
    durable STORE. Configured through the same ${env:...} secrets chokepoint as
    ControlPlaneConfig. Its members are characterized by three properties that
    together exclude every other cache: FEDERATABLE (the engine reads it as a real
    relation it can join/scan — REQ-826; excludes hot tables, which are VALUES-CTE
    plan injections, and the APQ/result memos, which are not relations); DURABLE
    (survives restart, disk/object-backed — excludes the ephemeral tier); and
    REFRESHABLE (actively kept in sync by the one centralized freshness gate —
    REQ-855/856/857/858; excludes a passive scanned source, which is federatable
    and durable but unmanaged).
    It holds TWO ROLES on ONE categorical axis — whether the entry has a
    semantic-SQL definition:
    (1) REPLICA — undefined verbatim copies of source rows, no standalone
    identity; governance/derivation applied at query time on top, never baked in.
    Two population profiles: reactive (source is UNREACHABLE — landed so it is
    queryable at all; on-miss, single-flighted pull-through; REQ-845/847; formerly
    api_cache, renamed as the role is source-agnostic) and warm (source is
    REACHABLE — an optional latency copy; usage-promoted/demoted by query
    frequency; REQ-238/239).
    (2) VIEW — mv: governed, named datasets each defined by semantic SQL
    (view_sql; implicit relationship-generated or explicit view materialize:true).
    The definition IS the identity and the basis for lineage, provenance
    (REQ-862), and definition-versioning.
    Two orthogonal, ENGINE-RELATIVE attributes apply to any entry and are NOT
    roles: PLACEMENT — where the entry lands, chosen relative to engine capability
    (object store, a low-latency fast-read tier, engine-native store, or Iceberg);
    warm's "fast tier" is just placement=engine's-low-latency-store (Trino realizes
    it as the Iceberg results catalog + local-SSD file cache, other engines
    differently), never a Trino-specific definition. FRESHNESS POLICY — TTL /
    probe / transitive (REQ-855). Population trigger and eviction are NOT roles:
    both roles are lazy and use the one freshness method; the view background
    refresh loop and warm's frequency promotion are optional warm-ahead only.
    SUBSTRATE is selected independently per role (roles may occupy distinct schemas
    of one backend OR distinct backends), engine-capability-gated (REQ-846):
    replica → a relational/engine-native store suffices (undefined copies have no
    forensic value); view → SQLAlchemy DB OR engine-native Iceberg, defaulting
    to Iceberg whenever a reachable Iceberg catalog exists, because the derived
    dataset's snapshot history is the forensic/bitemporal value (time-travel,
    provenance, restatement; REQ-372/862). Iceberg view refresh MUST use
    overwrite semantics — one clean snapshot per refresh (not delete+insert) — so
    time-travel maps exactly one snapshot to one refresh state. When no Iceberg
    catalog is reachable the substrate degrades to the relational/native store as an
    explicit, surfaced capability signal (never a silent fallback; REQ-847).
  use_case: >-
    One engine-agnostic materialization store replacing per-protocol hardcoded
    caches, defined by three properties (federatable, durable, refreshable) that
    cleanly separate it from the ephemeral hot/APQ/result tiers and from passive
    scan sources. The replica-vs-view axis drives substrate: cheap
    relational storage for undefined source copies (reactive/warm), snapshot-capable
    Iceberg for the governed derived datasets whose history underpins audit,
    provenance, and bitemporal restatement. Supports security-conscious tenants
    pointing the store at their own data plane.
  notes: >-
    DONE (2026-07): the store's engine-relative foundations are in place on the federation contract —
    membership is derived (a member is a source that federate() resolves to MATERIALIZED, i.e. the
    reactive set; provisa/federation/materialization.py::reactive_sources), backend validity is enforced
    (REQ-846), and the write face is selected per backend (REQ-848). REMAINING (kept in-progress): the
    concrete store lifecycle — the two roles (replica vs view) over their selected substrate (relational
    vs Iceberg with overwrite-snapshot semantics), durable load/refresh, and participation in federation
    as a real joinable/scannable relation — lands with the freshness gate (REQ-855) and MV refresh path.
  code:
    - provisa/federation/materialization.py
    - provisa/federation/engine.py
  tests:
    - tests/unit/test_federation_materialization.py
  related_reqs:
  - REQ-135
  - REQ-158
  - REQ-238
  - REQ-239
  - REQ-309
  - REQ-318
  - REQ-327
  - REQ-372
  - REQ-424
  - REQ-826
  - REQ-830
  - REQ-845
  - REQ-846
  - REQ-848
  - REQ-855
  - REQ-862

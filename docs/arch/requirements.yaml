    When Provisa auto-classifies them
    Then GetUsers and StreamEvents are classified as queries and CreateUser as a mutation

- id: REQ-324
  status: complete
  group: "4. Source Connectors"
  category: "gRPC Remote Schema Connector (REQ-322–329)"
  priority: SHOULD
  type: structural
  description: >-
    Proto scalar types are mapped to SQL/GraphQL types as follows: `string`/`bytes` → `text`;
    `int32`/`uint32`/`sint32`/`fixed32`/`sfixed32` → `integer`;
    `int64`/`uint64`/`sint64`/`fixed64`/`sfixed64` → `bigint`; `float` → `real`; `double` →
    `numeric`; `bool` → `boolean`; `repeated <T>` → `jsonb`; nested message → `jsonb`; enum →
    `text`.
  use_case: >-
    Proto scalar type mapping to SQL/GraphQL types gives gRPC message fields correct query and filter
    semantics.
  code:
    - provisa/grpc_remote/
  tests:
    - tests/unit/test_grpc_remote_loader.py
    - tests/integration/test_grpc_execution.py
  since: "2026-01"


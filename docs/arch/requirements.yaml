- id: REQ-840
  status: complete
  since: "2026-07"
  group: 4. Source Connectors
  category: Federation Engine Abstraction
  priority: MUST
  type: infrastructure
  target: "2026-Q3"
  description: >-
    The federation engine is a pluggable abstraction with per-engine drivers.
    Three driver classes exist: broad federators (Trino, reaches many external
    source types), partial federators (DuckDB, attaches a subset of external
    databases via extensions/scanners), and self-only warehouse-native engines
    (Snowflake, Oracle, Databricks — reach only their own store). Reachability
    is connector-presence-defined and binary: reachable(table) is true iff a
    connector exists for (selected_engine, table.source.type). The connector's
    mechanism — attach (reference in place) or land (materialize into the
    engine's reachable store) — is an internal property of the connector, not a
    reachability tier; warehouse-native engines have only land mechanisms
    (into self), broad/partial federators use attach where a connector supports
    it and land otherwise.

    A federation engine INSTANCE owns its connector collection — a map keyed by
    source_type (connectors: dict[source_type -> Connector]). Reachability is
    a lookup into that collection: reachable(table) == (table.source.type in
    engine.connectors). The three driver classes are defined by collection
    contents — broad federator (Trino: many source_types), partial federator
    (DuckDB: postgres/csv/json/parquet where an extension/scanner exists),
    self-only warehouse-native (Snowflake: own store only). Swapping the engine
    swaps the connector collection; planner/cache/freshness-gate logic is
    unchanged. Each Connector projects CatalogEntry rows into the engine catalog.
    DONE (2026-07): provisa/federation/engine.py::FederationEngine owns a connector collection keyed
    by source_type; reachable(source_type) is the binary connector-presence lookup; swapping the engine
    swaps the collection. driver_class() classifies by collection contents — build_trino_engine
    (postgres/mysql/sqlserver → BROAD), build_duckdb_engine (postgres + csv scanner → PARTIAL),
    build_snowflake_engine (land-into-self only → SELF_ONLY).
  use_case: >-
    Support deployments whose engine ranges from a broad federator to a
    self-only data warehouse without changing planner or cache logic.
  code:
    - provisa/federation/engine.py
    - provisa/federation/connector.py
  tests:
    - tests/unit/test_federation_engine.py
  competitive_position:
    status: ahead
    rationale: >-
      Engine-pluggable federation (not hardwired to one engine) is uncommon;
      Denodo, Dremio, and Trino each hardwire their own engine.
  related_reqs:
  - REQ-841
  - REQ-842

- id: REQ-673
  status: in-progress
  since: "2026-07"
  group: 4. Source Connectors
  category: Cost Statistics
  priority: SHOULD
  type: structural
  target: '2026-Q4'
  description: >-
    Connector cardinality capability — cardinality(source, table) -> Estimate{value,
    exact, method}. A source may expose a CHEAP volume metric so a caller can size a
    table without a full scan. Resolution order: (1) a cheap native statistic when the
    source has one (GraphQL totalCount, OpenAPI X-Total-Count, PG pg_class.reltuples,
    Trino SHOW STATS, Parquet/Iceberg row-group metadata); (2) an exact COUNT(*) only
    when the connector reports counting is cheap; (3) UNKNOWN when sizing is expensive
    and no native estimate exists — fail-open, never a hidden full scan. The Estimate
    carries `exact` (true for a native count(*)/totalCount, false for reltuples-style
    estimates) and `method`, so a consumer knows what the number is and what it may be
    used for. The producer is SPARSE and OPT-IN: a native count is authored only for
    expensive-count sources — the API sources (openapi/graphql_remote/grpc), where a
    count today means materializing the full pull, and huge un-indexed row-stores.
    Cheap-count sources contribute nothing and carry no maintenance. Generalizes and
    supersedes the GQL-specific count_query helper (provisa/sources/counts.py) under
    the connector abstraction (REQ-840-843).
    DONE (2026-07): the estimate type + resolution order are implemented — provisa/federation/
    cardinality.py::Estimate(value, exact, method: CardinalityMethod) and resolve_cardinality(native_stat,
    exact_count_cheap, exact_count) returning, in order, a source's native statistic (exact totalCount or
    approximate reltuples), else an exact COUNT(*) only when the connector says counting is cheap, else
    UNKNOWN (fail-open, never a hidden full scan). REMAINING (kept in-progress): the per-source native-stat
    PRODUCERS wired onto the connectors (graphql totalCount, openapi X-Total-Count, PG reltuples, Trino
    SHOW STATS, Parquet/Iceberg row-group metadata) — sparse/opt-in for expensive-count sources.
  code:
    - provisa/federation/cardinality.py
  tests:
    - tests/unit/test_cardinality.py
  use_case: >-
    One estimate serves two consumer classes. The AUTOMATED PLANNER reads it to choose
    a federation strategy (materialize vs virtual, REQ-826), gate hot-table promotion
    (REQ-236) without a blind COUNT(*), and set redirect/probe thresholds. HUMAN
    PLANNERS read the same estimate — in the catalog, in plan/EXPLAIN output, and on the
    cold graph-counts path — to size a source before committing to an expensive
    federated query, with exact/estimate/unknown surfaced honestly. An "unknown, sizing
    requires a full pull" answer is itself actionable, unlike today's bare 0.
  related_reqs:
    - REQ-840
    - REQ-841
    - REQ-842
    - REQ-843
    - REQ-826
    - REQ-236
    - REQ-875
  stakeholders:
  - data-engineer
  - app-developer
  competitive_position:
    status: ahead
    rationale: A source-agnostic cardinality capability that prefers cheap native
      statistics and reports estimate/exact/unknown honestly — feeding both the query

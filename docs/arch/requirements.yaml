    Cross-source semantic inference — naming conventions diverge, high false-positive risk.
    Candidates corroborated by multiple evidence types accumulate confidence.
  use_case: >-
    Confidence hierarchy lets stewards prioritize which relationship suggestions to review first,
    reducing false-positive noise.

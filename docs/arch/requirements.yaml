- id: REQ-424
  status: complete
  group: "4. Source Connectors"
  category: Vector Search
  priority: SHOULD
  type: behavioral
  description: >-
    For sources without native vector capability, Provisa must transparently materialize the embedding
    column to an internal pgvector-enabled PostgreSQL cache table, build an HNSW index, rewrite the
    query against the cache joining PKs back to the source, and return unified results. The caller
    must not be aware of the fallback path.
  use_case: >-
    Transparent fallback enables vector search on any source without source-side changes.
  code:

- id: REQ-870
  status: complete
  since: "2026-07"
  group: "2. Authentication & Identity"
  category: Authorization
  priority: MUST
  type: behavioral
  description: >-
    Admin-only reclassification: legitimate reclassification of a mutation to read-safe
    is gated by ACCESS_CONFIG capability and recorded as a governance decision. No
    per-operation read_only opt-out for callers; only admin acts can demote a mutation.
    Re-introspection of discovered mutations registers with empty writable_by; existing
    grants preserved by name.
    DONE (2026-07): two enforceable behaviors. (1) reclassify_kind (provisa/security/
    mutation_authz.py) is the single reclassification gate — only a role holding ACCESS_CONFIG
    (ADMIN bypasses, per has_capability) may demote a mutation to read-safe; the reverse
    (promoting a read to a write) is rejected for everyone, and there is no caller-supplied
    read_only flag anywhere in the request path, so classification stays under governance
    control. A no-op transition is idempotent. (2) upsert_function (provisa/core/repositories/
    function.py) now preserves an existing writable_by on re-introspection: a discovered mutation
    upserts with an empty writable_by that keeps the current admin grant (grants preserved by
    name), while an explicit non-empty grant still applies. Proven with unit tests for the gate
    and a live-Postgres test for grant preservation across re-introspection.
  use_case: >-
    Ensures authorization policy remains under control of governance (admin), not individual
    callers. Prevents callers from overriding mutation classification, supports safe
    discovery/re-registration of mutations without accidentally granting them.
  code:

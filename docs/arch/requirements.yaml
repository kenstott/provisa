- id: REQ-230
  status: complete
  group: "6. Execution, Routing, Caching & Performance"
  category: Hot Tables (Redis-Cached Lookups)
  priority: MUST
  type: behavioral
  description: >-
    Hot tables stored as a single JSON blob in Redis and injected as a VALUES CTE; column governance
    (RLS/masking/visibility) is NOT applied at storage time but by Stage-2 apply_governance over the
    governed SQL that wraps the CTE (pipeline order: governance -> cache/CTE -> route). The per-row
    PK-hash/sorted-set storage in the spec was judged unnecessary because hot tables are tiny inline
    tables.
  use_case: >-
    Centralised JSON blob storage with governance applied at query time simplifies cache maintenance
    and ensures all governance rules are enforced on hot data.
  code:
    - provisa/cache/
  tests:
    - tests/unit/test_hot_tables.py
    - tests/integration/test_hot_tables_real.py
  since: "2026-01"
  scenario: |
    Given a table designated as hot
    When a query references that table
    Then the cached JSON blob is injected as a VALUES CTE and governance is applied by Stage-2 at
    query time

- id: REQ-231
  status: complete
  group: "6. Execution, Routing, Caching & Performance"
  category: Hot Tables (Redis-Cached Lookups)
  priority: MUST
  type: behavioral
  description: >-
    Hot table refresh follows MV pattern: TTL-based via `refresh_interval` (default:
    `materialized_views.default_ttl`), background refresh loop, stale fallback to live query.
    Mutations to the source table trigger immediate invalidation + async reload.
  use_case: >-
    TTL-based hot table refresh keeps cached lookup data current without manual cache invalidation.
  code:
    - provisa/cache/
  tests:
    - tests/unit/test_hot_tables.py

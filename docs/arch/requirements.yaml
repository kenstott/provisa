- id: REQ-842
  status: in-progress
  since: "2026-07"
  group: 4. Source Connectors
  category: Connector Abstraction
  priority: MUST
  type: structural
  target: "2026-Q3"
  description: >-
    A Connector, indexed by (federation_engine, source_type), encapsulates all
    engine-specific catalog operations — capability(), catalog_add(asset),
    catalog_remove(asset), land(source), typemap(source->engine). For Trino,
    catalog_add updates the Trino catalog; for DuckDB it issues ATTACH/scanner
    setup plus view DDL; for warehouse-native engines it is a no-op (the asset
    is already a native table). Adding a source type, a federation engine, or
    a cache backend is a connector registration; planner, cache-role, and
    freshness-gate logic are unchanged.

    The connector's derived engine-catalog entry has an explicit persisted row
    shape: (name: text, engine/platform: text, source_type: text, mechanism:
    attach|land, details: jsonb). The connector exposes catalog_add,
    catalog_update, and catalog_remove operations over individual entries, plus
    a catalog_refresh operation that re-projects the entire engine catalog from
    the asset registry (REQ-843 reconcile). The details jsonb field is
    engine+source_type specific — e.g., Trino postgresql = connection-url/user
    /password .properties; DuckDB postgresql = ATTACH dsn; DuckDB csv/json =
    read_csv_auto/read_json_auto view DDL over file paths+columns; warehouse
    -native (Snowflake) = no-op land-into-self. Per the V1 no-migrations
    constraint, the catalog-entry table is derived/rebuildable engine state,
    not a migrated Postgres table.
    DONE (2026-07): provisa/federation/connector.py defines the Connector ABC keyed by
    (engine, source_type) with capability() and details(source), projecting the persisted
    CatalogEntry shape exactly — (name, engine, source_type, mechanism: attach|land, details: dict/jsonb).
    Concrete connectors realize the three engine families: Trino postgres/mysql/sqlserver (attach,
    connection-url/user/password .properties details), DuckDB postgres (attach dsn) + csv
    (read_csv_auto view DDL), and a warehouse-native land-into-self no-op. catalog_add/remove/refresh
    are the EngineCatalog.add/remove/refresh operations over these projected entries.
    REMAINING (kept in-progress): typemap(source→engine) per connector, and the live APPLICATION of a
    catalog entry to a running engine (writing Trino .properties / issuing DuckDB ATTACH+view DDL) —
    wired with the executor in the federate() work (REQ-825-827).
  use_case: >-
    A single extensibility seam so new engines/sources/backends require only
    a connector, not core changes.
  code:
    - provisa/federation/connector.py
    - provisa/federation/engine.py
  tests:
    - tests/unit/test_federation_engine.py
  related_reqs:
  - REQ-840
  - REQ-843

- id: REQ-871
  status: complete
  since: "2026-07"
  group: "2. Authentication & Identity"
  category: Authorization
  priority: MUST
  type: behavioral
  description: >-
    Mutation↔table association suggestions at registration time via protocol-specific
    association-suggesters. Universal rule: adapter emits ranked (mutation → table)
    candidates; suggestions are hints only; admin-confirmed; confirmed associations
    register with empty writable_by (default-deny); any mutation may bind to any table
    (manual override always); unmatched mutations remain registerable. GraphQL: walk
    mutation return type's fields, unwrap NON_NULL/LIST, match leaf types against
    type_to_table; LIST-valued field = changed-records collection; prioritize single
    object > list-of-table-type; ignore scalar/stats fields. OpenAPI: align via URL path
    template, operationId stem, and tags (e.g., POST /users → users table); response
    schema is tiebreaker only, not primary signal. gRPC: response-message repeated field
    type + method-name entity stem (weakest signal). Fallbacks (all adapters): operation
    name affixes (create*/update*/delete*/upsert*) and input-type stem for operations
    whose response carries no queryable type. False negatives expected; no suggestion
    auto-binds.
    DONE (2026-07): the suggester engine (provisa/security/association_suggester.py) implements all
    three protocols and the shared fallbacks exactly as specified, returning a ranked list of
    TableCandidate(table, score, reason) deduplicated per table (strongest signal wins, corroborating
    signals add a small tiebreak). Signal strengths encode the spec order: GraphQL single-object return
    (1.0) > list-of-table-type (0.8); OpenAPI path resource (0.9) > operationId stem (0.7) > tag (0.6)
    with response schema as a 0.05 tiebreak; gRPC repeated response-field type (0.6) > method-name stem
    (0.4); name-affix / input-type stem fallback (0.3). Nothing auto-binds — the functions are pure and
    return hints; an empty list is the honest false-negative case. The GraphQL remote mapper
    (provisa/graphql_remote/mapper.py) invokes it during registration so every mapped mutation entry
    carries suggested_associations = [{table, score, reason}] computed from its unwrapped return-type
    leaves + input-type stem, with writable_by left empty (default-deny). Consuming these hints into an
    admin confirmation surface is REQ-870; projecting/binding across surfaces is REQ-872.
  use_case: >-
    Registration of mutations across heterogeneous sources requires protocol-aware
    association signals. Per-adapter suggesters reduce admin friction by ranking likely
    alignment; unmatched mutations remain registerable as global functions or require
    manual binding.
  code:
    - provisa/security/association_suggester.py
    - provisa/graphql_remote/mapper.py
  tests:
    - tests/unit/test_association_suggester.py
    - tests/unit/test_graphql_remote_mapper.py
  target: "2026-Q4"
  scenario: |
    Given a remote GraphQL source with a query "users" returning [User] (so type_to_table
    maps User → the users table) and a mutation "createUser(input: UserInput): User"
    When the schema is registered and mapped
    Then the createUser tracked-function entry carries suggested_associations whose top
    candidate is the users table (score 1.0, reason "return type User"), and its writable_by
    stays empty — the suggestion is a hint that no code auto-binds
    And a mutation "sendTelemetry: Boolean" with no table-typed return yields an empty
    suggested_associations list rather than an error
  related_reqs:
    - REQ-867
    - REQ-870
- id: REQ-872
  status: complete
  since: "2026-07"
  group: "2. Authentication & Identity"
  category: Authorization
  priority: MUST
  type: behavioral
  description: >-
    Registered remote-schema mutations/functions (tracked_functions, tracked_webhooks)
    MUST be projected into each query surface's native function catalog and be invocable
    from each surface, routing through the shared executor and enforcing per-mutation
    writable_by authorization. Single source of truth: tracked_functions + tracked_webhooks
    registry. Per-surface fidelity: pgwire populates _pg_proc and supports SELECT fn(...),
    SQL/Explore projects information_schema.routines and supports table-valued-function
    invocation, Cypher/Bolt binds CALL <registeredFn>(args) YIELD ... with optional discovery.
    DONE (2026-07) — the SQL-surface DISCOVERY projection: the pgwire catalog builds pg_proc and
    information_schema.routines + information_schema.parameters from the tracked_functions registry
    (provisa/pgwire/catalog.py::_populate_functions, called from _build_catalog_db), so psql \\df,
    DBeaver and Explore now see registered functions. The registry is the single source of truth;
    projection is role-scoped by visible_to (unrestricted or the role is granted); table-valued
    functions (a return_schema) are set-returning (proretset/record); arguments become
    information_schema.parameters rows in ordinal order with SQL data types; the same function
    registered under multiple keys (bare + domain-prefixed alias) projects once.
    DONE (2026-07) — the SHARED EXECUTOR + Cypher INVOCATION: the tracked-function execution core is
    extracted from the GraphQL action path into invoke_tracked_function(name, args, state, role_id)
    (provisa/api/data/endpoint.py) — surface-agnostic, enforcing per-mutation writable_by by contract
    (REQ-869) then running SELECT * FROM "schema"."fn"(args) through the function's source pool. The
    GraphQL path now routes through it, and the Cypher surface binds CALL <registeredFn>(args)
    YIELD col [AS alias] to it (provisa/api/rest/cypher_router.py::_detect_registered_call /
    _handle_registered_call): the call is intercepted before parse, args (literals / $params) are
    coerced positionally, writable_by is enforced in the executor (403 on deny), and YIELD projects
    the returned columns.
    DONE (2026-07) — the pgwire / SQL INVOCATION: execute_pgwire_sql intercepts a bare
    SELECT-of-a-registered-function before governance/routing and runs it through the same executor
    (provisa/pgwire/function_call.py). Both the table-valued form SELECT * FROM fn(args) and the
    scalar form SELECT fn(args) are recognized via sqlglot (an Anonymous func whose name is a
    registered tracked function), literal args are coerced positionally, and the executor's row dicts
    are adapted back to a pgwire QueryResult — so psql / DBeaver / Explore invoke registered functions
    exactly like native ones, with writable_by enforced. All surfaces (GraphQL, Cypher CALL, pgwire/
    SQL SELECT) now discover AND invoke registered functions through the one shared executor.
  use_case: >-
    UDF registry currently exposed only through GraphQL; pgwire, SQL/Explore, and Cypher
    surfaces cannot discover or invoke registered functions. Cross-surface projection and
    execution binding unifies function access across all query surfaces and enforces
    consistent authorization.
  code:

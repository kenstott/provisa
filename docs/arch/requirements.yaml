    Pgwire clients (DBeaver, DataGrip, DuckDB) discover database schemas via pg_catalog and
    information_schema queries. Without object-level authorization filtering, a Pgwire client
    will display all accessible Calcite schemas/tables to the user even if the user's role
    should not see them. Enforcing role visibility in both discovery and execution prevents
    information leakage and aligns object access with existing RLS/masking governance.
  code:

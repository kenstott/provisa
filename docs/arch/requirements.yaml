- id: REQ-703
  status: complete
  group: 10. Execution & Query Planning
  category: High Availability
  priority: MUST
  type: infrastructure
  description: Provisa implements a two-tier recovery model for all deployment modes. Tier 1 retries read
    operations for up to 30 seconds on transient errors using exponential backoff with full jitter (configurable
    via PROVISA_RETRY_BUDGET_SECS). Tier 2 uses an internal watcher to detect and restart failed software
    components within 2–3 minutes. Write operations are never retried internally. Machine-level and cluster-level
    failures are the customer's responsibility.
  use_case: Read-heavy query workloads may encounter transient coordinator unavailability, brief network
    partitions, or temporary query queue saturation. Automatic retry provides resilience without requiring
    client-side retry logic for all read operations. Software component failures are self-healing within
    the deployment boundary; cluster-wide HA is configured by the customer based on their failure domain
    (single-node, VM/metal, K8s).
  code:
  - provisa/executor/trino.py
  - provisa/executor/direct.py
  - provisa/scheduler/jobs.py
  - terraform/aws/main.tf
  - terraform/gcp/main.tf
  - terraform/azure/main.tf
  tests:
  - tests/unit/test_high_availability.py
  integration_test: deferred
  integration_test_reason: 'End-to-end Trino container restart timing (2-3 min) requires a live Docker
    environment. [deferred: requires external infrastructure not in CI stack]'
  e2e: false
  e2e_reason: 'The two-tier retry model (exponential backoff on transient errors, component watcher restart)
    can only be verified by injecting real transient failures into a running server and observing retry
    and recovery behavior over actual network connections. [deferred: requires full UI/installer stack
    not available in CI]'
  scenario: 'Given a read operation is issued against Provisa

    When a transient error occurs (e.g., COORDINATOR_NOT_AVAILABLE, ConnectionError)

    Then Provisa internally retries with exponential backoff for up to PROVISA_RETRY_BUDGET_SECS (default
    30s)


    Given a software component fails (e.g., executor crashes)

    When the internal watcher detects the failure

    Then the component is restarted within 2–3 minutes

    And in-flight operations are lost (client must retry)


    Given a write operation fails for any reason

    Then it is never retried internally

    And the error is returned to the client immediately

    '
  since: 2026-06
  stakeholders:
  - ops
  - executive
  competitive_position:
    status: ahead
    rationale: 'Consistent with Trino, Spark, Presto, Snowflake, and BigQuery — none guarantee coordinator
      HA out of the box. Provisa improves on the baseline: built-in read retry with configurable budget
      means every client gets resilience for free without client-side implementation; DNS-stable coordinator
      address removes a manual ops step competitors leave to the customer; write-safety guarantee (never
      retry writes internally) is a correctness property that naive client retry implementations routinely
      miss.'

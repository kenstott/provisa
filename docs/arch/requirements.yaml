- id: REQ-194
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Naming Convention
  priority: MUST
  type: structural
  description: >-
    The naming authority is the single source of truth for all client-facing names. Physical backend
    column names are never exposed to clients. **Alias** (`column.alias` in config): the canonical
    name. SQL uses it verbatim (no convention applied). GQL applies its configured convention to it.
    CQL derives from GQL. **No alias**: each query language derives its name from the physical
    column name via its configured convention. **SQL convention**: configurable, default
    `snake_case`. Applied via `apply_sql_name()`. **GQL convention**: configurable (`apollo_graphql`
    default = camelCase, `hasura_graphql` = snake_case). Applied via `apply_gql_name()`. **CQL**:
    derived from the GQL name.
  use_case: >-
    Consistent multi-language naming with a single authority ensures client-facing names are
    predictable and independent of physical schema.
  code:
    - provisa/compiler/
  tests:
    - tests/unit/test_naming.py
  since: "2026-01"
  scenario: |
    Given a column with and without an alias configured
    When names are generated for SQL, GQL, and CQL
    Then the naming authority applies the configured convention consistently and physical names are
    never exposed


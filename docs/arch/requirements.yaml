- id: REQ-260
  status: complete
  group: 9. Live Data & Events
  category: Subscriptions
  priority: SHOULD
  type: behavioral
  description: 'Polling-based subscription provider for sources without native CDC. A `watermark_column`
    (monotonic timestamp or sequence, e.g. `updated_at`) must be declared on the table config. Without
    a `watermark_column`, poll subscriptions are unavailable for that source. Part of Phase AM (Live Query
    Engine). Note: Poll-based subscriptions cannot detect hard deletes — a deleted row leaves no updated
    watermark value and will not appear in any poll. Applications requiring delete visibility must use
    soft deletes (e.g. a `deleted_at` flag) that update the watermark column; the delete is then visible
    as an update event containing the soft-delete marker.'
  use_case: Poll-based subscriptions enable live delivery for sources that do not support CDC or LISTEN/NOTIFY.
  code:
  - provisa/subscriptions/
  tests:
  - tests/e2e/test_subscriptions.py
  - tests/integration/test_sse_subscriptions.py
  - tests/unit/test_live_engine_full.py
  - tests/unit/test_subscribe.py
  since: 2026-01
  scenario: 'Given a table config declares a watermark_column and a source without native CDC

    When a poll subscription is created for that table

    Then new or updated rows since the last watermark are delivered to the subscriber on each poll interval

    '
  integration_test: required
  integration_test_reason: Watermark-based polling requires real database access, watermark tracking,
    and timing verification.
  bdd: true
  bdd_reason: Behavior expressed as stakeholder-readable Gherkin acceptance criteria.
  stakeholders:
  - ops
  - data-engineer
  competitive_position:
    status: parity
    rationale: Watermark-based polling subscription for sources without CDC is available in Hasura's polling
      subscriptions and Debezium.

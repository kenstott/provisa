- id: REQ-001
  status: complete
  group: 1. Access Governance & Security
  category: Query Governance
  priority: MUST
  type: behavioral
  since: 2026-03
  description: Any authenticated identity can query using any supported language (GraphQL, SQL, pgwire,
    Arrow Flight). Data returned is governed solely by table/column visibility, RLS, and masking — there
    is no capability gate on querying itself. Relationship join enforcement applies unless the role holds
    the ignore_relationships capability. There is no query registry and no pre-approval concept.
  use_case: Removing the query-execution capability gate means governance is expressed entirely through
    data-layer controls (visibility, RLS, masking), not through access lists.
  code:
  - provisa/security/
  - provisa/compiler/
  tests:
  - tests/integration/test_governance_integration.py
  - tests/unit/test_governance.py
  - tests/unit/test_registry_removed.py
  - provisa-ui/e2e/governance-core.spec.ts
  scenario: 'Given an authenticated identity with role "analyst"

    When a GraphQL query is submitted against a registered table

    Then data is returned filtered by RLS and masking rules only

    And no capability gate rejects the query

    '
  integration_test: required
  integration_test_reason: Behavior verifiable only end-to-end across all transports (GraphQL, SQL, pgwire,
    Arrow Flight) with real governance applied.
  e2e: true
  e2e_reason: Verifying that data is returned filtered by RLS and masking across all transports (GraphQL,
    SQL, pgwire, Arrow Flight) requires a real running server with actual governance applied end-to-end.
  bdd: true
  bdd_reason: Behavior expressed as stakeholder-readable Gherkin acceptance criteria.
  stakeholders:
  - app-developer
  - compliance
  - data-engineer
  competitive_position:
    status: ahead
    rationale: Provisa expresses governance entirely through data-layer controls (visibility, RLS, masking)
      across all query protocols (GraphQL, SQL, pgwire, Arrow Flight) with no capability gate on querying
      itself. Competitors like Hasura and Denodo still use protocol-specific access control lists or query
      whitelists that must be managed per-endpoint.

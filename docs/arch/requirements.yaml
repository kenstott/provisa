- id: REQ-864
  status: complete
  since: "2026-07"
  group: 6. Execution, Routing, Caching & Performance
  category: Query Result Cache
  priority: SHOULD
  type: structural
  description: >-
    The query result cache key is computed from a NORMALIZED IR — a canonical,
    AST-normalized form of the GOVERNANCE-NORMALIZED IR (the post-Stage-2 governed
    SQL — REQ-263 — after RLS, masking, and column visibility are applied with
    per-identity values resolved, REQ-041/REQ-402) — rather than the serialized
    compiled-SQL string it hashes today (provisa/cache/key.py hashes
    compiled.sql as text). Normalization canonicalizes cosmetic variation that does
    not change results (whitespace, alias naming/ordering, literal formatting,
    commutable predicate/JOIN ordering, projection ordering) so two
    semantically-identical queries resolve to the SAME cache entry instead of
    missing. Because the keyed form is the governed IR, the resolved persona — role,
    RLS predicate values, masking, and column visibility — is ALREADY embedded in it
    (no separate concatenation), and the per-tenant prefix (REQ-595) is applied on
    top; the RLS-unresolved guard (key.py ValueError) is retained. CRITICAL: normalization
    canonicalizes cosmetic/structural form ONLY and MUST preserve every
    identity-encoding element — the RESOLVED RLS predicate values, role, masking,
    and column visibility — so it can never collapse two personas onto one key (the
    hypercritical isolation constraint REQ-866). Refines, does not replace, the
    existing result cache (REQ-544).
  use_case: >-
    Raises cache hit-rate and eliminates duplicate entries for queries that differ
    only in text, making the result cache robust to cosmetic query variation from
    different clients, formatters, or GraphQL shapes that compile to equivalent IR.
  code:
  - provisa/cache/key.py
  - provisa/api/data/endpoint.py
  tests:
  - tests/unit/test_cache_key.py
  related_reqs:
    - REQ-544
    - REQ-536
    - REQ-595
    - REQ-262
    - REQ-865
    - REQ-866
- id: REQ-865
  status: complete
  since: "2026-07"
  group: 6. Execution, Routing, Caching & Performance
  category: Query Routing
  priority: SHOULD
  type: structural
  description: >-
    The route decision includes CACHED as a first-class route alongside DIRECT
    (REQ-027) and FEDERATED/Trino (REQ-028): the Route enum gains Route.CACHE and
    decide_route (provisa/transpiler/router.py) evaluates the result cache — keyed
    per REQ-864/REQ-544 — as the first candidate route. A cache hit resolves to
    Route.CACHE and serves the stored result with no direct or federated execution;
    a miss falls through to DIRECT/FEDERATED as today. This elevates the current
    outer-wrapper cache check (which runs before decide_route in endpoint.py and is
    invisible to routing) into the routing model, so every query is served by
    exactly one uniformly-decided route: {cached, direct, federated}. CACHED belongs
    in the route decision precisely BECAUSE the routing point is where the query is
    GOVERNANCE-NORMALIZED: routing consumes the post-Stage-2 governed IR (REQ-263,
    persona-resolved via REQ-041/REQ-402), so the cache key derived there ALREADY
    encodes the requester's persona and a cache serve is inherently isolated
    (REQ-866) — a pre-governance wrapper cannot guarantee that structurally. The
    no-cache bypass (@noCache / no_cache / @cached(ttl:0); REQ-544) removes CACHED from the
    candidate set for that query. Routing consumes the post-optimization IR
    (REQ-863), so cache-key computation and route selection operate on the same
    normalized form.
  use_case: >-
    Unifies the serving model — one decision point owns how every query is served —
    makes cache participation observable in the route/plan (traceable like any
    route), and lets routing policy reason about the cache alongside direct and
    federated execution instead of it being a hidden pre-step.
  code:
    - provisa/transpiler/router.py
    - provisa/api/data/endpoint.py
    - provisa/cache/store.py
  related_reqs:
    - REQ-544
    - REQ-536
    - REQ-864
    - REQ-027
    - REQ-028
    - REQ-863
    - REQ-866
- id: REQ-866
  status: complete
  since: "2026-07"
  group: 1. Access Governance & Security
  category: Cache Isolation
  priority: MUST
  type: constraint
  description: >-
    HYPERCRITICAL isolation invariant for the query result cache. The cache key MUST
    fully partition by the RESOLVED governance identity of the requester, so a cache
    hit can NEVER serve rows computed for a different persona. This matters because
    personas can switch on the same device, connection, or pooled session; a
    mis-scoped key would leak one user's data to another. The key MUST bind to: the
    per-tenant prefix (REQ-595), role_id, and the fully-RESOLVED RLS predicates plus
    masking and column visibility — i.e. RLS current_setting/session values
    substituted to their actual per-identity values (REQ-041/REQ-402), NOT the
    unresolved rule template (identical across users, which would collapse distinct
    personas onto one key). This isolation is STRUCTURAL when the cache is a
    first-class route (REQ-865): the route decision operates on the
    governance-normalized IR, so the key intrinsically encodes the persona. IR/SQL
    normalization (REQ-864) canonicalizes cosmetic and structural form ONLY and MUST
    preserve every identity-encoding element.
    FAIL-CLOSED: if any identity dimension is unresolved or unknown, the cache MUST
    NOT be read or written for that query (the key.py RLS-unresolved guard), and
    CACHED (REQ-865) is removed from the candidate routes — never a silent fallback
    that could serve another persona's data.
  use_case: >-
    Prevents cross-persona / cross-user data leakage through the result cache when
    identities change on a shared device, connection, or pooled session — a hard
    multi-tenant and RLS isolation guarantee, consistent with the two-layer
    governance model (REQ-038) and Stage-2 RLS/masking enforcement (REQ-263).
  code:
  - provisa/cache/key.py
  - provisa/api/data/endpoint.py
  tests:
  - tests/unit/test_cache_key.py
  related_reqs:
    - REQ-544
    - REQ-595
    - REQ-864
    - REQ-865
    - REQ-041
    - REQ-402
    - REQ-038
    - REQ-263

- id: REQ-654
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Compiler & Schema
  priority: SHOULD
  type: behavioral
  description: >-
    `{table}_group_by` root query field. Requires `by: [SelectColumn!]!`; accepts same args as the
    base table query (`where`, `order_by`, `limit`, `offset`, `distinct_on`). Returns
    `[{TypeName}GroupByRow!]!` where `{TypeName}GroupByRow` has `groupKey: JSON!` (object mapping
    group-by column names to their values) and `aggregates: {TypeName}AggregateFields!`. Reuses
    existing `{TypeName}AggregateFields` type unchanged. Maps to `SELECT <by_cols>, <agg_funcs>
    FROM <table> WHERE <where> GROUP BY <by_cols> ORDER BY <order_by> LIMIT <limit> OFFSET
    <offset>`.
  use_case: >-
    Exposes grouped analytics (e.g. count per user, sum per category) as a first-class query
    without requiring a database view.
  code:
    - provisa/compiler/schema_gen.py
    - provisa/compiler/aggregate_gen.py
    - provisa/compiler/sql_gen.py
  tests:
    - tests/unit/test_group_by.py
    - tests/integration/test_compiler_integration.py
  target: "2026-Q3"
  scenario: |
    Given a registered table with numeric columns
    When a _group_by query is submitted with by: [category] and aggregate count
    Then the response contains one GroupByRow per distinct category value
    And each row includes groupKey and aggregates fields

- id: REQ-655
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Compiler & Schema
  priority: SHOULD
  type: behavioral
  description: >-
    `{table}_group_by` supports two additional filter clauses beyond the base `where`: (1)
    `aggregates(where: {TypeName}BoolExp)` — a `where` arg on the `aggregates` field of
    `{TypeName}GroupByRow` that applies conditional aggregation within each group (SQL `FILTER
    (WHERE ...)`); (2) `having: {TypeName}HavingExp` arg on the root field that filters groups
    post-aggregation (SQL `HAVING`). `{TypeName}HavingExp` is a new input type with the same
    numeric/comparable fields as `{TypeName}AggregateFields` but with comparison operators. Three
    filters compose orthogonally: `_group_by(where:)` → SQL WHERE, `aggregates(where:)` → SQL
    FILTER, `having:` → SQL HAVING.
  use_case: >-
    Enables queries like "users with more than 3 active inquiries" without client-side filtering or
    custom views.
  code:
    - provisa/compiler/aggregate_gen.py
    - provisa/compiler/sql_gen.py
  tests:
    - tests/unit/test_group_by.py
    - tests/integration/test_compiler_integration.py
  target: "2026-Q3"
  scenario: |
    Given a _group_by query with a having: clause on an aggregate field
    When the query is compiled
    Then the generated SQL includes a HAVING clause after GROUP BY
    And aggregates(where:) generates a SQL FILTER (WHERE ...) expression

- id: REQ-661
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: MUST
  type: constraint
  description: >-
    Labels in Cypher write clauses (CREATE, SET, DELETE) must resolve to exactly one NodeMeta via
    the semantic label map. Ambiguous or unknown labels are hard errors at translation time; no
    fuzzy matching or implicit selection is permitted.
  use_case: >-
    Single-label resolution ensures write operations are unambiguous and cannot accidentally target
    the wrong table.
  code:
    - provisa/cypher/translator.py
  tests:
    - tests/unit/test_cypher_translator.py
  target: "2026-Q3"

- id: REQ-662
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: MUST
  type: constraint
  description: >-
    Labels in write operations must already exist in the governed semantic label map. New labels
    cannot be created via Cypher write clauses — only pre-registered tables are writable.
  use_case: >-
    Restricting writes to pre-registered tables ensures schema integrity and prevents untracked
    table creation.
  code:
    - provisa/cypher/translator.py
  tests:
    - tests/unit/test_cypher_translator.py
  target: "2026-Q3"

- id: REQ-663
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: MUST
  type: constraint
  description: >-
    All Cypher write operations (CREATE, SET, DELETE) are gated on `writable_by` ACL defined on the
    target table's NodeMeta. If a role lacks write permission, the query is rejected at compile
    time. The check applies uniformly to CREATE, SET, and DELETE.
  use_case: >-
    Consistent write access control across all mutation types prevents unauthorized writes to
    sensitive tables.
  code:
    - provisa/cypher/translator.py
    - provisa/compiler/stage2.py
  tests:
    - tests/unit/test_cypher_translator.py
  target: "2026-Q3"

- id: REQ-664
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: MUST
  type: constraint
  description: >-
    A source connector must explicitly support DML (INSERT, UPDATE, DELETE) to be writable.
    Read-only connectors (e.g., Trino-federated, iceberg catalog without Delta connector) reject
    write operations at translation time with a clear error message.
  use_case: >-
    Restricting writes to DML-capable sources prevents silent failures on read-only systems.
  code:
    - provisa/cypher/translator.py
    - provisa/core/models.py
  tests:
    - tests/unit/test_cypher_translator.py
  target: "2026-Q3"

- id: REQ-665
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: MUST
  type: constraint
  description: >-
    Relationships in Cypher cannot be written — they are derived from foreign-key joins in the
    semantic layer, not stored edges. CREATE, SET, and DELETE cannot target relationship entities.
    Attempting to write a relationship is a hard error at translation time.
  use_case: >-
    Relationship immutability prevents accidental FK manipulation and keeps relationship metadata
    consistent with the declared join paths.
  code:
    - provisa/cypher/translator.py
    - provisa/cypher/label_map.py
  tests:
    - tests/unit/test_cypher_translator.py
  target: "2026-Q3"

- id: REQ-666
  status: in-progress
  group: "5. Query Languages, Compilation & Operations"
  category: Cypher Mutations
  priority: SHOULD
  type: behavioral
  description: >-
    `CREATE (n:Label {props})` is translated to `INSERT INTO catalog.schema.table (columns) VALUES
    (values)`. Property names in the Cypher object are mapped to table columns via domain-prefix
    stripping and alias resolution. Type coercion aligns Cypher scalar values with target column

- id: REQ-346
  status: rejected
  rejection_reason: >-
    Superseded by REQ-818. Cypher is no longer read-only: CREATE/DELETE/SET now execute as
    governed direct table writes through the mutation pipeline. The still-true parts — MERGE/
    DETACH/REMOVE and APOC are rejected — are carried by REQ-818 and REQ-671. This entry's
    blanket "strictly read-only, all write clauses rejected" claim is now inaccurate.
  group: 5. Query Languages, Compilation & Operations
  category: Cypher Query Frontend (Phase AU)
  priority: MUST
  type: constraint
  description: >-
    SUPERSEDED BY REQ-818. Originally: the Cypher compiler is strictly read-only, rejecting any
    write clause (CREATE/MERGE/SET/DELETE/DETACH/REMOVE) or APOC reference at parse time. Cypher
    now supports governed CREATE/DELETE/SET writes (REQ-818); only MERGE/DETACH/REMOVE and APOC
    remain rejected. Use REQ-818 and REQ-671 instead.
  use_case: Read-only enforcement prevents graph users from accidentally mutating data via Cypher.
  code:
  - provisa/cypher/
  tests:
  - tests/integration/test_cypher_endpoint.py
  - tests/unit/test_cypher_parser.py
  - tests/unit/test_cypher_translator.py
  - tests/unit/test_sql_to_cypher.py
  since: 2026-01
  scenario: 'Given a Cypher query containing a CREATE or DELETE clause

    When the parser processes it

    Then it is rejected at parse time with a precise error and no fallback occurs

    '
  integration_test: not_required
  integration_test_reason: Read-only clause rejection is pure parser logic verifiable through unit tests
    without execution.
  stakeholders:
  - compliance
  competitive_position:
    status: ahead
    rationale: Read-only Cypher enforcement at parse time with write-clause rejection is a stronger safety
      guarantee than Hasura's role-based GraphQL mutation gating.

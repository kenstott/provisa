- id: REQ-262
  status: complete
  group: 1. Access Governance & Security
  category: Two-Stage Compiler (Governed SQL)
  priority: MUST
  type: structural
  description: 'Compiler refactored into two explicit stages. Stage 1: GraphQL → plain PG-style SQL (semantic
    compilation only — resolves aliases, domains, relationships, emits physical column names and table
    names with AS aliases). Stage 2: plain SQL → governed SQL (AST rewrite applying RLS, masking, visibility,
    and the row cap). Stage 2 is a standalone transformer that accepts SQL + role and returns governed
    SQL, with no knowledge of GraphQL or the semantic model.'
  use_case: Two-stage compiler separates semantic translation from governance so Stage 2 can be reused
    by any SQL client.
  code:
  - provisa/compiler/stage2.py
  - provisa/compiler/sql_gen.py
  tests:
  - tests/integration/test_governance_integration.py
  - tests/unit/test_graphql_alias.py
  - tests/unit/test_stage2.py
  - tests/unit/test_two_stage_compiler.py
  since: 2026-01
  integration_test: required
  integration_test_reason: Two-stage compiler design verified end-to-end with Stage 2 reused by SQL clients
    to confirm semantic + governance separation.
  stakeholders:
  - app-developer
  - data-engineer
  competitive_position:
    status: ahead
    rationale: A two-stage compiler where Stage 2 is a standalone SQL governance transformer (accepts
      SQL + role, returns governed SQL) is architecturally unique among open-source federation engines.
      Trino's authorizer and Hasura's permission system are tightly coupled to their query planners and
      cannot be reused as standalone transformers by external SQL clients.
- id: REQ-263
  status: complete
  group: 1. Access Governance & Security
  category: Two-Stage Compiler (Governed SQL)
  priority: MUST
  type: behavioral
  description: 'Stage 2 governance transformer applies four governance concerns: (1) RLS — inject WHERE
    predicate per table reference per role (SQLGlot AST rewrite); (2) column masking — wrap masked column
    expressions with masking function (AST rewrite); (3) column visibility — remove or NULL-out columns
    invisible to the role (AST rewrite); (4) row cap — inject/cap LIMIT to the most restrictive per-role/table
    `max_rows` ceiling for any referenced table. A role without the FULL_RESULTS capability receives the
    configured default cap. The row cap is the single mechanism for bounding result size; statistical
    sampling is a user query feature, not a governance concern (REQ-478).'
  use_case: Stage 2 governance transformer enforces RLS, masking, visibility, and the row cap uniformly
    on every SQL path and transport.
  code:
  - provisa/compiler/stage2.py
  - provisa/compiler/sql_gen.py
  tests:
  - tests/integration/test_governance_integration.py
  - tests/unit/test_mask_inject.py
  - tests/unit/test_stage2.py
  - tests/unit/test_stage2_complex.py
  - tests/unit/test_two_stage_compiler.py
  since: 2026-01
  scenario: 'Given a SQL query submitted by a role with governance rules configured

    When Stage 2 processes the query

    Then RLS predicates, column masking, column visibility, and row cap are all applied via AST rewrite

    '
  integration_test: required
  integration_test_reason: Stage 2 governance transformer (RLS, masking, visibility, row cap) requires
    real data execution to verify all four concerns applied.
  bdd: true
  bdd_reason: Behavior expressed as stakeholder-readable Gherkin acceptance criteria.
  stakeholders:
  - compliance
  - data-engineer
  competitive_position:
    status: ahead
    rationale: AST-level rewrite enforcing all four governance concerns (RLS, column masking, column visibility,
      row cap) in a single Stage 2 pass, uniformly across every SQL-speaking transport, is more complete
      than Hasura (no column masking) or Trino (no built-in column masking; RLS is connector-specific).

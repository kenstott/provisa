    - tests/integration/test_duckdb_attach_pgwire.py
  scenario: |
    Given a client issues COPY (SELECT id, name FROM t) TO STDOUT (FORMAT binary) over pgwire
    When the result has an INTEGER id and a VARCHAR name column
    Then the server replies with a binary-mode CopyOutResponse and a byte stream beginning with the
    PGCOPY signature, encoding id as a 4-byte int and name as UTF-8 text per row, a NULL as field
    length -1, and terminating with the int16 -1 trailer
    And the same COPY in text/csv format is byte-for-byte unchanged from before

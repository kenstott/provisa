- id: REQ-652
  status: complete
  group: "4. Source Connectors"
  category: Vector Search
  priority: MUST
  type: constraint
  description: >-
    Column masking does not apply to embedding columns — a vector cannot be partially masked and
    remain semantically meaningful. Access to an embedding column is enforced via visibility (hide
    entirely), RLS (filter rows), sensitivity tier (block search), and domain boundary rules; the
    column is either visible and searchable for a given role, or absent from the schema entirely.
  use_case: >-
    Preventing partial-masking of vectors ensures access control is all-or-nothing for embedding
    columns, which cannot be meaningfully redacted at the field level.
  code:
    - provisa/vector/governance.py
  tests:
    - tests/unit/test_vector.py
  since: "2026-01"
  scenario: |
    Given an embedding column with access restrictions
    When a role without sufficient permissions queries the column
    Then the column is absent from the schema entirely; column masking is never applied to embedding columns


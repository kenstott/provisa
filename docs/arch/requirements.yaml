- id: REQ-849
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: "Views (Governed Computed Datasets)"
  priority: SHOULD
  type: behavioral
  since: "2026-07"
  description: >-
    After SQL compilation, the query rewriter inspects FROM/JOIN clauses and
    transparently rewrites the query to read from a materialized view target
    table when a matching MV exists — without the query author referencing the MV
    by name. Rewrites are gated by MV enabled status, freshness, and TTL. Match
    selection is coverage-optimal and independent of candidate ordering: a full
    match (all query JOINs covered → entire query redirected to the MV) is always
    preferred over any partial match, and among partial matches the widest
    coverage (most MV-covered JOINs replaced, remainder preserved) wins. A
    fully-matching MV is never preempted by an earlier partially-matching one.
  use_case: >-
    Transparent MV substitution improves query performance without requiring
    application changes; TTL gating ensures stale data is not served without
    explicit policy.
  code:
    - provisa/mv/rewriter.py
    - provisa/mv/registry.py
  tests:
    - tests/unit/test_mv_partial_rewrite.py
  related_reqs:
    - REQ-135
    - REQ-198
    - REQ-199
    - REQ-844
    - REQ-845
    - REQ-855
  scenario: |
    Given a fresh, enabled MV covering a query's root table (and optionally some joins)
    When a query is compiled that references the underlying source tables without naming the MV
    Then the rewriter transparently redirects the FROM/JOIN to the MV target (full or partial),
    otherwise the query runs against the live source tables.

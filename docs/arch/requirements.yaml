- id: REQ-863
  status: proposed
  group: 6. Execution, Routing, Caching & Performance
  category: Query Planning Pipeline
  priority: SHOULD
  type: structural
  target: "2026-Q3"
  description: >-
    Query planning phases are ordered so that source-set-mutating transforms complete before
    routing. The pipeline is: query language -> semantic SQL (IR) -> governance (which may ADD
    sources via RLS subquery predicates) -> a post-governance optimization stage (which may
    REMOVE sources, e.g. hot-table VALUES-CTE inlining, API-cache rewrites, union-branch
    pruning) -> route decision + physical lowering -> execute. Routing (extract_sources /
    decide_route) MUST consume the output of the post-governance optimization stage, never the
    pre-optimization governed SQL. Consequence: when hot-CTE inlining collapses a federated
    (multi-source) query to a single remaining live source, routing observes one source and
    selects DIRECT execution instead of Trino federation; the VALUES CTEs are then lowered in
    the chosen route's dialect (source dialect for direct pushdown, Trino for federated).
  use_case: >-
    Direct single-source execution is materially faster than Trino federation. Today the route

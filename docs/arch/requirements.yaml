- id: REQ-712
  status: complete
  group: 6. Execution, Routing, Caching & Performance
  category: Cache
  priority: MUST
  type: constraint
  description: check_cache and store_result in provisa/cache/middleware.py pass tenant_id (org_id) through
    to RedisCacheStore.get/set, so the per-tenant cache key prefix implemented in the store is applied
    at the call site and multi-tenant cache key isolation is active for query result caching.
  use_case: Tenant-prefixed cache keys at the middleware layer ensure one tenant's cached query results
    can never be returned to another tenant.
  code:
  - provisa/cache/middleware.py
  since: 2026-06
  stakeholders:
  - ops
  - compliance
  competitive_position:
    status: ahead
    rationale: Redis-backed query result caches that do not partition by tenant are a known security risk
      in multi-tenant SaaS deployments. Provisa partitions every query result cache key by tenant_id at
      the middleware layer, matching the tenant-account result isolation Snowflake and BigQuery enforce.

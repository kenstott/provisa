- id: REQ-855
  status: in-progress
  since: "2026-07"
  group: 4. Source Connectors
  category: Materialization Store
  priority: SHOULD
  type: behavioral
  target: "2026-Q3"
  description: >-
    materialization_store freshness policy — the ONE centralized freshness gate referenced by
    REQ-845 (reactive replica pull-through) and applicable to REQ-844's view
    role; both roles evaluate it lazily on access. Per cache entry (per-table,
    keyed like the existing replica/view targets, NOT per-query-slice)
    the steward selects one of three modes: (1) TTL only — bounded staleness,
    current behavior (reactive-replica _mem_fresh expiry / view refresh
    interval); (2) probe — re-probe the upstream on access and rebuild
    only on change, ignoring TTL; (3) TTL+probe — probe only after a TTL floor
    elapses, capping probe frequency. The probe returns an OPAQUE token; Provisa
    never interprets it, only compares stored vs. fresh by equality. Unchanged
    token → keep the materialized rows, skip the re-pull/rebuild (zero lag at
    probe cost); changed token → invalidate the entry and re-pull, then store the
    new token. MUTUAL EXCLUSIVITY with delta (REQ-874): Probe (opaque-token change detection)
    and delta (monotonic-cursor incremental reload) are MUTUALLY EXCLUSIVE PER ENTRY, selected by
    token type. Opaque-token entries ⇒ REQ-855 probe + full re-pull, no delta. Monotonic entries ⇒
    delta-as-probe (delta query IS the freshness evaluation), no separate probe runs. Probe transport
    is source-type-agnostic behind a single dispatch
    (freshness_token(source, table) -> str | None); None means the source cannot
    produce a token and the entry degrades to TTL (a capability signal, not a
    silent fallback — REQ-847). Transports: graphql_remote posts a steward GQL
    query (generalizing the REQ-673 count_query/graph_counts prototype); openapi
    uses ETag/Last-Modified or a steward-configured endpoint; DB-SQL sources run
    a steward SQL query via the engine; file-based sources use file mtime.
  use_case: >-
    Lets stewards trade probe cost against TTL lag per cached source/table —
    zero-lag freshness for volatile pull-through sources and materialized views
    where lag is unacceptable, cheap TTL for static ones — inside the one
    materialization_store gate (REQ-845) rather than a per-protocol bolt-on. view targets
    (REQ-844 derivation role) may carry both a TTL/refresh interval and a
    freshness gate; the gate suppresses needless CTAS rebuilds when the upstream
    token is unchanged.
    DONE (2026-07): the centralized gate is implemented — provisa/federation/freshness_gate.py::
    evaluate_freshness(mode, now, last_refresh_at, ttl, stored_token, probe) returns a FreshnessDecision
    (fresh + new_token) for the three modes: TTL (bounded staleness), PROBE (probe every access, ignore
    TTL), TTL_PROBE (probe only past the TTL floor). The probe yields an opaque token compared by equality
    — unchanged keeps the rows (zero lag), changed marks not-fresh with the new token to persist — and a
    probe returning None degrades the entry to TTL (a capability signal, never a silent stale fallback,
    REQ-847). Pure and reused by both the reactive-replica (REQ-845) and view (REQ-844) roles. REMAINING
    (kept in-progress): the per-source probe TRANSPORTS behind freshness_token(source, table) -> str | None
    (graphql query, openapi ETag/Last-Modified, DB-SQL steward query, file mtime) and wiring the gate into
    the store's lazy-on-access path + delta mutual-exclusivity (REQ-874).
  code:
    - provisa/federation/freshness_gate.py
  tests:
    - tests/unit/test_freshness_gate.py
  related_reqs:
    - REQ-844
    - REQ-845
    - REQ-847
    - REQ-849
    - REQ-135
    - REQ-199
    - REQ-673
    - REQ-874
  scenario: |
    Given a reactive replica pull-through source configured with the TTL+probe mode and a TTL floor
    When a query reads the cached rows before the floor elapses
    Then the materialized rows are served without probing the upstream
    When a later query arrives after the TTL floor has elapsed
    Then freshness_token(source, table) is evaluated and compared to the stored token; if equal the
    existing rows are kept, and if different the entry is invalidated, re-pulled, rematerialized, and
    the new token stored
    And a view materialization with a freshness gate skips its scheduled CTAS rebuild while the
    upstream token is unchanged.

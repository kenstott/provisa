    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a SQL client submitting INSERT, UPDATE, or DELETE over pgwire
    When the listener receives the statement
    Then the statement is not routed to any write path

- id: REQ-616
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire
  priority: MUST
  type: constraint
  description: >-
    COPY and DDL statements submitted over pgwire require the `ddl` role capability. Roles without
    `ddl` receive a permission error (PG error code 42501). Roles with `ddl` have COPY and DDL
    executed via the DDL handler and COPY handler respectively.
  use_case: >-
    Capability-gated DDL and COPY lets power users perform schema operations via psql or DBeaver
    while protecting other roles from accidental destructive statements.
  code:

  - tests/unit/test_registry_removed.py
  since: 2026-01
  scenario: "Given an Apollo client sending only a hash\nWhen the server has the query cached it executes\
    \ immediately; when not it returns\n  PersistedQueryNotFound\nThen the client resends with full text,\
    \ server stores and executes without modification\n"
  integration_test: required
  integration_test_reason: Apollo APQ wire protocol with hash/query text exchange requires HTTP request/response
    behavior validation.
  bdd: true
  bdd_reason: Behavior expressed as stakeholder-readable Gherkin acceptance criteria.
  stakeholders:
  - app-developer
  competitive_position:

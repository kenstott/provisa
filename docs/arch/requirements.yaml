  type: infrastructure
  description: 'macOS and Windows use an extension model: Core is the only installer that creates the
    VM runtime (Lima on macOS; VirtualBox OVA on Windows). Obs and Demo are extension packages that load
    images into the existing VM and write a compose file into `~/.provisa/extensions/<name>/`. The Core
    launcher enumerates `extensions/*/docker-compose.*.yml` at startup and appends each found file to
    the compose file list, composing the service set dynamically. `PROVISA_REDIRECT_ENABLED`, MinIO, and
    OTel env vars are set only when the obs extension is present.'

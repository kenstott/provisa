- id: REQ-246
  status: complete
  group: 1. Access Governance & Security
  category: ABAC Approval Hook
  priority: MAY
  type: structural
  description: 'Approval hook protocols — three transport options, configured via `auth.approval_hook.type`
    (Part of Phase AE): - `webhook` (default): HTTP POST to URL. ~5-50ms. Simplest, works with any external
    ABAC service. - `grpc`: gRPC with persistent connection + multiplexing. ~1-5ms. Binary protocol for
    high-volume same-datacenter deployments. Proto service definition shipped with Provisa. - `unix_socket`:
    Unix domain socket for same-machine sidecars (e.g., OPA). <0.5ms. Path configured via `auth.approval_hook.socket_path`.'
  use_case: Three approval hook transports (HTTP/gRPC/Unix socket) let enterprises match latency requirements
    to ABAC infra.
  code:
  - provisa/security/
  tests:
  - tests/integration/test_governance_integration.py
  - tests/unit/test_abac_hook.py
  - tests/unit/test_abac_hook_extended.py
  - tests/unit/test_approval_hook.py
  since: 2026-01
  integration_test: required
  integration_test_reason: Three transport protocols (HTTP/gRPC/Unix socket) require real network or IPC
    verification with latency validation.
  e2e: true
  e2e_reason: Three approval hook transport protocols (HTTP webhook, gRPC, Unix socket) each cross a real
    network or IPC boundary and can only be verified end-to- end with a live server and hook endpoint.
  stakeholders:
  - ops
  - app-developer
  competitive_position:
    status: ahead
    rationale: Three approval hook transports (HTTP webhook ~50ms, gRPC ~5ms, Unix domain socket <0.5ms)
      let enterprises choose latency tier to match co-location of the ABAC sidecar. No comparable multi-transport
      ABAC hook is offered by Trino, Hasura, Dremio, or Denodo.

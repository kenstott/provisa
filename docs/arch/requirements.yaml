  - tests/unit/test_openapi_loader.py
  - tests/unit/test_remote_adapter_contract.py
  - tests/unit/test_schema_service.py
  since: 2026-01
  scenario: 'Given a remote GraphQL schema with deeply nested OBJECT fields beyond max_object_depth

    When the schema is introspected

    Then fields beyond the depth limit are excluded from the fetch and array sizes are capped at max_list_items

    '
  integration_test: not_required
  integration_test_reason: Depth limit enforcement is pure logic; field exclusion testable with mocks.
  stakeholders:
  - ops
  competitive_position:
    status: ahead
    rationale: Configurable depth limits (max_object_depth, max_list_depth, max_list_items) to prevent
      unbounded remote schema expansion at introspection time are safety guards absent from Hasura Remote
      Schemas and Denodo GraphQL connectors, which have no built-in nesting limits.

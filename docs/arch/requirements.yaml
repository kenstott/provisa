- id: REQ-813
  status: complete
  group: 9. Live Data & Events
  category: Subscriptions
  priority: MUST
  type: structural
  description: 'The `live` block (LiveDeliveryConfig on Table) is a unified change-feed / CDC abstraction.
    The binary `delivery: poll|cdc` field is replaced by a multi-strategy model: `strategy: poll|native|debezium|kafka`.
    Per-table params: poll → watermark_column/poll_interval; native → none; kafka → LiveKafkaParams (topic/format/key_column/field_mapping).
    Reconciled with REQ-824: Debezium/Kafka delta-transport (bootstrap_servers/topic_prefix/schema_registry_url/consumer_group_id)
    is inherited from Source.cdc, entered once per source — NOT repeated in per-table debezium params.
    query_id and outputs are optional so `live` covers both raw table change-feeds and live persisted-query
    output fan-out. Debezium topic names are derived from the source transport: {topic_prefix}.{schema}.{table}.'
  use_case: A single `live` config abstraction unifies all capture mechanisms (polling, PostgreSQL LISTEN/NOTIFY,
    MongoDB change streams, Debezium, arbitrary Kafka deltas), eliminating the misleading binary of "poll
    vs CDC" where poll IS a change-feed mechanism. Strategy-specific params prevent schema pollution.
    Optional query_id and outputs enable both low-level table subscriptions and high-level live persisted-query
    delivery.

- id: REQ-687
  status: complete
  since: "2026-07"
  group: 15. Proposed Features
  category: Encryption
  priority: SHOULD
  type: structural
  description: >-
    DECIDED (bulk-only, client-held key): encrypt ONLY the S3/Iceberg BULK-RESULT payloads emitted by
    the large-result redirect path (provisa/executor/redirect.py), NOT the Trino non-SQL query cache.
    Mechanism = client-side envelope encryption: Provisa generates a per-result DEK, encrypts the
    serialized body (AES-256-GCM) via EncryptionService BEFORE upload, and stores CIPHERTEXT in S3.
    The presigned GET URL therefore delivers ciphertext; the client must possess the DEK to decrypt.
    The DEK travels to the client over the authenticated redirect response channel (not via S3), so a
    leaked presigned URL or a directly-accessed bucket object is useless without it. This is stronger
    than object-store SSE (which trusts the store to hold plaintext + the key). Presigned-URL
    compatibility is preserved precisely because Provisa hands back ciphertext — no SSE-C headers on
    the GET are required.
    WHY NOT the Trino non-SQL cache: that cache exists so Trino can QUERY cached rows as SQL (Phase-2
    pushdown applies compiled WHERE/ORDER BY/LIMIT against the cache table; provisa/api_source/
    trino_cache.py). Encrypting those payload columns makes them opaque to Trino — it can no longer
    filter/sort/join them, defeating the cache. The query cache is instead protected by short TTL +
    Trino/PG access control, and is explicitly OUT of scope for payload encryption.
    KEY-DELIVERY (IMPLEMENTED — role-bound grant + authenticated unwrap): the redirect response carries
    a GRANT = the raw per-result DEK sealed together with the creating role under the master key (a
    second envelope blob). To decrypt, the client POSTs the grant to the authenticated
    POST /data/redirect/unwrap; the server opens it under the MasterKeyProvider, verifies the caller is
    the creating role (or holds ADMIN/SUPERADMIN), and returns the DEK. The client then AES-256-GCM
    decrypts the iv/ciphertext parsed from the self-describing S3 blob (provisa.encryption.
    split_envelope). Possession of the presigned URL + grant alone is useless — decrypt-time authz is
    enforced AND the grant is integrity-protected so it cannot be re-scoped to another role. Rejected
    alternatives: inline raw DEK (no decrypt-time authz); SSE-C pre-shared key (breaks plain-HTTP
    clients). SECOND-CHOICE fallback, not selected: sensitive-data column-level encryption only.
    IMPLEMENTATION: opt-in via PROVISA_REDIRECT_ENCRYPT (default off, fail-closed — requires a real
    envelope provider); provisa/executor/redirect.py::_encrypt_payload seals the grant; endpoint at
    provisa/api/data/endpoint.py::redirect_unwrap. Proven against live MinIO end-to-end
    (tests/integration/test_redirect_encryption_minio.py) + unit round-trip
    (tests/unit/test_redirect_encryption.py).
  use_case: Bulk result objects in S3/Iceberg are unreadable from the object store or a leaked presigned
    URL without the per-result DEK, which is released only over the authenticated redirect channel.
  target: 2026-Q4
  integration_test: required
  integration_test_reason: Cache encryption requires real Trino, real PG catalog, and real S3/Iceberg
    to verify payload encryption lifecycle and DEK management.
  stakeholders:
  - compliance
  - ops
  competitive_position:
    status: ahead
    rationale: Trino non-SQL cache row payload encryption via EncryptionService protects cached data at
      the application layer — beyond what Trino's native caching offers.

    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a role with domain_access configured
    When DDL executes without specifying catalog or schema
    Then ddl_catalog defaults to Iceberg and ddl_schema defaults to the domain ID

- id: REQ-585
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    pgwire supports `COPY ... TO STDOUT` (export) and `COPY ... FROM STDIN` (import). COPY TO STDOUT
    supports both table reference and arbitrary subquery forms. Supported formats for COPY output:
    `text` (tab-delimited, default) and `csv`. Binary COPY format is not supported.
  use_case: >-
    COPY protocol support enables bulk data export and import via psql, pgdump-compatible tools, and
    JDBC copy managers without requiring the HTTP API.
  code:
    - provisa/pgwire/copy_handler.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a psql or JDBC copy manager issuing COPY TO STDOUT or COPY FROM STDIN
    When the command executes
    Then text and csv formats are supported; binary format is rejected

- id: REQ-586
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: MUST
  type: constraint
  description: >-
    `COPY ... FROM STDIN` is restricted to sources with types `postgresql`, `mysql`, `sqlite`, or
    `mariadb`. Attempting COPY FROM against a Trino-only source raises SQLSTATE 42501. If no column
    list is provided, columns are inferred from the registered schema.
  use_case: >-
    Restricting COPY FROM to writable source types prevents accidental writes to read-only Iceberg
    or Trino-federated tables.
  code:
    - provisa/pgwire/copy_handler.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a COPY FROM STDIN against a Trino-only source
    When the command is received
    Then SQLSTATE 42501 is raised

- id: REQ-587
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    Transaction control commands (SET, BEGIN, START TRANSACTION, COMMIT, ROLLBACK, SAVEPOINT,
    RELEASE, DISCARD, RESET, DEALLOCATE) are intercepted and return an empty success response. The
    server is stateless with respect to transactions — `in_transaction()` always returns False; there
    is no transaction isolation or rollback support.
  use_case: >-
    Accepting but ignoring transaction commands allows JDBC drivers and ORMs that issue implicit
    BEGIN/COMMIT to function without errors, while making the stateless nature explicit.
  code:
    - provisa/pgwire/server.py
    - provisa/pgwire/catalog.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a JDBC driver or ORM issuing BEGIN, COMMIT, or ROLLBACK
    When the command is received by pgwire
    Then an empty success response is returned with no actual transaction state maintained

- id: REQ-588
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    The catalog intercept layer handles scalar expression queries: `current_user` / `session_user`
    → authenticated `role_id`; `current_database()` → `"provisa"`; `current_schema()` → `"public"`;
    `version()` → `"PostgreSQL 14.0 on Provisa"`; `pg_backend_pid()` → `0`;
    `current_setting(...)` → value from a fixed settings table; `SHOW <setting>` → value from the
    same settings table.
  use_case: >-
    Scalar expression intercepts prevent JDBC drivers and ORMs from failing on startup queries that
    probe server identity and settings.
  code:
    - provisa/pgwire/catalog.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a JDBC driver or ORM issuing scalar probes like current_user or version()
    When the catalog intercept layer processes the query
    Then hardcoded values are returned without a Trino round-trip

- id: REQ-589
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: SHOULD
  type: behavioral
  description: >-
    The extended-query protocol (Bind/Execute) supports binary-encoded parameters. Supported OIDs
    for binary decode: 16 (bool), 17 (bytea), 20 (int8), 21 (int2), 23 (int4), 25 (text), 700
    (float4), 701 (float8), 1043 (varchar), 1082 (date), 1114 (timestamp), 1184 (timestamptz), 1700
    (numeric), 2950 (uuid). Unsupported OIDs raise `"Unsupported binary parameter type: <oid>"`.
    Result columns are also sent in binary when the client requests it.
  use_case: >-
    Binary parameter encoding support enables psycopg2 and asyncpg to send typed parameters without
    text serialization, preserving full type fidelity for numeric and temporal values.
  code:
    - vendor/buenavista/buenavista/postgres.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given psycopg2 or asyncpg sending binary-encoded parameters via Bind/Execute
    When the server decodes them
    Then supported OIDs are decoded correctly; unsupported OIDs raise an error

- id: REQ-590
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire Server
  priority: MUST
  type: constraint
  description: >-
    pgwire enforces hard-coded timeouts: DDL operations time out after 60 seconds; query operations
    time out after 120 seconds. These are enforced in the handler threads via
    `future.result(timeout=N)`.
  use_case: >-
    Hard-coded timeouts prevent long-running DDL or query operations from blocking pgwire handler
    threads indefinitely.
  code:
    - provisa/pgwire/ddl_handler.py
    - provisa/pgwire/server.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a DDL or query operation running in a pgwire handler thread
    When the operation exceeds 60s (DDL) or 120s (query)
    Then a timeout error is raised via future.result(timeout=N)

- id: REQ-606
  status: complete
  group: "8. Client Access & Protocols"
  category: "SQL & Multi-Protocol Client Access"
  priority: SHOULD
  type: behavioral
  description: >-
    ProvisaClient accepts a bearer token (`token` parameter) as an alternative to username/password
    for authentication. When a token is present, it is sent as `Authorization: Bearer <token>` on

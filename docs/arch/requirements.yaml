- id: REQ-862
  status: complete
  since: "2026-07"
  group: 5. Data Lineage & Provenance
  category: Column-Level Trace Instrumentation
  priority: MUST
  type: structural
  target: "2026-Q3"
  description: >-
    MV creation/refresh is instrumented with detailed column-level trace records: for each
    refresh, the emitted OTel spans capture the resolved per-output-column derivation (upstream
    source column(s) and transform, from the view_sql), the input snapshot ids/watermark epochs
    consumed, the active definition-version, and the refresh trace_id. These records land in the
    governed telemetry substrate (OTel→Parquet, otel catalog). The system does not provide a
    lineage-resolution engine; lineage is DERIVED BY THE USER querying these trace records
    (optionally materialized as an MV), which — combined with Iceberg time-travel — yields
    point-in-time, column-level lineage as a query result.
    DONE (2026-07): the mv.refresh.column_lineage span now carries all four store-independent stamps —
    per-output-column derivation (provisa/lineage/columns.py, sqlglot), the definition-version content
    hash (provisa/lineage/versions.py), the resolved input-version + fidelity kind, and the trace_id.
    The final piece — actual per-source signal gathering — is wired: at refresh
    (provisa/mv/input_signals.py::gather_input_signals) each source table is asked, through the same
    Trino connection, for the strongest signal it offers — an Iceberg snapshot id from
    "<table>$snapshots", else an RDB watermark MAX(watermark_column) with the column discovered from the
    provisa_admin registry catalog (REQ-260) — so input_version reflects the real data version rather
    than always degrading to the refresh epoch. Best-effort telemetry: sources offering neither
    contribute nothing and any query error is skipped, never failing the refresh; resolve_input_version
    grades iceberg_snapshot > watermark > freshness_token > refresh_epoch.
    Enables audit, impact analysis, and compliance workflows without a bespoke lineage service:
    because the trace substrate is itself queryable and time-travelable, users answer "where did
    this column value come from, as of time T" by querying the column-level MV-refresh traces
    rather than by invoking a dedicated lineage API.
  code:
    - provisa/lineage/columns.py
    - provisa/lineage/versions.py
    - provisa/mv/refresh.py
    - provisa/mv/input_signals.py
    - provisa/mv/registry.py
    - provisa/transpiler/
    - provisa/mv/aggregate_catalog.py
  tests:
    - tests/unit/test_lineage_columns.py
    - tests/unit/test_mv_input_signals.py

- id: REQ-355
  status: complete
  group: "5. Query Languages, Compilation & Operations"
  category: Natural Language Query Service (Phase AV)
  priority: SHOULD
  type: behavioral
  description: >-
    For each submitted NL query the service runs three independent parallel generation loops — one
    targeting Cypher, one GraphQL, and one SQL. Each loop uses an LLM to generate a candidate query,
    validates it through the existing Provisa compiler pipeline (parse + compile, no execution),
    feeds any compiler error back to the LLM as a correction signal, and retries until the query is
    valid or a max iteration limit is reached. The three loops are independent — failure in one does
    not block the others.
  use_case: >-
    Parallel three-target generation maximizes answer quality; one valid result is enough to respond.
  code:
    - provisa/nl/
  tests:
    - tests/unit/test_nl_loop.py
    - tests/unit/test_nl_runner.py
    - tests/integration/test_nl_endpoint.py
  since: "2026-01"
  scenario: |

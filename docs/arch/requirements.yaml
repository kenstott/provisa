    - provisa/sparql/
    - provisa/api_source/
  tests:
    - tests/unit/test_neo4j_normalizers.py
    - tests/integration/test_neo4j_exec.py
  since: "2026-01"
  scenario: |
    Given a Neo4j or SPARQL source requiring POST requests with a request body
    When the API source caller executes a query
    Then the POST body is transmitted correctly and existing GET endpoints are unaffected

- id: REQ-299
  status: complete
  group: "4. Source Connectors"
  category: "Query-API Sources (Neo4j & SPARQL)"
  priority: SHOULD
  type: structural
  description: >-
    A `response_normalizer: str | None` field added to `ApiEndpoint`. When set, the named normalizer
    is applied to the raw API response before `response_root` navigation and the existing flattener.
    Built-in normalizers: `neo4j_tabular` (zips `data.fields[]` with each `data.values[][]` entry
    into a flat dict) and `sparql_bindings` (extracts `results.bindings[]` and maps each

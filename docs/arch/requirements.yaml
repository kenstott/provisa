  type: structural
  description: 'There is only one view type — always intradomain (the output belongs to a domain). Two
    valid reasons to create a view: (1) the source is cross-domain (importing external data into the domain
    as a named business concept), (2) the source is local (deriving new or calculated data from existing
    domain assets). Two hard constraints follow: cross-domain data may only enter a domain via a view,
    and new or derived data may only exist as a view. No other reason to create a view is valid; there
    is no separate cross-domain view type — just views, always intradomain, used for exactly these two
    purposes.'
  use_case: Unified view model with two hard constraints ensures cross-domain imports are read-only adapters
    while computed data is always created within a single domain.
  code:
  - provisa/compiler/sql_gen.py
  - provisa/mv/
  tests:
  - tests/unit/test_domain_views.py
  since: 2026-01
  scenario: 'Given a request to create a view in a domain

    When the view source is cross-domain or derives new data locally

    Then the view is valid; any other motivation is rejected as it violates the two-purpose rule

    '
  integration_test: not_required
  integration_test_reason: View type constraints are architectural rules; can be validated via static
    config analysis.
  stakeholders:
  - data-engineer
  competitive_position:
    status: ahead
    rationale: Enforcing a two-purpose-only view model (cross-domain import or local derivation, nothing
      else) as a hard platform constraint is unique; competitors treat views as general-purpose objects
      with no semantic intent enforcement.

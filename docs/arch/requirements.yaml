  tests:
    - tests/unit/test_vector.py
  since: "2026-01"
  scenario: |
    Given a source without native vector capability
    When a cosine_similarity query is executed
    Then the embedding column is materialized to the pgvector cache, an HNSW index is built, and results are returned transparently

- id: REQ-425
  status: complete
  group: "4. Source Connectors"
  category: Vector Search
  priority: MUST
  type: constraint
  description: >-
    The pgvector fallback cache must support TTL-based invalidation, mutation-triggered invalidation,
    manual refresh via admin API, and row count drift detection. Stale cache must not silently serve
    results beyond configured TTL.
  use_case: >-
    Multiple invalidation strategies with drift detection prevent silent data staleness.
  code:

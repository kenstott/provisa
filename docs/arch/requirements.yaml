- id: REQ-633
  status: complete
  group: "11. Platform, Infrastructure & Delivery"
  category: Installer & Packaging
  priority: SHOULD
  type: infrastructure
  description: >-
    macOS and Windows use an extension model: Core is the only installer that creates the VM runtime
    (Lima on macOS; VirtualBox OVA on Windows). Obs and Demo are extension packages that load images
    into the existing VM and write a compose file into `~/.provisa/extensions/<name>/`. The Core
    launcher enumerates `extensions/*/docker-compose.*.yml` at startup and appends each found file
    to the compose file list, composing the service set dynamically. `PROVISA_REDIRECT_ENABLED`,
    MinIO, and OTel env vars are set only when the obs extension is present.
  use_case: >-
    Extension model lets users install observability and demo services incrementally without
    reinstalling Core, and lets the launcher automatically discover installed extensions without
    hard-coded feature flags.
  code:
    - packaging/macos/build-dmg-obs.sh
    - packaging/macos/build-dmg-demo.sh
    - packaging/macos/ProvisaLauncher/Sources/ProvisaLauncher/Services/ScriptRunner.swift
    - packaging/windows/build-installer-obs.ps1
    - packaging/windows/provisa.ps1
  tests:
    - tests/e2e/test_installer.py
    - tests/unit/test_infra_requirements.py
  since: "2026-01"
  scenario: |
    Given Core is installed and the Obs extension is added
    When the Core launcher starts
    Then it discovers extensions/*/docker-compose.*.yml files and composes the service set dynamically

- id: REQ-634
  status: complete
  group: "11. Platform, Infrastructure & Delivery"
  category: Installer & Packaging
  priority: MUST
  type: constraint
  description: >-
    The dev environment runs the Python backend (uvicorn, port 8000) and UI (vite dev server, port
    3000) on the host, never in containers. `docker-compose.app.yml` and
    `docker-compose.airgap.yml` are packaged-product only and must never be included in dev compose
    stacks. `start-ui-install.sh --demo` is the only dev mode flag; `--demo` always implies obs.
    Ports 8000 and 3000 must never appear in any dev compose file.
  use_case: >-
    Host-based uvicorn + vite in dev avoids port conflicts with containerised services and enables
    hot-reload without rebuilding images.
  code:
    - start-ui-install.sh
    - docker-compose.dev-install.yml
    - docker-compose.observability.yml
    - docker-compose.demo.yml
  tests:
    - tests/e2e/test_health_checks.py
    - tests/unit/test_infra_requirements.py
  since: "2026-01"
  scenario: |
    Given the dev environment is started via start-ui-install.sh
    When any dev compose file is inspected
    Then ports 8000 and 3000 do not appear in any compose file and the backend runs on the host

    - provisa/grpc/server.py
  tests:
    - tests/unit/test_grpc_requirements.py
  since: "2026-01"
  scenario: |
    Given a gRPC caller omitting or providing an unrecognised x-provisa-role metadata key
    When the RPC is received
    Then the call is rejected with UNAUTHENTICATED
- id: REQ-172
  status: complete
  group: "9. Live Data & Events"
  category: Dataset Change Events

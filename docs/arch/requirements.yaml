    Route.TRINO branch), so a query whose second source is fully inlined still executes
    federated. Correct phase ordering makes the DIRECT collapse fall out naturally instead of
    requiring special-case logic, and unblocks the pushdown of inlined lookups on the direct
    path. The optimization stage sits after governance because hot inlining depends on the
    governed logical table reference (REQ-233: governance binds to the table name, then inlining
    swaps in the CTE, and the governed wrapper filters/masks the CTE rows).

- id: REQ-875
  status: in-progress
  since: "2026-07"
  group: "6. Execution, Routing, Caching & Performance"
  category: Query Routing
  priority: SHOULD
  type: behavioral
  target: "2026-Q4"
  description: >-
    Cheap-count route: a count(*)-shaped query over an UNMATERIALIZED source that
    exposes an EXACT native count (REQ-673 cardinality capability) is routed to the
    native count call instead of materializing the full dataset to count it. Parallels
    Route.CACHE (REQ-865) — a query shape that resolves to a first-class route bypassing
    the expensive path. Today SELECT count(*) over a cold API source pulls the entire
    dataset (endpoint.py _materialize_api_to_trino_cache) to count it; with an exact
    native count it becomes a single call. THREE GUARDS, all required. (1) SHAPE: a bare
    count(*) with no other projection and no WHERE the native call cannot honor; a
    filtered count the source cannot filter falls back to materialize. (2) EXACTNESS:
    fires only when the cardinality Estimate is exact; approximate statistics stay in
    the planner/human-hint lane and are never served as the answer to count(*). (3)
    GOVERNANCE: the route MUST NOT bypass Stage-2 RLS/masking (REQ-263) — when an RLS
    predicate applies to the table for the requesting persona a native total count would
    over-count the visible subset, so the route is disabled and falls back to
    materialize+count. Fail-closed, the same discipline as cache isolation (REQ-866).
    DONE (2026-07): the three-guard route decision is implemented — provisa/federation/cardinality.py::
    can_route_cheap_count(is_bare_count_star, estimate, rls_applies) fires only when the shape is a bare
    count(*), the REQ-673 estimate is EXACT with a value, and NO RLS predicate applies to the persona;
    any guard failing returns False (fail-closed → materialize+count). REMAINING (kept in-progress):
    wiring it into the endpoint count(*) path so an exact-native-count source answers with one call
    instead of _materialize_api_to_trino_cache.
  code:
    - provisa/federation/cardinality.py
  tests:
    - tests/unit/test_cardinality.py
  use_case: >-
    Turns SELECT count(*) over a cold remote/API table from a full-dataset HTTP pull
    into a single cheap call, while preserving exact-answer semantics and governance, so
    the volume question is answerable interactively without warming the cache.
  scenario: |
    Given an unmaterialized API source with an exact cardinality capability and no RLS predicate
    When a user issues a bare SELECT count(*) query with no WHERE clause
    Then the query is routed to the native count call instead of materializing the full dataset
    And when the same query applies to a table where RLS rules restrict the user's visible rows
    Then the cheap-count route is disabled and the query falls back to materialize+count to preserve governance
  related_reqs:
    - REQ-673
    - REQ-865
    - REQ-826
    - REQ-263
    - REQ-866
  stakeholders:
  - data-engineer
  - app-developer
  competitive_position:
    status: ahead
    rationale: Routing an unmaterialized-source count(*) to a native count call — gated
      by shape, exactness, and RLS — is a federation execution optimization absent in
      Hasura and Dremio.
- id: REQ-876
  status: proposed
  group: 11. Platform, Infrastructure & Delivery
  category: Deployment & Infrastructure
  priority: SHOULD
  type: infrastructure
  target: "2026-Q4"
  description: >-
    Compose host-port parameterization for stack coexistence. Every published host port
    in docker-compose.core.yml (and the dev/observability overlays) MUST be expressed as
    ${VAR:-default} so the default preserves current behavior while a second stack can bind
    a different host port. This lets the dev (provisa), e2e (provisa-e2e), and integration
    (provisa-test) compose projects run simultaneously instead of colliding on 5432/8080/
    9000/6379/8480 — the failure mode observed when a second project's minio could not bind
    9000, started detached from its network, and its minio-init could not resolve minio,
    hanging the stack at N-1/N. THREE parts: (1) parameterize the published ports in
    core.yml/dev.yml/observability.yml (left side only; container ports fixed). (2) each test
    harness project (tests/conftest.py integration, tests/e2e/conftest.py) sets its own offset
    port set (e.g. PG_PORT/TRINO_PORT/REDIS_PORT/MINIO_PORT/ZAYCHIK_PORT) before compose up.
    (3) the in-process app under test connects to the matching ports — TRINO_PORT/ZAYCHIK_PORT
    are already env-driven (app.py:1119/1160); the PROVISA_CONFIG fixture's Postgres host:port
    must become env-interpolated (or the harness must template it) so the app reaches the
    offset postgres. Isolation of the compose PROJECT (‑p) already exists; this closes the
    host-port dimension so lifecycle-independent stacks are also bind-independent.
  use_case: >-
    A developer or CI can run the dev stack, the e2e stack, and an integration test run at the
    same time without tearing one down — each provisions its own services on its own host ports,
    so no run blocks another and no half-attached container corrupts a shared network.
  code:

  since: "2026-01"
  scenario: |
    Given a DDN HML project where some ObjectType HML files are missing
    When the DDN converter runs
    Then missing ObjectType tables are skipped with a warning and conversion continues

- id: REQ-629
  status: complete
  group: "12. Migration & Compatibility (Hasura)"
  category: Hasura Migration Converters
  priority: SHOULD
  type: structural
  description: >-
    Subgraph assignment for DDN HML documents is derived from the directory structure, not from a
    `subgraph` field in the document. The first directory component under the project root is taken
    as the subgraph name. Files under a `globals/` directory are assigned the `globals` subgraph
    and excluded from domain discovery.
  use_case: >-
    Correct subgraph-to-domain mapping without requiring stewards to add metadata to individual
    HML files.
  code:
    - provisa/ddn/parser.py
  tests:
    - tests/unit/test_ddn.py
  since: "2026-01"
- id: REQ-672
  status: proposed
  group: "15. Proposed Features"
  category: Graph Model
  priority: SHOULD
  type: structural
  description: >-
    M:N relationship support via explicit join tables: a RelationshipMapping may declare a join_table
    (schema + table name, source FK column, target FK column) to represent a many-to-many association.
    The join table's extra columns are projected as relationship properties into the Cypher rel JSON
    object. Two Cypher relationship type names (one per direction) and two GraphQL field names (one per
    side) are declared from the same join table definition. Relationship properties are accessible as
    r.prop in Cypher queries via JSON_EXTRACT_SCALAR on the rel object's properties bag. Users who
    prefer simplicity may instead expose the join table as a node label with its own identity.
  use_case: >-
    Many-to-many relationships with attributes on the association (e.g. WORKS_AT with start_date and
    salary) cannot be modeled today without exposing the join table as a node. A native M:N join table
    mapping lets the graph model reflect the true cardinality without forcing an artificial entity.
  tests:
    - tests/unit/test_mn_relationship_requirements.py
  target: "2026-Q3"

- id: REQ-611
  status: complete
  group: "3. Source Registration & Data Modeling"
  category: Registration & Governance
  priority: SHOULD
  type: structural
  description: >-
    Discovery is structured across five tiers of increasing governance: (1) Registered source
    schema — raw inventory, admin-level visibility; (2) Unclaimed tables — introspected from
    registered sources with no domain owner; (3) Domain assets — claimed tables and steward-defined
    views, fully governed; (4) Relationships — approved traversal paths between Tier 3 assets;
    (5) Field grants — domain-to-domain field access permissions. Each tier is a prerequisite for
    the next.
  use_case: >-
    Structured discovery tiers give stewards and analysts a clear mental model of what data is
    governed and at what level.

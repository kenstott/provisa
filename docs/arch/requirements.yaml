- id: REQ-647
  status: complete
  group: "10. UI & Admin Surfaces"
  category: "Graph Grouping — Hull SVG Overlay"
  priority: SHOULD
  type: ui
  description: >-
    When a grouping attribute is active, an SVG ellipse is drawn over the Cytoscape canvas around
    each group's node positions. Ellipses are computed by fitting bounding-box centroids and radii
    from node positions in graph coordinates, then converted to screen coordinates using Cytoscape
    zoom and pan. The SVG layer re-renders on every Cytoscape `viewport` event so hulls track pan
    and zoom.
  use_case: >-
    SVG hull ellipses provide spatial grouping cues that remain accurate during pan and zoom without
    requiring re-layout.
  code:
    - provisa-ui/src/components/graph/GraphCanvas.tsx
  tests:
    - provisa-ui/src/__tests__/GraphFrame.test.tsx
    - provisa-ui/src/__tests__/ui_requirements.test.ts
    - tests/unit/test_graph_grouping_requirements.py
  since: "2026-01"
  scenario: |
    Given an active grouping attribute in the graph view
    When the user pans or zooms the Cytoscape canvas
    Then SVG hull ellipses re-render to accurately enclose each group's nodes

- id: REQ-648
  status: complete
  group: "10. UI & Admin Surfaces"
  category: "Graph Grouping — Collapse to Supernode"
  priority: SHOULD
  type: ui
  description: >-
    Each group cluster supports a collapse toggle. When collapsed: member nodes are removed from
    the Cytoscape graph; a synthetic supernode with id `__collapsed_<level>_<cidToId(cid)>` is
    added showing the group label and member count; edges crossing the group boundary are rewritten
    to connect to/from the supernode. Double-clicking the supernode expands the group and restores
    original nodes and edges. Collapsed state is held in a `Set<string>` per frame and reset when
    the grouping attribute changes.
  use_case: >-
    Collapse-to-supernode reduces visual complexity for large clusters while preserving cross-cluster
    edge visibility.
  code:
    - provisa-ui/src/components/graph/graph-clusters.ts
    - provisa-ui/src/components/graph/GraphCanvas.tsx
  tests:
    - provisa-ui/src/__tests__/GraphFrame.test.tsx
    - provisa-ui/src/__tests__/ui_requirements.test.ts
    - tests/unit/test_graph_grouping_requirements.py
  since: "2026-01"
  scenario: |
    Given a grouped graph with a cluster toggled to collapsed
    When the cluster is collapsed
    Then member nodes are replaced by a synthetic supernode and cross-boundary edges are rewritten;
    double-clicking the supernode restores the original nodes and edges

- id: REQ-649
  status: complete
  group: "10. UI & Admin Surfaces"
  category: "Graph Node Size Encoding"
  priority: MAY
  type: ui
  description: >-
    Node size can be driven by any numeric node property via `sizeByProperty` (a per-label map of
    property name). The property value is linearly scaled between the observed min and max across
    all nodes of that label to produce a node diameter between `base` and `base * multiplier`. The
    `sizeByProperty` setting is persisted in localStorage under key `provisa.graph.sizeByProperty`.
  use_case: >-
    Size-by-property encoding lets analysts visually compare centrality scores or any other numeric
    metric across nodes without reading raw values.
  code:
    - provisa-ui/src/components/graph/GraphCanvas.tsx
    - provisa-ui/src/pages/GraphPage.tsx
  tests:
    - provisa-ui/src/__tests__/GraphFrame.test.tsx
    - provisa-ui/src/__tests__/ui_requirements.test.ts
    - tests/unit/test_graph_grouping_requirements.py
  since: "2026-01"
  scenario: |
    Given a sizeByProperty mapping configured for a node label
    When the graph renders nodes of that label
    Then node diameters are linearly scaled between base and base*multiplier based on the property value

    - provisa/pgwire/_pipeline.py
  related_reqs:
    - REQ-883
- id: REQ-892
  status: proposed
  target: "2026-Q4"
  group: "4. Source Connectors"
  category: Connector Abstraction
  priority: MAY
  type: structural
  description: >-
    Pgwire may present popular PostgreSQL extension surfaces backed by the federation engine,
    as a pluggable opt-in-per-deployment mechanism: each surface (a) advertises itself in pg_extension
    so clients see it "installed", (b) declares its types/OIDs in the single normalization module,
    (c) maps its operators/functions to an engine function or rejects them explicitly
    (convert-or-reject-loudly — a surface must NOT claim a capability, e.g. index acceleration,
    it does not implement). Concrete surfaces: pgvector-compatible (vector type + distance operators
    <-> L2, <=> cosine, <#> inner product, including ORDER BY emb <-> $1 similarity search, NOT
    advertising ivfflat/hnsw index acceleration); PostGIS-subset (geometry/geography +
    ST_Distance/ST_Contains/ST_DWithin/ST_Intersects/&&); JSON operators (-> ->> #> #>>
    mapped to JSON_VALUE/JSON_QUERY); and compatibility functions (pg_trgm similarity()/%,
    gen_random_uuid(), pgcrypto digest()).
  use_case: >-
    Pgwire clients assume PostgreSQL extensions are available (pgvector for ML/embedding workloads,
    PostGIS for geospatial, JSON operators for document processing). Making these surfaces available
    over the federation engine eliminates the need to add specialized backends or custom UDFs;
    a single Provisa pgwire endpoint can serve diverse analytics workloads (ML, geospatial,
    document) via compatibility operators mapped to federation engine functions.
  code:
    - provisa/pgwire/catalog.py
    - provisa/pgwire/_pipeline.py
  related_reqs:
    - REQ-883
    - REQ-842
- id: REQ-893
  status: complete
  since: "2026-07"
  group: "4. Source Connectors"
  category: Federation Engine Abstraction
  priority: MAY
  type: structural
  description: >-
    PostgreSQL can act as a pluggable FederationEngine (DriverClass.PARTIAL) via postgres_fdw,
    enabling Postgres servers to attach foreign tables from other Postgres servers (ATTACH
    mechanism — no data movement, references in place). FDW types (postgres_fdw, mysql_fdw,
    file_fdw, mongo_fdw, tds_fdw, etc.) are provisioned at install time via CREATE EXTENSION;
    per-source connections are created at runtime via CREATE SERVER + CREATE USER MAPPING + IMPORT
    FOREIGN SCHEMA / CREATE FOREIGN TABLE. This mirrors Trino's architecture: connector types
    bundled at provision, catalogs dynamically created at runtime (REQ-251).
  use_case: >-
    Enables Tier 1 deployment: a single PostgreSQL instance serves as both the metadata home
    and the compute engine for PG-to-PG and cross-FDW federation, eliminating the need for Trino
    until heterogeneous/broad federation is required. Maintains containerless deployment spirit
    and completes the multi-tier deployment story. Governed queries pass through the semantic→IR
    layer (RLS/masking applied before transpile), ensuring Postgres engine passes governance-parity
    conformance suite (REQ-827) by construction.
  notes: >-
    Scale constraint (single-node, no MPP): like DuckDB, a Postgres+postgres_fdw engine executes on
    ONE node — there is no massively-parallel execution. postgres_fdw pushes down predicates and
    same-server joins/aggregates, but a cross-SERVER join (data from two different remotes) cannot
    be pushed down and materializes locally, bounded by the single node's memory/CPU. This makes
    DuckDB and Postgres the SINGLE-NODE federators (embedded / small-to-medium tiers, low latency,
    no cluster); Trino is the only MPP federator (distributes federated joins/aggregations across a
    worker cluster). The tier boundary is therefore about SCALE, not just breadth: run
    DuckDB/Postgres compute until federation volume or concurrency outgrows one node, then graduate
    to Trino for MPP. The metadata home never moves (REQ-889); only the compute engine scales up.
    Implication for DriverClass: classification should reflect single-node vs MPP in addition to
    connector breadth.

    Value positioning (deprioritized to MAY): a Postgres engine adds NO federation-scale advantage
    over DuckDB — both are single-node, and horizontal scale is already achieved by running multiple
    stateless Provisa instances behind a load balancer with DuckDB. Postgres's value is purely
    OPERATIONAL, not federation: (1) inspectable — a real listening server (psql, pg_stat_*, EXPLAIN,
    standard monitoring/backup) vs DuckDB's opaque in-process file; (2) hardened/mature — MVCC, WAL,
    replication/HA/PITR, auth/roles; (3) shared concurrent state — N stateless Provisa app instances
    can share ONE Postgres as both metadata home and single-node engine, whereas DuckDB is embedded/
    single-writer so each instance needs its own file (no shared home across a fleet). So DuckDB is
    the PRIMARY embedded single-node federator (Tier 0, per-instance); Postgres is the OPTIONAL
    shared/hardened/inspectable state+compute tier for fleets that want one concurrent backend. Build
    only if that ops profile is needed; not required for federation capability.

    Additional Postgres advantages for the SHARED-backend role: (a) connection pooling — PG is a
    multi-client server built for pooled clients (pgbouncer, server-side max_connections, driver
    pools), whereas DuckDB has no server-side pool (Provisa multiplexes threads/cursors to one file);
    (b) stability/maturity matters more for a shared backend than a per-instance file; (c) STANDARDIZED
    federation surface — postgres_fdw implements SQL/MED (ISO SQL's standard for external data:
    CREATE FOREIGN TABLE, IMPORT FOREIGN SCHEMA), while DuckDB's ATTACH + read_* scanners are
    DuckDB-specific. DuckDB concurrency model (for contrast): one Provisa process owns one embedded
    DuckDB and IS the multi-user multiplexer — concurrent readers are cheap (MVCC snapshots), writers/
    materialization serialize and are coordinated by Provisa's execution layer; DuckDB is not a
    multi-client server.

    IMPLEMENTATION: PostgresFdwConnector and FileFdwConnector (Mechanism.ATTACH) implemented in
    provisa/federation/connector.py. build_postgres_engine() in provisa/federation/engine.py creates
    a DriverClass.PARTIAL single-node engine. E2E tests pass: postgres_fdw attaches remote PG source
    with RLS masking (non-NY customers hidden), file_fdw attaches CSV; both joined to local engine
    table and executed via compile→apply_governance→rewrite_semantic_to_physical→transpile→execute
    on Postgres. Companion DuckDB engine also passes e2e (test_duckdb_federation_engine_e2e.py):
    RLS filter on customers.csv (15→5 rows) and CSV+SQLite relationship join on DuckDB.

    CORE FDW SET (bundled in standard PG, verified working): postgres_fdw (remote PG), file_fdw
    (CSV/text). EXTERNAL FDW CANDIDATES (not in standard image): sqlite_fdw (SQLite files),
    parquet_fdw (Parquet), iceberg_fdw (Apache Iceberg lakehouse), mysql_fdw, mongo_fdw, tds_fdw.

    ADDING EXTERNAL FDWs TO EMBEDDED PG: FDW provisioning is a BUILD/BUNDLING step, not runtime
    CREATE EXTENSION. Each external FDW is a shared library (.so) compiled against the embedded
    PG's exact version; SQL files placed in that PG's lib/ and share/extension/ dirs. Only then
    does CREATE EXTENSION succeed. Curated FDWs must be compiled into the embedded-PG distribution
    (pgserver bundles prebuilt PG binaries). Adding FDWs means shipping a customized embedded-PG
    build — directly parallel to how Trino bundles connector plugins in its image. This is the
    design guarantee: FDW set is fixed at distribution build time, not provisioned at install time.
  code:
    - provisa/federation/connector.py
    - provisa/federation/engine.py
  tests:
    - tests/integration/test_postgres_federation_engine_e2e.py
    - tests/integration/test_duckdb_federation_engine_e2e.py
  e2e: true
  e2e_reason: >-
    RLS masking on joined federation tables is only verifiable through a live-stack round-trip:
    semantic governance layer must apply before transpile, then Postgres executor confirms rows
    are hidden/shown correctly based on user context.
  related_reqs:
    - REQ-825
    - REQ-840
    - REQ-841
    - REQ-888
    - REQ-889
    - REQ-827
    - REQ-251
    - REQ-894
    - REQ-897
- id: REQ-894
  status: proposed
  target: "2026-Q4"
  group: "8. Deployment & Infrastructure"
  category: Deployment Tier Architecture
  priority: SHOULD
  type: constraint
  description: >-
    DuckDB federation engine is a DESKTOP/EDGE/DEV tier embedded federator, not a production
    multi-user backend. DuckDB is single-process with no server-side connection pooling and no
    HA; one Provisa process owns one DuckDB file and serves as the multi-user multiplexer
    (concurrent readers cheap via MVCC snapshots; writers/materialization serialize under Provisa
    coordination). The "multiple Provisas behind a load balancer with DuckDB" pattern works only
    for fully independent/partitioned workloads because DuckDB provides no shared state and is
    single-writer.
  use_case: >-
    DuckDB is recommended for zero-install single-node desktop/edge/dev deployments with one
    Provisa instance per DuckDB file. Production multi-user federation at scale requires either
    Trino (MPP, distributes across a worker cluster) or PostgreSQL with postgres_fdw (single-node
    shared backend, operational hardening). The tier boundary is SCALE (single-node vs MPP), not
    just federation breadth.
  notes: >-
    Design invariant: DuckDB and Postgres are the SINGLE-NODE federators (embedded/small-to-medium
    tiers, low latency, no cluster); Trino is the only MPP federator. The metadata home never
    moves (REQ-889); only the compute engine scales up. DuckDB's concurrency model: one Provisa
    process owns one embedded DuckDB file and IS the multi-user multiplexer — concurrent readers
    are cheap (MVCC snapshots), writers/materialization serialize and are coordinated by Provisa's
    execution layer. DuckDB is not a multi-client server and cannot be a shared production backend.
  related_reqs:
    - REQ-825
    - REQ-840
    - REQ-841
    - REQ-888
    - REQ-889
    - REQ-893
- id: REQ-895
  status: proposed
  target: "2026-Q4"
  group: "4. Source Connectors"
  category: Federation Engine Abstraction
  priority: MAY
  type: structural
  description: >-
    RDBMS-as-single-node-federation-engine pattern generalizes across DB vendors via native
    foreign-data mechanisms (SQL/MED or equivalent). Faithful SQL/MED: PostgreSQL (most complete,
    postgres_fdw and ecosystem FDWs) and IBM Db2 (federation via CREATE NICKNAME). Equivalent
    proprietary mechanisms: Oracle (database links + Heterogeneous Gateways), SQL Server (linked
    servers + PolyBase external tables), MySQL/MariaDB (FEDERATED / MariaDB CONNECT engine). All
    are single-node ATTACH-mechanism connectors and belong to the same federation-engine tier as
    PG/DuckDB; Trino remains the only MPP/broad federator.
  use_case: >-
    Pluggable "warehouse/RDBMS-native" engine family: a customer's existing warehouse (Db2/Oracle/
    SQL Server/PG) could itself be the federation engine via its native foreign-data mechanism,
    requiring no new infrastructure. These engines are OPTIONAL/MAY and operations-driven, not
    scale-driven. Unifies the single-node federator family under the SQL/MED abstraction and
    enables ecosystem partnerships (e.g., Db2, Oracle, SQL Server connectors as plugins).
  notes: >-
    All RDBMS foreign-data engines share the single-node scale constraint: each executes on ONE
    node and cannot push distributed joins/aggregations across two different remote servers.
    Cross-SERVER joins materialize locally. This makes them equivalent tiers: DuckDB and Postgres
    (via postgres_fdw) are embedded/shared examples; Db2 federation, Oracle database links, SQL
    Server linked servers, and MariaDB CONNECT are the vendor-native equivalents. All are SINGLE-NODE
    (REQ-894); only Trino is MPP. The tier boundary is SCALE, not breadth. Implementation: each
    RDBMS engine would be a pluggable DriverClass.PARTIAL connector wired via EngineRuntime (REQ-888).
  related_reqs:
    - REQ-825
    - REQ-840
    - REQ-841
    - REQ-888
    - REQ-889
    - REQ-893
- id: REQ-896
  status: proposed
  target: "2026-Q4"
  group: "0. Architecture & Design Principles"
  category: Federation Architecture
  priority: MUST
  type: structural
  description: >-
    Provisa's defensible value is the GOVERNED-FEDERATION MODEL and consistent governance philosophy,
    not any compute engine or infrastructure. Federation engines (Trino, DuckDB, Postgres, Snowflake,
    warehouse-native) are interchangeable commodity COMPUTE substrates; governance (RLS, column masking,
    relationship-join enforcement) is applied in the semantic→IR layer BEFORE any engine sees the query,
    ensuring governance-parity across all engines regardless of architecture.
  use_case: >-
    Engine independence allows Provisa to swap compute substrates (Trino ↔ DuckDB ↔ Postgres) with the
    entire governed federation model unchanged. The connector, CatalogEntry, materialization-store
    abstractions and single-node→MPP tier graduation remain engine-agnostic; governance invariants hold
    across deployment tiers and engine boundaries.
  notes: >-
    Design consequence: keep governance and the semantic model strictly above the engine seam. Never
    let engine-specific behavior leak into governance logic. Engines must remain hot-swappable. This
    principle is validated by the fact that Provisa can demonstrate identical governed-federation
    behavior across fundamentally different compute architectures (Trino/MPP cluster vs DuckDB/embedded
    in-process vs Postgres/single-node shared backend).
  related_reqs:
    - REQ-827
    - REQ-825
    - REQ-840
    - REQ-841
    - REQ-888
    - REQ-889
    - REQ-893
    - REQ-894
    - REQ-895
- id: REQ-897
  status: proposed
  target: "2026-Q4"
  group: "0. Architecture & Design Principles"
  category: Federation Architecture
  priority: SHOULD
  type: structural
  description: >-
    Federation engines are declared-capability objects; capabilities are planner inputs. Each
    FederationEngine carries a set of DECLARED capability traits used to make routing/planning/tier
    decisions. Established traits: driver_class (reach: BROAD/PARTIAL/SELF_ONLY) and mpp (scale-out;
    orthogonal to reach). Candidate additional traits: file_native, pooled, transactional, streaming
    (Arrow transport modes), and connector-level pushdown (predicate/join/aggregate).
  use_case: >-
    Consolidating engine capabilities into one coherent descriptor enables planner decisions such as:
    push a large federated join to an MPP engine; land API/remote sources into a pooled/transactional
    store; prefer a file_native engine when sources are files; gate single-node→MPP tier graduation.
    Capabilities become planner inputs rather than being inferred from incidental plumbing (e.g.,
    connector count or driver class alone).
  notes: >-
    Current seeds are scattered across EngineCapability (transports, provisa/federation/runtime.py),
    connector Capability (pushdown), and engine driver_class/mpp fields. Direction: consolidate into
    one coherent engine-capability descriptor that orthogonally captures: (a) reach dimension —
    BROAD (native federation), PARTIAL (via connectors), SELF_ONLY (single-node); (b) scale dimension —
    mpp/distributed vs single-node; (c) storage dimension — file_native (scans files directly),
    pooled (server-side connection pooling), transactional support; (d) compute dimension — pushdown
    capabilities (predicate/join/aggregate at connector level). This consolidation is informational
    today; it enables decision-driving planner logic and capability-aware cost models in future versions.
  related_reqs:
    - REQ-825
    - REQ-840
    - REQ-841
    - REQ-888
    - REQ-889
    - REQ-893
    - REQ-894
    - REQ-895

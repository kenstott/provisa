- id: REQ-283
  status: complete
  group: "9. Live Data & Events"
  category: Live Query Engine (Unified Subscription & Sink Delivery)
  priority: MUST
  type: constraint
  description: >-
    `watermark_column` is a required config field for any poll-based live delivery. The column must
    be monotonically increasing (e.g. `updated_at`, `created_at`) and is declared on the table/view
    config (REQ-260). Without `watermark_column`, poll delivery is unavailable and config validation
    fails at startup.
  use_case: >-
    Required watermark_column config makes poll delivery explicit and prevents unbounded or duplicate
    event delivery.
  code:
    - provisa/live/
    - provisa/subscriptions/
  tests:
    - tests/unit/test_live_engine.py
    - tests/integration/test_live_sse_integration.py
  since: "2026-01"

- id: REQ-285
  status: complete
  group: "9. Live Data & Events"
  category: Live Query Engine (Unified Subscription & Sink Delivery)
  priority: MUST
  type: behavioral
  description: >-
    Tables declare delivery mode in the subscription/sink config: `delivery: cdc` or
    `delivery: poll`. `cdc` is available for PostgreSQL (LISTEN/NOTIFY), Debezium-connected sources
    (REQ-261), and MongoDB (Change Streams per REQ-258). All other sources — Trino-federated, JDBC
    with restricted access, Kafka topics, API sources — must use `delivery: poll`. Config validation
    rejects `delivery: cdc` for sources that do not support it.
  use_case: >-
    Delivery mode validation at config load time prevents misconfiguring CDC on sources that do not
    support it.
  code:
    - provisa/live/
    - provisa/subscriptions/
  tests:
    - tests/unit/test_live_engine.py
    - tests/integration/test_live_sse_integration.py
  since: "2026-01"
  scenario: |
    Given a Trino-federated source with delivery: cdc in its config
    When Provisa starts up
    Then config validation fails with an error indicating CDC is not supported for that source

- id: REQ-286
  status: complete
  group: "9. Live Data & Events"
  category: Live Query Engine (Unified Subscription & Sink Delivery)
  priority: SHOULD
  type: behavioral
  description: >-
    SSE subscription and Kafka sink are equivalent output mechanisms for a table or view. A single
    live definition may list both `sse_subscription` and `kafka_sink` in its `outputs`. The poll
    engine executes once per interval; each output tracks its own watermark independently in a
    `live_query_state` table (keyed by source name + output_type). A slow Kafka consumer does not
    block SSE delivery and vice versa.
  use_case: >-
    Independent watermark tracking per output type ensures a slow Kafka consumer never delays SSE
    subscribers.
  code:
    - provisa/live/
    - provisa/subscriptions/
  tests:
    - tests/unit/test_live_engine.py
    - tests/integration/test_live_sse_integration.py
  since: "2026-01"
  scenario: |
    Given a table with both sse_subscription and kafka_sink outputs configured
    When the Kafka consumer falls behind
    Then SSE delivery continues at normal intervals unaffected by the Kafka consumer lag

- id: REQ-287
  status: complete
  group: "9. Live Data & Events"
  category: Live Query Engine (Unified Subscription & Sink Delivery)
  priority: MUST
  type: structural
  description: >-
    Live query state persisted in a `live_query_state` PG table:
    `(source, output_type, last_watermark, last_polled_at, status)`. On restart, polling resumes

- id: REQ-877
  status: proposed
  group: "5. Data Lineage & Provenance"
  category: Row-Level Delta Capture
  priority: MAY
  type: behavioral
  target: "2026-Q4"
  description: >-
    Opt-in, per-table row-level delta capture for materialized views — the row-level
    companion to the column-level lineage trace (REQ-862). Each MV refresh can record
    which rows changed (insert / update / delete) since the prior refresh, so downstream
    consumers get change-data-capture on a derived dataset and audit gets row-granular
    provenance. NATIVE-FIRST — hashing is the fallback, never the default: (1) an
    Iceberg-target MV derives deltas from a snapshot-to-snapshot changelog scan (no
    hashing, no retained state); (2) a watermarked source (REQ-260 watermark_column)
    derives the delta from the watermark-bounded slice — this IS the output-side mirror of
    REQ-874 delta-fetch; (3) ONLY an RDB target with no watermark falls back to full-MV row
    hashing. QUERY-GENERATED — MAKE THE DB THE COMPUTE: the row hash and the diff are pushed down
    as SQL (hash via the engine's md5/sha over the canonical row projection; the delta via a set
    operation — EXCEPT / anti-join — between the current and the previous hash relation, the
    previous snapshot persisted as a relation). Provisa issues the query and lands the result
    (INSERT…SELECT / CTAS in the engine); it MUST NOT SELECT rows out and hash/diff them in Python.
    The delta is (key, change_type, old_hash, new_hash). COLUMN EXCLUSION: the opt-in specifies
    which columns are EXCLUDED from the row hash (e.g. volatile audit/updated_at columns), so a
    change to an ignored column is not reported as a row change — the hash is computed over the
    included projection only. The hash path is the expensive case and is strictly OPT-IN per table
    (default off). A SYSTEM-WIDE config sets the row-count ceiling for
    the hash path — `max_row_hashing` (global default in provisa.yaml, per-table override) —
    above which hash-based delta capture is SKIPPED and logged (mirrors the existing MV
    materialization max_rows guard); never sampled (sampling would make an audit delta lossy and
    untrustworthy). Deltas land in a SEPARATE append-only ledger keyed by (mv_id,
    definition_version, refresh_trace_id) — the same store-independent principle as mv_refresh_log
    (REQ-862), never stamped on the target table. NON-BLOCKING: delta capture — especially the
    full-MV hash path — MUST run off the refresh critical path in a background thread/task; the
    refresh completes and marks fresh without waiting on delta computation, and a slow or failed
    delta capture never delays or fails the refresh (best-effort provenance, logged on failure).
  use_case: >-
    Gives audit and incremental-consumption workflows row-level "what changed between refresh N and
    N+1" without a bespoke CDC service, while bounding cost: capable targets/sources (Iceberg,
    watermarked) get deltas cheaply from the engine, and the expensive full-MV hash path is opt-in
    and ceiling-guarded so very large MVs never silently pay for it.
  code:
    - provisa/mv/refresh.py
    - provisa/lineage/
    - provisa/core/config_loader.py
    - provisa/core/schema_org.py
  related_reqs:
    - REQ-862
    - REQ-874
    - REQ-826
    - REQ-260
- id: REQ-878
  status: proposed
  group: "5. Data Lineage & Provenance"
  category: Point-In-Time Reconstruction
  priority: MAY
  type: behavioral
  target: "2026-Q4"
  description: >-
    Point-in-time MV reconstruction from the delta ledger (REQ-877). An append-only delta
    ledger is a temporal substrate: folding change events up to a refresh version N (or reversing
    them from the live table back to N) reconstructs the view as of N — time-travel for targets
    that lack it natively. TWO OPT-IN TIERS by fidelity, matching what the ledger stores: (1)
    HASH-DELTA (REQ-877 default) reconstructs MEMBERSHIP and change history only — which row keys
    existed as of N, and that/when a row changed — because a hash proves change but does not invert
    to old values; (2) VALUE-DELTA stores the changed row VALUES, enabling FULL CONTENT
    reconstruction as of N (true time-travel for an RDB target). Value-delta is a second, heavier
    opt-in — it reimplements what Iceberg gives natively (checkpoint snapshots + a changelog), so
    Iceberg targets get content time-travel for free and value-delta buys it for RDB targets at a
    storage cost. CHECKPOINT-BOUNDED REPLAY: do not fold all history — persist a periodic full
    snapshot plus deltas between; reconstruct = nearest checkpoint <= N, then apply deltas up to N
    (Iceberg's model). RECONSTRUCTION IS A QUERY — MAKE THE DB THE COMPUTE (same discipline as
    REQ-877): as-of-N is a windowed greatest-per-key query over the ledger (last event with version
    <= N per key, excluding deletes), executed in the engine, never a Python replay. Non-blocking
    and system-config bounded like REQ-877.
  use_case: >-
    Lets a user query "the view as of refresh N / time T" for MVs whose target is not Iceberg,
    without a bespoke temporal store — membership-and-audit reconstruction cheaply from hashes, or
    full content reconstruction when the value-delta tier is opted in, with replay cost bounded by
    checkpoints and the whole reconstruction expressed as a single ledger query.
  code:
    - provisa/lineage/
    - provisa/mv/refresh.py
    - provisa/core/schema_org.py
  related_reqs:
    - REQ-877
    - REQ-862
    - REQ-826
    - REQ-874
- id: REQ-879
  status: proposed
  group: "4. Source Connectors"
  category: Materialization Store
  priority: MUST
  type: structural
  target: "2026-Q4"
  description: >-
    Cross-instance MV refresh coordination for a load-balanced fleet sharing one
    materialization store. Today the live refresh state is per-instance in-memory
    (MVRegistry._mvs; mark_refreshing flips an in-process status), so instance A's
    REFRESHING is invisible to B and both refresh the same MV — redundant compute plus
    concurrent writers racing on the same relation. FIX: promote the materialized_views
    catalog into the AUTHORITATIVE SHARED refresh-state and drive the refresh loop off it
    (not the per-instance registry). Add columns: writer, lease_until,
    materialized_definition_version, materialized_input_version, snapshot_id. PROTOCOL:
    (1) ATOMIC CLAIM — a single conditional UPDATE that BOTH dedups by version (skip when
    materialized_input_version == target, the REQ-862 stamp is the already-written key) AND
    excludes concurrent writers (skip when status=refreshing AND lease_until>now). 0 rows =
    skip; 1 row = this instance owns the refresh. This is the per-MV election — DECENTRALIZED,
    no global leader; a heartbeat renews lease_until during a long refresh, and lease expiry
    reclaims after a crash. (2) FENCED COMMIT — finalize (set materialized_version/status/
    snapshot_id) only WHERE writer=me AND lease_until>=now; 0 rows means the lease was lost
    (slow/crashed-then-revived) so the result is DISCARDED — prevents a stale writer clobbering
    a newer refresh (fencing token). (3) SOURCE OF TRUTH — the store's committed snapshot
    (atomic commit, e.g. Iceberg) is authoritative for what is materialized; the catalog is
    coordination metadata reconciled to the store on lease expiry, so a crash mid-write leaves
    no partial data. NOT held pessimistic locks (SELECT FOR UPDATE over a long refresh holds a
    transaction open and a crash leaves a stuck lock) — leases + fencing. The catalog is the
    same structure that holds freshness (REQ-855) and the version/lineage stamps (REQ-862).
    CONSISTENCY KNOB: a per-MV `consistency` setting selects the tier — `shared` (default)
    engages this coordination catalog (one snapshot-consistent copy); `distributed`
    per-instance-materializes and does NOT engage it. The distributed tier is only
    eventually consistent under TWO preconditions: (a) a DETERMINISTIC view_sql — enforced
    at registration (reject now()/random()/uuid/unordered-LIMIT; provisa/mv/determinism.py);
    and (b) source QUIESCENCE — the source must stop changing long enough within a refresh
    cycle for all instances to materialize the same source state. A never-settling
    high-churn source never converges (each instance perpetually reflects a different
    snapshot), so the distributed tier is inappropriate for it — determinism is necessary
    but not sufficient. Quiescence is a workload property, not statically checkable, so it is
    an operational constraint on choosing `distributed`, whereas determinism is validated.
  use_case: >-
    Lets an arbitrary number of control-plane/engine instances run behind a load balancer
    against one shared materialization store without redundant refreshes, write races, or a
    single-leader bottleneck — each instance races to claim due MVs, exactly one wins per MV,
    and crashes are handled by lease expiry and fenced commits.
  code:
    - provisa/mv/registry.py
    - provisa/mv/refresh.py
    - provisa/core/schema_org.py
  related_reqs:
    - REQ-826
    - REQ-830
    - REQ-855
    - REQ-862
    - REQ-844

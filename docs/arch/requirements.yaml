    When the listener receives the statement
    Then it is rejected; only SQL statements are accepted

- id: REQ-615
  status: complete
  group: "8. Client Access & Protocols"
  category: pgwire
  priority: MUST
  type: constraint
  description: >-
    The pgwire listener does not support DML mutations (INSERT, UPDATE, DELETE). SQL statements of
    these types are not routed to a write path.
  use_case: >-
    Read-only restriction on pgwire keeps the connection appropriate for analytics tools and prevents
    accidental data modification via SQL clients.

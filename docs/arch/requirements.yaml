    - provisa/pgwire/ddl_handler.py
    - provisa/pgwire/copy_handler.py
  tests:
    - tests/unit/test_pgwire_requirements.py
    - tests/integration/test_pgwire_integration.py
  since: "2026-01"
  scenario: |
    Given a role without the ddl capability submitting COPY or DDL over pgwire
    When the statement is received
    Then PG error code 42501 is returned

- id: REQ-617
  status: complete
  group: "8. Client Access & Protocols"
  category: gRPC
  priority: MUST
  type: behavioral
  description: >-
    Role selection on every Provisa gRPC RPC is via the `x-provisa-role` metadata key. Missing or
    unrecognised role metadata causes the call to be rejected with UNAUTHENTICATED. Streaming query
    RPCs emit one response message per result row; mutation RPCs are unary.
  use_case: >-
    Metadata-based role selection lets a single gRPC channel serve multiple roles by setting the key
    per-call without reconnecting.

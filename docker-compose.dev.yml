# Dev/test overlay — exposed ports for direct host access + optional test services.
# Test-only services (Kafka/Debezium, Elasticsearch, Neo4j, Fuseki, MongoDB) require --profile test.
# Usage:
#   dev:   docker compose -f docker-compose.core.yml -f docker-compose.observability.yml -f docker-compose.dev.yml up
#   test:  docker compose -f docker-compose.core.yml -f docker-compose.observability.yml -f docker-compose.dev.yml --profile test up
#   clean: docker compose -f docker-compose.core.yml -f docker-compose.observability.yml -f docker-compose.dev.yml --profile test down --volumes
services:
  # Expose core service ports for direct access during development
  postgres:
    ports:
      - "5432:5432"

  pgbouncer:
    ports:
      - "6432:6432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  redis:
    ports:
      - "6379:6379"

  trino:
    ports:
      - "8080:8080"

  zaychik:
    ports:
      - "8480:8480"

  # Test-only services (kafka, schema-registry, mongodb, elasticsearch, neo4j,
  # fuseki) now live in the isolated provisa-test project — see
  # docker-compose.test.yml. debezium-connect stays here (core) and reaches the
  # test-project kafka by its shared-network alias.
  debezium-connect:
    profiles: ["test"]
    restart: unless-stopped
    image: quay.io/debezium/connect:2.7
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    # kafka lives in the provisa-test project (shared network alias `kafka`),
    # so it cannot be a compose depends_on here; the healthcheck retries cover
    # kafka not yet being reachable at first start.
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # Expose core observability service ports for direct host access
  otel-collector:
    volumes:
      - ./observability/otel-collector-config.dev.yaml:/etc/otel-collector-config.dev.yaml:ro
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--config=/etc/otel-collector-config.dev.yaml"
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo

  prometheus:
    ports:
      - "9090:9090"

  otlp2parquet:
    ports:
      - "4319:4319"

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/var/tempo
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3100:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  tempo_data:
  grafana_data:

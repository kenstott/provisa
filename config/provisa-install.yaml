# Provisa install-simulation config — pet store demo.
# Used by start-ui-install.sh via PROVISA_CONFIG env var.
# Federates the Petstore public API (OpenAPI), internal inventory (PG), and
# customer inquiries (SQLite) into one virtual database. The graphql-demo
# (shelter) source is registered dynamically by the demo, not from this file.
sources:
  - id: pet-store-pg
    type: postgresql
    host: ${env:POSTGRES_HOST:-postgres}
    port: 5432
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD:-provisa}
    description: Internal pet inventory database — animals on hand, breed, pricing, and availability maintained by the inventory department
  - id: petstore-api
    type: openapi
    path: https://petstore3.swagger.io/api/v3/openapi.json
    base_url: https://petstore3.swagger.io/api/v3
    cache_ttl: 300
    auth_config:
      type: none
    description: Petstore public REST API (OpenAPI) — external catalog of pets exposed by the Swagger Petstore service
  - id: inquiries-sqlite
    type: sqlite
    path: ./demo/files/inquiries.sqlite
    description: Customer adoption inquiries — front-desk/CRM submissions stored in a local SQLite file

domains:
  - id: pet-store
    description: Pet store — Petstore public API (OpenAPI), internal inventory (PG), and customer inquiries (SQLite) federated into one virtual database

naming:
  domain_prefix: true
  rules: []

tables:
  - source_id: pet-store-pg
    domain_id: pet-store
    schema: pet_store
    table: pets
    governance: pre-approved
    description: Pet inventory — animals available for adoption or purchase, managed by the inventory department
    columns:
      - name: id
        data_type: integer
        visible_to: [admin, analyst]
      - name: name
        data_type: varchar(100)
        visible_to: [admin, analyst]
      - name: species
        data_type: varchar(50)
        visible_to: [admin, analyst]
      - name: breed_name
        data_type: varchar(100)
        visible_to: [admin, analyst]
      - name: price
        data_type: decimal(10,2)
        visible_to: [admin]
      - name: available
        data_type: boolean
        visible_to: [admin, analyst]
  - source_id: petstore-api
    domain_id: pet-store
    schema: default
    table: pet
    governance: pre-approved
    description: Pet catalog from the Petstore public API (OpenAPI)
    columns:
      - name: id
        data_type: bigint
        visible_to: [admin, analyst]
      - name: name
        data_type: varchar
        visible_to: [admin, analyst]
      - name: status
        data_type: varchar
        visible_to: [admin, analyst]
      - name: photoUrls
        data_type: varchar
        visible_to: [admin, analyst]
  - source_id: inquiries-sqlite
    domain_id: pet-store
    schema: default
    table: inquiries
    governance: pre-approved
    description: Customer adoption inquiries — managed by the front-desk/CRM team
    columns:
      - name: id
        data_type: bigint
        visible_to: [admin, analyst]
      - name: pet_id
        data_type: bigint
        visible_to: [admin, analyst]
      - name: user_id
        data_type: bigint
        visible_to: [admin, analyst]
      - name: inquiry_type
        data_type: varchar
        visible_to: [admin, analyst]
      - name: message
        data_type: varchar
        visible_to: [admin, analyst]
      - name: status
        data_type: varchar
        visible_to: [admin, analyst]
      - name: submitted_at
        data_type: varchar
        visible_to: [admin, analyst]

relationships:
  - id: pets-to-api
    source_table_id: pets
    target_table_id: pet
    source_column: name
    target_column: name
    cardinality: many-to-one
    alias: LISTED_AS
  - id: pets-to-inquiries
    source_table_id: pets
    target_table_id: inquiries
    source_column: id
    target_column: pet_id
    cardinality: one-to-many
    alias: HAS_INQUIRY

roles:
  - id: admin
    capabilities:
      - source_registration
      - table_registration
      - create_relationship
      - access_config
      - query_development
      - approve_view
      - admin
    domain_access: ["*"]
  - id: analyst
    capabilities:
      - query_development
    domain_access:
      - pet-store

cache:
  enabled: true
  redis_url: redis://${env:REDIS_HOST:-localhost}:6379
  default_ttl: 300

auth:
  provider: firebase
  assignments_source: provisa
  default_assignments:
    - role_id: analyst
      domain_id: "*"
  firebase:
    project_id: ${env:FIREBASE_PROJECT_ID:-provisa-dev}
    service_account_key: ${env:FIREBASE_SERVICE_ACCOUNT_KEY:-}

server:
  limits:
    default_row_limit: 10000    # rows returned when no LIMIT specified; env PROVISA_DEFAULT_ROW_LIMIT overrides
    trino_query_timeout: 120    # seconds before Trino kills a query; env PROVISA_TRINO_QUERY_TIMEOUT overrides
    request_timeout: 120        # seconds before the API returns 504; env PROVISA_REQUEST_TIMEOUT overrides

graphql_remote:
  max_object_depth: 5  # max nesting depth for OBJECT column sub-selection at introspection time
  max_list_depth: 2    # nesting depth at which LIST sub-fields are excluded from selection (prevents explosion)
  max_list_items: 100  # max items fetched per LIST field; injected as first: N in the GQL selection

observability:
  endpoint: "http://localhost:4319"
  service_name: provisa
  sample_rate: 1.0
  log_level: WARNING
  compact_cron: "* * * * *"
  compact_batch_size: 1000
  s3_endpoint: "http://localhost:9000"
  telemetry_filter:
    redact_sql_literals: false       # strip literal values from db.statement before export to internal endpoint
    redact_attributes: []            # attribute names to drop entirely before export to internal endpoint
  # support_endpoint: ""            # Provisa support OTLP endpoint — off by default
  support_telemetry_filter:
    redact_sql_literals: true        # strip literal values from db.statement (default on for support)
    redact_attributes: []            # additional attributes to drop before sending to Provisa support

# Provisa config — demo environment pointing at Docker Compose PG.
sources:
  - id: sales-pg
    type: postgresql
    host: postgres
    port: 5432
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD}
  - id: analytics-pg
    type: postgresql
    host: postgres
    port: 5432
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD}
  - id: reviews-mongo
    type: mongodb
    host: mongodb
    port: 27017
    database: provisa
    username: ""
    password: ""

  - id: support-kafka
    type: kafka
    host: kafka
    port: 29092
    database: default
    username: ""
    password: ""

  # File-based sources (Issue #27)
  - id: demo-customers-csv
    type: csv
    path: ./demo/files/customers.csv

  - id: demo-products-parquet
    type: parquet
    path: ./demo/files/products.parquet

  - id: demo-orders-sqlite
    type: sqlite
    path: ./demo/files/orders.sqlite

domains:
  - id: sales-analytics
    description: Sales operational and analytical data
  - id: product-catalog
    description: Product catalog data
  - id: customer-insights
    description: Customer segmentation and analytics
  - id: support
    description: Customer support ticket events

naming:
  domain_prefix: true  # prepends domain_id__ to all GraphQL names
  rules:
    - pattern: "^prod_pg_"
      replace: ""

tables:
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: orders
    governance: pre-approved
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: customer_id
        visible_to: [admin, analyst]
      - name: product_id
        visible_to: [admin]
      - name: amount
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
      - name: status
        visible_to: [admin, analyst]
      - name: created_at
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: customers
    governance: pre-approved
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: email
        visible_to: [admin, analyst]
        masking:
          analyst:
            type: regex
            pattern: "^(.{2}).*(@.*)$"
            replace: "$1***$2"
      - name: region
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: product-catalog
    schema: public
    table: products
    governance: registry-required
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: price
        visible_to: [admin]
      - name: category
        visible_to: [admin, analyst]

  - source_id: reviews-mongo
    domain_id: product-catalog
    schema: provisa
    table: product_reviews
    governance: pre-approved
    description: "User-submitted product reviews from MongoDB"
    columns:
      - name: product_id
        visible_to: [admin, analyst]
        description: "FK to products table"
      - name: reviewer
        visible_to: [admin, analyst]
        description: "Username of the reviewer"
      - name: rating
        visible_to: [admin, analyst]
        description: "Rating from 1-5 stars"
      - name: comment
        visible_to: [admin]
        description: "Free-text review comment"

  - source_id: analytics-pg
    domain_id: customer-insights
    schema: analytics
    table: customer_segments
    governance: pre-approved
    columns:
      - name: customer_id
        visible_to: [admin, analyst]
      - name: segment
        visible_to: [admin, analyst]
      - name: score
        visible_to: [admin]

views:
  - id: monthly-revenue
    sql: |
      SELECT DATE_TRUNC('month', created_at) AS month,
             region,
             SUM(amount) AS revenue,
             COUNT(*) AS order_count
      FROM orders
      GROUP BY 1, 2
    description: "Monthly revenue by region — steward-approved aggregation"
    domain_id: sales-analytics
    governance: pre-approved
    materialize: true
    refresh_interval: 3600
    columns:
      - name: month
        visible_to: [admin, analyst]
        description: "Month (truncated to first day)"
      - name: region
        visible_to: [admin, analyst]
        description: "Geographic region"
      - name: revenue
        visible_to: [admin]
        description: "Total revenue in USD"
      - name: order_count
        visible_to: [admin, analyst]
        description: "Number of orders"

  - id: customer-order-summary
    sql: |
      SELECT c.id AS customer_id,
             c.name AS customer_name,
             c.region,
             COUNT(o.id) AS total_orders,
             SUM(o.amount) AS total_spent
      FROM customers c
      LEFT JOIN orders o ON c.id = o.customer_id
      GROUP BY c.id, c.name, c.region
    description: "Customer lifetime order summary"
    domain_id: customer-insights
    governance: registry-required
    materialize: false
    columns:
      - name: customer_id
        visible_to: [admin, analyst]
      - name: customer_name
        visible_to: [admin, analyst]
      - name: region
        visible_to: [admin, analyst]
      - name: total_orders
        visible_to: [admin, analyst]
      - name: total_spent
        visible_to: [admin]

relationships:
  - id: orders-to-customers
    source_table_id: orders
    target_table_id: customers
    source_column: customer_id
    target_column: id
    cardinality: many-to-one
  - id: customers-to-segments
    source_table_id: customers
    target_table_id: customer_segments
    source_column: id
    target_column: customer_id
    cardinality: one-to-many
  - id: tickets-to-customers
    source_table_id: ticket_created
    target_table_id: customers
    source_column: customer_id
    target_column: id
    cardinality: many-to-one
  - id: orders-to-reviews
    source_table_id: orders
    target_table_id: product_reviews
    source_column: product_id
    target_column: product_id
    cardinality: one-to-many

roles:
  - id: admin
    capabilities:
      - source_registration
      - table_registration
      - relationship_registration
      - security_config
      - query_development
      - query_approval
      - admin
    domain_access: ["*"]
  - id: analyst
    capabilities:
      - query_development
    domain_access:
      - sales-analytics

materialized_views:
  - id: mv-orders-customers
    source_tables: [orders, customers]
    join_pattern:
      left_table: orders
      left_column: customer_id
      right_table: customers
      right_column: id
      join_type: left
    target_catalog: postgresql
    target_schema: mv_cache
    refresh_interval: 300
    enabled: true

cache:
  enabled: true
  redis_url: ${env:REDIS_URL}
  default_ttl: 300

kafka_sources:
  - id: support-kafka
    bootstrap_servers: kafka:29092
    topics:
      - id: ticket_created
        topic: support.tickets
        default_window: 1h
        domain_id: support
        description: "Support tickets opened by customers"
        discriminator:
          field: event_type
          value: TicketCreated
        columns:
          - name: _timestamp
            description: "Kafka message timestamp"
          - name: ticket_id
            description: "Unique ticket identifier"
          - name: customer_id
            description: "FK to customers table"
          - name: category
            description: "Ticket category"
          - name: priority
            description: "Priority level"
          - name: subject
          - name: created_at
      - id: ticket_resolved
        topic: support.tickets
        default_window: 1h
        domain_id: support
        description: "Support tickets that have been resolved"
        discriminator:
          field: event_type
          value: TicketResolved
        columns:
          - name: _timestamp
            description: "Kafka message timestamp"
          - name: ticket_id
            description: "Unique ticket identifier"
          - name: customer_id
            description: "FK to customers table"
          - name: agent
            description: "Support agent who resolved"
          - name: resolution
            description: "Resolution type"
          - name: resolution_time_minutes
          - name: resolved_at


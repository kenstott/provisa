webhooks:
- arguments:
  - name: name
    type: String
  - name: status
    type: String
  description: Add a new pet to the store via Petstore API
  domain_id: pet-store
  kind: mutation
  method: POST
  name: add_pet
  timeout_ms: 5000
  url: ${env:PETSTORE_BASE_URL:-http://petstore-mock:8080/api/v3}/pet
  visible_to:
  - admin
- arguments:
  - name: petId
    type: Int
  - name: quantity
    type: Int
  description: Place a purchase order for a pet via Petstore API
  domain_id: pet-store
  kind: mutation
  method: POST
  name: place_order
  timeout_ms: 5000
  url: ${env:PETSTORE_BASE_URL:-http://petstore-mock:8080/api/v3}/store/order
  visible_to:
  - admin

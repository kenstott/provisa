auth:
  assignments_source: provisa
  default_assignments:
  - domain_id: '*'
    role_id: admin
  provider: basic
cache:
  default_ttl: 300
  enabled: true
  redis_url: redis://${env:REDIS_HOST:-localhost}:6379
discovery:
  api_key: ${env:ANTHROPIC_API_KEY}
  min_confidence: 0.7
  sample_size: 20
domains:
- description: "Pet store \u2014 Petstore public API (OpenAPI), internal inventory\
    \ (PG), and customer inquiries (SQLite) federated into one virtual database"
  id: pet-store
- description: "Animal shelter staff and breed management \u2014 employees, assignments,\
    \ schedules from GraphQL demo server"
  id: shelter
graphql_remote:
  max_list_depth: 2
  max_list_items: 100
  max_object_depth: 5
naming:
  domain_prefix: true
  rules: []
observability:
  endpoint: http://localhost:4319
  ops_snapshot_retention_hours: 1
  sample_rate: 1.0
  service_name: provisa
relationships:
- alias: LISTED_AS
  cardinality: many-to-one
  id: pets-to-find-pets-by-status
  source_column: name
  source_table_id: pets
  target_column: name
  target_table_id: pet_by_status
- alias: HAS_INQUIRY
  cardinality: one-to-many
  id: pets-to-inquiries
  source_column: id
  source_table_id: pets
  target_column: pet_id
  target_table_id: inquiries
- alias: SUBMITTED
  cardinality: one-to-many
  id: users-to-inquiries
  source_column: id
  source_table_id: users
  target_column: user_id
  target_table_id: inquiries
- alias: SUBMITTED_BY
  cardinality: many-to-one
  id: inquiries-to-users
  source_column: user_id
  source_table_id: inquiries
  target_column: id
  target_table_id: users
- alias: HAS_PETS
  cardinality: many-to-one
  id: inquiries-to-pets
  source_column: pet_id
  source_table_id: inquiries
  target_column: id
  target_table_id: pets
- alias: FOR_PET
  cardinality: many-to-one
  id: order-to-find-pets-by-status
  source_column: petId
  source_table_id: order_by_id
  target_column: id
  target_table_id: pet_by_status
- alias: DETAIL
  cardinality: many-to-one
  id: find-pets-by-status-to-get-pet-by-id
  source_column: id
  source_table_id: pet_by_status
  target_column: id
  target_table_id: pet_by_id
- alias: BREED_INFO
  cardinality: many-to-one
  id: pets-to-shelter-breed
  source_column: breed_name
  source_table_id: pets
  target_column: name
  target_table_id: animal_breeds
- alias: PETS_OF_BREED
  cardinality: one-to-many
  id: shelter-breed-to-pets
  source_column: name
  source_table_id: animal_breeds
  target_column: breed_name
  target_table_id: pets
- cardinality: many-to-one
  id: pets-to-shelter-assignments
  source_column: breed_name
  source_table_id: pets
  target_column: breed_name
  target_table_id: assignments
- cardinality: one-to-many
  id: shelter-assignments-to-pets
  source_column: breed_name
  source_table_id: assignments
  target_column: breed_name
  target_table_id: pets
- alias: ASSIGNMENT_EMPLOYEE
  cardinality: many-to-one
  id: shelter-assignments-to-employees
  source_column: employee_id
  source_table_id: assignments
  target_column: id
  target_table_id: employees
- alias: ASSIGNMENT_BREED
  cardinality: many-to-one
  graphql_alias: breed
  id: shelter-assignments-to-breeds
  source_column: breed_name
  source_table_id: assignments
  target_column: name
  target_table_id: animal_breeds
roles:
- capabilities:
  - source_registration
  - table_registration
  - create_relationship
  - access_config
  - query_development
  - approve_view
  - admin
  domain_access:
  - '*'
  id: admin
- capabilities:
  - query_development
  domain_access:
  - pet-store
  - shelter
  id: analyst
server:
  limits:
    default_row_limit: 10000
    request_timeout: 60
    trino_query_timeout: 120
sources:
- database: provisa
  description: "Internal pet store inventory \u2014 tracks animals available for sale,\
    \ pricing, species, and breed assignments managed by the inventory department"
  host: ${env:POSTGRES_HOST:-postgres}
  id: pet-store-pg
  password: ${env:PG_PASSWORD:-provisa}
  port: 5432
  type: postgresql
  username: provisa
- auth_config:
    type: none
  base_url: ${env:PETSTORE_BASE_URL:-http://petstore-mock:8080/api/v3}
  cache_ttl: 300
  description: "Petstore e-commerce API \u2014 browse available animals, check inventory\
    \ levels, retrieve purchase orders, and manage customer accounts through the public\
    \ storefront"
  id: petstore-api
  path: ${env:PETSTORE_BASE_URL:-http://petstore-mock:8080/api/v3}/openapi.json
  type: openapi
- description: "Customer adoption inquiry records \u2014 prospective pet owner interest\
    \ submissions tracked by the front-desk team, including inquiry type, message,\
    \ and resolution status"
  id: inquiries-sqlite
  path: ./demo/files/inquiries.sqlite
  type: sqlite
- description: "Animal shelter GraphQL API \u2014 staff schedules, breed catalogue,\
    \ and animal assignment records managed by shelter operations"
  id: graphql-demo
  path: ${env:GRAPHQL_DEMO_URL:-http://graphql-demo:4000/graphql}
  type: graphql_remote
tables:
- columns:
  - description: Unique identifier for the pet record
    name: id
    visible_to:
    - admin
    - analyst
  - description: Name of the pet
    name: name
    visible_to:
    - admin
    - analyst
  - description: Species of the pet (e.g. dog, cat, bird)
    name: species
    visible_to:
    - admin
    - analyst
  - description: Breed of the pet
    name: breed_name
    visible_to:
    - admin
    - analyst
  - description: Sale price of the pet in USD
    name: price
    visible_to:
    - admin
  - description: Whether the pet is currently available for purchase
    name: available
    visible_to:
    - admin
    - analyst
  description: "Pet inventory \u2014 managed by the inventory department"
  domain_id: pet-store
  enable_aggregates: true
  enable_group_by: true
  governance: pre-approved
  schema: pet_store
  source_id: pet-store-pg
  table: pets
- alias: pet_by_status

# Provisa config — demo environment pointing at Docker Compose PG.
sources:
  - id: sales-pg
    type: postgresql
    host: ${env:POSTGRES_HOST:-postgres}
    port: 5432
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD:-provisa}
  - id: kafka-support
    type: kafka
    host: ${env:KAFKA_HOST:-kafka}
    port: 9092

domains:
  - id: sales-analytics
    description: Sales operational and analytical data
  - id: product-catalog
    description: Product catalog data

naming:
  domain_prefix: true
  rules:
    - pattern: "^prod_pg_"
      replace: ""

tables:
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: orders
    governance: pre-approved
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: customer_id
        visible_to: [admin, analyst]
      - name: product_id
        visible_to: [admin]
      - name: amount
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
      - name: status
        visible_to: [admin, analyst]
      - name: created_at
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: customers
    governance: pre-approved
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: email
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: product-catalog
    schema: public
    table: products
    governance: registry-required
    columns:
      - name: id
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: price
        visible_to: [admin]
      - name: category
        visible_to: [admin, analyst]

relationships:
  - id: orders-to-customers
    source_table_id: orders
    target_table_id: customers
    source_column: customer_id
    target_column: id
    cardinality: many-to-one

roles:
  - id: admin
    capabilities:
      - source_registration
      - table_registration
      - create_relationship
      - access_config
      - query_development
      - approve_view
      - admin
    domain_access: ["*"]
  - id: analyst
    capabilities:
      - query_development
    domain_access:
      - sales-analytics

rls_rules:
  - table_id: orders
    role_id: analyst
    filter: "region = current_setting('provisa.user_region')"

cache:
  enabled: true
  redis_url: redis://${env:REDIS_HOST:-localhost}:6379
  default_ttl: 300

kafka_sources:
  - id: kafka-support
    topics:
      - id: tickets
        topic: support.tickets
        domain_id: sales-analytics
        default_window: 1h
        columns:
          - name: id
          - name: subject
          - name: status
          - name: created_at

functions:
  - name: get_customers_by_region
    source_id: sales-pg
    schema: public
    function_name: get_customers_by_region
    returns: customers
    domain_id: sales-analytics
    description: "Returns customers filtered by region — pass no argument to return all"
    visible_to: [admin, analyst]
    kind: query
    arguments:
      - name: p_region
        type: String

webhooks:
  - name: notify_support
    url: http://localhost:9999/notify
    method: POST
    timeout_ms: 3000
    domain_id: sales-analytics
    description: "Send a support notification (example webhook)"
    visible_to: [admin]
    kind: mutation
    arguments:
      - name: message
        type: String

auth:
  provider: firebase
  assignments_source: provisa
  default_assignments:
    - role_id: analyst
      domain_id: "*"
  firebase:
    project_id: ${env:FIREBASE_PROJECT_ID:-provisa-dev}
    service_account_key: ${env:FIREBASE_SERVICE_ACCOUNT_KEY:-}

server:
  limits:
    default_row_limit: 10000    # rows returned when no LIMIT specified; env PROVISA_DEFAULT_ROW_LIMIT overrides
    trino_query_timeout: 120    # seconds before Trino kills a query; env PROVISA_TRINO_QUERY_TIMEOUT overrides
    request_timeout: 60         # seconds before the API returns 504; env PROVISA_REQUEST_TIMEOUT overrides

observability:
  endpoint: "http://localhost:4319"
  service_name: provisa
  sample_rate: 1.0
  log_level: WARNING
  compact_cron: "* * * * *"
  compact_batch_size: 10

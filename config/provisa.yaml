# Provisa config — demo environment pointing at Docker Compose PG.
sources:
  - id: sales-pg
    type: postgresql
    host: ${env:POSTGRES_HOST:-postgres}
    port: 5432
    database: provisa
    username: provisa
    password: ${env:PG_PASSWORD:-provisa}
    description: Operational sales database — orders placed by customers, regional revenue tracking, and the product catalog managed by the sales and operations teams
  - id: kafka-support
    type: kafka
    host: ${env:KAFKA_HOST:-kafka}
    port: 9092
    description: Live support ticket stream from the customer helpdesk — captures issue submissions and status changes in real time for support operations and SLA tracking

domains:
  - id: sales-analytics
    description: Sales operational and analytical data
  - id: product-catalog
    description: Product catalog data
  - id: pet-store
    description: Pet store inventory — animals available for adoption or purchase

naming:
  domain_prefix: true
  rules:
    - pattern: "^prod_pg_"
      replace: ""

tables:
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: orders
    governance: pre-approved
    description: Customer purchase orders — records every transaction placed through the sales channel, including amount, region, and fulfillment status
    columns:
      - name: id
        visible_to: [admin, analyst]
        is_primary_key: true
      - name: customer_id
        visible_to: [admin, analyst]
      - name: product_id
        visible_to: [admin]
      - name: amount
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
      - name: status
        visible_to: [admin, analyst]
      - name: created_at
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: sales-analytics
    schema: public
    table: customers
    governance: pre-approved
    description: Customer master — accounts registered with the business, including contact details and regional assignment used for sales territory reporting
    columns:
      - name: id
        is_primary_key: true
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: email
        visible_to: [admin]
      - name: region
        visible_to: [admin, analyst]
  - source_id: sales-pg
    domain_id: product-catalog
    schema: public
    table: products
    governance: registry-required
    description: Product catalog — all SKUs offered for sale, with pricing and category classification maintained by the product management team
    columns:
      - name: id
        is_primary_key: true
        visible_to: [admin, analyst]
      - name: name
        visible_to: [admin, analyst]
      - name: price
        visible_to: [admin]
      - name: category
        visible_to: [admin, analyst]
relationships:
  - id: orders-to-customers
    source_table_id: orders
    target_table_id: customers
    source_column: customer_id
    target_column: id
    cardinality: many-to-one

roles:
  - id: admin
    capabilities:
      - source_registration
      - table_registration
      - create_relationship
      - access_config
      - query_development
      - approve_view
      - admin
    domain_access: ["*"]
  - id: analyst
    capabilities:
      - query_development
    domain_access:
      - sales-analytics

rls_rules:
  - table_id: orders
    role_id: analyst
    filter: "region = current_setting('provisa.user_region')"

cache:
  enabled: true
  redis_url: redis://${env:REDIS_HOST:-localhost}:6379
  default_ttl: 300

kafka_sources:
  - id: kafka-support
    topics:
      - id: tickets
        topic: support.tickets
        domain_id: sales-analytics
        description: Inbound support tickets — real-time issue submissions from customers routed through the helpdesk platform for triage and resolution tracking
        default_window: 1h
        columns:
          - name: id
          - name: subject
          - name: status
          - name: created_at

functions:
  - name: get_customers_by_region
    source_id: sales-pg
    schema: public
    function_name: get_customers_by_region
    returns: customers
    domain_id: sales-analytics
    description: "Returns customers filtered by region — pass no argument to return all"
    visible_to: [admin, analyst]
    kind: query
    arguments:
      - name: p_region
        type: String

webhooks:
  - name: notify_support
    url: http://localhost:9999/notify
    method: POST
    timeout_ms: 3000
    domain_id: sales-analytics
    description: "Send a support notification (example webhook)"
    visible_to: [admin]
    kind: mutation
    arguments:
      - name: message
        type: String

auth:
  provider: firebase
  assignments_source: provisa
  default_assignments:
    - role_id: analyst
      domain_id: "*"
  firebase:
    project_id: ${env:FIREBASE_PROJECT_ID:-provisa-dev}
    service_account_key: ${env:FIREBASE_SERVICE_ACCOUNT_KEY:-}

server:
  limits:
    default_row_limit: 10000    # rows returned when no LIMIT specified; env PROVISA_DEFAULT_ROW_LIMIT overrides
    trino_query_timeout: 120    # seconds before Trino kills a query; env PROVISA_TRINO_QUERY_TIMEOUT overrides
    request_timeout: 120        # seconds before the API returns 504; env PROVISA_REQUEST_TIMEOUT overrides

graphql_remote:
  max_object_depth: 5  # max nesting depth for OBJECT column sub-selection at introspection time
  max_list_depth: 2    # nesting depth at which LIST sub-fields are excluded from selection (prevents explosion)
  max_list_items: 100  # max items fetched per LIST field; injected as first: N in the GQL selection

observability:
  endpoint: "http://localhost:4319"
  service_name: provisa
  sample_rate: 1.0
  log_level: WARNING
  compact_cron: "* * * * *"
  compact_batch_size: 1000
  s3_endpoint: "http://localhost:9000"
  telemetry_filter:
    redact_sql_literals: false       # strip literal values from db.statement before export to internal endpoint
    redact_attributes: []            # attribute names to drop entirely before export to internal endpoint
  # support_endpoint: ""            # Provisa support OTLP endpoint — off by default
  support_telemetry_filter:
    redact_sql_literals: true        # strip literal values from db.statement (default on for support)
    redact_attributes: []            # additional attributes to drop before sending to Provisa support

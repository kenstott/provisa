repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "provisa", "-ll", "-b", ".bandit-baseline.json"]
        pass_filenames: false
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        language: system
        entry: pyright
        args: ["provisa"]
        pass_filenames: false
        types: [python]
      - id: eslint-ui
        name: eslint-ui
        language: system
        entry: provisa-ui/scripts/precommit-eslint.sh
        files: ^provisa-ui/src/.*\.(ts|tsx)$

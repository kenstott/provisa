repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-r", "provisa", "-ll"]
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        language: system
        entry: pyright
        args: ["provisa"]
        pass_filenames: false
        types: [python]

connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/provisa?autosave=conservative
iceberg.jdbc-catalog.connection-user=provisa
iceberg.jdbc-catalog.connection-password=provisa
iceberg.jdbc-catalog.catalog-name=results
iceberg.jdbc-catalog.default-warehouse-dir=s3://provisa-results/warehouse
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true
s3.region=us-east-1
iceberg.register-table-procedure.enabled=true
# REQ-238: Trino filesystem (SSD) read-cache for warm Iceberg tables. Disabled by default;
# enable per worker by setting fs.cache.enabled=true and provisioning fs.cache.directories.
fs.cache.enabled=false
fs.cache.directories=/tmp/trino-cache
fs.cache.max-sizes=10GB

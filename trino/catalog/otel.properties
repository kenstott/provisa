connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/provisa
iceberg.jdbc-catalog.connection-user=provisa
iceberg.jdbc-catalog.connection-password=provisa
iceberg.jdbc-catalog.catalog-name=otel
iceberg.jdbc-catalog.default-warehouse-dir=s3://provisa-otel/warehouse
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true
s3.region=us-east-1
iceberg.register-table-procedure.enabled=true
iceberg.max-previous-versions=1
iceberg.metadata-cache.enabled=true
iceberg.expire-snapshots.min-retention=7d

# Observability overlay — adds minio, otlp2parquet, otel-collector, prometheus, tempo, grafana.
# Required for ops and metrics domains to be populated.
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.observability.yml up
services:
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/${PROVISA_OTEL_BUCKET:-provisa-otel} &&
        mc mb --ignore-existing local/provisa-results
      "

  otlp2parquet:
    image: ghcr.io/smithclay/otlp2parquet:latest
    volumes:
      - ./observability/otlp2parquet.toml:/etc/otlp2parquet.toml:ro
    command:
      - "-c"
      - "/etc/otlp2parquet.toml"
    environment:
      OTLP2PARQUET_STORAGE_BACKEND: "${OTLP2PARQUET_STORAGE_BACKEND:-s3}"
      OTLP2PARQUET_S3_BUCKET: "${PROVISA_OTEL_BUCKET:-provisa-otel}"
      OTLP2PARQUET_S3_ENDPOINT: "http://minio:9000"
      OTLP2PARQUET_S3_REGION: "${PROVISA_OTEL_S3_REGION:-us-east-1}"
      OTLP2PARQUET_HTTP_PORT: "${OTLP2PARQUET_HTTP_PORT:-4318}"
      AWS_ACCESS_KEY_ID: "${PROVISA_OTEL_S3_ACCESS_KEY:-minioadmin}"
      AWS_SECRET_ACCESS_KEY: "${PROVISA_OTEL_S3_SECRET_KEY:-minioadmin}"
    ports:
      - "4319:4318"
    depends_on:
      minio:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./observability/otel-collector-config.dev.yaml:/etc/otel-collector-config.dev.yaml:ro
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--config=/etc/otel-collector-config.dev.yaml"
    environment:
      OTEL_COLLECTOR_BATCH_TIMEOUT: "${OTEL_COLLECTOR_BATCH_TIMEOUT:-200ms}"
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - otlp2parquet
      - tempo

  prometheus:
    image: prom/prometheus:v2.51.2
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/var/tempo
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3100:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

  trino:
    environment:
      JAVA_TOOL_OPTIONS: "-Dotel.javaagent.enabled=false"

  trino-worker:
    environment:
      JAVA_TOOL_OPTIONS: "-Dotel.javaagent.enabled=false"

volumes:
  minio_data:
  prometheus_data:
  tempo_data:
  grafana_data:

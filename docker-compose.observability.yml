# Observability overlay — adds otel-collector, prometheus, otlp2parquet, tempo, grafana.
# Required for ops and metrics domains to be populated.
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.observability.yml up
services:
  otel-collector:
    volumes:
      - ./observability/otel-collector-config.dev.yaml:/etc/otel-collector-config.dev.yaml:ro
    command:
      - "--config=/etc/otel-collector-config.yaml"
      - "--config=/etc/otel-collector-config.dev.yaml"
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo

  prometheus:
    ports:
      - "9090:9090"

  otlp2parquet:
    ports:
      - "4319:4319"

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/var/tempo
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3100:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

volumes:
  tempo_data:
  grafana_data:

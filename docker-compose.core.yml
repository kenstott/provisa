# Core services only — postgres, redis, trino, zaychik. No observability, no demo.
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.dev-install.yml up
services:
  postgres:
    restart: unless-stopped
    image: postgres:16
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    environment:
      POSTGRES_DB: provisa
      POSTGRES_USER: provisa
      POSTGRES_PASSWORD: provisa
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provisa"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  pgbouncer:
    restart: unless-stopped
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: provisa
      POOL_MODE: transaction
      LISTEN_PORT: 6432
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  # A fresh provisa_exchange named volume is created root:root; Trino runs as
  # uid 1000 and cannot write FTE (retry-policy=TASK) exchange spooling files,
  # so every query fails with GENERIC_INTERNAL_ERROR. Chown the volume before
  # Trino starts so the mount is writable regardless of volume recreation.
  trino-exchange-init:
    image: busybox
    command: sh -c "mkdir -p /data/provisa/exchange && chown -R 1000:1000 /data/provisa/exchange"
    volumes:
      - provisa_exchange:/data/provisa/exchange
    restart: "no"

  trino:
    restart: unless-stopped
    image: trinodb/trino:481
    mem_limit: 8g
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/exchange-manager.properties:/etc/trino/exchange-manager.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/resource-groups.json:/etc/trino/resource-groups.json:ro
      - ./trino/etc/resource-groups.properties:/etc/trino/resource-groups.properties:ro
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/kafka:/etc/trino/kafka:ro
      - trino_cache:/data/trino/cache
      - provisa_exchange:/data/provisa/exchange
      - ./observability/trino-otel:/etc/trino/otel:ro
      - trino_logs:/var/log/trino
      - ./trino/plugins/trino-sharepoint:/usr/lib/trino/plugin/trino-sharepoint:ro
      - ./trino/plugins/trino-splunk:/usr/lib/trino/plugin/trino-splunk:ro
      - ./trino/plugins/trino-file:/usr/lib/trino/plugin/trino-file:ro
      - ./sharepoint.pfx:/certs/sharepoint.pfx:ro
      - ./demo/files:/data/files:ro
    environment:
      JAVA_TOOL_OPTIONS: "-Dotel.javaagent.enabled=false"
    depends_on:
      postgres:
        condition: service_healthy
      trino-exchange-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "trino --execute 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 42
      start_period: 120s

  trino-worker:
    restart: unless-stopped
    image: trinodb/trino:481
    entrypoint: ["/etc/trino/worker/entrypoint.sh"]
    volumes:
      - ./trino/etc/worker/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/exchange-manager.properties:/etc/trino/exchange-manager.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/worker/entrypoint.sh:/etc/trino/worker/entrypoint.sh:ro
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/kafka:/etc/trino/kafka:ro
      - trino_worker_cache:/data/trino/cache
      - provisa_exchange:/data/provisa/exchange
      - ./observability/trino-otel:/etc/trino/otel:ro
      - trino_worker_logs:/var/log/trino
      - ./trino/plugins/trino-sharepoint:/usr/lib/trino/plugin/trino-sharepoint:ro
      - ./trino/plugins/trino-splunk:/usr/lib/trino/plugin/trino-splunk:ro
      - ./trino/plugins/trino-file:/usr/lib/trino/plugin/trino-file:ro
      - ./sharepoint.pfx:/certs/sharepoint.pfx:ro
      - ./demo/files:/data/files:ro
    environment:
      JAVA_TOOL_OPTIONS: "-Dotel.javaagent.enabled=false"
    depends_on:
      trino:
        condition: service_healthy
      trino-exchange-init:
        condition: service_completed_successfully
    deploy:
      replicas: 0

  zaychik:
    restart: unless-stopped
    build: ./zaychik
    ports:
      - "8480:8480"
    environment:
      TF_TRINO_HOST: trino
      TF_TRINO_PORT: 8080
      TF_TRINO_SSL: "false"
      TF_FLIGHT_HOST: 0.0.0.0
      TF_FLIGHT_PORT: 8480
      TF_FLIGHT_SSL: "false"
      TF_FLIGHT_AUTH_TYPE: trino
      TF_FLIGHT_BATCH_SIZE: 10000
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8480' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
      start_interval: 2s

  stripe-mock:
    restart: unless-stopped
    image: stripe/stripe-mock:latest
    ports:
      - "12111:12111"

volumes:
  pg_data:
  redis_data:
  trino_cache:
  trino_worker_cache:
  provisa_exchange:
  trino_logs:
  trino_worker_logs:

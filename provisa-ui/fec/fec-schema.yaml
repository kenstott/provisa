# ============================================================================
# Federal Election Commission (FEC) Campaign Finance Schema
# ============================================================================
# Comprehensive campaign finance data from FEC bulk downloads:
#   - Candidates (cn): All federal candidates
#   - Committees (cm): All political committees (PACs, party, campaign)
#   - Candidate-Committee Linkages (ccl): Which committees support which candidates
#   - Individual Contributions (indiv): Itemized individual contributions
#   - Committee-to-Candidate (pas2): Contributions from committees to candidates
#   - Inter-Committee Transactions (oth): Transfers between committees
#   - Operating Expenditures (oppexp): Committee operating expenditures
#   - Independent Expenditures (independent_expenditure): IE spending
#   - Electioneering Communications (ElectioneeringComm): Broadcast ads
#   - Communication Costs (CommunicationCosts): Internal communications
#   - Candidate Summaries (candidate_summary): Aggregated financial totals
#   - Committee Summaries (committee_summary): Aggregated financial totals
#
# FEC Bulk Download Format:
#   - Core files: pipe-delimited (|), NO header rows, inside ZIP archives
#   - Summary/IE files: CSV with headers
#   - URL pattern: https://www.fec.gov/files/bulk-downloads/{YEAR}/{file}.zip
#   - Election cycles: even-numbered years (1980-2030)
#   - Header definitions: https://www.fec.gov/campaign-finance-data/
#
# Cross-Schema References:
#   - geo: state FIPS, congressional districts
#   - sec/ref: corporate PAC linkage via committee treasurer/connected org
# ============================================================================

schemaName: "${SCHEMA_NAME:fec}"
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  Federal Election Commission campaign finance data. Contains candidate and
  committee registrations, itemized contributions, expenditures, and inter-committee
  transfers. Covers all federal elections (President, Senate, House) with data
  from 1980 to present. Bulk downloads are pipe-delimited files with no headers.

# ============================================================================
# DIMENSION TEMPLATES
# ============================================================================
# FEC uses even-numbered election cycle years (not yearRange which generates
# consecutive years). Define as explicit YAML list for proper expansion.

dimension_templates:

  fec_election_cycles: &fec_election_cycles
    - "2010"
    - "2012"
    - "2014"
    - "2016"
    - "2018"
    - "2020"
    - "2022"
    - "2024"
    - "2026"

# ============================================================================
# BULK DOWNLOADS
# ============================================================================

bulkDownloads:

  # Candidates master file — all federal candidates
  fec_candidates:
    cachePattern: "fec/type=fec_bulk/year={year}/cn{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/cn{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Committees master file — all political committees
  fec_committees:
    cachePattern: "fec/type=fec_bulk/year={year}/cm{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/cm{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Candidate-Committee linkages
  fec_linkages:
    cachePattern: "fec/type=fec_bulk/year={year}/ccl{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/ccl{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Individual contributions (largest file, ~1-2GB per cycle)
  fec_individual:
    cachePattern: "fec/type=fec_bulk/year={year}/indiv{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/indiv{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Committee-to-candidate contributions
  fec_pas2:
    cachePattern: "fec/type=fec_bulk/year={year}/pas2{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/pas2{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Inter-committee transactions (other)
  fec_oth:
    cachePattern: "fec/type=fec_bulk/year={year}/oth{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/oth{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

  # Operating expenditures
  fec_oppexp:
    cachePattern: "fec/type=fec_bulk/year={year}/oppexp{yearSuffix}.zip"
    url: "https://www.fec.gov/files/bulk-downloads/{year}/oppexp{yearSuffix}.zip"
    dimensions:
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  # --- Candidate Columns ---

  candidate_id_column: &candidate_id_column
    name: candidate_id
    type: string
    nullable: false
    comment: FEC candidate ID (e.g., H0AL01234, S0AK00567, P80000722)
    source: CAND_ID

  candidate_name_column: &candidate_name_column
    name: candidate_name
    type: string
    nullable: true
    comment: Candidate name (LAST, FIRST MIDDLE)
    source: CAND_NAME

  candidate_party_column: &candidate_party_column
    name: party
    type: string
    nullable: true
    comment: Party affiliation (DEM, REP, LIB, GRN, IND, etc.)
    source: CAND_PTY_AFFILIATION

  candidate_office_column: &candidate_office_column
    name: office
    type: string
    nullable: true
    comment: Office sought (H=House, S=Senate, P=President)
    source: CAND_OFFICE

  candidate_state_column: &candidate_state_column
    name: state
    type: string
    nullable: true
    comment: Two-letter state abbreviation (US postal code)
    source: CAND_OFFICE_ST

  candidate_district_column: &candidate_district_column
    name: district
    type: string
    nullable: true
    comment: Congressional district number (00 for at-large/Senate/President)
    source: CAND_OFFICE_DISTRICT

  election_year_column: &election_year_column
    name: election_year
    type: integer
    nullable: true
    comment: Election year (even-numbered)
    source: CAND_ELECTION_YR

  # --- Committee Columns ---

  committee_id_column: &committee_id_column
    name: committee_id
    type: string
    nullable: false
    comment: FEC committee ID (e.g., C00000042)
    source: CMTE_ID

  committee_name_column: &committee_name_column
    name: committee_name
    type: string
    nullable: true
    comment: Committee name
    source: CMTE_NM

  committee_type_column: &committee_type_column
    name: committee_type
    type: string
    nullable: true
    comment: >
      Committee type code: H=House, S=Senate, P=Presidential, D=Delegate,
      U=Single-candidate independent, V=PAC with non-contribution account,
      W=PAC with non-contribution account (nonqualified), X=Party nonqualified,
      Y=Party qualified, Z=National party nonfederal, N=PAC nonqualified,
      Q=PAC qualified, I=Independent expenditure filer (person), C=Communication cost filer,
      E=Independent expenditure filer (not a committee), O=Super PAC
    source: CMTE_TP

  # --- Transaction Columns ---

  transaction_date_column: &transaction_date_column
    name: transaction_date
    type: string
    nullable: true
    comment: Transaction date (MMDDYYYY format in source)
    source: TRANSACTION_DT

  amount_column: &amount_column
    name: amount
    type: double
    nullable: true
    comment: Transaction amount in USD (negative for refunds)
    source: TRANSACTION_AMT

  # --- Filing Columns ---

  fec_election_year_column: &fec_election_year_column
    name: fec_election_year
    type: integer
    nullable: true
    comment: FEC election year for this record
    source: FEC_ELECTION_YR

  filing_id_column: &filing_id_column
    name: filing_id
    type: long
    nullable: true
    comment: FEC filing ID number
    source: FILE_NUM

  amendment_indicator_column: &amendment_indicator_column
    name: amendment_indicator
    type: string
    nullable: true
    comment: Amendment indicator (N=new, A=amendment, T=termination)
    source: AMNDT_IND

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ==========================================================================
  # CANDIDATES — Federal candidate registrations
  # ==========================================================================
  - name: candidates
    pattern: "type=candidates/year={year}/candidates.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER

    comment: >
      All federal candidates registered with the FEC. Includes candidate ID,
      name, party, office sought, state, district, incumbent/challenger status,
      and principal campaign committee. One record per candidate per election cycle.
      Source: cn{YY}.zip bulk download (pipe-delimited, no header).

    columns:
      - *candidate_id_column
      - *candidate_name_column
      - name: party
        type: string
        nullable: true
        comment: Party affiliation code (DEM, REP, LIB, GRN, IND, etc.)
        source: CAND_PTY_AFFILIATION
      - *candidate_office_column
      - *candidate_state_column
      - *candidate_district_column
      - name: incumbent_challenger
        type: string
        nullable: true
        comment: Incumbent/challenger/open status (I, C, O)
        source: CAND_ICI
      - name: candidate_status
        type: string
        nullable: true
        comment: Candidate status (C=statutory candidate, F=statutory candidate for future, N=not yet, P=statutory candidate in prior)
        source: CAND_STATUS
      - name: principal_committee_id
        type: string
        nullable: true
        comment: Principal campaign committee ID
        source: CAND_PCC
      - name: street1
        type: string
        nullable: true
        comment: Mailing address street line 1
        source: CAND_ST1
      - name: street2
        type: string
        nullable: true
        comment: Mailing address street line 2
        source: CAND_ST2
      - name: city
        type: string
        nullable: true
        comment: Mailing address city
        source: CAND_CITY
      - name: state_address
        type: string
        nullable: true
        comment: Mailing address state
        source: CAND_ST
      - name: zip
        type: string
        nullable: true
        comment: Mailing address ZIP code
        source: CAND_ZIP
      - *election_year_column

    download:
      bulkDownload: fec_candidates

    source:
      type: http
      url: "https://www.fec.gov/files/bulk-downloads/{year}/cn{yearSuffix}.zip"
      method: GET
      extractPattern: "*.txt"
      response:
        format: csv
        delimiter: "|"
        hasHeader: false
        columnNames: "CAND_ID|CAND_NAME|CAND_PTY_AFFILIATION|CAND_ELECTION_YR|CAND_OFFICE_ST|CAND_OFFICE|CAND_OFFICE_DISTRICT|CAND_ICI|CAND_STATUS|CAND_PCC|CAND_ST1|CAND_ST2|CAND_CITY|CAND_ST|CAND_ZIP"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - candidates
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        overwritePartitions: true
        incrementalTtlDays: 30
        batchPartitionColumns: [type, year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # COMMITTEES — Political committee registrations
  # ==========================================================================
  - name: committees
    pattern: "type=committees/year={year}/committees.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER

    comment: >
      All political committees registered with the FEC. Includes PACs, party
      committees, campaign committees, and Super PACs. Contains committee type,
      designation, connected organization, treasurer, and filing frequency.
      Source: cm{YY}.zip bulk download (pipe-delimited, no header).

    columns:
      - *committee_id_column
      - *committee_name_column
      - name: treasurer_name
        type: string
        nullable: true
        comment: Committee treasurer name
        source: TRES_NM
      - name: street1
        type: string
        nullable: true
        comment: Committee street address line 1
        source: CMTE_ST1
      - name: street2
        type: string
        nullable: true
        comment: Committee street address line 2
        source: CMTE_ST2
      - name: city
        type: string
        nullable: true
        comment: Committee city
        source: CMTE_CITY
      - name: state
        type: string
        nullable: true
        comment: Committee state (two-letter postal)
        source: CMTE_ST
      - name: zip
        type: string
        nullable: true
        comment: Committee ZIP code
        source: CMTE_ZIP
      - name: designation
        type: string
        nullable: true
        comment: >
          Committee designation: A=Authorized by candidate, B=Lobbyist/Registrant PAC,
          D=Leadership PAC, J=Joint fundraiser, P=Principal campaign committee,
          U=Unauthorized
        source: CMTE_DSGN
      - *committee_type_column
      - name: connected_org_name
        type: string
        nullable: true
        comment: Connected organization name (for corporate/labor/trade PACs)
        source: CONNECTED_ORG_NM
      - name: candidate_id
        type: string
        nullable: true
        comment: Candidate ID (for authorized committees)
        source: CAND_ID
      - name: filing_frequency
        type: string
        nullable: true
        comment: Filing frequency (A=administratively terminated, D=debt, M=monthly, Q=quarterly, T=terminated, W=waived)
        source: CMTE_FILING_FREQ
      - name: org_type
        type: string
        nullable: true
        comment: Interest group category (C=corporation, L=labor, M=membership, T=trade, V=cooperative, W=corp without capital stock)
        source: ORG_TP
      - name: party
        type: string
        nullable: true
        comment: Party affiliation
        source: CMTE_PTY_AFFILIATION

    download:
      bulkDownload: fec_committees

    source:
      type: http
      url: "https://www.fec.gov/files/bulk-downloads/{year}/cm{yearSuffix}.zip"
      method: GET
      extractPattern: "*.txt"
      response:
        format: csv
        delimiter: "|"
        hasHeader: false
        columnNames: "CMTE_ID|CMTE_NM|TRES_NM|CMTE_ST1|CMTE_ST2|CMTE_CITY|CMTE_ST|CMTE_ZIP|CMTE_DSGN|CMTE_TP|CMTE_PTY_AFFILIATION|CMTE_FILING_FREQ|ORG_TP|CONNECTED_ORG_NM|CAND_ID"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - committees
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        overwritePartitions: true
        incrementalTtlDays: 30
        batchPartitionColumns: [type, year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # CANDIDATE-COMMITTEE LINKAGES — Which committees support which candidates
  # ==========================================================================
  - name: candidate_committee_linkages
    pattern: "type=candidate_committee_linkages/year={year}/linkages.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER

    comment: >
      Links between candidates and their authorized committees. Shows which
      committees are authorized by which candidates, including the linkage type
      and election year context. Source: ccl{YY}.zip (pipe-delimited, no header).

    columns:
      - *candidate_id_column
      - *election_year_column
      - *fec_election_year_column
      - *committee_id_column
      - *committee_type_column
      - name: committee_designation
        type: string
        nullable: true
        comment: Committee designation (A=authorized, P=principal)
        source: CMTE_DSGN
      - name: linkage_id
        type: long
        nullable: true
        comment: Unique linkage identifier
        source: LINKAGE_ID

    download:
      bulkDownload: fec_linkages

    source:
      type: http
      url: "https://www.fec.gov/files/bulk-downloads/{year}/ccl{yearSuffix}.zip"
      method: GET
      extractPattern: "*.txt"
      response:
        format: csv
        delimiter: "|"
        hasHeader: false
        columnNames: "CAND_ID|CAND_ELECTION_YR|FEC_ELECTION_YR|CMTE_ID|CMTE_TP|CMTE_DSGN|LINKAGE_ID"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - candidate_committee_linkages
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        overwritePartitions: true
        incrementalTtlDays: 30
        batchPartitionColumns: [type, year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # INDIVIDUAL CONTRIBUTIONS — Itemized individual contributions (>$200)
  # ==========================================================================
  - name: individual_contributions
    pattern: "type=individual_contributions/year={year}/contributions.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER

    comment: >
      Itemized individual contributions to federal committees exceeding $200 in
      an election cycle. Largest FEC dataset (~4-5GB per cycle, 20M+ records).
      Contains donor name, employer, occupation, amount, date, and memo text.
      Memo text is vectorized for inferred relationship discovery.
      Source: indiv{YY}.zip (pipe-delimited, no header).

    columns:
      - *committee_id_column
      - *amendment_indicator_column
      - name: report_type
        type: string
        nullable: true
        comment: Report type (e.g., 12G=pre-general, 12P=pre-primary, 30G=post-general, Q1-Q3=quarterly, YE=year-end)
        source: RPT_TP
      - name: transaction_pgi
        type: string
        nullable: true
        comment: Primary/general indicator (P=primary, G=general)
        source: TRANSACTION_PGI
      - name: image_num
        type: string
        nullable: true
        comment: Microfilm image number
        source: IMAGE_NUM
      - name: transaction_type
        type: string
        nullable: true
        comment: Transaction type code (15=contribution, 15E=earmarked, 22Y=refund)
        source: TRANSACTION_TP
      - name: entity_type
        type: string
        nullable: true
        comment: Entity type (IND=individual, COM=committee, ORG=organization, PAC=PAC, CAN=candidate)
        source: ENTITY_TP
      - name: contributor_name
        type: string
        nullable: true
        comment: Contributor name (LAST, FIRST MIDDLE)
        source: NAME
      - name: city
        type: string
        nullable: true
        comment: Contributor city
        source: CITY
      - name: state
        type: string
        nullable: true
        comment: Contributor state (two-letter postal)
        source: STATE
      - name: zip_code
        type: string
        nullable: true
        comment: Contributor ZIP code
        source: ZIP_CODE
      - name: employer
        type: string
        nullable: true
        comment: Contributor employer name
        source: EMPLOYER
      - name: occupation
        type: string
        nullable: true
        comment: Contributor occupation
        source: OCCUPATION
      - *transaction_date_column
      - *amount_column
      - name: other_id
        type: string
        nullable: true
        comment: Other committee ID (for transfers/earmarks)
        source: OTHER_ID
      - name: transaction_id
        type: string
        nullable: true
        comment: Transaction ID assigned by filer
        source: TRAN_ID
      - *filing_id_column
      - name: memo_cd
        type: string
        nullable: true
        comment: Memo code (X=memo item, not counted in totals)
        source: MEMO_CD
      - name: memo_text
        type: string
        nullable: true
        comment: Memo text (earmark info, conduit, purpose descriptions)
        source: MEMO_TEXT
      - name: sub_id
        type: long
        nullable: true
        comment: FEC unique record identifier
        source: SUB_ID

    download:
      bulkDownload: fec_individual

    source:
      type: http
      url: "https://www.fec.gov/files/bulk-downloads/{year}/indiv{yearSuffix}.zip"
      method: GET
      extractPattern: "*.txt"
      response:
        format: csv
        delimiter: "|"
        hasHeader: false
        columnNames: "CMTE_ID|AMNDT_IND|RPT_TP|TRANSACTION_PGI|IMAGE_NUM|TRANSACTION_TP|ENTITY_TP|NAME|CITY|STATE|ZIP_CODE|EMPLOYER|OCCUPATION|TRANSACTION_DT|TRANSACTION_AMT|OTHER_ID|TRAN_ID|FILE_NUM|MEMO_CD|MEMO_TEXT|SUB_ID"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - individual_contributions
      year:
        values: *fec_election_cycles
        minYear: "${GOVDATA_START_YEAR}"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 100000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        overwritePartitions: true
        incrementalTtlDays: 30
        batchPartitionColumns: [type, year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 2000

    vectorize:
      enabled: true
      columns:
        - name: memo_text
          comment: >
            Contribution memo text containing earmark designations, conduit info,
            and purpose descriptions. Useful for discovering indirect corporate
            influence, bundling patterns, and organizational affiliations.

  # ==========================================================================
  # COMMITTEE-TO-CANDIDATE CONTRIBUTIONS — PAC/party contributions to candidates
  # ==========================================================================
  - name: committee_contributions
    pattern: "type=committee_contributions/year={year}/contributions.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER

    comment: >
      Contributions from committees (PACs, party committees) to candidates.
      Shows direct committee-to-candidate financial support including amount,
      date, and purpose. Source: pas2{YY}.zip (pipe-delimited, no header).

    columns:
      - *committee_id_column
      - *amendment_indicator_column
      - name: report_type
        type: string
        nullable: true
        comment: Report type
        source: RPT_TP
      - name: transaction_pgi
        type: string
        nullable: true
        comment: Primary/general indicator
        source: TRANSACTION_PGI
      - name: image_num
        type: string
        nullable: true
        comment: Microfilm image number
        source: IMAGE_NUM
      - name: transaction_type
        type: string
        nullable: true
        comment: Transaction type code (24A=independent against, 24C=coordinated, 24E=independent for, 24F=comm cost for, 24K=direct contribution)
        source: TRANSACTION_TP
      - name: entity_type
        type: string
        nullable: true
        comment: Entity type
        source: ENTITY_TP
      - name: contributor_name
        type: string
        nullable: true
        comment: Contributing committee/entity name
        source: NAME
      - name: city
        type: string
        nullable: true
        comment: Contributor city
        source: CITY
      - name: state
        type: string
        nullable: true
        comment: Contributor state
        source: STATE
      - name: zip_code
        type: string
        nullable: true
        comment: Contributor ZIP code
        source: ZIP_CODE
      - name: employer
        type: string
        nullable: true
        comment: Employer (if applicable)
        source: EMPLOYER
      - name: occupation
        type: string
        nullable: true
        comment: Occupation (if applicable)
        source: OCCUPATION
      - *transaction_date_column
      - *amount_column
      - name: other_id
        type: string

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  candidates:
    primaryKey: [type, year, candidate_id]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]
        comment: Links candidate state to geographic state data
      - columns: [state, district]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: congressional_districts
        targetColumns: [state_abbreviation, district_number]
        comment: Links House candidates to congressional district geography

  committees:
    primaryKey: [type, year, committee_id]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]
        comment: Links committee state to geographic state data
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
        comment: Links authorized committees to their candidate

  candidate_committee_linkages:
    primaryKey: [type, year, linkage_id]
    foreignKeys:
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
        comment: Links to candidate registration
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links to committee registration

  individual_contributions:
    primaryKey: [type, year, sub_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links contribution to receiving committee
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]
        comment: Links contributor state to geographic data

  committee_contributions:
    primaryKey: [type, year, sub_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links to contributing committee
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
        comment: Links to recipient candidate
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]
        comment: Links contributor state to geographic data

  intercommittee_transactions:
    primaryKey: [type, year, sub_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links to originating committee
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  operating_expenditures:
    primaryKey: [type, year, sub_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links expenditure to spending committee
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  independent_expenditures:
    primaryKey: [type, year, filing_id, transaction_id]
    foreignKeys:
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
        comment: Links IE to targeted candidate
      - columns: [spender_id]
        targetTable: committees
        targetColumns: [committee_id]
        comment: Links IE to spending committee
      - columns: [candidate_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  electioneering_communications:
    primaryKey: [type, year, committee_id, candidate_id, communication_date]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
      - columns: [candidate_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  communication_costs:
    primaryKey: [type, year, filing_id, candidate_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
      - columns: [candidate_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  candidate_summaries:
    primaryKey: [type, year, candidate_id]
    foreignKeys:
      - columns: [candidate_id]
        targetTable: candidates
        targetColumns: [candidate_id]
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

  committee_summaries:
    primaryKey: [type, year, committee_id]
    foreignKeys:
      - columns: [committee_id]
        targetTable: committees
        targetColumns: [committee_id]
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbreviation]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: candidate_district_profile
    comment: >
      Enriches FEC candidates with geographic state and congressional district data.
      House candidates (office=H) are matched to their TIGER district boundary via
      state_fips + zero-padded district number. Senate/presidential rows get state
      geography only (no CD match).
    sql: >
      SELECT
        c.candidate_id,
        c.candidate_name,
        c.office,
        c.state,
        c.district,
        c.party,
        c.incumbent_challenger,
        c.year,
        gs.state_name,
        gs.state_fips,
        cd.cd_fips,
        cd.cd_name
      FROM candidates c
      LEFT JOIN "geo"."states" gs ON c.state = gs.state_abbr
      LEFT JOIN "geo"."congressional_districts" cd
        ON c.office = 'H'
        AND gs.state_fips = cd.state_fips
        AND cd.cd_fips = CONCAT(gs.state_fips, LPAD(c.district, 2, '0'))

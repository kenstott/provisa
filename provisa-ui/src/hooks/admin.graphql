# Reusable fragments

fragment MutationResult on MutationResult {
  success
  message
}

fragment ColumnFields on TableColumnType {
  id
  columnName
  visibleTo
  writableBy
  unmaskedTo
  maskType
  maskPattern
  maskReplace
  maskValue
  maskPrecision
  alias
  computedSqlAlias
  description
  nativeFilterType
  isPrimaryKey
  isForeignKey
  isAlternateKey
  scope
}

fragment ColumnPresetFields on ColumnPresetType {
  column
  source
  name
  value
  dataType
}

# Queries

query RolesQuery {
  roles {
    id
    capabilities
    domainAccess
  }
}

query SourcesQuery {
  sources {
    id
    type
    host
    port
    database
    username
    dialect
    cacheEnabled
    cacheTtl
    preferMaterialized
    loadProtected
    offPeakWindow
    offPeakTz
    gqlNamingConvention
    allowedDomains
    description
    mappingJson
    changeSignal
    cdc {
      bootstrapServers
      topicPrefix
      schemaRegistryUrl
      consumerGroupId
    }
  }
}

query DomainsQuery {
  domains {
    id
    description
    graphqlAlias
  }
}

query TablesQuery {
  tables {
    id
    sourceId
    domainId
    schemaName
    tableName
    alias
    description
    cacheTtl
    preferMaterialized
    loadProtected
    offPeakWindow
    offPeakTz
    refreshPolicySummary {
      text
      serving
      warning
    }
    gqlNamingConvention
    watermarkColumn
    changeSignal
    probeQuery
    probeType
    apiEndpoint
    viewSql
    materialize
    mvRefreshInterval
    mvDebounceQuiet
    mvDebounceMaxDelay
    mvConsistency
    mvPreprocess
    mvBitemporalMode
    mvBitemporalKey
    mvPersist
    mvPrimaryKey
    mvIncremental
    mvCalendar
    mvGrain
    mvAllowedLateness
    mvExpectedEvents
    mvBusinessDayGrain
    dataProduct
    enableAggregates
    enableGroupBy
    canDeployToDb
    live {
      queryId
      watermarkColumn
      pollInterval
      strategy
      kafka {
        topic
        format
        keyColumn
      }
      outputs {
        type
        topic
        keyColumn
        bootstrapServers
      }
    }
    columns {
      ...ColumnFields
    }
    columnPresets {
      ...ColumnPresetFields
    }
    uniqueConstraints {
      name
      columns
    }
  }
}

# REQ-1143: preview the effective refresh/serving summary for draft (unsaved) editor knobs.
query RefreshPolicyPreview(
  $sourceId: String!
  $domainId: String!
  $schemaName: String!
  $tableName: String!
  $cacheTtl: Int
  $preferMaterialized: Boolean
  $loadProtected: Boolean
  $offPeakWindow: String
  $offPeakTz: String
  $changeSignal: String
) {
  refreshPolicyPreview(
    sourceId: $sourceId
    domainId: $domainId
    schemaName: $schemaName
    tableName: $tableName
    cacheTtl: $cacheTtl
    preferMaterialized: $preferMaterialized
    loadProtected: $loadProtected
    offPeakWindow: $offPeakWindow
    offPeakTz: $offPeakTz
    changeSignal: $changeSignal
  ) {
    text
    serving
    warning
  }
}


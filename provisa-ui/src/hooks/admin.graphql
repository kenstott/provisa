# Reusable fragments

fragment MutationResult on MutationResult {
  success
  message
}

fragment ColumnFields on TableColumnType {
  id
  columnName
  visibleTo
  writableBy
  unmaskedTo
  maskType
  maskPattern
  maskReplace
  maskValue
  maskPrecision
  alias
  computedSqlAlias
  description
  nativeFilterType
  isPrimaryKey
  isForeignKey
  isAlternateKey
  scope
}

fragment ColumnPresetFields on ColumnPresetType {
  column
  source
  name
  value
  dataType
}

# Queries

query RolesQuery {
  roles {
    id
    capabilities
    domainAccess
  }
}

query SourcesQuery {
  sources {
    id
    type
    host
    port
    database
    username
    dialect
    cacheEnabled
    cacheTtl
    preferMaterialized
    gqlNamingConvention
    allowedDomains
    description
    mappingJson
    cdc {
      bootstrapServers
      topicPrefix
      schemaRegistryUrl
      consumerGroupId
    }
  }
}

query DomainsQuery {
  domains {
    id
    description
    graphqlAlias
  }
}

query TablesQuery {
  tables {
    id
    sourceId
    domainId
    schemaName
    tableName
    alias
    description
    cacheTtl
    preferMaterialized
    gqlNamingConvention
    watermarkColumn
    changeSignal
    probeQuery
    apiEndpoint
    viewSql
    materialize
    mvRefreshInterval
    dataProduct
    enableAggregates
    enableGroupBy
    canDeployToDb
    live {
      queryId
      watermarkColumn
      pollInterval
      strategy
      kafka {
        topic
        format
        keyColumn
      }
      outputs {
        type
        topic
        keyColumn
        bootstrapServers
      }
    }
    columns {
      ...ColumnFields
    }
    columnPresets {
      ...ColumnPresetFields
    }
  }
}

query RelationshipsQuery {
  relationships {
    id
    sourceTableId
    targetTableId
    sourceTableName
    sourceDomainId
    targetTableName
    sourceColumn
    targetColumn
    cardinality
    materialize
    refreshInterval
    targetFunctionName
    functionArg
    alias
    graphqlAlias
    computedCypherAlias
    autoSuggested
    disableCypher
  }
}

query AllRelationshipsQuery {
  allRelationships {
    id
    sourceTableId
    targetTableId
    sourceTableName
    sourceDomainId
    targetTableName
    sourceColumn
    targetColumn
    cardinality
    materialize
    refreshInterval
    targetFunctionName
    functionArg
    alias
    graphqlAlias
    computedCypherAlias
    autoSuggested
    disableCypher
  }
}

query RLSRulesQuery {
  rlsRules {
    id
    tableId
    domainId
    roleId
    filterExpr
  }
}

query AvailableSchemas($sourceId: String!) {
  availableSchemas(sourceId: $sourceId)
}

query AvailableTables($sourceId: String!, $schemaName: String!) {
  availableTables(sourceId: $sourceId, schemaName: $schemaName) {
    name
    comment
  }
}

query AvailableColumns($sourceId: String!, $schemaName: String!, $tableName: String!) {
  availableColumns(sourceId: $sourceId, schemaName: $schemaName, tableName: $tableName)
}

query AvailableColumnsMetadata($sourceId: String!, $schemaName: String!, $tableName: String!) {
  availableColumnsMetadata(sourceId: $sourceId, schemaName: $schemaName, tableName: $tableName) {
    name
    dataType
    comment
    nativeFilterType
    isPrimaryKey
  }
}

query AvailableFunctions($sourceId: String!, $schemaName: String!) {
  availableFunctions(sourceId: $sourceId, schemaName: $schemaName) {
    name
    comment
  }
}

query GenerateColumnDescription($tableId: String!, $columnName: String!) {
  generateColumnDescription(tableId: $tableId, columnName: $columnName)
}

query GenerateTableDescription($tableId: String!) {
  generateTableDescription(tableId: $tableId)
}

query SuggestTableAlias($tableName: String!, $domainId: String!, $sourceId: String!) {
  suggestTableAlias(tableName: $tableName, domainId: $domainId, sourceId: $sourceId)
}

mutation CompileQuery($input: CompileQueryInput!) {
  compileQuery(input: $input) {
    sql
    semanticSql
    engineSql
    directSql
    route
    routeReason
    sources
    rootField
    canonicalField
    compiledCypher
    cypherError
    optimizations
    warnings
    columnAliases {
      fieldName
      column
    }
    enforcement {
      rlsFiltersApplied
      columnsExcluded
      schemaScope
      maskingApplied
      ceilingApplied
      route
    }
  }
}

query MVList {
  mvList {
    id
    sourceTables
    targetTable
    refreshInterval
    enabled
    status
    lastRefreshAt
    rowCount
    lastError
  }
}

query CacheStats {
  cacheStats {
    totalKeys
    hitCount
    missCount
    storeType
  }
}

query SystemHealth {
  systemHealth {
    engineConnected
    engineWorkerCount
    engineActiveWorkers
    metadataPoolSize
    metadataPoolFree
    metadataDialect
    cacheMode
    cacheConnected
    protocols {
      name
      status
      port
    }
    mvRefreshLoopRunning
  }
}

query ScheduledTasks {
  scheduledTasks {
    id
    name
    cronExpression
    webhookUrl
    enabled
    lastRunAt
    nextRunAt
  }
}

# Mutations

mutation CreateDomain($id: String!, $description: String!, $graphqlAlias: String) {
  createDomain(input: { id: $id, description: $description, graphqlAlias: $graphqlAlias }) {
    ...MutationResult
  }
}

mutation DeleteDomain($id: String!) {
  deleteDomain(id: $id) {
    ...MutationResult
  }
}

mutation RegisterTable($input: TableInput!) {
  registerTable(input: $input) {
    ...MutationResult
  }
}

mutation UpdateTable($input: TableInput!) {
  updateTable(input: $input) {
    ...MutationResult
  }
}

mutation DeleteTable($id: Int!) {
  deleteTable(id: $id) {
    ...MutationResult
  }
}


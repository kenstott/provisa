}

mutation CompileQuery($input: CompileQueryInput!) {
  compileQuery(input: $input) {
    sql
    semanticSql
    engineSql
    directSql
    route
    routeReason
    sources
    rootField
    canonicalField
    compiledCypher
    cypherError
    optimizations
    warnings
    columnAliases {
      fieldName
      column
    }
    enforcement {
      rlsFiltersApplied
      columnsExcluded
      schemaScope
      maskingApplied
      ceilingApplied
      route
    }
  }
}


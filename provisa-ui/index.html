<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1F2933" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Provisa</title>
    <script>
      // Set the Mantine color-scheme attribute before first paint to avoid a
      // light/dark flash (REQ-1011). Mirrors @mantine/core's ColorSchemeScript
      // for this non-SSR Vite app. Key + default must match MantineProvider.
      (function () {
        try {
          var stored = localStorage.getItem("provisa-color-scheme");
          document.documentElement.setAttribute(
            "data-mantine-color-scheme",
            stored === "light" || stored === "dark" ? stored : "dark",
          );
        } catch (e) {
          document.documentElement.setAttribute("data-mantine-color-scheme", "dark");
        }
      })();
    </script>
    <style>
      /* Convergence flow-field splash — painted on first paint, before the JS bundle
         loads, and faded out when the React app signals ready (window.__provisaHideSplash).
         Federated streams flow inward and ignite emerald as they resolve into the mark. */
      #provisa-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(120% 120% at 50% 45%, #16213f 0%, #0f1117 55%, #0b0d13 100%);
        opacity: 1;
        transition: opacity 350ms ease;
      }
      #provisa-splash.provisa-splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      #provisa-splash-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .provisa-splash-mark {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: provisa-splash-rise 700ms ease both;
      }
      .provisa-splash-mark svg {
        filter: drop-shadow(0 0 22px rgba(16, 185, 129, 0.35));
      }
      .provisa-splash-word {
        font: 600 15px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        color: #e1e4ed;
        opacity: 0.9;
      }
      @keyframes provisa-splash-rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .provisa-splash-mark {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="provisa-splash" role="presentation">
      <canvas id="provisa-splash-canvas"></canvas>
      <div class="provisa-splash-mark">
        <svg viewBox="0 0 100 100" width="76" height="76" role="img" aria-label="Provisa">
          <g fill="#e1e4ed">
            <rect x="30" y="18" width="15" height="64" rx="7" />
            <circle cx="52" cy="35" r="22" />
          </g>
          <circle cx="52" cy="34" r="10.5" fill="#0f1117" />
          <circle cx="52" cy="34" r="4.5" fill="#10B981" />
        </svg>
        <div class="provisa-splash-word">PROVISA</div>
      </div>
    </div>
    <script>
      // Vanilla, runs during parse (before the deferred module) so the field animates immediately.
      (function () {
        var splash = document.getElementById("provisa-splash");
        if (!splash) return;
        var start = Date.now();
        var MIN_MS = 450; // avoid a jarring blink on very fast (native-tier) loads
        var reduce =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        var canvas = document.getElementById("provisa-splash-canvas");
        var raf = 0;
        var running = !reduce && !!(canvas && canvas.getContext);

        if (running) {
          var ctx = canvas.getContext("2d");
          var dpr = Math.min(window.devicePixelRatio || 1, 2);
          var W = 0,
            H = 0,
            cx = 0,
            cy = 0,
            spawnR = 0,
            coreR = 0;

          function resize() {
            W = canvas.clientWidth;
            H = canvas.clientHeight;
            canvas.width = W * dpr;
            canvas.height = H * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            cx = W / 2;
            cy = H * 0.45;
            spawnR = Math.max(W, H) * 0.72;
            coreR = Math.max(56, Math.min(W, H) * 0.13);
            ctx.fillStyle = "#0f1117";
            ctx.fillRect(0, 0, W, H);
          }
          window.addEventListener("resize", resize);
          resize();

          var N = Math.max(140, Math.min(320, Math.round((W * H) / 5200)));
          var P = [];
          function spawn(p) {
            var a = Math.random() * Math.PI * 2;
            var r = spawnR * (0.7 + Math.random() * 0.5);
            p.x = cx + Math.cos(a) * r;
            p.y = cy + Math.sin(a) * r * 0.82;
            p.px = p.x;
            p.py = p.y;
            p.spd = 0.6 + Math.random() * 1.1;
            p.life = 0;
          }
          for (var i = 0; i < N; i++) {
            var seed = {};
            spawn(seed);
            P.push(seed);
          }

          function frame() {
            // Fade the prior frame → flowing streaks. Low alpha = long-lived rivers.
            ctx.fillStyle = "rgba(15,17,23,0.085)";
            ctx.fillRect(0, 0, W, H);

            for (var i = 0; i < P.length; i++) {
              var p = P[i];
              var dx = cx - p.x,
                dy = cy - p.y;
              var d = Math.sqrt(dx * dx + dy * dy) || 1;
              // Inward pull + curl (cheap flow field) → curved converging streams.
              var curl = Math.sin(p.x * 0.012 + p.y * 0.01) * 0.9;
              var ang = Math.atan2(dy, dx) + curl * (d / spawnR);
              var v = p.spd * (0.6 + (1 - d / spawnR) * 2.2);
              p.px = p.x;
              p.py = p.y;
              p.x += Math.cos(ang) * v;
              p.y += Math.sin(ang) * v;
              p.life++;

              // Colour: indigo far → emerald as it nears the core.
              var t = Math.max(0, Math.min(1, 1 - d / (spawnR * 0.55)));
              var rr = Math.round(99 + (16 - 99) * t);
              var gg = Math.round(102 + (185 - 102) * t);
              var bb = Math.round(241 + (129 - 241) * t);
              var alpha = 0.22 + t * 0.6;
              ctx.strokeStyle = "rgba(" + rr + "," + gg + "," + bb + "," + alpha + ")";
              ctx.lineWidth = 0.9 + t * 1.6;
              ctx.beginPath();
              ctx.moveTo(p.px, p.py);
              ctx.lineTo(p.x, p.y);
              ctx.stroke();

              if (d < coreR || p.life > 900) spawn(p);
            }

            // Tight emerald core ignition, gently breathing.
            var pulse = 0.55 + 0.45 * Math.sin(Date.now() * 0.002);
            var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 1.3);
            g.addColorStop(0, "rgba(16,185,129," + 0.16 * pulse + ")");
            g.addColorStop(0.5, "rgba(52,120,180," + 0.06 * pulse + ")");
            g.addColorStop(1, "rgba(16,185,129,0)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, coreR * 1.3, 0, Math.PI * 2);
            ctx.fill();

            raf = requestAnimationFrame(frame);
          }
          raf = requestAnimationFrame(frame);
        }

        function hide() {
          var wait = Math.max(0, MIN_MS - (Date.now() - start));
          setTimeout(function () {
            splash.classList.add("provisa-splash-hide");
            setTimeout(function () {
              if (raf) cancelAnimationFrame(raf);
              if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
            }, 380);
          }, wait);
        }
        window.__provisaHideSplash = hide;
        // Safety net: never trap the user behind the veil if the app never signals.
        setTimeout(hide, 8000);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

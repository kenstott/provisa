type Query {
  schemaVersion: String!
  sources: [SourceType!]!
  source(id: String!): SourceType
  domains: [DomainType!]!
  tables: [RegisteredTableType!]!
  relationships: [RelationshipType!]!
  roles: [RoleType!]!
  rlsRules: [RLSRuleType!]!
  availableSchemas(sourceId: String!): [String!]!
  availableTables(sourceId: String!, schemaName: String! = "public"): [AvailableTableType!]!
  availableFunctions(sourceId: String!, schemaName: String! = "openapi"): [AvailableTableType!]!
  availableColumns(sourceId: String!, schemaName: String!, tableName: String!): [String!]!
  availableColumnsMetadata(sourceId: String!, schemaName: String!, tableName: String!): [AvailableColumnType!]!
  mvList: [MVType!]!
  cacheStats: CacheStatsType!
  cacheTableStats: [CacheTableStatType!]!
  hotTables: [HotTableStatType!]!
  materializeStoreInfo: MaterializeStoreInfoType!
  systemHealth: SystemHealthType!
  scheduledTasks: [ScheduledTaskType!]!
  generateTableDescription(tableId: String!): String!
  generateColumnDescription(tableId: String!, columnName: String!): String!
}

type SourceType {
  id: String!
  type: String!
  host: String!
  port: Int!
  database: String!
  username: String!
  dialect: String!
  cacheEnabled: Boolean!
  cacheTtl: Int
  preferMaterialized: Boolean!
  namingConvention: String
  path: String
  allowedDomains: [String!]!
  description: String!
  mappingJson: String!
}

type DomainType {
  id: String!
  description: String!
  graphqlAlias: String
}

type RegisteredTableType {
  id: Int!
  sourceId: String!
  domainId: String!
  schemaName: String!
  tableName: String!
  governance: String!
  alias: String
  description: String
  cacheTtl: Int
  preferMaterialized: Boolean
  namingConvention: String
  watermarkColumn: String
  columns: [TableColumnType!]!
  columnPresets: [ColumnPresetType!]!
  apiEndpoint: String
  viewSql: String
  dataProduct: Boolean!
}

type TableColumnType {
  id: Int!
  columnName: String!
  visibleTo: [String!]!
  writableBy: [String!]!
  unmaskedTo: [String!]!
  maskType: String
  maskPattern: String
  maskReplace: String
  maskValue: String
  maskPrecision: String
  alias: String
  description: String
  dataType: String
  nativeFilterType: String
  isPrimaryKey: Boolean!
  isForeignKey: Boolean!
  isAlternateKey: Boolean!
  scope: String!
}

type ColumnPresetType {
  column: String!
  source: String!
  name: String
  value: String
  dataType: String
}

type RelationshipType {
  id: String!
  sourceTableId: Int!
  targetTableId: Int
  sourceTableName: String!
  targetTableName: String!
  sourceColumn: String!
  targetColumn: String
  cardinality: String!
  materialize: Boolean!
  refreshInterval: Int!
  targetFunctionName: String
  functionArg: String
  alias: String
  graphqlAlias: String
  computedCypherAlias: String
  disableCypher: Boolean!
  autoSuggested: Boolean!
}

type RoleType {
  id: String!
  capabilities: [String!]!
  domainAccess: [String!]!
}

type RLSRuleType {
  id: Int!
  tableId: Int
  domainId: String
  roleId: String!
  filterExpr: String!
}

type AvailableTableType {
  name: String!
  comment: String
}

type AvailableColumnType {
  name: String!
  dataType: String!
  comment: String
  nativeFilterType: String
  isPrimaryKey: Boolean!
}

type MVType {
  id: String!
  sourceTables: [String!]!
  targetTable: String!
  refreshInterval: Int!
  enabled: Boolean!
  status: String!
  lastRefreshAt: Float
  rowCount: Int
  lastError: String
}

type CacheStatsType {
  totalKeys: Int!
  hitCount: Int!
  missCount: Int!
  storeType: String!
  usedMemoryBytes: Int
  maxMemoryBytes: Int
  evictedKeys: Int
  expiredKeys: Int
  connectedClients: Int
  opsPerSec: Int
}

type CacheTableStatType {
  tableId: Int!
  cachedEntries: Int!
}

type HotTableStatType {
  tableName: String!
  catalog: String!
  schemaName: String!
  rowCount: Int!
  isApi: Boolean!
  loaded: Boolean!
}

type MaterializeStoreInfoType {
  engineName: String!
  storeRef: String!
  mvCount: Int!
}

type SystemHealthType {
  trinoConnected: Boolean!
  trinoWorkerCount: Int!
  trinoActiveWorkers: Int!
  pgPoolSize: Int!
  pgPoolFree: Int!
  cacheConnected: Boolean!
  flightServerRunning: Boolean!
  mvRefreshLoopRunning: Boolean!
}

type ScheduledTaskType {
  id: String!
  name: String!
  cronExpression: String!
  webhookUrl: String
  enabled: Boolean!
  lastRunAt: String
  nextRunAt: String
}

type Mutation {
  createSource(input: SourceInput!): MutationResult!
  updateSource(input: SourceInput!): MutationResult!
  renameSource(oldId: String!, newId: String!): MutationResult!
  deleteSource(id: String!): MutationResult!
  createDomain(input: DomainInput!): MutationResult!
  deleteDomain(id: String!): MutationResult!
  createRole(input: RoleInput!): MutationResult!
  registerTable(input: TableInput!): MutationResult!
  updateTable(input: TableInput!): MutationResult!
  deleteTable(id: Int!): MutationResult!
  deleteRole(id: String!): MutationResult!
  upsertRlsRule(input: RLSRuleInput!): MutationResult!
  deleteRlsRule(roleId: String!, tableId: Int = null, domainId: String = null): MutationResult!
  upsertRelationship(input: RelationshipInput!): MutationResult!
  deleteRelationship(id: String!): MutationResult!
  updateSourceCache(sourceId: String!, cacheEnabled: Boolean!, cacheTtl: Int = null): MutationResult!
  updateTableCache(tableId: Int!, cacheTtl: Int = null): MutationResult!
  updateSourcePreferMaterialized(sourceId: String!, preferMaterialized: Boolean!): MutationResult!
  updateTablePreferMaterialized(tableId: Int!, preferMaterialized: Boolean = null): MutationResult!
  updateNamingConvention(convention: String!): MutationResult!
  updateSourceNaming(sourceId: String!, namingConvention: String = null): MutationResult!
  updateSourceAllowedDomains(sourceId: String!, allowedDomains: [String!]!): MutationResult!
  updateTableNaming(tableId: Int!, namingConvention: String = null): MutationResult!
  refreshMv(mvId: String!): MutationResult!
  toggleMv(mvId: String!, enabled: Boolean!): MutationResult!
  purgeCache: MutationResult!
  purgeCacheByTable(tableId: Int!): MutationResult!
  invalidateFileSource(tableId: Int!): MutationResult!
  toggleScheduledTask(taskId: String!, enabled: Boolean!): MutationResult!
  compileQuery(input: CompileQueryInput!): [CompileQueryResult!]!
  deployViewToDb(tableId: Int!): MutationResult!
}

type MutationResult {
  success: Boolean!
  message: String!
}

input SourceInput {
  id: String!
  type: String!
  host: String! = ""
  port: Int! = 0
  database: String! = ""
  username: String! = ""
  password: String! = ""
  path: String = null
  description: String! = ""
  allowedDomains: [String!]! = []
  mappingJson: String = null
}

input DomainInput {
  id: String!
  description: String! = ""
  graphqlAlias: String = null
}

input RoleInput {
  id: String!
  capabilities: [String!]!
  domainAccess: [String!]!
}

input TableInput {
  sourceId: String!
  domainId: String!
  schemaName: String!
  tableName: String!
  governance: String!
  columns: [ColumnInput!]!
  alias: String = null
  description: String = null
  watermarkColumn: String = null
  columnPresets: [ColumnPresetInput!]! = []
  viewSql: String = null
  dataProduct: Boolean! = false
}

input ColumnInput {
  name: String!
  visibleTo: [String!]!
  writableBy: [String!]! = []
  unmaskedTo: [String!]! = []
  maskType: String = null
  maskPattern: String = null
  maskReplace: String = null
  maskValue: String = null
  maskPrecision: String = null
  alias: String = null
  description: String = null
  nativeFilterType: String = null
  isPrimaryKey: Boolean! = false
  isForeignKey: Boolean! = false
  isAlternateKey: Boolean! = false
  scope: String! = "domain"
}

input ColumnPresetInput {
  column: String!
  source: String!
  name: String = null
  value: String = null
  dataType: String = null
}

input RLSRuleInput {
  tableId: String = null
  domainId: String = null
  roleId: String! = ""
  filterExpr: String! = ""
}

input RelationshipInput {
  id: String!
  sourceTableId: String!
  targetTableId: String! = ""
  sourceColumn: String!
  targetColumn: String! = ""
  cardinality: String!
  materialize: Boolean! = false
  refreshInterval: Int! = 300
  targetFunctionName: String = null
  functionArg: String = null
  alias: String = null
  graphqlAlias: String = null
  disableCypher: Boolean! = false
  recordCandidate: Boolean! = false
}

type CompileQueryResult {
  sql: String!
  semanticSql: String!
  trinoSql: String
  directSql: String
  route: String!
  routeReason: String!
  sources: [String!]!
  rootField: String!
  canonicalField: String!
  columnAliases: [ColumnAliasType!]!
  enforcement: EnforcementType!
  optimizations: [String!]!
  warnings: [String!]!
  compiledCypher: String
  cypherError: String
}

type ColumnAliasType {
  fieldName: String!
  column: String!
}

type EnforcementType {
  rlsFiltersApplied: [String!]!
  columnsExcluded: [String!]!
  schemaScope: String!
  maskingApplied: [String!]!
  ceilingApplied: String
  route: String!
}

input CompileQueryInput {
  query: String!
  role: String!
  variables: JSON = null
  flatSql: Boolean! = false
  flatCypher: Boolean! = false
  nodeOnlyCypher: Boolean! = false
}

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](https://ecma-international.org/wp-content/uploads/ECMA-404_2nd_edition_december_2017.pdf).
"""
scalar JSON
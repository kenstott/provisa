# Provisa application — overlay onto core.yml.
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.app.yml up
services:
  provisa:
    restart: unless-stopped
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
      - "${FLIGHT_PORT:-8815}:8815"
    volumes:
      - ./demo:/app/demo:ro
    environment:
      PG_HOST: "${CONFIG_DB_HOST:-postgres}"
      PG_PORT: "${CONFIG_DB_PORT:-5432}"
      PG_DATABASE: "${CONFIG_DB_NAME:-provisa}"
      PG_USER: "${CONFIG_DB_USER:-provisa}"
      PG_PASSWORD: "${CONFIG_DB_PASSWORD:-provisa}"
      # Control-plane SQLAlchemy URIs — the single chokepoint that reads the DB
      # connection (REQ-837). PLATFORM_DATABASE_URL has no fallback and the app
      # aborts at startup without it; the tenant default points at localhost, which
      # is wrong inside the container network. Build both from the PG_* vars above so
      # they track the same postgres service (parity with the Helm deployment).
      TENANT_DATABASE_URL: "postgresql+asyncpg://${CONFIG_DB_USER:-provisa}:${CONFIG_DB_PASSWORD:-provisa}@${CONFIG_DB_HOST:-postgres}:${CONFIG_DB_PORT:-5432}/${CONFIG_DB_NAME:-provisa}"
      PLATFORM_DATABASE_URL: "postgresql+asyncpg://${CONFIG_DB_USER:-provisa}:${CONFIG_DB_PASSWORD:-provisa}@${CONFIG_DB_HOST:-postgres}:${CONFIG_DB_PORT:-5432}/${CONFIG_DB_NAME:-provisa}"
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_FLIGHT_PORT: 8480
      FLIGHT_PORT: "${FLIGHT_PORT:-8815}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-provisa}"
      GRAPHQL_DEMO_ENABLED: "${GRAPHQL_DEMO_ENABLED:-false}"
      GRAPHQL_DEMO_URL: "${GRAPHQL_DEMO_URL:-http://graphql-demo:4000/graphql}"
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy

  provisa-ui:
    restart: unless-stopped
    build: .
    command: ["uvicorn", "provisa.ui_server:app", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      - provisa

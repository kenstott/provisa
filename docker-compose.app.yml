# Provisa application — overlay onto core.yml.
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.app.yml up
services:
  provisa:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
      - "${FLIGHT_PORT:-8815}:8815"
    environment:
      PG_HOST: "${CONFIG_DB_HOST:-postgres}"
      PG_PORT: "${CONFIG_DB_PORT:-5432}"
      PG_DATABASE: "${CONFIG_DB_NAME:-provisa}"
      PG_USER: "${CONFIG_DB_USER:-provisa}"
      PG_PASSWORD: "${CONFIG_DB_PASSWORD:-provisa}"
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TRINO_FLIGHT_PORT: 8480
      FLIGHT_PORT: "${FLIGHT_PORT:-8815}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-provisa}"
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy

  provisa-ui:
    build: .
    command: ["uvicorn", "provisa.ui_server:app", "--host", "0.0.0.0", "--port", "3000"]
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      - provisa

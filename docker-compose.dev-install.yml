# Install-simulation overlay — exposes core service ports for local backend access.
# Matches the installed product's service set (no kafka, mongo, elasticsearch, observability).
# Usage: docker compose -f docker-compose.core.yml -f docker-compose.dev-install.yml up
services:
  postgres:
    ports:
      - "${PG_PORT:-5432}:5432"

  pgbouncer:
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  trino:
    ports:
      - "${TRINO_PORT:-8080}:8080"
    volumes:
      - ./trino/catalog-install:/etc/trino/catalog

  trino-worker:
    volumes:
      - ./trino/catalog-install:/etc/trino/catalog

  zaychik:
    ports:
      - "${ZAYCHIK_PORT:-8480}:8480"



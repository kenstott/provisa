# Provisa Helm chart values

provisa:
  replicaCount: 2
  image:
    repository: provisa
    tag: latest
    pullPolicy: IfNotPresent
  port: 8000
  flightPort: 8815
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  env:
    PROVISA_MODE: production
    PROVISA_CONFIG: /app/config/provisa.yaml
  configMap: provisa-config

trino:
  enabled: true
  coordinator:
    replicaCount: 1
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
  worker:
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
      targetCPUUtilization: 70
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 8Gi
  image:
    repository: trinodb/trino
    tag: "439"
  port: 8080

postgresql:
  enabled: true
  host: ""  # set if using external PG
  port: 5432
  database: provisa
  username: provisa
  password: provisa  # override via --set or secrets

pgbouncer:
  enabled: true
  port: 6432
  poolMode: transaction
  defaultPoolSize: 20
  maxClientConn: 200

mongodb:
  enabled: true
  port: 27017

minio:
  enabled: true
  accessKey: minioadmin
  secretKey: minioadmin

redis:
  enabled: false
  host: ""
  port: 6379

ingress:
  enabled: false
  className: nginx
  host: provisa.example.com
  tls:
    enabled: false
    secretName: provisa-tls

observability:
  enabled: false  # set to true to deploy otel-collector, tempo, prometheus, grafana

  otelCollector:
    image: otel/opentelemetry-collector-contrib
    tag: "0.99.0"
    otlpGrpcPort: 4317
    otlpHttpPort: 4318
    prometheusPort: 8889

  tempo:
    image: grafana/tempo
    tag: "2.4.1"
    httpPort: 3200
    otlpGrpcPort: 4317

  prometheus:
    image: prom/prometheus
    tag: "v2.51.2"
    port: 9090

  grafana:
    image: grafana/grafana
    tag: "10.4.2"
    port: 3000
    adminPassword: provisa
    service:
      type: ClusterIP

{{- if .Values.trino.enabled }}
# Workers are stateless — they discover the coordinator via config and do not need
# stable DNS identities. Using Deployment (not StatefulSet) enables correct HPA
# scale-down behaviour and standard rolling updates.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-trino-worker
  labels:
    app: trino
    role: worker
spec:
  replicas: {{ .Values.trino.worker.replicaCount }}
  selector:
    matchLabels:
      app: trino
      role: worker
  template:
    metadata:
      labels:
        app: trino
        role: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: trino
          image: "{{ .Values.trino.image.repository }}:{{ .Values.trino.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.trino.port }}
          env:
            - name: TRINO_NODE_TYPE
              value: worker
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: worker-config.properties
            {{- if .Values.postgresql.enabled }}
            - name: catalog-secret
              mountPath: /etc/trino/catalog/sales_pg.properties
              subPath: sales_pg.properties
            - name: catalog-secret
              mountPath: /etc/trino/catalog/analytics_pg.properties
              subPath: analytics_pg.properties
            {{- end }}
            {{- if .Values.mongodb.enabled }}
            - name: config
              mountPath: /etc/trino/catalog/reviews_mongo.properties
              subPath: reviews_mongo.properties
            {{- end }}
          resources:
            {{- toYaml .Values.trino.worker.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/info
              port: {{ .Values.trino.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/info
              port: {{ .Values.trino.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-trino-config
        {{- if .Values.postgresql.enabled }}
        - name: catalog-secret
          secret:
            secretName: {{ .Release.Name }}-trino-catalog
        {{- end }}
{{- if .Values.trino.worker.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-trino-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-trino-worker
  minReplicas: {{ .Values.trino.worker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.trino.worker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.trino.worker.autoscaling.targetCPUUtilization }}
{{- end }}
{{- end }}

# PodDisruptionBudgets — ensure minimum availability during node drains and
# cluster maintenance windows. minAvailable: 1 is safe even for single-replica
# workloads (drain blocks until a replacement is ready).

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-provisa
spec:
  minAvailable: {{ .Values.provisa.pdb.minAvailable }}
  selector:
    matchLabels:
      app: provisa
{{- if .Values.trino.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-trino-coordinator
spec:
  minAvailable: {{ .Values.trino.coordinator.pdb.minAvailable }}
  selector:
    matchLabels:
      app: trino
      role: coordinator
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-trino-worker
spec:
  minAvailable: {{ .Values.trino.worker.pdb.minAvailable }}
  selector:
    matchLabels:
      app: trino
      role: worker
{{- end }}
{{- if .Values.postgresql.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-postgresql
spec:
  minAvailable: {{ .Values.postgresql.pdb.minAvailable }}

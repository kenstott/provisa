{{- if .Values.provisa.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-provisa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-provisa
  minReplicas: {{ .Values.provisa.hpa.minReplicas }}
  maxReplicas: {{ .Values.provisa.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.provisa.hpa.targetCPUUtilization }}
{{- end }}

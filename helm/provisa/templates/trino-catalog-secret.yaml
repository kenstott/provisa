{{- if and .Values.trino.enabled .Values.postgresql.enabled }}
# Trino catalog credentials are stored in a Secret (not ConfigMap) so they can be
# restricted via RBAC and encrypted at rest when etcd encryption is configured.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-trino-catalog
type: Opaque
stringData:
  sales_pg.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://{{ .Release.Name }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}
    connection-user={{ .Values.postgresql.username }}
    connection-password={{ .Values.postgresql.password }}
  analytics_pg.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://{{ .Release.Name }}-postgresql:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}
    connection-user={{ .Values.postgresql.username }}
    connection-password={{ .Values.postgresql.password }}
{{- end }}

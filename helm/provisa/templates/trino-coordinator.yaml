{{- if .Values.trino.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-trino-coordinator
  labels:
    app: trino
    role: coordinator
spec:
  replicas: {{ .Values.trino.coordinator.replicaCount }}
  serviceName: {{ .Release.Name }}-trino-coordinator
  selector:
    matchLabels:
      app: trino
      role: coordinator
  template:
    metadata:
      labels:
        app: trino
        role: coordinator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: trino
          image: "{{ .Values.trino.image.repository }}:{{ .Values.trino.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.trino.port }}
          env:
            - name: TRINO_NODE_TYPE
              value: coordinator
          volumeMounts:
            - name: config
              mountPath: /etc/trino/config.properties
              subPath: coordinator-config.properties
            {{- if .Values.postgresql.enabled }}
            - name: catalog-secret
              mountPath: /etc/trino/catalog/sales_pg.properties
              subPath: sales_pg.properties
            - name: catalog-secret
              mountPath: /etc/trino/catalog/analytics_pg.properties
              subPath: analytics_pg.properties
            {{- end }}
            {{- if .Values.mongodb.enabled }}
            - name: config
              mountPath: /etc/trino/catalog/reviews_mongo.properties
              subPath: reviews_mongo.properties
            {{- end }}
          resources:
            {{- toYaml .Values.trino.coordinator.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/info
              port: {{ .Values.trino.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/info
              port: {{ .Values.trino.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-trino-config
        {{- if .Values.postgresql.enabled }}
        - name: catalog-secret
          secret:
            secretName: {{ .Release.Name }}-trino-catalog
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-trino-coordinator
spec:
  selector:
    app: trino
    role: coordinator
  ports:
    - port: {{ .Values.trino.port }}
      targetPort: {{ .Values.trino.port }}
  type: ClusterIP
{{- end }}

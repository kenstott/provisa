{{- if .Values.trino.enabled }}
{{- /*
  Fault-tolerant execution exchange manager (replaces legacy spill-to-disk).
  Pods can land on different nodes, so the exchange spool must be shared external
  storage — S3/MinIO, not a local disk. Credentials live in a Secret (not the
  ConfigMap) so they can be RBAC-restricted and encrypted at rest.

  Endpoint resolution (no silent fallback — the cluster must provide one path or
  the other, else render fails):
    - trino.exchange.s3.endpoint set  → external S3; creds from trino.exchange.s3.*
    - empty                           → in-cluster MinIO; requires minio.enabled
*/}}
{{- $ext := .Values.trino.exchange.s3.endpoint }}
{{- $endpoint := $ext }}
{{- $accessKey := .Values.trino.exchange.s3.accessKey }}
{{- $secretKey := .Values.trino.exchange.s3.secretKey }}
{{- if not $ext }}
  {{- if not .Values.minio.enabled }}
    {{- fail "trino: fault-tolerant execution needs an exchange store. Set minio.enabled=true or provide trino.exchange.s3.endpoint (+accessKey/secretKey)." }}
  {{- end }}
  {{- $endpoint = printf "http://%s-minio:9000" .Release.Name }}
  {{- $accessKey = .Values.minio.accessKey }}
  {{- $secretKey = .Values.minio.secretKey }}
{{- else }}
  {{- if or (not $accessKey) (not $secretKey) }}
    {{- fail "trino.exchange.s3.endpoint is set but trino.exchange.s3.accessKey/secretKey are empty." }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-trino-exchange
type: Opaque
stringData:
  exchange-manager.properties: |
    exchange-manager.name=filesystem
    exchange.base-directories=s3://{{ .Values.trino.exchange.bucket }}
    exchange.s3.endpoint={{ $endpoint }}
    exchange.s3.region={{ .Values.trino.exchange.region }}
    exchange.s3.aws-access-key={{ $accessKey }}
    exchange.s3.aws-secret-key={{ $secretKey }}
    exchange.s3.path-style-access=true
{{- end }}

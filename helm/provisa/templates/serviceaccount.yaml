# Dedicated ServiceAccount for the provisa application pod.
# automountServiceAccountToken: false — the app does not need K8s API access.
# Granting only what's needed satisfies least-privilege RBAC audits.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-provisa
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: false

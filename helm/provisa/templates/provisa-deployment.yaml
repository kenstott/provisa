apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-provisa
  labels:
    app: provisa
spec:
  replicas: {{ .Values.provisa.replicaCount }}
  selector:
    matchLabels:
      app: provisa
  template:
    metadata:
      labels:
        app: provisa
    spec:
      serviceAccountName: {{ .Release.Name }}-provisa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.provisa.podAntiAffinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: provisa
                topologyKey: kubernetes.io/hostname
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: postgres:16
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: pg-password
          command:
            - sh
            - -c
            - |
              until psql -h {{ .Release.Name }}-postgresql -p {{ .Values.postgresql.port }} \
                -U {{ .Values.postgresql.username }} -d {{ .Values.postgresql.database }} \
                -c "SELECT 1" > /dev/null 2>&1; do
                echo "waiting for postgres..."; sleep 3
              done
      containers:
        - name: provisa
          image: "{{ .Values.provisa.image.repository }}:{{ .Values.provisa.image.tag }}"
          imagePullPolicy: {{ .Values.provisa.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.provisa.port }}
            - name: flight
              containerPort: {{ .Values.provisa.flightPort }}
          env:
            - name: PG_HOST
              value: {{ if .Values.postgresql.host }}{{ .Values.postgresql.host }}{{ else if .Values.pgbouncer.enabled }}{{ .Release.Name }}-pgbouncer{{ else }}{{ .Release.Name }}-postgresql{{ end }}
            - name: PG_PORT
              value: {{ if .Values.pgbouncer.enabled }}"{{ .Values.pgbouncer.port }}"{{ else }}"{{ .Values.postgresql.port }}"{{ end }}
            - name: PG_DATABASE
              value: "{{ .Values.postgresql.database }}"
            - name: PG_USER
              value: "{{ .Values.postgresql.username }}"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: pg-password
            # Control-plane DB URLs are REQUIRED with no fallback (REQ-837), so
            # the chart must supply them. Both planes share the same Postgres in
            # this deployment; built from the PG_* vars above via k8s dependent
            # env-var interpolation so the password stays sourced from the secret.
            - name: TENANT_DATABASE_URL
              value: "postgresql+asyncpg://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/$(PG_DATABASE)"
            - name: PLATFORM_DATABASE_URL
              value: "postgresql+asyncpg://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/$(PG_DATABASE)"
            # Deployment engine (parity with the desktop wizard, REQ-972..979).
            # The user-facing "external" maps to the app's engine key "sqlalchemy"
            # (the value the installers write); the engine registry has no "external"
            # key and rejects it, so translate here.
            - name: PROVISA_ENGINE
              value: "{{ if eq .Values.deployment.engine "external" }}sqlalchemy{{ else }}{{ .Values.deployment.engine }}{{ end }}"
            {{- if eq .Values.deployment.engine "external" }}
            - name: PROVISA_ENGINE_URL
              value: "{{ required "deployment.engineUrl is required when deployment.engine=external" .Values.deployment.engineUrl }}"
            {{- if .Values.deployment.materializeUrl }}
            - name: PROVISA_MATERIALIZE_URL
              value: "{{ .Values.deployment.materializeUrl }}"
            {{- end }}
            {{- end }}
            - name: TRINO_HOST
              value: "{{ .Release.Name }}-trino-coordinator"
            - name: TRINO_PORT
              value: "{{ .Values.trino.port }}"
            - name: TRINO_FLIGHT_PORT
              value: "8480"
            - name: FLIGHT_PORT
              value: "{{ .Values.provisa.flightPort }}"
            {{- if .Values.zaychik.enabled }}
            - name: ZAYCHIK_HOST
              value: "{{ .Release.Name }}-zaychik"
            - name: ZAYCHIK_PORT
              value: "{{ .Values.zaychik.port }}"
            {{- end }}
            {{- range $key, $val := .Values.provisa.env }}
            - name: {{ $key }}
              value: "{{ $val }}"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              value: {{ if .Values.redis.host }}{{ .Values.redis.host }}{{ else }}{{ .Release.Name }}-redis{{ end }}
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-password
            - name: REDIS_TLS
              value: "{{ .Values.redis.tls }}"
            {{- end }}
            {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:{{ .Values.observability.otelCollector.otlpGrpcPort }}"
            - name: OTEL_SERVICE_NAME
              value: "provisa"
            {{- else if .Values.observability.externalEndpoint }}
            # obs=collector: export to an operator-supplied OTLP endpoint, deploy no stack.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.observability.externalEndpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "provisa"
            {{- end }}
            {{- if .Values.demo.enabled }}
            # Demo add-on: seed demo domains and open the guided tour.
            - name: PROVISA_INSTALL_DEMO
              value: "y"
            - name: PROVISA_DEMO_GRAPHQL_URL
              value: "http://{{ .Release.Name }}-demo-graphql:{{ .Values.demo.graphql.port }}"
            - name: PROVISA_DEMO_PETSTORE_URL
              value: "http://{{ .Release.Name }}-demo-petstore:{{ .Values.demo.petstore.port }}"
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            {{- toYaml .Values.provisa.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.provisa.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.provisa.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-provisa
  labels:
    app: provisa
spec:
  replicas: {{ .Values.provisa.replicaCount }}
  selector:
    matchLabels:
      app: provisa
  template:
    metadata:
      labels:
        app: provisa
    spec:
      serviceAccountName: {{ .Release.Name }}-provisa
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.provisa.podAntiAffinity }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: provisa
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: provisa
          image: "{{ .Values.provisa.image.repository }}:{{ .Values.provisa.image.tag }}"
          imagePullPolicy: {{ .Values.provisa.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.provisa.port }}
            - name: flight
              containerPort: {{ .Values.provisa.flightPort }}
          env:
            - name: PG_HOST
              value: {{ if .Values.postgresql.host }}{{ .Values.postgresql.host }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}
            - name: PG_PORT
              value: {{ if .Values.pgbouncer.enabled }}"{{ .Values.pgbouncer.port }}"{{ else }}"{{ .Values.postgresql.port }}"{{ end }}
            - name: PG_DATABASE
              value: "{{ .Values.postgresql.database }}"
            - name: PG_USER
              value: "{{ .Values.postgresql.username }}"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: pg-password
            - name: TRINO_HOST
              value: "{{ .Release.Name }}-trino-coordinator"
            - name: TRINO_PORT
              value: "{{ .Values.trino.port }}"
            - name: TRINO_FLIGHT_PORT
              value: "8480"
            - name: FLIGHT_PORT
              value: "{{ .Values.provisa.flightPort }}"
            {{- range $key, $val := .Values.provisa.env }}
            - name: {{ $key }}
              value: "{{ $val }}"
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              value: {{ if .Values.redis.host }}{{ .Values.redis.host }}{{ else }}{{ .Release.Name }}-redis{{ end }}
            - name: REDIS_PORT
              value: "{{ .Values.redis.port }}"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-password
            - name: REDIS_TLS
              value: "{{ .Values.redis.tls }}"
            {{- end }}
            {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-otel-collector:{{ .Values.observability.otelCollector.otlpGrpcPort }}"
            - name: OTEL_SERVICE_NAME
              value: "provisa"
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            {{- toYaml .Values.provisa.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.provisa.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.provisa.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-config

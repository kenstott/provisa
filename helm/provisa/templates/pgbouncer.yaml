{{- if .Values.pgbouncer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-pgbouncer
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pgbouncer
          image: "edoburu/pgbouncer:{{ .Values.pgbouncer.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
          env:
            - name: DB_HOST
              value: {{ if .Values.postgresql.host }}{{ .Values.postgresql.host }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}
            - name: DB_PORT
              value: "{{ .Values.postgresql.port }}"
            - name: DB_USER
              value: "{{ .Values.postgresql.username }}"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: pg-password
            - name: DB_NAME
              value: "{{ .Values.postgresql.database }}"
            - name: POOL_MODE
              value: "{{ .Values.pgbouncer.poolMode }}"
            - name: MAX_CLIENT_CONN
              value: "{{ .Values.pgbouncer.maxClientConn }}"
            - name: DEFAULT_POOL_SIZE
              value: "{{ .Values.pgbouncer.defaultPoolSize }}"
            - name: AUTH_TYPE
              value: scram-sha-256
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
    - port: {{ .Values.pgbouncer.port }}
      targetPort: 5432
  type: ClusterIP
{{- end }}

# Dev mode: PG + Trino only. Run Provisa locally with native debugger.
services:
  postgres:
    image: postgres:16
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: provisa
      POSTGRES_USER: provisa
      POSTGRES_PASSWORD: provisa
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provisa"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongodb:
    profiles: [dev]
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6432:6432"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: provisa
      POOL_MODE: transaction
      LISTEN_PORT: 6432
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka:
    profiles: [dev]
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: 3W4Vn7JTS4yUfx7dcvUlPg
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-registry:
    profiles: [dev]
    image: confluentinc/cp-schema-registry:7.6.0
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  debezium-connect:
    profiles: [dev]
    image: quay.io/debezium/connect:2.7
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  trino:
    image: trinodb/trino:480
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/kafka:/etc/trino/kafka:ro
      - trino_cache:/data/trino/cache
      # OTel Java agent dir: start-ui.sh --observability patches jvm.config and stores jar here
      - ./observability/trino-otel:/etc/trino/otel:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "trino --execute 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  zaychik:
    build: ./zaychik
    ports:
      - "8480:8480"
    environment:
      TF_TRINO_HOST: trino
      TF_TRINO_PORT: 8080
      TF_TRINO_SSL: "false"
      TF_FLIGHT_HOST: 0.0.0.0
      TF_FLIGHT_PORT: 8480
      TF_FLIGHT_SSL: "false"
      TF_FLIGHT_AUTH_TYPE: trino
      TF_FLIGHT_BATCH_SIZE: 10000
    depends_on:
      trino:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8480' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  elasticsearch:
    profiles: [dev]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  trino-worker:
    image: trinodb/trino:480
    entrypoint: ["/etc/trino/worker/entrypoint.sh"]
    volumes:
      - ./trino/etc/worker/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/worker/entrypoint.sh:/etc/trino/worker/entrypoint.sh:ro
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/kafka:/etc/trino/kafka:ro
      - trino_worker_cache:/data/trino/cache
      - ./observability/trino-otel:/etc/trino/otel:ro
    depends_on:
      trino:
        condition: service_healthy
    deploy:
      replicas: 0

  # Optional: Neo4j for Phase AO integration tests
  # Start with: docker compose up neo4j
  neo4j:
    image: neo4j:5.19
    profiles: ["neo4j"]
    environment:
      NEO4J_AUTH: none
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # Optional: OpenTelemetry observability stack
  # Start with: docker compose --profile observability up
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    profiles: ["observability"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    command: ["--config=/etc/otel-collector-config.yaml"]

  prometheus:
    image: prom/prometheus:v2.51.2
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - otel-collector

  tempo:
    image: grafana/tempo:2.4.1
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - tempo_data:/var/tempo
    configs:
      - source: tempo_config
        target: /etc/tempo.yaml

  grafana:
    image: grafana/grafana:10.4.2
    profiles: ["observability"]
    ports:
      - "3100:3000"   # 3100 avoids conflict with UI dev server on 3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo

  # Optional: Apache Jena Fuseki (SPARQL) for Phase AO integration tests
  # Start with: docker compose up fuseki
  fuseki:
    image: atomgraph/fuseki:latest
    profiles: ["sparql"]
    command: ["--mem", "/provisa"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3030/$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pg_data:
  mongo_data:
  minio_data:
  redis_data:
  kafka_data:
  es_data:
  trino_cache:
  trino_worker_cache:
  neo4j_data:
  prometheus_data:
  tempo_data:
  grafana_data:

configs:
  tempo_config:
    content: |
      server:
        http_listen_port: 3200
      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
      ingester:
        max_block_duration: 5m
      compactor:
        compaction:
          block_retention: 48h
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/blocks
          wal:
            path: /var/tempo/wal

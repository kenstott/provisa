[project]
name = "provisa"
version = "0.1.0"
description = "Config-driven data virtualization platform"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn",
    "asyncpg",
    "pydantic>=2",
    "strawberry-graphql[fastapi]",
    "pyyaml",
    "graphql-core>=3.2",
    "sqlglot",
    "trino",
    "grpcio",
    "grpcio-tools",
    "grpcio-reflection",
    "pyarrow",
    "adbc-driver-flightsql",
    "adbc-driver-manager",
    "httpx",
    "redis[hiredis]",
    "anthropic",
    "apscheduler>=3.10",
    "jsonpath-ng",
    "PyJWT[crypto]",
    "bcrypt",
    "motor",
    "elasticsearch>=8,<9",
    "aiokafka",
]

[project.optional-dependencies]
mysql = ["aiomysql"]
sqlserver = ["aioodbc"]
oracle = ["oracledb"]
duckdb = ["duckdb"]
all-drivers = ["aiomysql", "aioodbc", "oracledb", "duckdb"]
firebase = ["firebase-admin"]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
    "black",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["provisa*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
markers = [
    "integration: requires Docker Compose stack (PG + Trino)",
    "e2e: full HTTP pipeline tests against running app",
    "slow: long-running tests",
]
filterwarnings = [
    "ignore::DeprecationWarning:pytest_asyncio",
    "ignore:The HMAC key is:UserWarning",
]

[tool.ruff]
target-version = "py312"
line-length = 100

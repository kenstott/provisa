# Demo/example services overlay — adds graphql-demo, petstore-mock, and sqlite demo data.
# MinIO and redirect env vars are provided by docker-compose.observability.yml.
# Usage (demo mode): docker compose -f docker-compose.core.yml -f docker-compose.observability.yml -f docker-compose.demo.yml up
# Do NOT include in production starts.
services:
  # Python OpenAPI mock (replaces the Java swaggerapi/petstore3 image).
  petstore-mock:
    build: ./demo/petstore_server
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v3/pet/findByStatus?status=available')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
      start_interval: 2s

  graphql-demo:
    build: ./demo/graphql_server
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/graphql?query=%7B__typename%7D')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# Demo/example services overlay — adds graphql-demo, petstore-mock, and sqlite demo data.
# Usage (demo mode): docker compose -f docker-compose.core.yml -f docker-compose.dev-install.yml -f docker-compose.demo.yml up
# Do NOT include in production starts.
services:
  petstore-mock:
    image: swaggerapi/petstore3:unstable
    platform: linux/amd64
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v3/pet/findByStatus?status=available || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  graphql-demo:
    build: ./demo/graphql_server
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/graphql?query=%7B__typename%7D')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
